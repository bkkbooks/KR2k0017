body:
  text: 赤城志地理類三都會郡縣之屬提要臣等謹案赤城志四十卷宋陳耆卿撰耆卿字壽老號篔窗台州寧海人登嘉定七年進士官至國子監司業其事迹不見於宋史惟謝鐸赤城新志稍著其仕履而亦不詳今以所著篔窗集考之則嘉定十一年嘗為青田縣主簿嘉定十三年為慶元府府學教授又趙希辨讀書附志稱耆卿集中沂邸箋表為多案宋史孝宗孫吳興郡王柄追封沂王其嗣子希瞿寧宗嘗立為皇子即濟王竑耆卿必嘗為其府記室而希辨略其文也此為所撰台州總志以所屬臨海黃巖天台仙居寧海五縣條分件繫分十五門其曰赤城者文選孫綽天台山賦稱赤城霞起以建標李善注引支遁天台山銘序曰往天台當由赤城山為道徑又引孔靈符會稽記曰赤城山石色皆赤狀似雲霞又引天台山圖曰赤城山天台之南門也梁始置赤城郡蓋因山為名耆卿此志即用梁郡名耳耆卿受學於葉適文章法度具有師承故敘述咸中體裁明謝鐸嘗續其書去之逺甚舊與耆卿書合編今析出别存其目陳振孫書録解題載此志之前有圖十三此本乃無一圖殆傳寫者艱於繪畫久而佚之矣乾隆四十五年七月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:0b904b5e5f6bfc3ddf01b3640145713ede7cd3c2f95b69bb6d3c734b84856150
