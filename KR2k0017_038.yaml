body:
  text: 赤城志卷三十八宋陳耆卿撰冢墓門生而敬其人死而護其兆此賢人君子之所以能為世勸也余觀州之冢墓自三國以來抑何其寥寥乎其埋沒者巳不存而其存者或不守翁仲孑立雨披煙殘欲遐想遺風而長夜不可旦矣然自今考之亦有出於遺民故老之流傳而未訂其實者如徐梁三王之類是耶非耶今既不能知其非則不容不襲之以為是至於近世貴盛踵相躡則有不可備記者今斷自法從云臨海吳陳尚書化墓在縣東一百三十里舊有碑隋末海寇仆之陳使君熙墓在縣東南一百二十三里白楓山北晉李使君成墓在縣東南一百二十五里白楓山南任隱君旭墓在縣東九十里東刋山南前有石麟又有九女冢乃其女弟之墓樊府君墓在縣東南七里樊續嶼按太平御覽云舊有空冢猶餘敗鼓角焉元相國墓在縣東一十五里舊傳唐元稹之後嘗為州通判而死葬於此按今城東有元其姓者居之藏其祖拜相麻乃白居易行詞并書後有守取以遺秦熺此其為稹後無疑但稱相國者訛也張中大康墓在縣東一百一十里五峴山下吳王墓在縣西一十四里失其名不知為何王也韓天冢在縣西二十里鯉魚墺四山環合隂陽家謂得子午卯酉之正上無林木石少土堅或云昔之仙人有韓其姓者尸解於此今章安湖側黃巖茶寮山亦各有之或云韓墓今不存舊有于其姓者葬於此吕丞相頤浩墓在縣西北三十里褒忠顯績院左吕薨時陳侍郎公輔營其柩於海上至一富姓家得之發其蓋有朱書吕安浩三字即主者姓名可怪也范丞相宗尹墓在縣東四十五里報恩衍慶院側陳侍郎公輔墓在縣南三十里拗嶺朝金紫公為墓在縣東南一百二十里金溪朝嘗為州後葬此曹開府勛墓在縣西四十里顯恩褒親院側王參政之望墓在縣南二十里定業院側綦內翰崈禮墓在城南一十里東山李尚書擢墓在縣南一十九里寶嚴院西子吏侍益謙墓附焉盧待制知原墓在縣東一百二十里柑桐盧本山東人嘗夢有告者云生山東死柑桐後果葬焉薑寶學詵墓在縣東四十五里西溪陳詹事良翰墓在縣南五里真空院右謝參政廓然墓在縣南二十里楊梅山謝丞相深甫墓在縣西北六十里保寧院側商侍郎飛卿墓在縣西二十五里龍潭莊側應諌議武墓在縣東北四十五里靈鷲院側黃巖天冢在茶寮山南世傳有人鋤山得物狀如鐡窗呼其黨劚之見金棺熠熠有光忽雷雨暴至勢若摧山裂石衆驚走及再往則有道士峩冠聳立於雲靄間明日詣之岌然石也於是相與駭異復封植之號云天冢徐偃王墓在縣東南二十五里勝果院後山有土甎臺址及石筍尚存按韓愈衢州廟記云王北走彭城百姓從之王死號其山為徐山鑿石為室以祠之則是其墓當在彭城矣又云或謂王之逃戰不之彭城之越城之隅棄玉几研於會稽之水則是其逃未有定止况其墓哉今象山霅川等處皆有偃王墓以一人而墓至三四誠不可考然黃巖故會稽也今並墓之山亦名徐山與韓愈説合徐山南一十五里有偃王古城其敢臆斷以為非耶晉王氏墓在縣南七十里樓﨑山墓甎螭形魚文貫以桞或為錢狀旁有文云晉永和十二年歲次丙辰八月壬午琅瑘國或云八月壬午作方壁二千樓﨑洽典作或云太元十五年餘皆漫不可識許靈感王墓在縣東五里唐李司直公亮墓在縣南一十五里墓志乃顔師本撰言其先隴西人以開成三年季冬六日旅窆於台州黃巖縣南黃山西南之原陸康業墓在縣東南一百里世傳為宣公贄之後國初擢進士第倅永嘉而卒葬於此謝參政克家墓在縣西五十里教忠崇報寺側天台唐豐尚書墓在縣東二里豐家橋近有人穿土得之墓記云尚書五子最幼者名干為僧即豐干也秦魯國賢穆大長公主祔都尉錢太師景臻墓在縣西北二十里護國寺側少師忱參政端禮丞相象祖仍祔焉滕忠烈侯膺墓在縣北七里傳教院側賀參政允中墓在縣東四十五里資福院仙居唐任相墓在縣北山五里今其溪曰任溪韓顯謨昭墓在縣南五里管竹村吳龍學芾墓在縣西一十里申墺寧海吳屈尚書晃妻墓在屈母山梁王墓在縣西北三十里梁王山上嘗於土中得鏡劍弩牙焉一云墓不可知但有古杉一根人疑其墓爾田將軍墓在縣西一里昔墓圮獲鐡鍪鎧即靖邉侯也詳見祠廟門李常侍墓在縣北二十五里梅林江南後主之族鄭都官墓一呼為鄭左史在縣南五里大坑昔家於此舊傳有牛落其鑿燭之棺已成土但見四壁彩畫如新都官事錢忠懿王與葉尚書以下四人為之納土者也今誥敕猶存葉尚書預墓在縣東北八十里東蒼葉太傅景泰墓在縣東三十里梅枝王尚書墓在縣東北五十里瀝洋嶺張光祿質墓在縣西北五十里硤石周中大祖墓在縣南五十里東墺其家自越徙此嘉祐五年忽有天燈見冢上其孫辨登第至元祐二年復見辨二子煒炳又登第焉羅提刑適墓在縣西南六十里馬山洪尚書墓在縣北二十里項墺赤城志卷三十八
