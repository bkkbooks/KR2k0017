body:
  text: 赤城志卷八宋陳耆卿撰秩官門一自罷侯置守更纍世之承襲而為三年之遷易事大異矣然得其人則治否則亂亦無以異也台自漢置回浦厥后或郡或縣廢置不等長民之吏雖零落千載而其磊磊落落以治行著聞者光芒注射亦曷嘗有古今哉按曽守會創壁記起唐武德趙逵前此弗著而后此亦多遺誤乃隨本年序次而博採傳記補其逸者五十有三人其歲月異同則各附見於其末蓋郡之司命在守當詳實不可遺也事難備載摘其要以列于下方云歷代郡守赤城志卷八
  hash: sha256:f39301fbf17a77f6382be0fdba8bbfc07e9fda8589dfdd4d7f1a1174d49c8689
