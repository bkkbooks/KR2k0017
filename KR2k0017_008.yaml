body:
  text: 赤城志巻八宋陳耆卿撰秩官門一自罷侯置守更累世之承襲而為三年之遷易事大異矣然得其人則治否則亂亦無以異也台自漢置回浦厥后或郡或縣廢置不等長民之吏雖零落千載而其磊磊落落以治行著聞者光芒注射亦曷嘗有古今哉按曽守㑹剏壁記起唐武徳趙逵前此弗著而后此亦多遺誤乃隨本年序次而博採傳記補其逸者五十有三人其歳月異同則各附見於其末蓋郡之司命在守當詳實不可遺也事難備載摘其要以列于下方云歴代郡守赤城志巻八
  hash: sha256:f5ad1ee1eafe87e8c7ae9d75335ba2a842bc1a46d3dfa5865b778df253844291
