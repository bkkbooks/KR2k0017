front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0017_WYG_001-1a, image: WYG0486/WYG0486-0568c.png}
body:
  text: 赤城志卷一宋陳耆卿撰地里門一禹别九州周分百縣州與縣之名昉此然以受地則廣以居民則富非若今之州縣蹙且鮮也台自漢萌芽僅號東南一尉至後漢始稱縣焉吳始稱郡焉以迄于今上下千餘載余以十道圖九域志及輿地寰宇諸書考之離合廢興殆不知幾變也即是以觀天下之大其沿革可勝道哉然自唐以前頗號僻左本朝南渡後陶和染醇文物滋盛乃始以勝壤名天下而官守者亦樂之焉地之顯晦時邪人邪余故博採以著于篇分敘州敘縣敘州上台州禹貢揚州之域春秋戰國時皆為越地自王無諸為楚所并秦滅楚為閩中郡閩君搖率越人佐漢伐秦漢立搖為東海王都東甌高帝六年為荆國十二年更名吳封劉濞為王其地屬焉孝景三年濞反漢擊之濞敗走保東越東越殺濞濞子駒怨東甌殺其父走閩越勸之擊東甌建元三年閩越圍東甌武帝遣嚴助發兵往救閩越引兵去東甌乃舉國徙江淮間以其地為回浦縣屬會稽郡為東部都尉按郡國志以章安縣東甌鄉為東部侯國通典云東部今臨海是也二説皆云東部獨漢地里志注回浦南部都尉治光武時改回浦為章安縣永和三年析縣之東甌鄉置永寧縣興平元年析章安永寧置松陽始平縣吳赤烏二年析永寧置羅陽縣太平二年析章安置臨海縣以會稽東部立臨海郡治臨海取郡東北臨海山而名屬揚州尋徙治章安晉武帝太康元年改始平為始豐羅陽為安固析臨海之北置寧海縣按寧海土風志縣本漢回浦鄞二縣太元二年裂鄞之八百户安北鄉二百步置寧海縣與前説微不同四年析安固置橫陽縣明帝太寧元年析永寧松陽安固橫陽置永嘉郡亦屬揚州穆帝永和三年析始豐置樂安縣宋孝建元年析揚之五郡為東揚州臨海與焉梁武帝改為赤城郡尋復為臨海縣至德元年復為郡治始豐隋開皇九年平陳郡廢復為臨海縣屬永嘉郡廢始豐寧海復入臨海十一年置臨海鎮於大固山移其縣於鎮大業四年沈法興擅立為海州唐武德四年平李子通以臨海縣置台州取天台山而名此按唐史係四年而壁記序乃云武德二年東南面行臺僕射杜伏威改海州為台州舊經又云五年改為台州二説不同當以史為正復置始豐寧海縣六年陷于輔公祏七年賊平仍置台州省寧海入章安八年廢始豐樂安章安三縣入臨海貞觀六年改隸括州都督府八年復析臨海置始豐上元二年復置永寧永昌元年復置寧海神龍二年析寧海置象山縣天授元年改永寧為黃岩天寶元年改台州為臨海郡乾元元年復為台州隸浙江東道肅宗上元二年改始豐為唐興析臨海復置樂安廣德元年郡徙治始豐二年以象山隸明州大厯十四年改隸浙江西道僖宗光啓三年升德化軍詳見魯洵作杜雄墓碑洵乃雄吏時為德化軍判官者也嘉定中黃岩永寧江有泅于水者拾一銅印其文曰台州德化軍行營朱記唐末吳越王錢鏐有其地梁開平三年改唐興為新興見徐靈府天台山記注錢氏寶正五年改樂安為永安後唐同光初改新興復為始豐晉天福初改台興國朝建隆初復為天台按天台縣經云梁時巳改曰天台考五代史無之太平興國三年錢氏納土入版圖隸兩浙東路前後沿革皆即臨海縣為州治景德四年改永安為仙居領縣五與兩浙道皆為南斗須女之分其境壤道里之數各附于左州境州在東京東南二千九百二十五里行在東五百四里東西三百九十里南北三百九十里是為提封之境東一百八十里入海西二百一十三里蒼嶺入處州南一百三十九里盤山入溫州北一百四十五里關嶺入紹興府是為四正之境東南二百九十二里入海西南一百九十二里括蒼山入處州東北三百二十五里磕蒼山入慶元府西北二百九十四里大盆山入婺州是為四隅之境多陸程西二十里至三江由江入溪八十里入仙居縣九十七里入天台縣南大江東南流一百里入黃巖縣又八十里出海門達溫福諸邊海州軍此水程也敘縣臨海望臨海縣本漢回浦屬會稽郡東漢改曰章安吳太平中析章安置臨海縣屬臨海郡晉宋因之後省入章安隋開皇改為臨海屬處州後屬永嘉郡唐武德復置章安縣後廢章安復為臨海縣境縣在州東南二百三十步東西二百四十里南北一百一十五里是為提封之境東一百八十里牛頭山入海西七十里黃奢嶺入仙居縣南四十五里黃土嶺入黃巖縣北六十五里杜潭嶺入天台縣是為四正之境東南一百二十六里海門山西南五十里括蒼山連燈壇山入仙居縣東北六十里寧和嶺入寧海縣此乃舊路今只循桐岩嶺而行以嶺脊為界去縣五十五里西北六十五里黃振嶺入天台縣是為四隅之境多陸程水程與州别黃巖望黃巖縣本漢永寧縣唐上元析臨海置屬台州天授元年更今名縣境縣在州南六十里東西三百一十里南北一百四十三里是為提封之境東六十里海門山入海西二百五十里蒼山入仙居縣南九十里嶠嶺入樂清縣北一十里戍鋪嶺入臨海縣是為四正之境東南二百一十五里大閭山入樂清縣西南三百里塵山入永嘉縣東北六十里赤山村西北七十里義誠鄉皆入臨海縣是為四隅之境多陸程南官塘九十里至嶠嶺入樂清縣北大江二十里至亭山入臨海縣又一百里入州由永寧江東北三十五里入海口東南三百二十里至上崎入溫州此水程也天台上天台縣本漢始平縣晉太康改始豐屬臨海郡宋因之隋廢唐武德復置屬海州後廢貞觀復置上元改唐興梁開平改新興後唐同光復名始豐晉天福改台興國朝建隆初改今名縣境縣在州西九十里東西二百二十九里南北七十二里是為提封之境東四十里筋竹嶺入寧海縣西一百八十三里大盆山入東陽縣南二十五里杜潭入臨海縣北五十里石壘寨入新昌縣是為四正之境東南四十里黃振嶺入臨海縣西南一百里紫籜山入仙居縣東北六十里靈墟入海西北四十里關嶺鋪入新昌縣是為四隅之境多陸程東南由始豐溪四十七里入臨海又東北七十里入州此水程也仙居上仙居縣本晉樂安縣宋因之唐武德廢上元復置錢氏改永安國朝景德更今名縣境縣在州西九十里東西一百二十里南北一百四十里是為提封之境東三十里界嶺入臨海縣西九十里風門入縉雲縣南一百里道者山入永嘉縣北五十里黃榆山入永康縣是為四正之境東南一百五十里五部山入黃岩縣西南一百里界繞山入縉雲縣東北八十里盧坑山入天台縣西北一百一十五里郭坦山入永康縣是為四隅之境多陸程南大溪自縣西五十里至石姥嶺東南入臨海界此水程也寧海緊寧海縣本吳臨海縣地晉太康析置隋開皇廢唐武德析臨海復置屬海州後省入章安永昌復置縣境縣在州東南一百七十五里東西一百九十里南北二百六十五里是為提封之境東一百三十里西溪嶺入象山縣西六十里筋竹嶺入天台縣南一百一十五里寧和嶺入臨海縣北六十里柵虛嶺入奉化縣是為四正之境東南二百五十里牛頭洋入臨海縣西南八十里白溪源入天台縣東北一百二十里紫溪嶺入象山縣西北八十里杉木嶺入奉化縣是為四隅之境多陸程港自縣東便風一潮過五嶼洋至牛頭洋小泊潮入海門一日夜至州此水程也赤城志卷一
