body:
  text: 赤城志巻六宋陳耆卿撰公廨門三縣眎州秩小位卑而於民最近民有事未有不由令之室而能徑達於守之庭者也州尊總其綱縣卑釐其目綱簡而目衆故凡獄訟若財賦漫漶轇轕絲棼葦積者咸先萃於縣縣能緝理位置則晝簾寂寂否則民肩吏足相與擁于門溢于庭散于廡充斥于狴犴如閧如市豈不削其體褻其居哉按五縣治黄巖最閎壯臨海號附郭今改選注京秩且以命朝士寄加重矣而其居亦未稱也然則居與人稱而政與居稱其自今日始乎臨海縣治在州南二百三十步按㕔事皇祐二年令崔黄臣建章望之為之記乾道九年火淳熙六年彭仲剛重新之尤守袤為記云乾道癸巳秋九月臨海居民不戒于火濫爛扇延以及縣治燔爇俱盡當官者因陋就簡僅能建三椽於煨燼之中以聴獄訟吏民亡所托足案牘無所棲列一遇風雨則沾漬暴露呌呼讙呶訟牒計簿散匿吏胥之家最易甲乙莫可循考縣曰以不理後三年予來為州有意興之而無與任其責者淳熙丁酉秋永嘉彭君仲剛來主縣事予聞彭名舊矣心固望其有為彭乃言曰夫環百里之地而為之長聚萬室之衆而聴其令民社所寄視古子男治必有所一邑之條教於是乎出而司存弗備亡以施政廢之當舉舍此孰先然役大用夥非受命于郡則令不得擅敢以為請予乃畀錢三十萬使營度之是冬予罷官歸踰年則彭以書來告成矣外為重門以嚴啓閉上建層樓以斂敕書治事有㕔燕居有室翼以脩廊挾以外廡吏直賓次環列有序奧者為藏爽者為獄為亭於大門之外以班詔令為閣於東廡之上以藏案牘為堂為齋為軒以備宴休游息之地下至於庖湢之所微至於什器之末雜至於丹雘甃甓之事纎悉畢具規橅堅壯工用精宻總為屋八十有一楹中鑿五池瀦水為備復以其餘力建丞簿之舍而新社稷之壇鄉之荆榛瓦礫之場今乃為高明宏麗之觀民始識有官府之嚴而稱其所以為邑大夫之居者問其經費之所出則曰未嘗巧取而奇斂也凡財之隠於吏而無籍木之訟於官而願獻者悉取而拘之鉤校畸贏積纍銖寸故費廣而不闕問其工役之次第則曰未嘗厲民而彊使也籍境内之為工者若干官出僦庸率如其私之直居處飲食先為規畫使極安便率旬有五日而迭休之其用夫止及於附邑之三鄉家止一人人役三日番無過十夫而亦與之庸省督工程無茍簡怠墮之患謹視給散無稽留朘削之弊民之與官為市為役者若私家然故役大而不擾葢經始於丁酉之冬而落成於已亥之秋問其所以久則曰不敢倉卒而趣辦也作於農隙而弗奪其時休其力而弗盡其用慰諭其勤而䇿其不勉民咸勸趨故功力而不勞夫聚財有方用民有節舉事有漸顧何往而不濟哉予常謂今之士莫難於為邑弱者不足以有為而健者或以病民幸而得彊弱之中則積負困之姦民撓之欲興事造業有其志而不克成者多矣又幸而不為積負之所困姦民之所撓而在上者或不察不得自展其才者亦多矣當君之始至賦亂政厖隠户移税弗可究詰乃考質劑乃正疆理逋租匿役披露首服吏姦民瘼檢柅濟理田野歡呼訟日以簡故能不困於積負不撓於姦民不抑於當路而興舊起廢不擾而集非庶幾於古之所謂循吏者乎夫裒聚贏羨於殫乏之餘可以觀儉謹用民力於偪仄之中可以觀仁積累工役於遲久之後可以觀智是皆足以為吏法而不可使之無傳予既嘉彭君之有成而因其請故遂著其實使後之人得以考而法之非以譽彭君也鼓樓在縣門上手詔亭在縣治前虚照堂在㕔後仲剛詩云宇定發天光所患在自窒機乗不容穟事至紛若櫛是中有物横滿眼皆黒漆斯堂亦空歟為我作虚室平心堂在㕔西仲剛詩云一泓不盈寸天地同其流微風相傾欹浩浩懷山丘牛馬已不辨况能鑑微不我欲稱物施舍是將安求琴堂在虚照堂後令孫祖徳題云一曲重彈子賤琴三年風月總知音休言無補公家事留得堂前竹樹隂擁青軒在琴堂後悦齋在虚照堂左瘦軒在㕔後嘉定十二年令朱中直建取宓子賤答有若之語而名丞㕔在縣東一十步舊在今主簿㕔乾道九年火淳熙六年令彭仲剛徙今地掃溉軒在㕔東嘉定十年丞王森建主簿㕔在縣西一十步舊在今丞㕔乾道九年火淳熙六年令彭仲剛徙今地慶元元年主簿蘇霖重建孔先堂在㕔前嘉定七年主簿趙汝駉建水心葉侍郎適名之且為銘曰非籍不有惟籍乃守先聖所正後學敢繆臨海之邑龠米寸帛必信必實以作民極尉㕔在州東北四里舊在下洋嘉祐元年徙今地宣和中燬于冦明年復建地据形勝其前秀巒環峙曠野平鋪後有峯屹然龍囦水㵼出其右隂陽家以為善吏隠者多通顯云隠軒在㕔東紹興二十二年尉王淮建景樞堂在㕔内淳熙六年尉葉卨建以先是王丞相淮為尉後位西府故名今名阜堂一鋒亭在㕔前淳熙六年尉葉卨建舊以舒亶為尉斬毆後母者賦詩有一鋒不斬姦邪首萬古安知將相材之句故名杜瀆塲㕔在縣東一百二十里押袋㕔在杜瀆塲㕔側黄巖縣治在城内宣和五年令王然重建鼓樓在縣治南一十步前跨石橋尉鄭伯熊詩云飛甍鬱峥嶸萬井交錯綜俯仰各有則静以御羣動平時心匠微斤斧袖不用少施見其餘規畫已驚衆姬公昔營洛道徳作梁棟東家有餘財鳯衰無復夢帝方議明堂行矣與君共宣詔亭班春亭在縣治前三步舊在鼓樓前東西後廢開禧元年令趙湜徙今地清心堂在民和堂後舊名清畏紹興二十一年令楊煒建三十二年令胡璉改名清軒嘉泰二年令劉鼎孫更今名初孫尚書覿嘗賦詩有所貴知我希巳及魚與豚之句璉謂清固不當求人知亦不必畏人知遂去畏字直掲曰清尉鄭伯熊詩云樹蕙餘百畝藝蘭當路歧清風一披拂香氣無不知紉為楚纍佩辱我幽靚姿小草生澗底雨露無恩私不入兒女玩嵗晚得自持所以古君子清徳畏人知民和堂在縣圃嘉定二年令劉鼎孫重建摘星樓在燕堂後嘉定四年令楊圭重建仁政閣在縣治東廡嘉定四年令楊圭重建舫齋在民和堂西開禧三年令趙汝伯建飛葢亭在舫齋西嘉定九年令陳夢建建浄涼亭在飛葢亭北嘉定五年令趙湜建丞㕔在縣東一十二步嘉定三年丞顧元龍重建香逺堂在㕔東舊名紫翠軒紹興五年丞趙子英建嘉定十五年丞趙彦珽更今名左緯詩云試捲朱簾看青山有幾重峥嶸秋色老蒼莽暮煙濃未辨清猿處遥知白鳥蹤藍田無此景痛掃只雙松真清亭在香逺堂南紹興三十一年丞李昱建今廢宜雪亭在香逺堂東慶元四年丞何坦建哦松亭在香逺堂後嘉定三年丞顧元龍重建主簿㕔在縣治東二十步隆興二年主簿趙仁夫重建後廢今僦民居尉㕔在縣治西一十五步慶元五年尉徐士表重建見山堂在㕔西傳香亭同嵗寒亭同射亭在㕔東南右嘉定四年尉楊璘重建買納塲㕔在縣東南六十里乾道三年監官戚大辯建嘉定十五年潘周伯重建押袋㕔在監塲㕔側嘉定十一年押袋鮑埜重建天台縣治在縣境之中慶元元年令常建重修鼓樓在縣門上班春亭在縣治東宣詔亭在縣治西静治堂在㕔東嘉泰元年令丁大榮建上有閣榜曰標霞樓叅政鑰為之記平心堂在宅堂西淳熙三年令薛洪建瑞粟堂在觀政堂北舊名瑞萱乾道二年令李異重建嘉泰二年令丁大榮以得粟一莖六穗更今名觀政亭在縣圃内淳熙七年令劉孝㦂建嘉泰二年令丁大榮名問松臺在宅堂後旁有大松如偃葢舊為松風亭嘉泰三年令丁大榮築為臺更今名多錦亭在縣圃内嘉定十四年令邵繼元建丞㕔在縣門西乾道五年丞朱皆建舊與主簿尉分處縣治内及是闢縣圃為之主簿㕔在縣東二百步淳熙十二年主簿杜純孝以縣吏没官屋建尉㕔在縣西北一百六十步紹興二十五年尉李異建仙居縣治在城内建炎二年令張亨重建鼓樓在縣門上紹興二十六年令梅克明建開禧二年令姚偓重建岩老堂在㕔事東皇祐元年令陳襄建按陳仙居詩自註云嘗鑿池引水經竹林間以環流釣翁名臺習坎嘉魚名亭未知在縣治何處今不可攷矣岩老堂詩云手持養性書此地學樵漁身𩔖龍蛇蟄情深木石居先迷成逺復正静得中虚何必求深隠幽蒙是所廬築徐融和云大老富詩書不煩耕與漁岩同傅說人學仲尼居静性觀三極窮神味六虚欲知休復意仁義是蘧廬閒章望之和云岩前未老客期在老樵漁拊俗多暇開軒適起居讀書明治亂學易體盈虚頻許相從否吾將當故廬安樂堂在縣治後紹興十二年令杜師旦建秀岐堂在安樂堂東慶元二年令尤棐以民獻瑞麥而建愛山堂在安樂堂左嘉定五年令董履道建真趣亭在安樂堂東嘉定六年令董履道建取陶潛是中有真趣之句丞㕔在縣治西建炎二年令張亨重建倚松亭在㕔後淳熙十二年丞趙善宿建三益亭在㕔東嘉定十二年丞林訪建主簿㕔在縣治東南五十步嘉定六年主簿趙彦儋建尉㕔在縣治東一十步建炎二年令張亨建寜海縣治在城内皇祐二年令李純師建鼓樓在縣治前景祐元年令張太蒙建勅書樓在縣治大門上後廢今為大門架閣樓在縣治東廡嘉定十年令陳宗仁建宣詔亭在縣治西班春亭在縣治東舊為茶鹽亭嘉定十六年權令張修重建均政堂在㕔東舊名問政嘉定十年令陳宗仁重建岸幘亭在縣圃北建炎元年令魏賁建舫齋在讀書徑北讀書徑在縣圃西面水舊名風漪隆興二年令薛抗建朱舎人翌寄詩以出宰山水縣讀書松竹林為韻遂更今名書林在㕔東隆興二年令薛抗建松竹林在縣圃東下瞰官河慶元二年令李知微建横翠閣在雲錦亭後今廢雲錦亭在縣圃蓮池中今廢丞㕔在縣西五步政和四年丞劉倚友建紹熙四年丞耿開重建劉自為記云崇寜甲申大觀戊子是邑兩置丞皆踰年詔罷政和壬辰復置予以初第承乏兹任前此雖越兩政皆以中廢而公廨不克治予至則僦舍編民隘陋苦之既而得地於縣之西隅以嵗在癸已九月經營越明年正月告成址而柱者凡二百二十有二他木稱是又闢縣之垣以跨橋曰通徳因㕔之餘以構堂曰松吟亦足以資出入燕息之便也一日落成士民縱觀有驚眎夸睨若見賞者有俯眉顰語若見勞者又有欲笑而頥不解欲言而聲不揚若見誚者夫見賞者予知其樂此基構之成也見勞者予知其恤此造為之勤也求其見誚者不可得竊思之固有在矣得非以仕宦所寓比傳舎為稍久今基構造為之功非不知其備且至也然斧墨未乾爨突未黔代者告至徒役役為後人資耳况繼而居者未必察察而未必徳也雖然彼見誚者固有理而所以誚者非予志也士之有為於世期以身任天下之重要皆使人之獲安利而後巳况朝夕從事無非盡其所以為人者於一室勞佚又何較焉若夫察與不察徳與不徳尤非所問也雖然繼是居茍能壞者思全弊者思新毋頺我窻牖毋毁我器用毋以一時茍簡而忘後人長久之利使向之見誚者於予心為無愧亦仁人之賜也因其落成故叙此以俟賢者松吟堂在㕔南今名壯觀不負軒在宅堂南今廢主簿㕔在縣治西五步紹興中廢徙于迎恩驛淳熙五年令方杲徙今地三瑞堂在㕔西政和四年主簿洪皓建時以荷花桃實竹幹有連理之瑞巳而生子适故名紹興十六年适以貳車行縣題詩云久矣馳䰟夢今登三瑞堂故山有喬木近事話甘棠展驥慙充位占熊憶問祥白雲留不住極望是吾鄉交翠亭在㕔右池南政和五年主簿洪皓建子适後有詩云三十年中事鸞栖築小亭寒聲長新籜清閟拂疎櫺水轉前時綠山濃逺處青重來勤問訊此别記秋螢合左緯詩云地勝多喬木亭髙闞古墉春稍經雨晚色過煙濃影落琴書畔聲穿户牖重鸞棲應不久枳棘若為容適志亭在㕔西慶元四年主簿胡宗建今廢尉㕔在縣治東五步宣和五年尉王允成建清風樓在㕔東舊名一覽紹興二年尉馬迥建梅軒在㕔西嘉定十年尉葉象翁建赤城志巻六
