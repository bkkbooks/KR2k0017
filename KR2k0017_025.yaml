body:
  text: 赤城志卷二十五宋陳耆卿撰山水門七水仙居永安溪在縣西二百一十里大小二源小源出馮師山東流一百六里至曹村淺不可舟自曹村而下廣二十步勝小艇又東至妃姑與大源會廣二十步又東流六十七里而南勝二十石舟曹溪在縣西九十里源出括蒼嶺南流四十里入大溪嶺上有潭曰曹潭淳熙十四年令蘇光庭禱雨忽有物蜿蜒而出一黑一黃以磬承之躍而入遂迎止於潭下翌日大雨先是光庭夢有曹其姓者手二小龍而至及是符其夢問潭何名則曰曹遂築室以祠櫸溪在縣西二十里源出處婺溫三州流至同蓼溪入大溪孟大武詩云樵斧斫雲春谷暗漁楖敲月夜溪寒人甚稱之杜蜀溪在縣南二十里蜀王廟前頗窈險俗號杜濁按廟記當為蜀也彭溪在縣東二十里源出天台南流一百一十里入大溪蓼溪在縣西二十里源出永嘉杉岡北流一百十里入大溪南溪在縣西南二十九里源出永嘉杉岡北流五十里入大溪白水溪在縣東北四十里源出天台竹山溪南流一百十五里入大溪班溪在縣東五十八里源出天台縣竹山溪東流五十里入大溪馬嶺溪在縣西六十里源出東陽南流三十里入大溪柘溪在縣西六十里源出馬嶺東流三十里入大溪瞿溪在縣西七十里源出東陽南流三十里入大溪土瀆溪在縣西八十里源出紫巖山北流五十里入大溪石井溪在縣西一百四里源出東陽南流一百二十里入大溪朱溪在縣西一百六里一名木溪源出括蒼嶺南流四十里入瞿溪十里入大溪㟏裏溪在縣西一百六里源出括蒼嶺南流三十里入大溪左溪在縣西一百七十里源出永嘉杉岡北流四十里入大溪真溪在縣西一百七十四里源出馮師山東流四十三里入大溪方溪在縣東一百七十八里源出永嘉北流一百二十里入大溪慈溪在縣西一百八十里源出括蒼嶺南流四十里入大溪盂溪山潭五曰老公潭在縣北二十里曰山王潭在縣北二十五里曰孟碗潭在縣北三十五里曰馬篠潭在縣北三十里曰桂坑潭在縣北三十里按舊經馬篠即石藤石稜二夫人溺死處皇祐中令陳襄禱雨立應陳有報雨詩二十韻有靈泉汲坎窞仙仗下嶙峋雷斧潛嗔樹天波忽灑塵之句柘溪潭在縣西北三十里近張阜山中有古湫名廣潭泓深特甚前橫石檻廣三丈許修四丈有竒有石室可容百人巖貯聖僧像且有石虎石馬之類又有大古藤一根故老云嘗有青蛇繞護或斧之則流血焉下又有三湫湫外有泓水亦隨潮盈縮每翕乾則有雨居人常以為候云張阜潭在縣西北三十里山上其深峻處有石潭垂崖飛瀑林木森然至者神竦後以崕石摧墮龍不潛伏歘於山嶺洞側湧一砂潭每水清則見長鮪焉會乞水必自石潭以次而升夜憩潭側旦則迎水而去每潮長則砂潭之波浸沒沙石潮退復平皆云龍之潛升以時變化蓋如此彭溪潭在縣北四十里支𣲖疏為四堰所溉田甚衆其旁修竹十頃民採擷以供衣食焉其後豪民奄據剪耨幾盡淳熙十四年因作新廟遂嚴樵牧之禁云三井潭在縣東北三十里罨源潭在縣西南四十里天井潭在縣東六十里馬鞍山潭在縣東六十里左溪右溪潭在縣西南九十里韋羌深處蒼山潭在縣東南一百里深澄湖在縣東一十五里相傳開禧初有漁於此者見巨魚長可二三丈因以物樅之獲一鱗如杯自後出沒不常或以為龍宅云相湖在縣東一十五里水四時不涸嘗於網中得石刻有相湖二字今尚存虬湖在縣東一十五里以其水灣曲如虬故名今廢黃赤湖在縣東南二十里修廣皆數丈水四時如沸夏飲毛骨凛凛冬飲則如湯故老云皇祐中嘗有龍出沒云小西湖在縣西二十里吳給事芾所創延袤數里傍有亭館凡十數磬湖在縣東南二十五里父老云常有磬浮水上光采奪目故名赤湖在縣西七十里其初煙水極目有赤眼巨魚長丈餘遊泳其中今不復存湖亦半為田矣蓴湖在縣東二十七里蔡經井有九在縣東一十七里舊傳每汲其一八皆波動兵火後存其五爾瑶崱瀑在縣西五十里玉几山北源出項羽山流為二潭潭之下巖三面壁立端截深峭可環以坐瀑緣壁而下或雨初霽則飛流濺沫廣至十丈餘蓋竒觀也民天泉在縣南三里寧海淮河源在縣東一百步桃源橋北經桐山羅坑湊黃墈三十里入海周顯德三年令祖孝傑用水工黃允德言謂縣北地坦夷冝鑿渠通海引舟入梁以通百貨遂葉田七頃發民丁六萬浚之既而渠成視其勢反卑於縣雖距海一舍而為堰者九重以兩山水暴漲齧蕩堰閘遂止不浚時歲飢且寒役人多死或云今縣北千人坑蓋其時叢冢也元祐六年羅提刑適重浚之亦無成今故道存焉廣度河在縣治外繞城如帶俗名玉帶水云大溪在縣西四十里源出桃花坑牛頭潭等處舊自草湖並山東行距邑頗逺元祐中羅提刑適檄縣窒之頗疏鑿使近邑今去溪無半里民以為便夷吳溪在縣西一十里源出靈公馬奧風廉等處東入海白渚溪在縣北一十五里源出白嶠山流三十五里入鄞縣馬紫溪在縣北二十里源出白嶠山東北流入港湖瀆溪在縣西南三十五里源出天台石橋等處流至雙港渡入海上白溪在縣南四十五里俗呼狐嘯溪源出天台華頂東北流八十里入餘魚溪又東流三十里入海小鱉溪在縣南四十五里源出桐柏山東流二十里入海東溪在縣南七十五里源出屈母山西北三十里入寧和溪寧和溪在縣南九十里源出天台及屈母山北流四十里又東流一十里入海車溪在縣南九十里彌望皆細沙沙出鐵屑冶者陶鍊成之西溪在縣西北三十里海遊溪在縣南四十里東流五十里入海峽溪在縣北六十里柴溪在縣東北八十里湫水潭三在縣東南一百里一名玉溪舊傳吳尚書屈晃生子坦坦偕其毋隱於此尋化為龍毋亦尸解葬其處世所謂龍毋山也隋開皇九年僧智顗自建鄴至薄暮覩一大厦莫知何所扣户有老嫗出迎顗已悟為龍遂託宿焉姥云師逺來何以幸教遂為鋪説且戒曰旱宜施雨姥受令惟謹翌日顗去回視其處巳成湫矣按州城隍廟記既指為屈坦今又以坦為湫水龍則是一人而主二祠豈神之變化固無方耶乾道四年加封城隍誥詞云至今台嶺之人想見玉溪之迹與毋俱隱既著一時之令名於民有功宜膺千載之命祀云白龍潭在縣西二十五里其上崇巖插空雲氣澒洞世傳龍與茶山會見鱗甲澡瑩如玉雪然有一嫗廬其前能以草木向背瞷龍出入其靈迹甚異梁源潭在縣西三十里梁王山西蹬棧險絶人迹罕到嘉定四年旱令趙善鏐因謁梁祠讀古碑遂訪求得之方致禱雷發兩崖雨如注石上有題名不書姓氏但云述同縡謁蓋紹聖丙子令髙述禱雨而書也縡不知為誰父老傳述禱此時亦曽有龍見驢潭在縣西北四十里龍鬚山上有蛟時出其首如驢故以為名山中崖石竒怪且多竅穴相傳鬼神出沒其間松巖潭三在縣西北七十里上潭險絶無徑中潭名煎茶每禱則瀹茗焉有瀑布㵼其下水清淺遊魚可數下潭圎徑三丈許上隘內寬水紺闕知淺深乾道中禱雨僧墜鈸其中善水者沒而取之見其下若大堂第晃潔可愛有龍枕石卧忽驤其首沒者驚亟出俄而兩崖間水湧丈餘甘澍大洽焉茶山黑龍潭三在縣北一百二十里其水三色中潭圎如井上有飛瀑瀉其下崖谷詰屈如三葉屏風上潭幾不可登蘇思潭在縣西北一百二十里上有大木如屈蓋然每禱祈文書不如式即浮出或許雨則現燭光隱隱若蓮華山多虎豹蛇虺之屬視城坈潭在縣東南一百三十里凡旱禱必飯粟羹鱣以祭得龜魚即雨又有雙峰潭同在其處皆號險怪云主簿潭在縣西二里崇教寺嶺下舊傳有一主簿出遊以馬躍溺死不知其所在後能顯異出雲雨今半堙塞矣石合潭在縣西一十里形如大石合故名凡禱雨送水必會於此石泄潭在縣東南三十里圎崖上有一穴徑數丈水清且深青雷潭在縣西北五十里其上一峯圎聳古木鬱蟠樵者至必有蛇逐之每乞雨則得金鰻云徐家潭在縣東北九十里接蓋蒼山每亢旱禱之輒有雲氣蜿蜒如帶巳而大雨大澤潭在縣西南一百里大龍山上紹聖三年令髙述禱雨嘗刻讃焉石婆奧潭在縣東北六里石門潭在縣北二十里源出剡中深不可測帽尖山潭在縣東北三十里梘潭在縣西三十里梁王山東白龍山潭在縣東四十里大雪潭在縣西北八十里方石潭在縣西北八十里石龍竇在縣西北七十里龍公嶴竇在石壁下世傳龍於此出入其展轉挨擦處猶有痕焉下為大湫不知源所從來但見竇水瀉下噴激如飛練崖上有石龍竇三字孝女湖在縣西三十里平野中有山特立名塔山山之麓有湖舊傳唐時有汪氏女苦節不嫁鋤織以奉其親親好湖水其家距湖五里女日汲以供之親沒建塔報焉人遂以此名湖與山凡大旱取之不竭青鏡湖在縣東南二里草湖在縣西南一十里九頃塘在縣西四十里包山吞麓其浸九頃歲産菡蓞則旱生菱芡則豐土人候之甚驗有金銀鯽魚味絶美然有魚艇則覆焉其神異多此類薛公井在縣東北九十步廣度坊側隆興二年令薛抗重建且亭其上按此至東驛凡八井位按比辰之次特廣且深自薛闓端餘次第甃治邑人蒙賴故以其姓名之其後井堙亭廢嘉定十六年齊守碩浚井復亭且為之記云市西井在縣西六十步名透瓶泉暑月以銀鐵等器汲之皆沁出寒冽特甚後郭井在縣西九十七步淳熙十三年邑人蕭氏女重修妙相寺前井在縣東一百一十六步晟家街井在縣北一百七十步桃源橋井在縣東一百八十步方家井在縣東二百步東驛井在縣東一百一十五步初鑿時於地中得石刻云下有石骨接天姥水旱如一隆興二年主簿黃橒甃治之新泉井在縣學講堂前紹熙五年因有泉溢出令李知微浚之石井在縣西北五十里閬風臺上石井在縣西北八十里崖上近石龍竇圎廣丈餘深不可測下有石鑊圍一丈深四尺許其凹窪處正如鑊然蓋溪水所經也或有石墜井歲月磨蕩盡為圎石以出今邑人多有之麻源水簾在縣西七十里有洞深廣坐可十數人瀑水緣崖而下日照如水晶簾盛夏有寒氣冷水泓在縣西五里旱不枯涸夏冽而冬溫尾閭在縣東海中與海門馬筋相直惟髙山可望其水湍急陷為大渦者十餘舟楫不敢近舊傳為東海泄水處詳見夷堅志鴈蒼瀑在縣西北四十里大壑中雙崖壁立瀑從空飛注石上聲出雷霆餘沫噴灑暑時暮秋旁多亂石可坐上有龍井土人以綆測之深百六十尋沿磴數丈有小石洞洞中石紋如龍鱗燁燁有光上有石窗唐末有道士居之自言江州人嘗取松葉茯苓以自給年百餘歲後不知所終赤城志卷二十五
