body:
  text: 赤城志卷十二宋陳耆卿撰秩官門五州縣官助州縣之治非專州縣之治也然諉曰不專而恣自豢逸則以一守令之身而下兼衆曹之事非材閎力巨誰與共此凜凛哉語云千金之裘非一狐之腋凡物猶爾况于官政今自軍事判官而下總不知幾何人備載則繁不載則略以故考閲今古述其建置之原而達官名流有假道于此者間出其姓名與行事使知負材抱器雖偶落下位其光氣常熒熒也以勸為善是編蓋有助焉州屬官軍事判官一員國朝沿唐置大觀初改司録參軍政和初以參軍名未正改司録事建炎初復曹掾始仍舊唐孫發自華亭尉為州從事發嘗應百篇登第至是諸公以詩送之方干詩云梅真入仕提雄筆阮瑀從軍著綵衣皮日休云百篇宫體喧金屋一日官銜下玉除皆此宫也王絲會稽人天禧五年以祕書省校書郎至州城據山少井一舍外有泉絲白州長淘土為筒導入于城五里一穴以濟行者之渴州人賴之見范文正公集及光相院記所稱王荆公志其墓虞肅上饒人以治行為當路趙彥齡紹興中至有詩名軍事推官一員國朝沿唐置大觀改户曹參軍政和改司士曹事建炎仍舊孔文仲臨江人熙寧中至繼舉賢良方正攻新法為王荆公所黜官至中書舍人太何執中括蒼人闕柟中至崇寧中拜左僕射贈師清源郡王王永嘉人淳熙初至有政譽決處州張彭之獄一郡稱明官至祕書少監録事參軍一員國朝沿唐置大觀改士曹兼儀曹參軍政和改司録以參軍為掾建炎仍舊本曹印文乃政和四年二月少府監頒下以台州司録朱記為文中更兵火與台州管勾鹽事之記互掌慶元初何少連始請歸之唐沈佺期闕句中至其詩有昔嘗遊此郡三霜弄雲島之事見本傳陳槖宣和中至事見郡守門司理參軍一員國朝沿唐置初為司冦參軍後改今稱大觀改左治獄參軍政和改司士曹事建炎仍舊唐劉鋭以開元中攝司士見真容應見碑司户參軍一員國朝沿唐置為戶曹參軍大觀改右治獄參軍政和改司户曹事建炎改司户參軍唐鄭虔至德中以謫至今州城東偏猶以户曹名巷有廟在焉和初至扞城有功詳見祠廟門滕膺南京人宣石崇昭會稽人淳熙初至有賢譽官至樞密院檢詳文字司法參軍一員國朝沿唐置大觀改議刑參軍政和改司刑曹事建炎仍舊唐李侃闕系中至見唐世表監攴鹽倉一員文臣政和四年置舊有二今省其一焉監在城商稅務二員文武各一國初置監比較務二員武臣紹興元年置是年七月兩浙運使徐康國奏溫台明州近以應辦軍興添置比較務乞别立課額分撥上供從之監贍軍務二員文臣紹興七年置監酒房廊務一員武臣嘉定二年省罷李守兼奏本州在城有都酒贍軍比較務又有酒房廊務今贍軍比較并歸都務而贍軍監當文臣又有兩員酒房廊所掌佃賃推受即無行移乞行省罷有旨依州兵官路分一員都監二員國初置內一員添差釐務監押一員國初置大使臣則曰都監小使臣則曰監押押隊一員遞鋪官一員正任指使官三員駐泊一員國初置州祠祿官台州崇道觀監嶽廟右無定員州添差不釐務官戚里一員東南第四副將本州駐劄一員宗室宗室監當三員宗室嶽廟五員隨龍一員闕奉使二員闕借使監支鹽倉文臣二員闕三衙揀汰窠闕三十員見任一員餘闕戰功六員大小使臣各三員皆闕軍功指使三員見任一員餘闕軍功聽候使喚三員闕軍功嶽廟四員離軍準備差使二員闕官闕員闕闕歸正戰功借使闕員闕闕人二員闕闕官二員闕闕順官四員闕養老使臣三員見任一員餘闕樞密院效士一員餘闕敢勇㨂汰使臣二員添差聽候使喚三員散祗候使臣一員諸縣屬官臨海縣丞一員熙寧四年中書劄子諸縣主戶二萬以上難治乞置丞一員于是諸縣始有丞崇寧中或改主簿充丞大觀四年令兩浙路相度不係繁難縣丞並罷政和二年復置建炎元年詔如係嘉祐以前員闕及萬户縣方許置丞餘並罷紹興初縣及萬户並注丞唐駱賓王義烏人武后時以言事下遷于此後耿耿不得志棄官去見唐書本傳有久客臨海有懷詩見天台集主簿一員開寶元年詔諸縣千戶以上依舊置令簿尉三員紹興十六年臣寮奏創業初人物稀少乞將東南縣小而事簡者簿常闕員而尉兼之其後縣滿萬户置丞而簿猶闕朱異劄子萬戶以下縣分已不差丞却多有主簿兼尉者乞應如此去處並特專置主簿一員從之葉翥括蒼人紹興中尉一員建隆三年詔每縣置尉一員因以弓户裁定弓手額建炎元年詔兩浙路依河北路招致弓手樞密院乞各添差武人縣尉一員置使一員招致弓手以五百人為額知縣兼領為將領部將紹興四年罷今尉銜內帶巡捉私茶鹽礬兼催綱舒亶四明人民有使酒逐其從母者亶命執之不服即斬之投劾去官至御史中丞有詩見一鋒亭王淮東陽人紹興中至淳熙中拜左丞相諡文定監杜瀆鹽場一員文臣知王之望襄陽人紹興初至終參政事有文集姚寬會稽人紹興中至終尚書兵部郎中有西溪叢藁注五代史葉侍郎適作集序催煎一員武臣監章安稅場一員今廢管界巡檢一員武臣劄熙寧三年凖鈐轄牒備凖樞密院子兩浙路鈐轄發運提刑司奏請相度巡檢地分除合改置減罷外餘係控扼要害各難裁省有旨依數內台州三員管界臨門松門亭場巡檢一員武臣院熙寧七年凖轉運司牒備凖樞密劄子兩浙路提舉鹽事司奏宜于石窟頭添置巡檢一員差兵級一百人有旨依闕九年兩浙路轉運司東西路鈐轄司奏備凖樞密院劄子巡尉職皆捕盜而所獲多少不侔蓋以尉所用弓手皆諳熟土人巡檢則用雜攢客軍不許差出緝捉所以常劣于尉欲乞行下應巡檢下兵級依舊額于本處招致就廨宇左右住營諸處不得抽差尋差著作佐郎熊臯等相度咸以為便有旨依內台州係在溫州七處巡檢數內每處置都頭副都頭各闕三十守將虞候承局各一人理官二人闕行九十人枓錢照熙寧三年闕揮依教闕亭場闕閲雄節條闕錢今其寨改名靖康元年凖提刑司奏闕度到刑司奏相州黃巖縣地院劄子兩浙路提名盤山繡嶺仙居縣白塔皆取巡尉相度處遙逺欲添置一員招置土軍八十人有旨依遂于其地立寨紹興十二年三月改就地名法安院駐劄今名吳都黃巖縣丞一員趙子英開封人紹興五年至以厚德稱秩滿因家焉今子孫甚盛主簿一員曽肇南豐人中書舍人鞏之弟纍遷翰林學士按東部事略本傳云調黃巖簿而行述乃云調後居鄭州守聞其賢薦為州教授以是考之肇未必至黃巖也尉一員唐栁芳蒲州人開元間登第為永寧尉入直史館見唐書許景衡紹聖三年至永嘉人從伊川先生學建炎初厯尚書右丞資政殿學士諡忠簡有橫塘集刋於郡齋鄭伯熊永嘉人文行為學者師建炎二十年至人呼為石蓮縣尉以其年尚少而堅不可磷也終宗正少卿直龍圖閣人孫應時會稽淳熙六年至監務一員武臣監于浦監鹽場一員文臣押袋一員文臣監路橋鎮一員武臣後省罷松門巡檢一員武臣管指揮見界天台縣丞一員主簿一員舊以尉兼後特置見淨慧寺法輪院碑尉一員監務一員武臣仙居縣丞一員主簿一員舊無此官嘉定李寧兼奏言簿本縣始以狹小版籍不滿萬户故以尉兼主簿今生齒多簿書叢委尉遇竊發躬親追逐一時交併或致無官可差設若尉受差簿鈔堆壓無從鈎考而况西鄉獷悍盜販公行以一共二實恐不給乞將酒房廊務省罷却于本縣添置主簿一員有旨依差王友元填創置闕按唐宰相世系表寶崇嘗任樂安主簿樂安古仙居也意舊有主簿而其後省之邪尉一員唐辛少府失其名張籍有送辛少府任樂安詩有選得天台山下住一家全似學仙人之句師徐默成宣和二年至會吕囊反破白塔寨死之監務一員武臣白塔巡檢一員武臣與指揮見吳都死鄒進宣和二年至尉徐默成同師囊之難寧海縣丞一員崇寧三年置後罷大觀二年再置後復罷政和二年復再置主簿一員張君房于真廟時至按君房雲笈七籖序云祀汾隂之歲𨽻職霜臺數年以鞫獄無狀謫掾寧海後除著作佐郎諡洪皓鄱陽人政和六年至官至徽猷閣直學士忠宣其子丞相適生于此後與伯仲皆中詞科通顯云尉一員監縣渚鎮一員監務一員武臣以舊監茶鹽酒稅後罷茶鹽嘉定八年放萬戶又罷酒今監啇稅而巳監港頭鎮一員武臣監長亭鹽場一員文臣官紹聖二年創酒稅務以本場監兼管大觀三年于港頭專立酒稅務故于長亭置買納鹽場押袋一員文臣赤城志卷十二
