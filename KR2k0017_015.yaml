body:
  text: 赤城志卷十五宋陳耆卿撰版籍門四户口古者獻民數於王王拜受之重邦本也譬如草木風霆雨露之滋長豈不日蕃月盛也哉按地志諸書晉不滿二萬户至唐武德始及八萬三千八百六十自是至乾寧末又蹙耗矣蓋遭世亂離且刳於兵其變故可勝道哉宋興天下平積而至熙豐間戶口寖衍咸可考見而余不復著獨斷自大觀之已丑迄於嘉定之壬午昔之為戶者二十四萬三千而今則二十六萬六千矣昔之為口者四十八萬九千而今則五十四萬八千矣僧道離於民者也略附見之亦以驗其消長云戶口赤城志卷十五
