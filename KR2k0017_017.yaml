body:
  text: 赤城志卷十七宋陳耆卿撰吏役門自罷鄉户用市户而州縣之吏罕良民矣余記故老言鄉户不足於材而有餘於行其真朴遜厚里黨多化焉則仗以行文書奉期會宜有易無難也及其後變法浮屯詭聚簸弄福禍無益於上而有損於下則至於民畏吏吏困民民吏相仇而不足以相德上之人疾吏則吏怨疾民則民散其滔滔滋患詎一日之積哉前輩論差雇二端舌本爛漫由今而論得失概可覩已於其中而變通之豈無長䇿而余不敢僣也州役人衙前國初置自都知兵馬使至第六名教練使凡十三階以鄉户中押録里正之年滿者為之押録三年替里正二年替限內各管重難一次其不厯衙前者雖得替不許歸農若主持官物必以家業及二百緡者聽更重難日久至都知兵馬使者試驗其材遣赴闕補官熙寧四年行募役罷鄉户衙前元祐元年復差役衙前招稅户鄉户衙前别立法優假之紹聖元年復熙寧法立衙規本州舊以七十五人為額今四十六人人吏國初置自都孔目官至糧料押司官凡十階謂之職級其次曰前行曰後行又其次曰貼司募有産而練於事者為之或無人應募則俾職級年滿出職其子姪繼替天聖初令無子姪可繼者與募百姓慶厯初詔並許投名取三人以上職級保明充熙寧四年行募役法依舊許投名始支料錢元祐元年復差役法亦許人投名不限産稅紹聖元年復熙寧法定使院規約仍因元豐額定法司州院勘事司司理院常平兩案職級前後行書表司之數紹興二十六年減吏額定本州為五十人內刑法司八人常平兩案三人職級一十人前後行二十五人書表司四人今如之貼司國初惟在京及監司許置諸州止有私名書手景祐元年量私名書手人數立額許正行人吏保明充元豐中始有攢司試書算又吏人不足則差貼司權行紹興二十六年詔以吏額之半置貼司本州以二十五人為額今如之造帳司國初置以諸縣曹司補充掌造轉運提舉司錢帛帳治平元年改用使院後行為之熙寧四年詔優與請給以免役錢支元祐三年罷雇錢聽於吏人內抽差滿三年循一資紹聖復募法本州以五人為額今如之祗候典熙寧十年置主受諸縣文書先是縣遣後行人吏詣州承領及是始募知後典代之即祗候典元豐七年定額紹聖因之諸縣各二人今各一人散從官國初置承符散從步奏官追催公事差稅户或坊郭有行止者為之給雇錢元豐三年改為散從官宣和減省紹聖後定節級聽子長行額軍事推官轄之本州總六十五人院虞候國初置主分直州司理兩院依承符散從官法差鄉户其節級遞充三年替熙寧二年更募法以第四等户充一年替元豐七年許投名不給雇錢紹聖因之政和二年詔左右獄當直司獄子給重祿將當直司併入左右獄却輪撥當直司左右獄子半年替當直司獄子一季替宣和罷重祿紹聖後定為七十三人今七十人雜職國初置依院虞候法差三年替未願歸農者聽熙寧行募法給雇錢元豐定額內以一人充指教並聽投名無雇錢紹聖因之本州以六人為額今七人斗子搯子稱子揀子庫子國初選第三第四等户有行止人充元豐定額許投名不給雇錢紹聖因之紹興三十一年令州縣專副庫搯各通抵産召三等以上户保充本州斗子額三十八人今一十八人搯子額二十人今九人稱子無額今三人揀子庫子以搯子為之欄頭至道二年委運司選充咸平三年招客戶祥符六年於第五等稅户差熙寧行募法元豐聽投名不支雇錢舊以一十四人為額今一十二人縣役人人吏國初以上下押録前行後行貼司書手為名次其押司録事選等第户諳吏道者充曹司隨户口多少立額康定二年以稅户不省文書召有産業人投名試書算不足則抽差稅户既而諸縣後行各充州吏以二年替仍輪上州充知後典慶厯三年令押司録事三年替熙寧募知後典替曹司自是縣吏不貼差紹興令募成丁有稅産無過犯者充不足則取犯杖罪情輕者充又不足則取非稅户而有稅産之人為保者充二十六年裁吏額臨海黃巖二十人天台仙居寧海一十五人今如之貼司國初人吏正名不許更置貼司抄狀司景德初量私名書手人數立額俾正名保充元豐令始籍定姓名舊額不及數者各不得私補人吏有闕則與鄉書手以次補充紹興二十六年裁吏額五縣各二十人今如之鄉書手國初里正户長掌課輸鄉書手𨽻焉以稅户有行止者充勒典押里正委保天聖後以第四等户差熙寧行募法以第三等以下户充免户下役錢無人就即給雇錢其後不限有無産業招募吏有闕與貼司依名次補充元豐七年聽投名不支雇錢臨海額一十八人黃巖額一十二人天台額四人仙居額六人寧海額六人今如之手力國初差二三等户掌追催公事及在城賦稅二年替建隆四年以縣户口多寡定額熙寧中募稅户及坊郭有行止充元豐役法臨海額五十二人黃巖額四十九人天台額三十五人仙居額四十人寧海額四十人今如之斗子法見州元豐法臨海額二人今闕黃巖額二人今如之天台額六人今八人仙居額六人今一人寧海額一十五人今四人庫子搯子元豐役法臨海額七人今一人黃巖額三人今如之天台額八人今七人仙居額一十人今六人寧海額七人今如之稱子元豐役法臨海闕黃巖額一人今如之天台額一人今二人仙居額一人今用庫子併充寧海額一人今如之欄頭元豐役法臨海闕黃巖額六人今七人天台額一十四人今一人仙居額四人今如之寧海額八人今二人所由元豐役法投名無雇錢臨海額九人今二人於本州院虞候內差充黃巖額一人今如之天台額一十四人今二人仙居額一十人今三人寧海額三人今一人雜職元豐役法臨海額八人黃巖額六人今如之天台額四人今三人仙居額三人今五人寧海額五人今四人鄉役人保正長建隆初里正户長掌課輸里正於第一等差户長於第二等差鄉書手𨽻里正於第四等差又有耆長掌盜賊煙火於第一第二等差其屬有壯丁於第四第五等差至和初罷里正增差户長熙寧五年罷户長六年行保甲法始置保正副大小保長譏察盜賊七年令耆長壯丁鄉書手並給雇錢既而輪保丁充甲頭催科八年罷募耆長壯丁今保正大保長掌盜賊煙火立庸直别召承帖人𨽻焉元豐八年復募耆户長壯丁元祐元年復差役法復令户長催科罷保甲紹聖元年復雇耆户長壯丁尋復保正長法令諸縣雇募保正副大保長催稅甲頭承帖人二年以催科甲頭皆下户不集事改付大保長一稅一替建炎元年罷户長復甲頭紹興七年復大保長催科九年令保正長専掌盜賊煙火不許承文帖及課輸事三十一年令甲頭仍舊催科二十八年指揮以三十户為一甲選欠多者一人為甲首催甲內稅乾道間罷自後變户長為催頭吏旁緣為姦其弊有不可言者大率隨情竄易曲意枝蔓甲當役詭以授乙又授丙授丁必盡得賂乃始反於甲故一人受役數家先被害其受役者例先代輸否則械繫鞭箠不輸不止輕者傾家資重則鬻産産非豪右無所售乘其罅賤入之産空訟未已甚至族與姻自為敵妻遁子散過者輒淚下焉淳熙十六年袁提舉説友奏請遵紹興甲首法以三十家為一結流水排次遇開場則以各户合輸之目列為榜揭之通衢令巳輸者自疏其時以待考察限滿上其榜以縣鈔點磨其輸足者先出甲未輸或輸未足者擇其尤一人罰為甲首給甲帖催甲內稅違者痛繩之自是民畏充甲首競先輸官不費寸紙而賦集齊民破蕩之禍殆少紓矣獨胥曹意不滿日撼歲搖或怖以稅長或雖用甲首而巳非袁公之舊名實交戾利害相反雖未至如催頭之酷而中産下户遍患苦之矣長民者可不動心乎赤城志卷十七
