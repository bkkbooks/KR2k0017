body:
  text: 赤城志卷三十三宋陳耆卿撰人物門二本朝本朝文獻尚矣厥初洗五季之陋天下以儒奮其噓呵疏濬火始然而泉始達也故吾州雖號落逺而文教無不之焉蓋自咸平初始有科目是時儒先長者劚荒燧暗以為多士之倡流風所暨莫不根柢行義枝葉藝能在朝則致君在州縣則阜俗如尤守袤所祠三老蓋魁傑也接于南渡文物益振故其圭衮之煒耀筆槖之層復為宰輔者四人為法從者幾十人其次不為宰輔法從而為卿監郎曹不為卿監郎曹而為部使者郡守又不知其幾人矣官有大小績用隨之固古今天下之所共然有以下僚末綴而風迹不減達宦者有窮不得位而文行超於科級者又未易以區區之名位為限斷也兹卷諗之邦侯骫之郡文學祖長樂志及黃守畇往年凡例凡擢第姓氏咸備列焉故其重年甲者重始進也著父子同産若羣從者尊世科也著所歷官簿及其所至者備終始也著身所至而又及其子孫所至者崇繼襲也考他邦之志若特科若右科若宗室或著或不著今並著貴不遺也乃若其事業則已見國史其文墨議論見家集其發揮幽潛見碑碣志狀今不復贅若夫名不登仕版而有異行懼將湮沒則採次書之至有不生長是邦而居焉者渡江後為尤盛且多名人故亦標其姓氏爵里云仕進進士科咸平三年陳堯咨榜杜垂象黃岩人字闕職按杜氏家譜為祁公衍從叔父終尚書方郎中括蒼志則云都官郎中知處州或者先為都官而後為職方也垂象生建中建中生七子長曰誼建中性微厲誼善事之以孝聞居喪晝夜號慟勺水不入者纍日負土為隴徒步行雨雪中每皸裂流血則以漆塗之如是者三年葬後廬墓左日一飯不葷明年大水發洚所在山皆漲溢誼所居獨免人以為孝子之報郡上其事下詔賜粟帛蘇舜欽作孝子傳以美之後歷衛尉大理寺丞通判梓州太子右贊善大夫今誥敕落同姓尚可考也余故特揭於人物之首以勸孝云大中祥符二年梁固榜姚拱闕都人字闕郎終官員外天禧三年王整榜胡仲元闕著人字闕終作佐郎天聖二年宋郊榜王琥臨海人字闕終都官郎中王珏臨海人字闕見琥之弟終屯田郎中事坊市門慶厯六年楊置榜楊蟠臨海人字公濟歷通判杭州終知壽州按國史章安人章安今臨海蟠文號章安集必不誤而登科記乃稱杭人臨川集有金華縣君吳氏志又云蟠父徽始去麗水為錢塘人夫既為錢塘人必不應又為杭倅或者本籍麗水後徙錢塘或又自錢塘徙章安也皇祐五年鄭獬榜方瑗臨海人字闕儒終安仁縣令方為世自此始嘉祐六年王俊民榜周辨寧海人字君儀終宣教郎知青陽縣後贈少師見寧川志云姚震臨海人字闕八年許將榜張希房臨海人字闕簿終金壇縣主治平三年彭汝礪榜陳貽序臨海人字叔倫為蘇文忠軾曽舍人鞏所知終奉議郎湖南運判子克刪定官有天台集行于世李察院庚為之序羅適寧海人字正之歷五縣提點府界兩浙京西刑獄終朝散大夫州言前輩大雅以適為稱首有易説赤城集行于世事見鄒諌議浩送董尊逸序秦觀生祠記及州學三先生記四年許安世榜方洵武臨海人字闕知瑗之子終朝奉大夫南安軍陳貽範臨海人字伯模貽序之兄為陳密學襄胡安定瑗高弟與羅提刑適友歷宗正丞終朝奉郎通判處州有慶善集行于世子師純師聖中八行熙寧六年余中榜方洵直臨海人字闕之弟終知闕洵武縣張希甫臨海人字闕縣希房之弟終樂清尉王磻闕人字闕元豐五年黃裳榜朱玠臨海人字寶仁終棣州防禦判官贈正議大夫事見陳侍郎公輔所為銘有朱氏易行于世王尹臨海人字少伊終宣教郎知松陽縣八年焦蹈榜蕭令修臨海人字闕終知貴溪縣元祐三年李常寧榜周煒寧海人字光庭辨之子歷知徽溫二州興化軍終中大夫周炳寧海人字光佐煒之兄終知瓊州兼瓊管司安撫都監牟金臨海人字闕簿終陽榖縣主六年馬涓榜方昌武臨海人字闕散洵武洵直之弟時號三方終朝大夫北京司業元符三年李釡榜吳經臨海人字闕進終奉議郎知武縣大觀三年賈安宅榜朱景行臨海人字闕官終敕令所刪修左譽臨海人字與言終湖州通判事見陳侍郎公輔所為銘政和二年莫儔榜朱縡臨海人字樞言玠之子歷國子博士宗子正辟雍博士工部司封郎官溫州鹽事湖南運判提舉浙西茶鹽知嚴州提點浙西刑獄改漕事知信州終朝議大夫知嚴州事見朱少卿斐所為行狀五年何栗榜蔣旦仙居人字淡然先是邑人未知教自旦以力學中第始爭自奮歷通判越州終承議郎監石炭場鄉人推其清節祠之學宫有適齋集藏于家應灌仙居人字仲宣與蔣旦同為邑倡自是其家世以儒顯接踵登科級至今未衰終衡州教授王衎臨海人字和仲終監廣陳鹽倉八年嘉王榜謝升俊臨海人字成彥終朝請大夫知徐州子廓然見淳熙四年科名卓然知南雄州左知微臨海人字闕終宣州教授宣和三年何渙榜潘大年臨海人字祖道終從政郎監南嶽廟范醇仙居人字希孟歷大理寺丞湖南安撫司參議官知南安軍終左朝請大夫六年沈晦榜朱伯臨臨海人字彥與景行之猶子終朝請郎通判池州事見朱少卿斐所為行狀李衎寧海人字和叔終常山縣令建炎二年李易榜杜穎臨海人字君美垂象之曽孫終明州司理參軍方行可臨海人字從志洵武之子終敕令所刪修官朱斐臨海人字知裁年十二預鄉薦歷大理丞提點廣西刑獄大理正刑部郎中大理少卿奉祠再除大理少卿未行卒初尤守袤祠三老欲以公預議不成而止有燕石集藏于家吳謙仙居人字多益歷知嚴處二州終朝奉大夫紹興二年張九成榜吳芾仙居人字明可謙之從弟歷刪定官正字通判處婺二州紹興府知處州監察御史殿中侍御史户部侍郎知婺州紹興府刑部侍郎給事中改吏部侍郎知臨安府復除吏侍遷禮侍知太平州紹興府後以龍圖閣直學士致仕自號湖山居士年八十卒諡康肅事見國史及朱文公所為神道碑有文集奏議行于世子津見乾道五年科名洪奉直大夫江西提舉沃朝請郎知筠州林藴臨海人字粹道終善化縣主簿李晞甫臨海人字闕授終臨江軍教五年汪應辰榜陳良翰臨海人字邦彥歷監察御史右正言左司諌知建寧府福建轉運副使提點江東浙西刑獄宗正少卿權兵部侍郎右諌議大夫給事中除禮部侍郎不拜以敷文閣待制提舉興國宫召除太子詹事後除敷文閣直學士奉前祠卒贈太中大夫諡獻肅舊與侍郎公輔通譜系其風節實相繼事見國史及三先生記朱文公熹所為行狀周丞相必大所為銘子耆壽直寶謨閣兩浙運判彭壽福建提點刑獄廣壽見乾道八年科名陳爟臨海人字世明良翰之猶子終武昌軍掌書記陳夷行臨海人字清臣公輔之子終監南嶽廟吳詠仙居人字永言芾之從兄終宣教郎知西安縣有西安詩集藏于家八年黃公度榜陳仲德臨海人字闕錢豐天台人字彥和終溫州教授十二年陳誠之榜鹿汝弼臨海人字國器終闕部架閣劉知變天台人字與權終池州教授鹿汝明臨海人字國強汝弼之弟終金溪縣尉十五年劉章榜何純佑臨海人字粹中終承議郎通判靖州顧士則臨海人字孝仲闕李庚臨海人字子長歷御史臺主簿監察御史兵部郎中繼奉祠提舉江東常平知南劍撫二州後知袁州未上卒有集號詅癡符樓參政鑰為之序石墩臨海人字子重祖公孺辟庚子之亂自會稽徙此後以詔居遺逸補迪功郎墩從朱文公遊自是里人知有洛學歷將作監太常寺主簿終朝散郎知南康軍事見文公所為銘十八年王佐榜王滋黃巖人字闕終鄱陽縣尉陳舉善臨海人字能之歷御史臺主簿監察御史殿中侍御史知衢常二州提舉浙東常平提點浙西刑獄左司郎中太常少卿終祕閣修撰事見左尚書袤所為銘子鑄見乾道八年科名姪鍾知施州二十一年趙逵榜陳嘉善臨海人字容之舉善之弟終知江隂軍彭龜年黃巖人字元老嘗中教官與弟椿年號二彭歷常德府僉判終朝請郎子藻今知臨江軍徐大受臨海人字元章終四川制置司幹官陳庸仙居人字時中歷御史臺主簿知常州兵部郎中太府少卿中書門下檢正諸房公事知撫州終提點江西刑獄事見彭殿撰椿年所為行狀子禫終知雷州章見淳熙八年科名應頥臨海人字頥正時州薦名才八頥與弟艮猶子士龍同貢鄉人榮之二十四年張孝祥榜左璠黃巖人字仲琰與弟璵㻫號三左終敕令所刪定官葉昌嗣臨海人字景厚終兩浙路轉運司幹官吳浚仙居人字達中謙之子終南外睦宗院教授陳騤臨海人字叔進省試第一歷祕書郎工部郎官將作監祕書少監權中書舍人兼太子諭德祕書少監祕書監中書舍人奉祠知寧國府袁州召除吏部侍郎禮部尚書同知樞密院參知政事知樞密院以資政殿大學士知婺州俄提舉洞霄宫進觀文殿學士薨贈少保事見國史及蔡尚書幼學所為行狀有文集行于世水心葉侍郎適為之序劉敦臨海人字處厚歷知道州終朝奉郎主管沖佑觀二十七年王十朋榜王道臨海人字夷仲衎之弟甲科第四人歷太學博士祕書省正字校書郎終奉議郎主管玉隆觀事見水心葉侍郎適所為銘應士龍臨海人字長文終宣教郎賈偉天台人字之竒歷祕書郎終知漢州子涉字濟川歷寶謨閣直學士淮東制置安撫使知楚州兼京東河北節制使淮西制置使以顯謨閣學士致仕贈龍圖閣學士光祿大夫彭椿年黃巖人字大老龜年之弟歷國子監主簿編修官提舉福建市舶知處州太常丞吏部郎中國子司業江東轉運副使終右文殿修撰事見商侍郎飛卿所為行狀有雜稿藏于家丘大猷臨海人字子訥終監嚴州比較務左㻫黃巖人字文琰璠之弟為賀正書狀官死于寇鮑祖文黃巖人字獻夫與弟祖武號二鮑終朝請郎通判興化軍三十年梁克家榜王齊輿寧海人字之孟歷刪定官將作司農丞知鄂州提點東川刑獄倉部郎中樞密院檢詳軍器監大理宗正少卿終直煥章閣致仕鹿何臨海人字伯可歷監登聞鼓院通判吉州知饒州諸王宫教授屯田金部郎官年五十二乞致仕進朝奉郎直祕閣官一子以華其歸時號見一先生子昌運知連州應揚臨海人字唐卿終奉議郎知義烏縣鄭寅臨海人字正叔終從事郎知豐城縣王若仙居人字若夫歷知歸道二州終朝奉大夫淮東安撫司參議官李由仙居人字民載終奉議郎知玉山縣隆興元年木待問榜王章寧海人字之韓齊輿之弟終從政郎湖南轉運司幹官宋之瑞天台人字伯嘉歷宗正祕書丞吏部司封郎官都大提點坑冶吏部郎官樞密院檢詳文字大理少卿提舉福建常平升提點刑獄祕書少監中書舍人知寧國府華文徽猷閣待制知江陵府龍圖閣待制寶謨閣直學士今以光榮大夫致仕次子濟今知湖州林處厚臨海人字淳甫藴之猶子終奉議郎謝修臨海人字子長歷太常寺主簿祕書郎終太宗正丞兼户部郎官應振仙居人字伯起權之子終儒林郎知昌國縣李遂夫仙居人字良夫由之子終宣教郎知長溪縣吳偰黃巖人字舜鄰終永豐縣主簿丁可天台人字無可終監行在惠民北局有文集藏于家陳澤仙居人字澤民終宣教郎王師尹寧海人字民瞻終闕州司理參軍乾道二年蕭國梁榜盧芷寧海人字良臣終通直郎周洎寧海人字子及光闕之孫厯大學正軍器監主簿將召試卒事見水心葉侍郎適所為銘有文集奏議藏于家王及寧海人字達之歷太學國子博士國子丞終朝奉大夫知信州謝深甫臨海人字子肅歷大理丞提舉江東常平左曹郎官借禮部侍郎為金國生辰使歸歷右正言起居郎權給事中知臨安府權工部侍郎兼權吏部侍郎兼給事中御史中丞端明殿學士