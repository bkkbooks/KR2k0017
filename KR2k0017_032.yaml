body:
  text: 赤城志卷三十二宋陳耆卿撰人物門一歷代考才於異代自昔難之非吾之難於考也而彼之難於傳也蓋非有勳業不傳非有名節不傳非有文藝不傳無是三者而非有爵位則不傳爵位之傳與彼三者之傳則又大有徑庭矣今所據惟信史而信史之法應立傳者固有數不能人人白也以故自漢至五季綿歷如許而仕焉者止十人遁焉者止七人寓焉者止十一人三者不同而同於傳者也以其所傳推其所不傳則人物亦豈止是哉吾知山巔水湄雲谷月嶠必有深藏遐蹈而人不得聞者矣仕進吳屈晃舊經云郡人吳志作汝南人為尚書僕射時孫權欲廢和立亮晃諫叩頭流血權不納斥還鄉里後皓即位封其子緒為東陽亭侯弟韓恭為立義都尉緒亦位至尚書僕射張悌臨海人為吳丞相天紀四年為晉兵所殺見吳志及搜神記虞翔章安人為鄱陽太守按會稽典録云與御史中丞任奕各馳文檄曄若春榮見吳志虞翻傳注黃他為章安小吏身當白刃濟君於難見吳志晉任旭章安人字次龍立操清修不染流俗郡將蔣秀請為功曹嘗以秀不奉法苦諌不納謝去久之秀坐事被收歎曰任功曹真人也惠帝元帝明帝時咸召不起咸和三年卒子琚位大宗正吳超章安人為國子祭酒後避地東甌見舊志齊吕文顯臨海人永明初為通事舍人與茹法亮等並見親厚各住一省世謂四户見南史唐鄭祕書德宗時以召起白樂天贈詩有赤城别松喬黃閣交夔龍之句後謝病居石溝溪項斯郡人字子遷按張為唐詩主客圖有清竒雅正升堂項斯之語擢進士第官至丹徒尉張洎集序作江東人孫郃按方干詩前後序皆云樂安人字希韓登乾寧進士第遺逸漢高察隱居天台佛隴之北今所謂察嶺是也吳鄧盧敘居章安弟犯公憲自殺乞代晉李廞居臨海兄侍中墓下王導辟為掾不就禇世標義熙中隱士梁蔣政字文通避地居寧海鄉人以其姓名山庾肩吾字子真新野人信之父隱居天台故哀江南賦云少微真人天台逸民唐張濆天台隱士喻鳬贈詩有道高天子問名重四方招之句王正白集亦有憶天台張處士詩僑寓晉江逌字道載避蘇峻亂居臨海州辟不就後從蔡謨何充之命始出仕許詢高陽人字玄度清峻不仕遊臨海山不歸後入剡山見初學記齊顧歡鹽官人字景怡年二十隱天台山開館授徒母亡廬墓讀詩至哀哀父母生我劬勞之句輒執書慟哭學者廢蓼莪篇高帝召之不起褚伯玉字元璩錢塘人少有隱操居瀑布山三十年高帝詔不起敕於剡白石山立太平館舍之徐靈府山記又云居桐柏觀小嶺年百餘歲未知孰是梁王元規太原人八歲而孤隨母嫁依舅氏居臨海時年十二土豪劉頊者欲妻以女元規力辭之後從沈文阿受業仕至祠部郎唐顧况吳中人字逋翁以文入仕終江南郡城有文集二十卷皇甫湜為之序嘗寓臨海有所居三絶及剡溪至赤城詩許渾字用晦大中間為睦郢二州刺史嘗寓于台任翻有詩名其題帢幘峯一絶尤膾炙按唐詩主客圖云郡人今按翻所賦台州早春詩有豈堪滄海畔為客十年來之句則知其寓此耳王展前進士寓天台項斯有懷王展先輩在天台山詩云赤城山下寺無計得相隨又見白郎岩記周朴泉州人張為唐詩主客圖有清竒雅正入室周朴之語為天台道士後入仕莫彥修按孫郃作才名志云前進士莫彥修本貫鄞川徙居台州赤城志卷三十二
