body:
  text: 赤城志卷四宋陳耆卿撰公廨門一先聖廟社稷壇非公廨也首之者何也社稷主此土而先聖主此道無此道則無此土矣無此土而欲治此土得乎先廟次壇示有本也若學宫與貢院則為國造士教場則為國簡兵士以宣道業善治兵以昭威鋭讋不軌文武二柄略具故不敢混諸官舍而附於廟社之後庶覽者得詳焉先聖廟州廟在州東南一百步康定二年李守防即廟建學初廟在州治後景祐二年范守説徙東城之維時未建學也李守既建學於其東得故版掾舍遂以錢易之復遷廟焉自是廟學一新矣皇祐二年吕守士宗創屋五十楹尋壞紹興十九年宗守穎三十一年黃守章乾道元年黃守然七年朱守江皆重修之淳熙七年唐守仲友始大修更戟門兩廡及齋舍紹熙元年江守乙祖闢縣學宗學先是趙守汝愚欲建學未果至江始成之慶元五年葉守籈奉旨闢武學惟大成殿久欲壓歷三政不果造造於開禧元年葉守箋殿之後有明道堂堂之上有稽古閣閣之後有直舍有上職事位七諸生齋六伸道敏行潛心居仁尚友育英有肅儀位祭器司計二庫而庖湢之屬不預焉蓋大綱略具矣嘉定四年黃守畇作櫺星門又為兩夾室易州學額創小學以三十人為額置教諭一員食減半增大學生食又捐錢買田造祭服祭器先是尤守袤立思賢堂祠畢文簡公士元章文簡公得象元章簡公絳皆舊侯有惠政後至宰輔者也三老堂祠羅提刑適陳侍郎公輔陳詹事良翰皆鄉之名德後進尊慕者也後有頌僖堂祠宗守頴黃守章朱守江唐守仲友江守乙祖皆有功於學者也有謝丞相祠至是復建四先生祠濓溪周先生惇頤明道程先生皓伊川程先生頤晦菴朱先生熹謝上蔡祠因上蔡子孫流落于此召至給官帶月廩其母子四人有差仍買田俾奉祭祀遂又立此祠於思賢頌僖益二位趙忠定公汝愚黃守然諸祠多遷徙嘉定十三年趙守彥紓合建于明道堂之東偏仍更造直舍十五年齊守碩重造櫺星門葺衆齋修祭器一千二百學之庶務可謂畢舉矣唐守記云本朝以恢儒為家法自慶厯訖紹興命教益廣太上皇帝首善輦轂欵謁臨幸親勒石經以風厲學者聖主服慈訓復舉縟典橋門觀聽益盛肇建華閣嚴奉奎畫增飾黌舍輪奐一新教風所被無間幽逺矧在甸服敢不欽承仲友世以諸生受國恩淳熙庚子奉命假守嵗丁大祲夙駕至郡既謁先聖行視學宫將就傾圯惕然念非宣化所宜顧民艱食事有敘既登麥命臨海令葺大成殿易腐苴罅堅緻可久至秋中熟乃議修學闢庭高門崇垣修廡論堂書閣因舊而葺鳩工度材慮吏並緣乃集鄉之搢紳推其賢能者三人庀役事擇僚屬四人助之以吏卒謹飭者行文書給呼召如作私室官不知役始作於壬寅孟春畢于首夏庭宇夷直規制宏壯悉過於舊材良匠能可支百載夫以天子命郡置學選明師教士以德行道藝以培植風化震蕩習俗使人知有禮義以胥訓胥保於平康輯睦之地乃王道之本生民之命不可一朝緩養薄則不足移體居陋則不足移氣青襟挑闥而不遜業則風俗之茍簡熟爛至於扞格而難入無怪也兹郡邇辟雍之流而以水火風旱之相仍補敗不給顧視嘆咨以迄于今又因循而不修守之罪大今捐數千緡而賢士大夫樂與共成豈獨守之責塞實亦成前人之志副多士之願然鄉之賢士大夫勞其心力而守蒙成此非天子之德厚而朝廷之化深與喜其成而推其本言之不足而至於咏歌詩其可無作詩曰有學之宫既久斯圯匪鄉之英孰葺而起伊鄉之英匪為我勞辟雍之化其流滔滔有廡斯䀺有門斯閌多士復來居移氣壯台山巍巍江流逶迤有學之宮與江山齊既安爾居既鼓爾篋青青子襟曷孫爾業我風斯移我俗斯美詔爾多士毋負于天子天劉尚書爚四先生祠堂記云嘉定五年春正月台郡學始建四先生祠郡侯豫章黃畇使來言曰故侍講文公朱先生道為世師台之士受業於其門者衆淳熙間浙東大飢詔起先生為常平使者部內賴以全活而於台人櫛垢􅐡癢為德獨厚蓋嘗比屋設位而祝之盍祠于學宫然先生之道濓溪周先生伊洛二程先生之道也故祠四先生焉庶幾邦人有所嚮慕而興起願子有以發其端爚惟黃侯因邦人懷先生之德而欲慰其思復推原先生學道愛人之所自出以風厲之其於化民成俗之意篤矣然四先生之道孔子孟子之道也今學者孰不曰師孔孟得其言孰得其所以言不入於清虛則溺於淺陋本原不正末流益逺是以義利不明習俗以壞儒者遂可厭薄天下不復見治古盛時然則長民者盍亦反其本矣今侯之牧其民也芟夷暴強封植善良政既行矣侯曰未及乎德禮也乃建是祠率諸生而舍菜焉執事以序雍雍如也禮成而退有進而言曰先生之容則既瞻而仰之矣先生之道可學而至乎侯曰善哉問吾嘗聞之維皇上帝降衷于民本然之性無不善也學者窮理以致其知反躬以踐其實則施之家而順達之國而理措之天下無所處而不得其當乃若趨其名以為高入乎耳而出乎口則非四先生之所望於後學也余既嘉侯之為邦知所本而其所以教人者又親切而著明可尚也已於是乎書水心葉侍郎適上蔡祠堂記云謝良佐字顯道受業二程與遊酢定夫楊時中立皆為高弟號上蔡先生學者宗其傳謂顔冉復見也不幸遭黨人禁錮未解而卒諸子避冦迸逸一死楚一死閩獨克念者落台州紹興六年給事中朱震子發奏官之尋亦死克念有子偕三子無衣食替人承符引養老母嘉定五年太守黃畇子耕修郡志訪求故家得之請見抗賓主禮給冠帶錢米買田宅祠顯道于學在二程後郡人驚異曰自黃太守來他日邦賦之沒于羣姦者一收斂公使之消於妄費者悉減節遂能以其餘興小學作櫺星門增太學生食服有珩韠器有罍簠又設熸火立養濟葬叢骸政通化達生死潤賴此吾等所知也惟上蔡事不可解甚或嗤笑曰奚不切若是哉夫意有逺近知有難易詩曰蒸我髦士近也又曰續古之人逺也興小學近而易知也祠上蔡逺而難解乎道非人不行不行而天地之理不章古今大患也先王比聨閭附而教其人不敢薄也然其致道而成材者幾絶都曠國不一遇焉故尊之貴之珍之重之哀其死也尸祝以神之祿位以延之更世千百猶未也蓋公之也若使人奮其私智家操乎異説各不相統而以已之氣血所勝者為善則道德壞而義理滅矣解子耕之舉者宜曰獨上蔡事尤長非不切也昔正考父饘粥於鼎循墻而走其後孔子生而孟僖子命其子學禮焉謝氏之困於庸奴久矣子耕既洗沐之列於士大夫安知無達人出復佐二程之道斯可以占天意矣然則余之不切不愈甚乎由又三老先生祠堂記云學者聚道之地而仕所出也或畔道從利茍榮其身欲復於學弗可受矣况可祠乎台州之學得祠者三人羅提刑適陳侍郎公輔陳詹事良翰提刑用不究故事不顯余聞鄒浩言熙豐外貴人視民甚蒿萊芟燎恨不力也是時能慷慨建白保赤子以對天命惟江都令羅適弋陽令董惇逸二人而鄒公獨謂羅公見而得之然則推於所不見而不畔道審矣方靖康憂恐懲艾已泮豈不尚合侍郎發明四肢心腹之論無過此矣竟失指逺去然後倣徨宗周卒成分裂之禍及隆興英睿憤激大勢宜若遽振詹事力守絶和不棄地之䇿最專一也使堅忍待之敵久當蕩析豈遺種至今哉雖紹興復用而巳與大臣異議終不留雖乾道再入而既為近習擅事迄自退二公任諫諍位從官立朝本末天下誦之豈惟不畔道而固行道道雖難行而不茍榮其身而止也士在天地間無他職業一徇於道一由於學而巳道有伸有屈生死之也學無仕無巳始終之也集義而行道之序也致命而止學之成也後世地或千里無學其君子以意行道晚進闊逺不知所從慶厯後名一功著一善往往復之於學矣今其秀人美士羣萃而校處朝夕瞻顧拂拭像服如三老之存春秋盥薦饔醴芳苾如三老之饗而又仰其大節俯其細行無不皆可師也為聚道之助不既多乎或疑侍郎不右移公學術若少異然按程公親為孔文仲排劾而與孔公並黨籍史記晏嬰非孔子而論語稱善與人交兩賢哉臨海廟在縣西南二十步景祐四年令師道即廟建學崇寧中學徙附于州後廢廟經乾道九年火淳熙二年趙守汝愚復新之黃巖廟在縣南二百步舊在縣東三里治平三年令許懋即廟建學元豐六年令翁仲通徙今地宣和二年燬于寇五年令王然重建開禧元年火二年令趙湜又新之嘉定九年令陳夢建作直舍天台廟在縣東南二百步舊在縣西南四十步皇祐中令石牧之即廟建學後三徙至今地淳熙中令趙公植作廊廡齋廬嘉泰二年令丁大榮重新之嘉定元年令詹阜民創明倫堂上為尊經閣十一年丞陳逵重建大成殿學前瞰溪其流舊釃為三古讖云三水共一流此地出公侯先是舉人多折北紹興二年大水其流適合自是舉不乏人云陳密學襄記云孔子聖人之大備者也使得百里之國以為政於天下雖堯舜不可及已為天子者不以有已聽命以治其天下為諸侯者不以有已聽命以治其國則必期月而為東周矣惜乎天民之不遇命也自唐以來天下郡縣始立孔子廟追尊王爵春秋釋奠天子以下皆執弟子禮世以為尊用孔子之道如是豈其然也生而有盛德於民死以祭禮報之如曰尊用其道則未也天下之文弊久矣自周迄于今冝黜浮偽尚忠實百物或有失職者宜正名王澤或有壅滯者宜任大臣逺邪佞官政或有冗濫者宜進官之賢者以黜不賢者若夫教或有未至者宜興立學校隆師儒禮或有未修者宜教民冠昏喪祭樂或有未作者宜考五聲十二律放鄭衛豪傑或有未出者宜拔賢材舉逸民鰥寡孤獨或有未養者宜弛力舍禁授田以制取財以節民之蠧或有未去者宜黜佛老夷狄之患或有未備者宜足兵孔子之道用之則必先於此數者夫能立廟以守其祭祀尚未為得禮者而况於用乎天台縣有孔子廟不修縣令石牧之始至嵗十月相縣之東南隅大作新廟為屋總六十有二楹先植正殿塑孔子南鄉左右十哲曽子自餘門弟子六十有一人與諸儒傳經者二十有一人皆圖之壁間各以其所追爵等降如周之服冕圭璧惟孟子荀况揚雄韓愈氏服儒服焉中立講堂圖古之輿服禮樂之器於其兩壁間又設學舍生師講習咸有位序祭器在西房庖厨在東房周回門廊環以墻宇又考古器作籩豆簠簋樽罍俎爵之屬十二月廟成明年春秋釋奠入而行禮生徒興事品物如制像圖尊嚴籩俎新嘉神明燕喜人物觀化先兹邑民不識儒學又故廟湫隘與民雜居侮慢不尊至是耳目開覺始有學者嗟乎石君可謂有志矣區區一小邑而能為孔子立廟制度以禮春秋以時祀之俾民不忘是以無愧於心如其欲用孔子則天也非力之所能及也天其不欲以斯道覺斯民也則亦巳矣乎如欲以斯道覺斯民也石君之志其必有遇矣仙居廟在縣東五十八步皇祐初令陳襄即廟建學初天聖中令陳戭止建廟襄既建學且為文勸誘學者宣和兵火廟獨存淳熙七年以風雨摧壓令莫洸新之十一年令徐柟重建學嘉泰二年令林嶽復加崈葺嘉定元年令姚偓創明倫堂櫺星門周丞相必大記云孔堂高弟猶分四科性與天道未嘗輕言世之學者乃欲德行言語政事文學兼而有之其不可得而聞者每求於議論之間往往名是實非言出而躬不逮此今昔通患也古靈先生陳公諱襄字述古福州侯官人時方以雕篆為學獨與陳烈周希孟鄭穆倡道海濱鄉人化之號四先生皇祐中令台州之仙居篤意學校首為文勸人讀書次諭以禮義之俗又擇明經之士朝夕講説詢問大義間習程試高不躐等卑不流俗示之以方期造於道而進取亦在其中士民懷之奉祀今百五十餘年嘉泰辛酉夏通直郎四明林嶽來治兹邑歆慕前哲凡庠序堂廡門觀舉新之厥初祠宇庳下遷置中門之右極其嚴潔刻公遺文二十五卷得謝雨詩於斷碑增置集中學有射圃淪棄榛莽亦加剃葺别市民居創觀德亭總為錢千二百緡皆出節用籍贓田十八畝輟務場餘財月萬錢以贍給生員請尉簿嘉禾錢撫專主教導於是學職林宓吕咸陳穎王杰不逺二千里以記為請夫教人必以聖人為師古靈學夫子者也林君希古靈者也學者誠能各因其材孜孜弗怠尊所聞而行所知豈特無負賢令亦將無負先聖可不勉歟按國史古靈傳惟載其宰河陽典數郡所至必務學校而令仙居則略之是尤不可以不書也寧海廟在縣西南二百步舊在縣東一里祥符五年令蘇季成即廟建學嘉祐四年徙縣驛側紹聖四年徙縣治東南紹興六年令錢埈徙今地慶元三年令趙笈夫重建廟有麗澤棠憩詠歸三亭建學時有曰者云山蟠水聚人物之鍾也然當鈍滯一甲子近世人士寖盛咸以為驗焉社稷壇州壇在州西南六十步政和中李守春卿建時知襄州俞惠奏言州縣壇壝率不如式乞按今格為圖下諸州以故李守倣行之嵗久圯近舍肆侵淳熙六年沈守揆命臨海令彭仲剛撤而新之得仆碑土中蓋政和所頒式也其制橫列三壝門各四出中立社稷東風師西雷師雨師總為五壇壇高二尺五寸外為燎壇視他壇稍高遂悉效其舊增築之有屋四楹為視饌更衣所又創其一為齊潔之地其塗北出表以二柱中建門嚴鑰以守之其制備矣嘉定三年火黃守畇重新之樓參政鑰為之記臨海壇在縣西南一百步淳熙六年令彭仲剛重建黃巖壇在縣西南二百三十步嘉定十四年令林士遜重修天台壇在縣南一百步嘉定元年令詹阜民重建仙居壇在縣西三里政和元年建寧海壇在縣西二里慶元元年令李知微重建貢院貢院在巾子山北乾道七年朱守江建南渡初應書士未盛故以州東三百步今韓運判宅址為之後徙兜率院按今藏殿柱間刻云終場三千人院據山腹陟降不勝病遂徙今地有監試位一考試位六後有亭曰搴秀為會考之地重廡參錯為屋三百一十楹置試案卷棚先是人士各先輸案入試併請卷紛拏洶閧上下病之今每屋一楹列三案案附柱長存一廡架二棚使坐其間者以關子附繩而上則卷子隨繩而下自是無失卷若案者二事他郡所無也自是應書者雖漸盛猶不過五六千人近嵗至八千人始於報恩寺截行者寮附益之猶慮不能容嘉定十四年將大比齊守碩諏羣議相其東有福安廢院院後多隙土可縛屋有馬氏地闑之守併得其地通為三百八十二丈墾高塞卑建八廡為屋七十三楹與正院第八廡通又益以福安餘屋别為門以入且慮徑塗隘蹙待試者病西闢酒務繚垣畫地為衢其廣四軌兩旁渠道亦以石甃平之是秋應書者又多皆穩步散坐無他患先是未有也樓少卿觀為之記解額舊制三嵗五人崇寧中行三舍法嵗貢一人大比貢四人宣和中復科舉三嵗解八人紹興三十一年合流寓三人為十一人以今終場數繩之幾於千取其一蓋與溫福等州最號人盛員窄處士至奔迸易鄉貫去井邑求試于漕臺于太學蓋亦勢所必至也儻均而廣之使為士者不窘于較藝而又不重搖其心則豈惟一郡之幸哉先是試無常日士有詭冒取解數州者紹興二十四年始詔天下例以八月十五日引試教場州教場在州東北一里一百步紹興二十二年蕭守振建有廳名奠發西有小廳為兵官彈壓之所東西二廡諸軍入隊或泊焉東有吏舍弓弩房嘉定四年黃守畇重修之易奠發為講武廳後創泊水為按閲棲習之地作外門按路分都監州都監皆以教閲為職循習既久止委之路分路分憚於躬閲而州都監又縱不入則付之軍頭押教而已士驕而惰甚於他郡淳熙十二年江守乙祖奏乞以揀中禁軍六百人分十二隊俾三都監一押隊各總其三日親閲習總其路分知通月一拍試務在兵官盡職以舉軍政有旨依他州郡放此先是軍額多闕齊守碩以次招補士為立碑陳耆卿為之記臨海教場在縣東北四里尉廳西黃巖教場在縣東三里天台教場在縣東一十步仙居教場在尉廳東五步寧海教場在縣東六十步赤城志卷四
