body:
  text: 赤城志巻二十六宋陳耆卿撰山水門八遷書河渠固志溝洫得不以水利吾民之命不容不偹録之歟每念古鄭白之儔出意䟽鑿有以一渠而溉田千頃者接於近世非惟不能圖新而併與其舊失之矣台雖號山郡所在陂塘良衆顧以豪吞冨噬日湮月磨每歲邑丞彚申按敗紙占名惟謹何識興壊以故甫晴虞旱方雨憂潦盖人力不至而動責之天宜其少樂歲也余故搜按舊畎特掲一門庶使後之有志者可按圖而得之焉乃若溪𣲖河流浸灌浩愽盖水利之大者前已詳故不重載水利臨海大固鄉周家堰古涇湖梁埭義誠鄉髙湖堰保樂鄉東山頭浦謝奥浦􅢰泄浦松浦涇廣濟埭浦涇林子浦涇呉志屋後浦涇涂下浦涇章安浦涇遂仁鄉長石廟前浦洋奥堰明化鄉蛟龍涇新剏家子浦涇安樂鄉道塲砩石牛砩湧泉砩胡超堰下堰吳丞有堰重輝鄉長潭堰黄肚堰中沙堰馬銀泉楊木泉潘婆泉長樂鄉古涇埭湧泉涇黄巖仁風鄉歩頭埭石湫埭西仙浦埭三童鄉興家埭方家埭孝順埭鄭戍埭林家埭永寜鄉楊家埭善化鄉浄土埭新埭飛鳬鄉仙浦埭水磡埭斗門仙埭章師埭蛟龍埭備禮鄉塘浦靖化鄉壇頭等砩自黄巖溪五十二水合為一溪東分為二十砩又東北始為壇頭砩白巖砩又北東為鳥巖砩板砩靈山鄉于浦瀕於海為河涇宣泄之處洋嶼埭長浦埭鮑家埭凌家埭陳㐲埭繁昌鄉顔家埭黄望埭金青埭葡萄棚二埭監側小埭細嶼埭來逺鄉陳家砩下㠘砩呉佛洋砩李家埭太平鄉髙浦大埭鋪堆埭髙浦小埭車輅大埭臨清涇埭西保埭婁子埭蔣家埭月河埭伍婆埭㹀牛埭王三浦埭流沙闕埭天台太平鄉長塘戴應塘新塘鮑家塘山頭大塘公塘鮑磚塘泉井塘西安隠院庒前塘明公砩資福前寺砩滑溪砩奚亭砩王家砩杜砩梘砩新官坊砩黄壇砩窠山砩苓塘砩新坊水甽西洋水甽永保鄉桐栢天照塘桐栢庒邉塘萬年塔邉塘桐栢伎石塘官塘䕶國塘二𨗳元塘葛家塘柿砩筋竹砩道士砩巖頭砩清口砩又清口砩白馬砩楊樹砩黄甚砩周家砩九女砩乃居人周頥九女共成之發源甚逺祥鸞鄉牛頭塘寧國寺前東塘過路塘徐家塘王家上下塘汪家塘衆塘石竹砩岳砩為一邑陂塘之最舊因居人岳其姓者開之故名今苗裔在焉松山砩峇溪砩積石鄉槎潭砩岳砩東求砩下砩大柘裏王砩坑砩單家砩小坑砩小溪畈砩黄固畈砩仙居昇平鄉張阜堰溪上堰盂溪石藤堰上砩堰丫溪堰慶雲鄉彭溪坈堰厚奢堰開元鄉圳口感德堰玉潘道堰祝墺堰赭光堰北山秋成堰髙遷雷垣堰潘湖堰赤城巖湖堰蓼溪新堰横溪堰張支湖堰清風鄉深裊堰才塘堰洋前堰柵岸砂溪堰板橋吳横堰湖村陳道堰歸仁鄉陽歸堰遂寧鄉童渠堰上畈堰木舟後洋堰寧海連理鄉大溪砩又大溪砩黄壇砩新村砩蔣家砩呉家砩太尉堂前砩金家澤坑砩崇教寺嶺砩吳阮大砩古大砩上畈古甽朱開鄉鍾家砩莫家砩東山頭坈砩和尚塘砩葉家奥砩永康鄉㠘子大塘上白溪潜家歩砩中砩下砩下山砩前王上砩下村砩坈口下田砩竺家洪水砩山王奥坈仙巖鄉黎家砩上砩下砩湧溪四砩毛二娘潭砩烏隠砩剡畈砩石馬胡村砩外洋砩和尚砩新寧鄉倉頭砩細零坑砩五里河白鶴殿甽寧和鄉聖前塘坑砩東洋杏桃砩東壁砩管溪砩前金砩下任砩嶺下砩蔣家砩塘泉水孔赤城志巻二十六
