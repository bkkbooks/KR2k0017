body:
  text: 赤城志巻三十五宋陳耆卿撰人物門四孟子進逃楊逃墨而韓愈闢入佛入老非以其擇術不可不謹哉道逺俗龎固有以豪偉聰明之士而遁於異教者如歐陽子所謂曼卿隠於酒秘演隠於浮屠夫隠於浮屠未若隠於儒之為正也歐陽子不之禁又俎豆之則與本論自矛㦸矣台古仙佛國也其多釋與道固宜余細攷之疑亦有沖深虚逺之士隠於其中如歐陽子所謂者乃若趺化飛昇離凡入獨雖神變莫指非所以訓也姑存之而已釋東晉曇猷燉煌人興寧中至天台舊傳赤城有五百大神居之言輒降禍猷至遇一嫗問塗忽有負而投諸淵者猷飛錫救之水立涸今乾溪是也方誦經有猛獸巨蟒交見猷不動後有神詣猷遜謝願他徙於是鼓角凌虚而去曇蘭青州人支姓日誦經三十萬言太元中憇赤城一日有神長數丈屈膝自言願推室相奉世傳韋鄉山神云懷玉臨海人高姓今樓石村其所居也號高玉禪師居方山運水逺谿忽見一老父曰庵前石下有泉也玉舉錫迸湧盈尺乃入天柱山即今湧泉延恩寺齊普遼東人居白岩號普耀禪師事見妙智寺及黄展白郎岩記梁定光青州人許姓字静照大同初隠佛隴三十年人罕知者初智顗在江陵夢光引至山頂曰汝當住此汝當終此及顗過佛隴光曰憶昔往時招手否顗即悟光曰金地吾巳居之銀峯爾宜往今修禪寺是也陳大建十三年坐滅凡三瘞體骨踊出後置殿乃巳陳智顗潁川人陳姓字德安號智者大師十歲誓佛前願荷正法游佛隴感定光之夢即建寺後示滅石城其徒輿葬佛隴今真覺院有塔存焉嘗著止觀十卷緇流宗為天台教天聖中詔求其書賜名天台總錄其徒如灌頂普明及智晞智璪輩皆有名詳見顔真卿梁肅碑灌頂章安人呉姓字法雲號章安禪師聆智顗所說法了無遺忘嘗入都講演義䟽晉王遣使送之還山為造國清寺今為天台第五祖師先是同門智晞絶而復蘇其徒問曰師生何處曰吾生兠率天上見先師智者坐寳座旁皆有人惟有一座尚虚問天人云六年後灌頂當升此説法及化果如其年普明㑹稽人朱姓初止國清半岩難於得水一日以杖叩石泉湧出今錫杖泉是也後示滅反屈三指云隋智越臨海人郭姓亦受業智顗嘗誦法華經瓶水自盈居露山精舍大業十三年終國清寺見高僧傳中唐豐干寒山拾得號國清三隠豐干者貎尤寢被髪布裘或時唱歌人問之第云隨我騎虎游松門三人每邂逅則長吟大笑人莫測也有詩偈三百題松石間如云日日日東出日日日西没不知千古萬古人送向青山成底物人競傳之貞觀中閭丘守嘗問豐干天台有何賢聖答云見之不識識之不見欲見而識不得取相國清有寒山拾得状類風狂歌笑不常盖普賢文殊後身也公至宜謁之至則二人方據火談笑閭丘遽作禮二人云豐干饒舌耶遂握手出門而去其後寒山隠寒石山拾得隠祥雲峯遺跡可攷獨豐干不知所終溈山禪師初作沙彌自福唐至國清求戒時寒山拾得掃松迎迓臨行寒山送之云千山萬水遇潭即止後於洪州潭山得道見傳燈録湛然常州人戚姓號荆溪禪師天寳大歴間優詔不起脫歸台山注天台教今赤城釋籖巖是也一日説法竟隠几而化今號天台教主云遺則京兆人長孫姓六祖牛頭弟子嘗謂天地無物也物我無物也雖無物也而未嘗無物也如此則聖人如影百姓如夢孰能死生哉至人以是能獨照能為萬物主吾知之矣於是至佛窟四十年而終世號佛窟禪師普岸漢東人蔡姓百丈弟子太和初止水磑西峯翌日有虎引至平田今萬年寺未幾寺成闕璋夏侯姓相國孜之猶子遊天台感異人語於静安鄉剏福田院今慧峯也後守駱延訓命居靈鷲人死於饑璋聚骸以葬錢武肅王嘗夢一僧形觀甚偉寤求之不獲後圖形至此處乃璋也諭令歸國號至德大師闕受業白雲院嗣法於六通紹禪師人闕稱欣四面後入天台華頂莫知所終五代勝光和尚住兠率院事見傳燈録大小静不知何許人同憇國清寺深悟宗旨其問答為人所傳聖者頭陁初憇國清寺顯異甚衆其雷馬山伐木事見頭陁庵全宰錢塘人沈姓嘗得石霜印可晚遁暗岩二十年今趺坐處尚存師簡初憇天台戯龍院時大旱有龍卧巖間簡以杖叩之隨即霶霈簡善書求者多以鵝酒易之徳韶常語人曰此簡羅漢也後示滅錢塘德韶龍泉人字惠舟清泰二年入台嶺憇智顗道場後於通元峯卓庵嘗有頌云通𤣥峯頂不是人間心外無法滿目青山時法眼印可之凡建道場一十有二處國朝開寳中示滅蓮華峯世號韶國師本朝道榮不知何許人淳化中居長隴院習禪定靈異頗多時以羅漢目之既入滅人有見於壽昌五百應真位者今肉身尚存自詢號國一道者傳法於了定大寂嘗燃一臂供佛雍熙初勅為建受業寺詢燃身以報火滅舌根不壞詔改寺為壽昌今萬年是也遵式寧海人葉姓字知白少住寳雲洞天台宗㫖後又歸東掖其靈異非一嘗以錫卓石成泉後又講法於杭之昭慶寺學者以千計賜號慈雲一日自言將死問其所歸以浄土寂光為對天聖中入滅長吉住浄名庵號梵才大師事見嘉祐院居昱錢塘人郭姓七歲扣疑於林逋書如夙諷丱角禮僧願拾誦法華經七日而周世號昱法華通判夏竦表為沙彌卒後三日啟棺貎如生昱善為詩有松聲和雨聴山色帶雲㸔之句知白居永慶院郎侍郎簡記行業云天台僧獨知白為可紀白嘗謂釋書不少觀者若臨海求濟茫乎不知其涯必有維楫之助然後旁行不難清徹仙居人戒行高潔天禧中嘗截一掌為衆祈雨立應庵前猛虎馴伏洎死鄉人塑尸事之處謙永嘉人潘姓字終倩住白蓮院號神悟大師為王荆公安石所知州旱請禱雨于潭謙語龍曰昔智者誨汝旱則施雨今偶忘之耶言訖雨大注如吉臨海人僧業精修元豐間居妙智院事見陸農師記智賢寧海人慶歴間遊錢塘傳智顗教又事明静師儒佛皆得趣後歸崇教寺卒禹昭寧海人傳智顗教又與智賢論五經得其奥㫖羅提刑適嘗咨請焉了然臨海人薛姓號智湧法師初母胡無子禱於石觀音像夢有一老僧手持蓮華語曰食是當娠然非汝子也生而超異住白蓮寺寺後有龍湫路嶢陋師呪之使遷一夕大風雨遂徙寛地寧海建法㑹請主法席寐中見有持牒来者曰兠率天請説法又夢一龍化為神告曰師七月當歸矣既寤併日演法且誡且别坐而化本如四明人林姓住白蓮院號神照大師卒之夕所居梁木盡壞體聞異香人見雲端有一衲子焉比葬發函如化爪髪俱長矣塔近地一日生蓮花趙清獻公抃作行業記良弼永嘉人柯姓學天台教訪僧本如於白蓮得其要㫖従之者甚衆住香積壽安又住白蓮歸壽安而卒元照錢塘人唐姓字湛如號安忍子深明教律四方宗之少遊天台度石橋合爪誦經想方廣而度者三復遶宴坐峯石誦經失足幾堕如人扶之而免與蔣之竒楊傑諸人為方外交劉燾作行業記處咸臨海人王姓字應之住崇善寺寺敝謀遷之令李廷芝夢神告曰五祖臺下龍頭九九和尚宜見之公未諭閩人陳白曰五祖天台教之第五祖師也昔居此山號五祖臺又指師九月九日生辰龍也其此僧之謂乎李悟趣為興寺後住白蓮院歸寂前二日與衆别楊傑為作誦云妙機仙居人陳姓母初娠夢有神僧告曰當生賢子至生有竒相落髪事雙林昌師後歸林下通判章憑因行縣謁之問如何是妙曰㸃鐡成金如何是機曰百發百中章尊事之又有行機者號簡堂操行尤峻世號大機小機云照伯不知何許人居崇教寺塔下夏坐則向日冬卧則擁雪或引紙縦筆濃淡横斜初若狂言終無不騐宣和已亥正旦忽持巨軸與一徃還士人緘縢甚宻巳乃行哭于市其中所言自方冦猖獗次及遼亡迄于中興日時不易一日忽辭寺僧去或問何往曰不天台不五臺不東去不西来沿道誦詠數日趺坐塔下視之死矣衆欲舁入寺忽躍起狂走従寺後登山縁高如猿猱衆墮即之望木杪騰踊者數十不知所終法濟臨海人師黄巖浩先罕卧食冬夏不爐扇建炎冦亂與其徒各燼一指以保城邑每誦法華至藥王品輒太息曰身如垂疣附贅虚生浪死何益遂采薪自焚是夕星月皓然忽天雨白花大如朔雪清旦拾遺骨得舍利焉澤龕寧海人葉姓建梁王寺塔塔成或請記歲月龕曰吾自有之乃取一鐸朱書二十字使垂之絶頂曰此塔記也乾道中通守趙師䕫侍母陳經行見塔壞欲新之夜感於夢且問始末使取鐸書以觀則曰二十世十八姓之僧造塔遇走小月東邑之氏修治趙母子駭歎施緡錢百萬且繪龕像於塔下焉道周王喬字子晉周靈王太子好吹簫作鳳鳴浮丘公接以上嵩高三十餘年後人求之不得偶見亘良曰告我家人七月七日待我於緱氏山至時果見喬乘白鶴而去後為右弼真人治桐柏山詳見喬祠前漢茅盈咸陽人字叔申於龍顧山駕鶴上昇按茅山記云盈漢景帝時人其高祖濛字初成秦時至華山飛升先是有童謡曰神仙得者茅初成駕龍上昇入太清時下𤣥洲戯赤城繼世而往在我盈帝若學之臘嘉平盈年十八委家學道詣南嶽上真西城王君受道道成命為太𤣥真人領東嶽上真卿司命真君至漢哀帝元壽元年乘雲駕龍至太霍赤城玉洞之府見道史屬辭叔申馭鶴注及臨海圖經後漢徐來勒字元和甫按本際經云昔在赤明刼一百八身為道士濟生度死其後白晝乘火上昇至東漢時為太極法師餘見括蒼洞劉晨阮肇永平中入天台山採藥失道遇二女焉詳見劉阮洞幽明錄作劉晟王逺東海人字方平舉孝廉官至中散大夫明天文圖讖逆知盛衰吉凶如指諸掌桓帝召不起後强起終不言但題數百字於宫扇上其語皆騐留太尉陳耽家三十年忽自言當死死後歛三日失其所在後至括蒼山與蔡經㑹焉詳見隠真宫徐公郡人居山鍾御功成以鐡錐刺穴有白鶴自石鼓飛出駕之上昇見道史屬辭按郡國志云漢末有徐公知於此山成道控鶴而去意其人也陳仲林漢末人與許道居尹林子趙叔道三人居盖竹山得道其後王世龍趙道元傅太初等又居之呉左慈廬江人字元放李仲甫弟子葛元之師也呉赤烏二年嘗與元遊括蒼洞錬九華丹服之得道葛元丹陽人字孝先洪之從祖初在赤城後入括蒼蓋竹等處遇三真人授以秘訣符籙戯幻之術無不通曉呉赤烏七年尸解而去為太極左仙公政和中封沖應真人見高道傳蔡經括蒼山人遇仙人王逺巳而羽化詳見隠真宫晉許邁一名元字逺遊隠盖竹山塵外記云蓋竹山有洞仙人許遠遊居之又見晉書真誥袁根栢碩剡縣人因驅羊度赤城山忽有石門豁然見二女方笄遂為室家後謝歸女以香囊遺之根後羽化碩年九十餘平仲節河中人以劉石亂中國渡江入括蒼山受業宋君存心鏡之道積四十五年後乘雲駕龍上昇梁徐則東海剡人居天台觀號隠真中峯武帝詔講道要徐陵欽其風致為作頌焉晉王廣鎮楊州召問道法則遜免一夕死柩自江都還台道中多見則徒行云得放還故棲矣令弟子掃室曰客至宜延於此語訖跨石梁而去須臾柩至方知其異見隋書陶𢎞景丹陽秣陵人字通明號華陽隠居嘗居寧海閬風里與張少霞煉丹今鐡場側有東山猶存庵址嘗夢神告曰山在後海在前金笈玉笥居兩邊是中可以藏汝丹遂瘞丹焉其後漁人每值月黒望見火光屬林紹興初邑人胡俊發地得甆合大小三重内貯石紫赤色如鐡有陸湜者取而藏之居半載有一道流至號茅山人與語大悦留之宿以丹示之道流歎異夜深各就寢比曉人與物俱亡矣見南史隠逸傳及高道傳唐王逺知郡道士善易作易摠十五巻唐上元中一日雷雨暝霧中有老人叱曰所著書何在上帝俾遣六丁至取且責曰此上方禁文汝何為藏之逺知曰青丘元老傳授老人曰帝謂汝仙品巳及斯令展二紀光宅中死長壽中有人過海見之見龍城錄異人錄司馬承禎洛陽人字子微隠玉霄峯號白雲子博學能文尤長古篆則天朝累召不起睿宗召問理身之道對曰國猶身也老子言游心於淡合氣於漠順物自然而無容私焉天下治矣又問隂陽術數則曰損之又損以至無為帝欲寵以官固辭歸著坐忘論年百餘歲忽謂弟子曰吾今為青童君所召乃蟬蛻而去弟子歛空衣葬之詔謚貞一先生國朝政和中封丹元真人謝自然華陽人㓜而入道其師以仙經示之一覽如舊記慕南嶽魏夫人之操一日往浮海尋蓬莱遇道士謂曰蓬莱隔弱水二十萬里天台山司馬子微身居赤城名在丹臺此良師也遂回詣子微受法後白日仙去事見續仙傳甘泉先生不知何許人隠華頂峯頻詔不起開元十八年特於王屋山置闕居之吳筠華隂人字貞節天寳初遊天台觀滄海與名士相娯樂文辭傳京師𤣥宗召見大同殿獻元綱論三篇大厯中卒剡中號宗元先生見唐書隠逸傳及髙道傳賀知章字季真㑹稽永興人按許鼎撰通和先生祖貫碑云貫學黄老初賀監得攝生之妙負笈賣藥數百年不死後於天台山升仙元和中貫嘗遇之授斷穀丹經謂曰子寛中而柔外可語道也道以退節為首退節則寡欲寡欲則神逸神逸則無為無不為反此而求道如却走以追奔爾見唐隠逸傳髙道傳田虛應齊人字良逸得大洞法每水旱請禱但敝衣岸幘而坐應不旋踵元和中入天台屢詔不起應夷節汝南人字適中母夢流星入牖而生後遊天台與葉蔵質劉處静為林泉友㑹昌中於桐柏觀建壇以居凡五十年謂其徒曰玉京金闕泉曲鄷都惟心所造爾汝等勉之年八十五卒及窆惟空棺羅隠為之贊馬惟良相人字雲翼修道衡嶽元和中入天台㢘使元稹聞其風常造請方外事後以三洞法行於江表屢詔不起徐靈府錢塘人號黙希子居天台雲盖峯目為方瀛以修鍊自樂嘗為詩云學道全真在此生迷津待死更求生今生不了無生理縱得生知何處生㑹昌初頻詔不起但獻言志云野性歌三樂皇恩出九重来傳紫宸命遣下白雲峯多媿書傳鶴深慙紙畫龍將何佐明主甘老在岩松閭丘方逺舒州人字大方初學出世術受籙於玉霄道士葉藏質毎曰葛稚川陶貞白吾之師友也詮太平經為三十篇昭宗屢詔不起天復六年沐浴端坐而逝舉棺但空衣後人於仙都及廬山見之見續仙傳厲歸貞天台人嗜酒嘗單衣精水墨漢乾祐三年於中條山飛昇語人曰吾台州唐興縣人也葉藏質括蒼人字涵象咸通初創道齋玉霄峯號石門山居精於符籙懿宗從其奏以所居為玉霄宫左元澤永嘉人居玉霄峯三年絶粒不語常制真一頌云大道杳㝠不可致詰含太虚為廣舎總萬宇為一貞以道守真真亦非一信之以自然任之以萬物胎根既斷三界逈出九祖得度三官息筆實賴無功之功其功妙而難匹陳寡言越人字太初隠玉霄號曰華琳以詩詠自娱其山居詩云醉卧茅簷不閉闗覺来開眼見青山松花落處宿縁在麋鹿羣従林際還臨化以詩别其徒王可交蘇州人一日棹舟入松江中流見畫舫有道士七人皆玉冠霞帔一人呼可交與以二栗命一黄衣送上岸且令合眼洎開眼已失黄衣但見峯巒中松柏參天問之乃天台山瀑布寺前也自是不食衆白於臺與州後挈妻子入四明山不復出見續仙傳杜光庭字聖賔天台人或曰括蒼人號東瀛子為時巨儒懿宗朝與鄭雲叟賦萬言不中遂入道初従僖宗入蜀有文集百巻終於上都太清宫内供奉王仙姑黄巖人小名子松家岱石村行至石櫃山遇仙成道咸通七年飛昇今其鄉有王仙姑村黄道士居黄巖山山旁有石驛即仙人王方平所居也五代朱霄外郡人居白雲菴善河圖秘緯持其法嚴甚錢忠懿王給驛以進錫賚一不受館於都廣順初謝歸乃葺菴為觀居之今栖霞宫是也按崇道觀蔵殿有題梁云呉越兩街道統天台道門威儀棲真明德大師通𤣥先生正一天師特進檢校太傅守太保上柱國呉郡開國公食邑一千五百户朱霄外建本朝張無夢鳯翔人字靈隠號鴻䝉子㓜入華山與种放劉海蟾為方外友師陳摶得㣲㫖廬於瓊䑓行赤松導引法間以修錬事形歌詠題曰還元篇真宗召問長久之䇿不對令講易即説謙卦曰方大有之時宜守以謙上喜猶除著作佐郎不受復召講還元篇答曰國身也心無為則氣和氣和則萬寶結有為則氣亂氣亂則英華散此還元大㫖也賜處士先生號亦不受上以長歌贈行自丞相以下咸賦詩後終於金陵黄永乾居天慶觀一日解化後半月有州駚足回自金陵於道中解後叙問􅍁宻且俾寄音觀中道舊暨歸則知以其日尸解矣見道史屬辭張日損天慶觀道士事見三官堂記屈元應臨海道士范文正仲淹表友人王居墓言屈深於易且善琴盖祥符初嘗與范過從者也王温樂安人善造夹紵像景德四年上昇因改縣曰仙居今社壇即其址也張用誠郡人字平叔嘗入成都遇真人得金丹術歸以所得稡成袐訣八十一首號悟真篇巳而仙去至淳熙中其家蚤起忽有一道流踞主席而坐叩其家事甚厯厯㑹其孫他出乃去人以為用誠之歸云彭文昌彭溪人有道行行天心法政和中令晁昌之女惑於祟以告文昌乃市之滛祠為妖也焚其廟聞鬼神哭聲其恠遂絶蛇姑不知何許人居臨海後嶺之顛樵者見之以告居人忻生生訪焉見庵畔有一蛇䕶守遇不善人則逐之故號蛇姑邑人張得一徃謁授之訣曰心湛湛而無動氣綿綿而徘徊精涓涓而運轉神混混而徃来張矍然解悟遂遊方不歸矣赤城志卷三十五
