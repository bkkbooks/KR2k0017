body:
  text: 赤城志巻三十一宋陳耆卿撰祠廟門夫以勞定國以死勤事禦大菑捍大患則祀之此先王之制也余觀州之神祠錯峙紛出以其牖一時之民而廟千里之食豈曰無之亦有空山斷蹊踵訛沿謬而風靡波蕩遂贅疣其間者豈其樂鬼重巫越之遺風固爾耶昔狄仁傑巡撫江南毁滛祠至千七百惟存禹太伯以下四人夫四人者不可數見而千七百之滛祠今未必不爛漫於宇宙間也猶以土俗傳信重於鋤剔姑並存之使來者擇焉州城隍廟在大固山東北唐武徳四年建初吳尚書屈晃妻夢與神遇生子曰坦有神變能興雲雨後與母俱隱山中及是以屈氏故居為州治祀為城隍神水旱禱祈多驗吳越王時號興聖永安王國朝政和中以范守祖述請雨立應賜額鎮安建炎三年封顯佑侯四年以保䕶巡幸加通應紹興八年加靈惠乾道四年加昭貺慶元二年進靈濟公四年加顯佑六年加廣澤嘉泰四年加普應嘉定元年進順利王廟屢修嘉定十五年齊守碩又新之遷正殿増禰殿寢殿十六年復請諸朝加顯應靈佑信助侯祠在州治後山祀吳尚書屈晃嘉泰元年吳守英雋重建初郡祀屈坦為城隍神故追祠晃焉世號聖公慶元六年封靈佑尋加信助三台星祠在天慶觀東舊在聖祖殿後隆興元年趙守伯圭建按道書州上應三台如處以處士名婺以婺女名之類故祠之嘉定九年康守仲頴徙今地三官堂在天慶觀西廡大中祥符三年道士張日損建按道書三官職在按籍以察天下善惡故祠之夏英公竦記云台之郡治東出百步且北而扺山有古宫室舊傳茅盈駕鶴上仙始建為白鶴觀既廢至唐明皇興之築天寳闕自之臺于庭書以開元之榜唐命既草棟宇將朽天福五載永嘉威儀葉後已之門人太元大師黄永乾惠然来居始議興葺凡五十祀乃傳門人張日損太和冲融悃幅無華黄老之教擇其正而後學藥石赴人之意不避風雨時議以為長者上即位之十二載敕本郡以禮遣至闕辭疾不起由是逺民始知日損有髙尚之節㑹國家降禪于社首有詔改賜觀額為䕶國由是逺民始知朝廷右清静之治乃有石湛來俊等獻直三十萬請新三官之堂以列塑像以廣焚修既就予往觀之而不知其何神日損曰道家之說太虚之上虚皇在焉分命元卿治於紫㣲鄷都清泠之宫而三元按籍考察天下有猾㸃詭異苛忍暴慢險詖隠慝僣佞欺偽者可殺可奪可貧可賤有信厚仁惠恭遜和易謹愿端方孝悌正介者可安可夀可富可貴故上天有命宥宻無聲疏而不漏如合符契者三官之職也噫吾嘗讀聖人言有云死生有命富貴在天又云皇天無親惟徳是輔故常疑造化中有主者耶其自然耶果如日損言則三官其為主者乎夫位為上真職司造化能使天下枉者直善者安暴者夭仁者夀貪者損㢘者益雖盡把梓之材為之宫備山龍之章為之服罄玉帛之禮為之薦日祀而辰享可矣非謂無名之土木也予結髮讀書弱冠為吏未嘗為惡惡亦不及從今而往益致為善以聴隂隲以驗三官之說元應善利真人祠在天慶觀昊天殿東祀仙人王喬淳熙九年唐守仲友建初喬為右弼真人治桐栢山掌天台水旱五代時封元弼真君國朝政和中封元應真人祠初附桐栢紹興九年旱郡請通守李彚迎像以禱及境雨洽郡以聞加善利其後唐守以旱禱亦驗故祠之唐守記云道家言仙人王子晉受帝命為右弼真人治天台山桐栢福地坐金庭宫受五岳朝謁總御衆仙其位髙其職重其冠服儀衛尊嚴率民以事神其禮冝稱䝉澤而效報者可茍簡而但已耶淳熙辛丑夏旱郡以故事迎香火于山至郊而雨邦民咨嗟願致崇敬乃更天慶塑像鏤木加髹絢以竒彩帳座輿輦幢節旌扇葩果燈燭之供皆新之工匠精能金碧輝映瞻者改觀壬寅嵗上元慶賛于郡之君子堂後二日奉安于昊天殿之東偏使吾民永有依嚮自周及今數千載真人道益光政和紹興繼錫顯號仲友之報徳則已㣲矣故采國語仙傳效步虚之音為賛詠九章授羽流歌之其詞曰周道昔波蕩王子生不辰忠言諌壅川親意不我親天壊不可支厭此濁世塵樂師爾何知吾將去上賔吹笙洛陽道邂逅浮丘公方瞳一莫逆精思嵩髙峯劒舄我何冇飛馭凌剛風時聞鳳凰鳴隠隠丹霞中弦月何皎皎緱山何巍巍上有白鶴駕聊與時人期後天凋三光何必千年歸金闕帝冇命吾非丁令威帝念下土民山川分百靈命汝右弼君秘宇開金庭闔闢隂陽機五岳趣朝纓暇日帝汝思時時来玉京桐栢亦何有清輝照瓊臺衆泉注金石萬木羅琳瑰玉室静窈窕鶴轡紛徘徊紫雲擁飛盖知是真仙来丹符列素奏黄水晞雲漿吾道固欲傳世人殊可傷授汝紫陽周語爾芧山楊食之仙人芝引𬒮同飛翔丹丘壤千里水旱固所司吾民實可矜有守孰不祈應汝捷影響樂嵗免阻飢萬人齊呌閽天子逺亦知天子鍚榮號賁我靈宫祠吾道豈加損羣心自瞻依峩峩芙蓉冠劍佩明朱衣自周迄于今千載彌光輝外傳烱遺迹真誥垂㣲言子㣲有妙筆羅列丹青傳我生後諸子傾心慕真筌像設儼如在白雲聊續篇天王堂在州治後城西北祀毗沙門天王唐天寳初建武烈帝廟在州東南二里靖越門内祀隋司徒陳果仁唐乾符二年守封彦卿建果仁字世威初沈法興據江表自稱總管大司馬以果仁為司徒隋大業中連平二冠遂拜大司徒初廟于常州唐咸通末金陵兵曹丁爽繪像而至夢于守譚洙曰吾願祠此譚從之闢基現靈草且禱雨隨應廟遂成乾符四年封忠烈公廣明二年進忠烈王李氏保大十四年加今封佑正廟在巾子山後祠五通淳化五年栁延邵重建按廟記吳越時祈禳如響事聞封保徳王建炎四年賜今額門有雙檜甚古按諸邑皆有廟此為正祠餘不書舊傳癸已之火勢延燎欲東亟禱于神神現雲表俄有火飛入祠之後麓回風撲燄境頼以安又傳鄞之象山土人採銀未獲有黄衣人指其所告之且曰吾中子山下人也倘有獲毋相忘後果如其言槖金來謝求於此祠得之遂新其堂廡云大固山廟在州北三百步淳熙十年守史彌正重建小固山廟在州東南二里鄭户曹祠在州東一里户曹巷祀唐鄭䖍巷盖其所居也俗訛為興福將軍詳見坊巷舊傳一日里巷有悖其母者母泣訴于廟是子忽見神叱曰汝不孝當誅但吾志在興福未欲降禍更爾不貸明年是子復然一夕雷雨遂殞此興福之名所由始也義靈廟在州治後山北祀滕户曹膺舊祠于天慶觀繼徙靈康廟東淳熈八年唐守仲友登北山覽膺舊跡剏新廟淳熈十五年江守乙祖徙今地宣和二年睦冦方臘嘯聚聲摇二浙膺白郡請為備不聴已而民迸走膺慰集誓以死守鳩土豪鄉兵及營壁子弟教習號忠義兵未幾仙居冦吕師囊應臘攻城守以下且遁膺躬擐甲與戰日戰數十合卒磔師囊城遂全洎去為立祠其後歴漕淮西以忌廢居興化還無室廬台父老迎之天台沒且𦵏焉慶元元年賜廟額嘉定四年封忠烈候未幾謚忠惠邦人以生之日來祭大夫士咸集焉朱文公熹記云慶元元年春正月勅以台州士民所請故直秘關滕侯之祠為義靈廟州人老穉聞是命下驚喜歡呼奔走迎拜遵至祠下酌奠以告大書扁榜金朱煒煌掲于門㯮庸侈上賜而其耆艾學士大夫葉君聖耦等四十餘人亦㑹祠庭相與言曰往嵗盗起幫原連䧟六州戎冦所加民無噍類而吾台人獨得全其室家仰父俯子傳世不絶以至于今者滕侯力也沒而弗祀固無以慰吾民之心祀而弗命又無以彰吾侯之徳今則廟事既脩而亦幸䝉上恩列祀典矣顧無金石以著本初其何以昭報事於長久且當日棄城冒賞之人其子孫猶有存者盖嘗肆為妄說強祔其祖以遂侵誣之計吾州之人亦斥其偽以控于朝而報絀之矣然或久而不傳則未敢必其無後患也迺以書來請篆其事熹以衰朽欲謝不能而復自念往使浙東留台最久固已熟聞兹事而有感於中矣矧以諸君之請之力其何可辭則應曰諾而病未能也乃今太守周府君曄又因鄞縣主簿趙生師䢼踵門以請則為考按台人前進士陳君師恭所為日記及故禮部侍郎陳公公輔諸人之銘序賛頌皆言聞亂之初闔郡震恐太守趙資道郡丞李景淵咸愕眙不知所為謀欲遁去他吏相顧亦無敢出一語者侯方司户曹事迺獨慨然請任其責有異議者輙面叱之即日移書訣其父母昆弟而閉其妻子於官舎悉召州人諭以利害人人感泣踴躍聴命乃亟下令發夫守險増埤濬隍除器募兵積糧致用分屯列柵為死守計日夜循撫甘苦同之城中之人始冇固志而守丞以下則皆已遁去久矣既而山民吕師囊起兵應賊號十餘萬導以攻城前後數四侯皆應機設械立摧破之手弓臨城殪厥渠帥賊逐退走卒全其郛凡所存活以六萬計㕘五其說一無異詞是則侯之為烈彰彰明矣獨稽史籍則見當時實以守城破賊為丞之功進領郡符就加職秩迺與所聞不類而扵妄說反冇助焉於是更即諸書以求其故然後迺見當時守丞雖遁而侯於所下文書猶必存其位號冦退解圍亟迎以歸俾上功狀而已不預焉丞盖熙豊故家諸子又皆貴仕故得獨冒顯賞塵策書而侯反下從捕盗七人之比僅改京秩初階移官旁郡以去是則閹尹擅兵賊臣柄國之所為而後來侵誣妄論所由起也一時之謬流惑萬世向非台之文獻有足證者民吏稱思久而不怠則亦何所質証而决其是非哉嗚呼是有可嘆也已滕侯名膺字子勤後保南都守陳蔡以杭狂冦乗勝焱銳之鋒勲績尤盛勸進大元帥於濟州所陳又皆當時天下大計切中機㑹其於建炎紹興之史法當立傳而熹於是書盖嘗受詔參筆削矣是以因書此碑而并覈其真偽如此不惟少塞台人之意亦使後之執筆者有以考焉廟數遷今在城西北隅永慶寺東實侯所再築而力戰破賊䖏台人迎侯繼室趙夫人及諸孫仲宜等使居其旁通判州事吕君祖儉謀為買田以資奉守未就而去談者惜之然以台人之徳侯如此吾知其繼而成之者無難也東嶽行宫在栖霞宫西廡乾道七年重修靈康行祠在天慶觀東宣和三年建祠山廣惠行祠在栖霞宫東淳熙十三年建五顯靈觀王行祠在栖霞宫後山嘉定十四年建即婺源神也右四祠按諸邑類有之今不盡載平園土地廟在州治酒庫乾道五年神降于添差通判廨舎自稱潘閬來掌酒醴自是𨽻祀典焉悟真橋土地廟在橋側舊名黄牛坊橋廟慶元四年更今名詳見坊巷臨海城隍廟在縣東一百步吳越時封興國侯端拱元年令王子輿重建且為之記靈康廟在縣東南二十里白鶴山祀東漢趙炳炳東陽人能為越方善禁咒與閩人徐登遇于烏傷溪上各試其術以起人疾登死炳入章安神幻事甚衆後為章安令華表所害世傅其屍泝流止今䖏故祠之以登侑食入國朝疊顯靈異元豐七年賜今額崇寧三年封仁濟侯大觀二年進顯仁公政和三年進靈順王宣和四年加顯佑建炎四年加廣惠慶元二年加善應開禧三年改善應為威烈宣和二年廟燬於冦冦退復建淳熙八年唐守仲友嘉定六年俞守建皆更新之唐守記云白鶴山在郡城東行二十里有廟曰靈康其神曰靈順顯佑廣惠王漢人姓趙氏諱昞字公阿生於東陽行於烏傷死於章安人為立祠永康祀子山之趾未有知其所起者自太平興國暨慶厯間繼顯靈異元豐賜額崇寜始封侯大觀進爵政和錫王號宣和建炎増衍鴻名以迄于今盖王生有道術沒為明靈固嘗應水旱之禱誘閩廣之米商揚神兵以殄冦澄海波以濟龍舟其事迹功徳寵榮本末具見于方術傳及郷貢進士石孺知州事侍郎陳公岩肖之碑宣和辛丑方吉臘亂睦仙居賊吕師囊應之將逼郡城禱于廟不焚之再攻不克賊退數月新廟成仲友奉命來守以淳熙辛丑嵗正月丁己謁于廟行視棟宇漏腐傾欹像設圖畫漶漫剥落供帳什噐故暗闕敗念承歉嵗方急救飢幸得中熟當議補葺越六日癸亥乙夜城南火西風急將及城闉仲友率官兵撲滅遐禱于神須㬰風轉西北城獲全六月不而復以丁巳祈于廟畢事登舟有雲如練自前山覆廟上急雨俄頃止薄暮大雨旬日霑足己巳既謝神休即計工費命臨海令陳處俊主簿向士斐董其事於是州民欲獻其力有登仕郎應世榮者謹恪能幹慨然先衆人身督工役度材必良擇匠必能易弊而新堅壯工緻經始於八月乙已落成於正月壬午竹木土石摶植刮摩設色之工凡一千八十二用公錢二十七萬有竒民錢二十五萬有竒自寢至門旁及廊廡齋祓之舘無不葺圖像噐物悉改舊觀距宣和復建六十年矣自茲以往民之事神不懈益䖍謹摭父老頌歌之意而詞曰山巃嵸兮江之滸靈之宫兮千古惠我兮父母狂童兮一炬炫金甲兮神之怒鯨之奔兮清吾土復舊觀兮靈之宇嵗甲子兮一周薄風霜兮淹留視棟宇兮心之憂幸我田兮更収咸獻力兮何求落成兮孟陬靈之孚兮延鴻休煥土木兮一新孰成兮庻民奠㫖酒兮蘭芬神具醉兮欣欣返鶴駕兮繽紛永我思兮無垠願終惠兮邦人章守得象題云白鶴何年入紫象空遺靈跡廟猶存岩崖暗鎻雲根老堂殿隂連海氣昏潮上神烏鳴祭鼓夜深鬼火照祠門遼天歸嘆桑田事應與麻姑仔細論徳淵廟在縣東北五里法安院側祀白龍潭崇寧五年令樓君明改壇而建政和五年賜今額建炎四年封滋榮侯時禦海赤頰碧湫水四潭同被侯封俗所謂五龍是也隆興二年趙守伯圭重建嘉定十四年令趙彦槢復新之闕在縣西一十五里祠禦海潭唐㑹昌六年刺史喬莊建按廟記先一嵗禱雨立驗故祠之建炎四年賜今額封善利侯靈溥廟在縣西南五十里祀赤頰潭吳赤烏中建國朝建炎四年賜額封䕶澤侯靈渥廟在縣東南一百二十里祀碧瀛潭建炎四年賜額封滋應侯靈濟侯廟在縣西南一十四里祀新現潭乾道七年建淳熙八年唐守仲友聞於朝賜今封唐自為記開濟廟在縣東南一百四十里祀海門潭吳越時建建炎四年賜額通濟廟在縣東南一百五十里海中祀桃枝潭建炎四年賜額寧濟廟在縣東南一百二十五里祀淡水潭建炎四年賜額娑竭羅廟在縣東南三十里祀娑竭羅潭相傳兩浙廵檢使謝公為建靈應廟在縣東南一百二十五里祀東邏土地建炎四年賜額盖竹洞廟在縣東南三十里淳熙七年建世傳後漢時龍現於此及是唐守仲友禱雨而驗故祠之絢珠龍祠在縣東四十里本湫水行祠舊傳居近廟者不患疫癘初卜地他所既鳩木一夕水漲漂流百餘步占之地尤勝遂祠之平水王廟在白鶴山西祀西晉周清俗傳清以行賈往來温台俗呼周七郎娶臨海林氏女俄棄杵化龍與女皆不見後有遇之彭公嶼者遂祠之大中祥符九年以顯異于温錫今封按諸邑皆有祠今不盡載俗又云此夏禹廟廟在江濵舊傳潮自南来雖巨潦至廟下必退近廟田無水患民徳而祠之白石梁顯徳王廟在縣東北三十五里失其名唐建中二年建舊傳廟有二竹頗異孔相公廟在縣東一十八里舊傳祀晉孔愉紹興二十八年重建愉山隂人永嘉之亂入臨海山中嘗位左僕射故土人目曰相公按黄岩寧海亦有祠今不盡載又按晉書惠帝末愉東還㑹稽入新安道中今㑹稽有孔府君廟東陽有孔郎廟歙縣有孔靈村孔先生廟三郡圗志皆稱孔愉盖本㑹稽人又嘗入新安入臨海以故所在祠之也蔡大王廟在縣南二十里咸平中建按廟籍周蔡叔度之後失其名初廟于錢柱山至今石有馬蹄㾗㑹大水像流漂止今地故徙而祠云惠政侯廟在縣西北三十里祀薛長官唐武徳中建按廟記時有薛其姓者令於此民愛而祠之舊在他所㑹昌中徙今地應順元年復新之蕭長史廟在縣西北一十里按舊經祀梁時守蕭洽唐貞觀二年建洽嘗為臨海太守拜司徒左長史故云廟在浮崗土人云嵗祀之則無蚊董將軍廟在東湖之南世傳錢氏有國時建又嘗錫額顯應仍封順福王按林師㸃廟記唐浙東觀察使也熙寧中浚湖欲毁廟衙校左良玉董其役左無子妻忽夢神告曰留吾廟當以判官為汝子及寤語良玉遂止不毁後得子名譽肖廟之判官卒為名士鄒將軍廟在縣東南七里白塔山下紹興二年重建舊傳辛景破孫恩時鄒其姓者戰有功故土人祠之白馬將軍廟在縣東北一十里開禧二年建按舊經白巖號白馬山廟因以名石新婦廟在縣東南七十里以廟山有石婦人狀故沿襲祠之舊在山下唐武徳二年建嘉定十三年徙今地其前面江山有連理木九井焉詳見山門江神廟在中津橋東嘉祐中徐守億建時縣西江岸摧墊故乞靈焉初廟于小固山西淳熙中以建橋徙今地黄巖城隍廟在縣東四十五步吳越時封永寧侯紹興三十年令龔滂重建有徐先將祠附焉靈感王廟在縣東五里祀邑人許氏子失其名元祐四年令錢景祥重建舊傳廣明之亂許起義兵衛一邑嘗謂人曰吾死當廟食乃以一石祝天擲之曰石所止吾廟也父老從之俗號許将軍尋封義安侯國朝治平中錫今封靈通感應安邦王廟在縣西五里祀陳九郎俗稱䕶國大聖舊傳陳於漢天福十二年策戰功死以靈顯得王封國朝澶淵之役有旗金書王爵里掲陳中遂錫今封重建廟後壊建炎二年以呵衛廵幸勅新之里正王其姓者以無封額辭事遂寢未幾其家以疫死今僅存數掾昭應廟在縣東一十里祀方巖潭紹聖初封昭應侯政和六年復請為今額云潜濟廟在縣東南一百二十里祀圓巖潭建炎四年賜額靈巖廟在縣北一十里祀靈巖潭方山潭廟在縣南一十七里紹興中邑人任大直西徙百步岱石廟在縣西一十七里按舊誌永初景平中建世傳神家婺州好遊觀至黄巖而死精爽如在父老祠之廟山有巨石數株聳如人形咸以為神顯異於此奏封岱石王又傳神嘗與錢塘江神競分其潮三分今廟北有港潮生則怒濤驚浪可髙五六尺頗類錢塘邑人號斷江渡焉徐偃王廟在縣東南二十五里舊傳廟前地嘗産六芝按韓愈廟記徐子章禹既執於吳徐之公族子弟散之徐揚二州台古揚州也豈亦因其公族子弟而廟乎今縣南三十五里古城亦有廟徐將軍廟在縣西七十里漢乾祐中封助治將軍誥勅尚存側有義髻廟附焉蕭王廟在縣東南一百里詳見五龍山葉將軍廟在縣南四十里或謂徐偃王將云潘大夫廟在縣西六十里祀柏都神土人舊傳晋闕禦冦海島神降其地每天雨多鐵屑闕嘗造兵器於此張太尉廟在縣東二里紹興中建俗傳康定中有商人陳其姓者從岱嶽奉燔以歸宣和冦犯邑晝見神金甲按兵河岸列幟皆神號冦驚遁邑得全民相帥祠之魯神廟在縣東南五里方山下舊傳有二女死𦵏于此頗有靈異後奏封魯神侍御或云有二女来從宫掖掲涉而游水墊衣裾縮衣水地上穴而成井女死𦵏其旁遂祠之或又云魯秦二女舊惟有二女像俗傳方山二神一夕炬而入焉後併祠于二女之左任三子廟在縣西北二十五里穿石廟在縣東南一百里隋末時建舊傳有一商舟以風濤簸巖側其勢危甚欲登巖而水急不可縻商恚奮拳穴石將以攬舟舟竟覆衆遂神事之廟址舊為海塗後以潮淤築其上宣和中復新之江亭廟在縣北一里永寧江側舟上下必乞靈焉商于海者事之尤盛永利橋廟在橋上開禧二年火逼簷梠竟踰河而南有枕廟居者抱一神像置于室火亦不犯人傳以為異云新安河西廟在縣南三十里宣和冦亂逼南鄉鄉人禱焉翼日與冦戰廟前橋上見神立空中飛矢石如雨冦驚走南鄉得全其名橋曰得勝謂此也天台城隍廟在縣北二百一十步舊在縣東吳越時封始平侯宣和二年徙今地黄山廟在縣西一十五里乾道八年建廟有石穿如牛鼻父老云昔海船繫纜處今封䕶國感應顯慶王應澤明王廟在縣西北三十里祀江白郎周顯徳中錫今額國朝宣和二年重新之事見白郎岩靈澤廟在縣東四十里蒼山祀靈澤潭嘉泰元年賜額廟有唐刻今不存惠濟廟在縣北五十里石橋下祀惠濟潭嘉泰元年賜額靈峰廟在縣東四十里祀靈峰潭嘉定元年賜額劉阮廟在縣西北三十里雙闕下元祐二年建世傳二仙所至即其處黎將軍廟在縣西六十步祀晉黎䕶將軍劉元捨宅為闡法寺處寺徙廟存側有三井邑人汲之舊傳即闡法寺之洗菜池俗呼為黎將軍楊少保廟在縣西一里西橋之北俗傳嘗有大白蛇出民禱輒應呼白蛇將軍折山廟在縣東二十里按松山舊記吳赤烏二年已有之相傳神王姓漢豫章人五兄弟皆剽勇遂祠之今折山松山明山聖山峇是也金相公廟在縣西南三十五里世傳為梁普通時人攷南史無之意流俗尊稱也今鎮國院亦有祠鎮國大將軍廟在縣西六里咸平元年重建父老言民有於廟側得古鏡者文曰始豐寨縣主鎮國大將軍雷燁不知何代人也赤城山廟在縣西六里舊在卧佛巖側祀韋山神世所謂登壇大神也嘉定十四年徙今地松山廟在縣東南一十里宣和六年建東有董將軍廟附焉亦靈驗峇廟在縣東三十里吳赤烏中建峇山廟在縣西五十里本龍王祠吳赤烏二年建白皇壇廟在縣西二十五里據父老言大不經然里俗呼王為皇今廟之左右多王姓抑嘗有王姓居此而偶然効異耶土墻山廟在縣西三十五里以山形如繞墻故名獨孤廟在縣西四十里石壁嶺東俗傳一婦人也周顯徳二年建焦山廟在縣西南六十里吳赤烏二年建僊居城隍廟在縣東郭外舊在縣治東七十步呉越時封昇平侯紹興二十一年徙今地佑聖真君廟在縣西二里淳熙十二年以舊五通廟改建慈感廟在縣北六里祀杜氏二女唐天寶中令鍾離介建按廟記二女生隋大業末家鬻湯餅甫笄䘮父母庖人挑之二女憤激殺庖人去而之盂溪隠焉㑹溪溢溺死後介寓長安夢二女揖曰吾家盂溪君今中第尹吾邑矣後果如其言入境見二枯骸罣藤上即之道左斧藤藤流血斸石石亦流血及舉其骸鈎連有聲遂取以還道遇樵父告曰此石藤石稜二夫人鎻子骨也語竟忽不見介嗟異塑其骨祠之國朝宣和中民避冦其間冦望山中草木皆為兵懼不敢犯慶元二年令趙㓜聞以聞遂賜額祠廟在縣北三十里行祠在縣西二里應瑞侯廟在縣東二十五里麻姑巖祀管供奉唐時建初管持詔詣洞宫設齋醮是夕麻姑見管不悟謂常人也且歸偕行五六里忽化鶴飛入麻姑山而去管嗟望墜馬死有司奏祠之錫今封紹興二十一年重建先是門人蕭徳藻赴南宫夢神告以必中蕭問何神以應瑞侯對且言上帝檄我為監門官故相白爾既登第注仙居主簿視圖諜有侯祠首祭焉紫籜廟在縣北五里祀竹山神唐天寶六年建先是神夢於明皇謂来呈瑞鳳已而鳳翔止遂以紫籜名廟及山封瑞應侯為建廣度寺云詳見紫籜山三井廟在縣東北三十里祀三井潭皇祐中令陳襄有禱隨驗欲新廟不果有謝雨詩云曽禱神龍井雲林杳莾間蘋蘩朝薦廟風雨夜離山百里田疇熟一年囹圄閒因循失報謝石險路難攀又云何年修廟貌棟宇巳摧殘牲幣三時少風泉四月寒野僧多稔穥古木有衫欒深欲重修葺蹉跎又解官彭溪廟在北四十里祀彭溪潭淳熙十四年丞王柄因禱雨靈驗重建仁濟廟在縣東五十步祀盤山神崇寧中建韋羌廟在縣西四十里祀韋羌山神建炎二年重建俗傳五代時有韋三郎者捨宅為金像寺已而升仙故祠之一云神乃顓帝之裔號豕韋氏其廟食最久民䝉頼焉闕蜀王廟在縣西三十里麻姑廟在縣西南二十五里麻姑山項羽一作山廟在縣東三十五里俗傳祀漢項羽紹興十八年建支將軍廟在縣東七里唐末建舊傳支乃黄巢將也死而顯迹故祠之赤城廟在縣西七十里祀赤城山神崇寧三年建石龕廟在縣東一十五里俗傳其鄉土神唐時建大營廟在縣東南二十五里紹興二十八年建俗傳大營小營二兄弟戰死顯異故祠之韋大將軍廟在縣東三里俗傳韋羌伯仲也乾道三年建石橋廟在縣西八十里祀胡四郎嘉祐中建枕海廟在縣西六十里祀枕海山神唐咸通二年建蒼山廟在縣南四十里祀吳將軍朱剛赤烏元年建白巖廟在縣南七里紹興中建靈山廟在縣西一十七里紹興五年建舊傳隂陽家言此地有異氣運工疏鑿其監官死此嘗有靈異故祀之其鑿處今號聖坑後廢赤城志巻三十一
