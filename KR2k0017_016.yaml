  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0017_WYG_016-1a, image: WYG0486/WYG0486-0725c.png}
body:
  text: 赤城志巻十六宋陳耆卿撰財賦門賦自一孔以上皆民力也力不可窮而又義不可廢嘉其義而寛其力則上之責焉國初制賦最平與天下更始自錢氏納土䟽煩滌苛畢公士元遂乞用舊籍以輯新民民賴之安矣自熙寧變法至建炎用兵洪𦦨所焮供億無藝民則不競而上亦莫之支焉盖自近世和戎始時有蠲弛而宿窠痼額固未易以驟輕之也民輸州縣州縣輸朝廷今輸朝廷者既不輕則輸州縣者亦孰得而省邪而况輸朝廷之外郡用百出又不可不講也以故昔號羡餘今稱寡匱余遂稽其所出之數且備載之使來者有攷焉上供紬二千五百三十五匹以諸縣第一等户資錢家活錢起納夏税和買内科折起發納左藏庫絹一萬一千一百一十二匹以諸縣第二第三等户資錢家活錢起納夏税和買内起發上件納左藏庫餘絹樁支本州官兵衣賜等用折絹錢一萬一千四百三十四匹為錢四萬五千七百三十六貫文以諸縣第四止末等户資錢起納夏税等錢内起發舊例全發本色嘉定十三年正月凖轉運司備凖都省劄子據户部申竊見左藏庫歳幣之絹停積已久恐致陳腐欲權將一年折納一半價錢每匹折官㑹四貫文是年本州起發一半絹錢計上件自後每年准户部牒照嘉定十三年例起發納左藏庫綿二萬八千九百一十四兩一錢以諸縣第一等戸資錢科折納左藏庫折帛錢二十二萬六千九百九十八貫二十八文以諸縣第一止第四等户資錢起納夏税和買内科折一半起發祖額二十四萬二千二百三十九貫四百文除積年減豁及開禧元年奉御筆永除人户身丁計減錢一萬五千二百四十一貫三百七十二文外今計上件納左藏庫經總制錢一十五萬六千五十四貫三百四十四文以本州與諸縣酒税及二税分撥頭合并牙契等錢起發下項窠名祖額二十萬六千二百三十六貫一百七十六文乾道四年沈運使行部住催諸縣二税畸零計無収經總制錢九千七百八十二貫四百五十二文淳熙六年轉運司奉㫖住罷臨海章安税場計無収經總制錢二百貫六百五十八文九年朱提舉熹行部將人户身丁税絹照建炎三年指揮減半計無収經總制錢五千二百六十七貫八百七十三文十六年顔尚書度奏言經總制錢立額太重乞減錢二萬貫文并開禧元年御筆永除人户身丁計無収經總制錢一萬四千九百三十貫八百四十九文通減放錢五萬一百八十一貫八百三十二文外實發上件内一萬九千五百貫文全㑹撥充降本錢納豐儲倉和糴場其餘一十三萬六千五十四貫三百四十四文銀㑹中半納左藏庫經制錢七萬二千九百五十三貫三百七十二文總制錢六萬八千三百九貫四十文無額錢一千七百五十八貫四百七十文添収頭子錢六千一百六十貫五十七文増収勘合錢九百二十五貫八百六十文州用一半牙契錢二千八百九十七貫六百文買銀収回頭子錢三千四十九貫九百四十五文上供錢七千六十七貫文以諸縣二税等錢起發半錢収買銀子半㑹納左蔵庫糴本錢九萬貫文以諸縣二税等錢起發祖額一十萬貫文淳熙十六年顔尚書度奏陳諸州軍糴本錢立額太重乞行減豁内本州减一萬貫實發上件每月七千五百貫文遇閏月年分増發六百貫文納左藏庫坊塲正名錢一萬五千貫文祖額三萬貫文紹興間曹侍郎奏陳於内撥一萬五千貫發納内庫外餘錢以十分為率七分作寛剰起觧三分充州用後因坊場税鋪廢闕収趂不及雖曰管催近二千貫不無拖欠而每歳所發内庫上件官錢未之有減慶元間葉守籈措置於酒税務大田塲每日収到錢内各撥五貫文并於中津橋每日開橋錢内樁撥三之一添湊起解亦祇及七十餘貫不能及額也七分寛剩錢一萬三千三百四十二貫二百七十二文以正名錢撥充舊發上件後因坊場税鋪廢闕無所從出乾道六年四月凖户部符令本州據見幹當實數起解至今以十餘年實無可催累䝉都省委官覈實除豁别無起發坊場五分浄利錢一千五百八十七貫一百二十四文祖額管一萬四千六百二十五貫四百二十文先因坊場税鋪廢闕紹興間有㫖不問着價多少並行給賣仍與免納増収五分浄利錢及乾道六年四月凖户部符令本州據見幹酒坊實催錢數起解嘉泰二年九月臨海縣凖提舉司備御史臺牒據進士民庶鄔開等狀訴州縣折納行下本州縣住催即無窠名本州懼違朝廷比較遂自嘉泰三年以後那撥州庫官㑹一千貫徑赴左藏庫抵納後有復興坊場實管催錢五百八十七貫一百二十四文通發上件餘錢一萬三千三十八貫二百九十六文即係虚額每年申省部除豁減下人吏雇錢九百四十二貫六百文以諸縣免役錢分四季起發或遇閏月増發七十八貫五百五十文納左藏庫在京官員雇錢一百貫文以諸縣免役錢起發納左藏庫官户不減半役錢一千三百七十六貫二百六十六文以諸縣免役錢内分撥主管司拘納左藏庫實花紗錢一百七十七貫五百六文以州用錢那發納左藏庫降本錢一萬四千貫文以諸縣糯米科催折錢起發納轉運司内六千五百貫文充重華宫錢二千五百貫文充御酒庫錢五千貫文充殿歩司馬草料錢七分酒息錢八千五百九十六貫二百一十八文以酒務収到錢主管司拘發納左藏庫外任官供給錢三百二十貫文以州用錢那發納左藏庫僧道免丁錢六千六百二十三貫五百文祖額一萬二千七百七十四貫文以乾道三年降賣度牒収到最多數為額淳熙十四年葉尚書奏泉台婺三州申到免丁錢虧額皆為乾道初降賣度牒最多故所収錢亦隨之近年披剃稀少且有老死逰行難執元額又知泉州林奏言免丁錢為擾頗甚亦有癃老無所從出之僧不堪催督至縊死者乞將本州虧額錢權與住催有㫖依以嘉定十五年括責坐夏僧道拘發上件納左藏庫代發平海軍銀子一千兩每年合認發絹二百五十匹綿子一千五百兩嘉定十三年凖户部符行下據知泉州真舎人德秀申本州銀坑生發之時朝廷撥台信州建昌卲武軍合解上供銀數令本州代納却以四州所産紬絹比折搪還今縁四州軍拖欠本州物帛乞將本州代納四州之銀撥還各州自行認觧凖轉運司行下自嘉定十三年為始數内令本州認解銀子五千二百三十六兩續累申朝廷認納上件分上下半年起解今為定額納左藏庫起發轉運司係省窠名錢一萬八百五十五貫七百二十文以本州及屬縣庫務諸色錢物毎貫分撥頭子錢五文五分并三分竹木税錢四分酒本錢六分税錢鹽場亭户折鹽二税錢等窠名主管司拘催分作十二月每月起發九百四貫六百四十三文或遇閏月増發八百三十八貫三百三十三文六文贍軍錢六百貫文祖額䝉封樁庫抛催六千貫文以場務煮酒錢起發後因場務敗闕収趂不及每年實發上件係主管司拘催樁發餘係虚額厯日錢五十貫文毎年承轉運司降下一千五百冊毎冊拘錢七十文計一百五貫案例分下諸縣及院觀每以四㪚艱於拘督嘉定十五年本州那發上件耗剰米錢一萬貫文以每年秋米収至剰耗撥充本州支遣外却以本州官錢那撥起發効士酒錢四百貫文以本州賣酒錢起發鹽鈔紙札二萬張係本州行下臨海天台僊居三縣収買起發起發提刑司歳賜錢三百貫文以州用錢那撥起發五分頭子錢五百貫文以本州及諸縣酒税等頭錢内分撥主管司拘催起發贓罰錢二百貫文主管司拘解於内截撥五十貫買黄蠟併發行遣紙札一萬五千張行下臨海天台僊居三縣分作兩次買發内平表一様檢紙各五千起發提舉司鹽司頭子錢無額每鹽一帒収四十五文主管司拘發貼収水脚錢無額每鹽一帒収一百三十八文主管司拘發額外三分錢無額每鹽一帒収二百五十文主管司拘發鹽五千二十九帒祖額上件抛下諸縣招趂發賣續以収趂不及支鹽官王闕措置招誘處州縉雲婺州金華東陽永康諸客人入納鈔引支請帒鹽批發前去歳無定數茶二百斤祖額八千八百斤抛下諸縣招趂每年不及元額開禧四年通判向公擇申提舉司行下遍榜住催每年自行措置官錢入納上件起發坑冶司鉛鐵坑錢一千五百九十貫三百一十二文本州管下鉛鐵坑七處每年係人户買幹内一處停閉三處凖都大司牒委各縣縣丞拘解外實催發三處年計上件分作一十二月起發起發建寧府絹一百六十五匹綿子一千兩係元降指揮撥發應副支遣官兵每年本府差人至州交領赤城志巻十六
