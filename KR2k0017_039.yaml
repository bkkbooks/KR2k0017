body:
  text: 赤城志卷三十九宋陳耆卿撰紀遺門宇宙之事無窮簡䇿之文有既自古傳記豈能物物而竟也哉不可竟而欲竟之故有紀遺焉然而歲逺年徂日訛月謬遺事之易墜又甚於遺迹之難尋也祥文瑞紀識者諱之然桑穀之災嘉禾之應白魚入舟之異雖經傳不廢豫得鋤而去之耶故自前代至我朝稍從採次且以古城郭而下附其後不可竟而欲竟之懼未之竟也遺事連理木吳大皇元年郡吏伍曜得於海際枝莖紫色有光見松陵集注又唐永昌三年五月里人馮義得於海中凡三株一髙一尺五寸連理者九枝一髙一尺四寸連理者五十枝一髙七寸五分連理者七十枝其年郡司馬孟詵表進云中有白石扣之聲甚清皮日休送從勉遊天台詩亦有行過石樹凍無煙之句注云消山有石連理木消山今赤城山也又紹興十七年生於天台山闡法寺楓榆共幹三分三合其時遊客以詩屬曽守宏父有政成不用中和頌看取春郊連理枝之句曽因作頌以獻於朝又通判聽後有連理號鴛鴦木而寧海溪南有櫟木亦然月桂子唐垂拱四年三月降於臨海縣境芳香有桂味食之和暢郡司馬孟詵以聞見封氏聞見録及陸龜蒙詩注五色雲元和中見於州按栁宗元集為薛中丞浙東奏有云紛紛郁郁自東而徂西若煙非煙一旬而再至乞宣付史館以昭簡䇿觀此可見其異矣瑞米淳化中出於寧海縣南二十五里地名九頃民應氏田中其稻生雙米郡以聞見會要神蝦天聖元年州漁人得之海中長三尺餘前二鉗二寸許末有紅鬚尺餘首如數升器若繪畫狀雙目十二足文如虎豹大率五彩皆具而狀魁梧尤異中使吳仲華繪其象以聞詔改名神蝦晏元獻公賦其事見文集仙鹿靖康元年寧海縣峽溪忽有之髙四尺餘莫知所從來遇驅逐則跪而請命中箭死時有黃朝宗者館其處夜夢有人持牘相召至一所見老道士白鬚毶毶垂其腰云小人無知余養此鹿五百載今為所殺聞子獲其麈幸見還視其左扉有司馬子微四字遂寤時村民既殺鹿有周堯者截其尾以遺朝宗後朝宗百餘歲方卒芝草紹興三十二年生於天台縣圃凡二本是時臨海亦送雙蓮花雙蓮子張守昌作詩有煌煌朱草連年秀的的丹渠並蒂香之句又紹熙五年二月生於臨海縣獄柱間七葉三層葩采可愛李龜朋為之記甘露乾道四年中秋夜降於州天慶觀聖祖殿前古松上狀如垂旒羽流採食之味甘而香海鰍淳熙五年八月出於寧海縣鐵場港乘潮而上形長十餘丈皮黑如牛揚鬐鼓鬛噴水至半空皆成煙霧人疑其龍也潮退閣泥中不能動但睛嗒嗒然視人兩日死識者呼為海鰍爭斧其肉煎為油以其脊骨作臼自是海濵人多患疫焉遺迹章安城在臨海縣東一百一十五里本漢回浦縣屬會稽郡後漢光武時改為章安古城在黃巖縣南三十五里大唐嶺東外城周十里髙僅存二尺厚四丈內城周五里有洗馬池九曲池故宫基址崈一十四級城上有髙木可數十圍故老云即徐偃王城也城東偏有偃王廟漢城在黃巖縣北一十里按舊郡志縣北一十里有莆林郡城相傳昔置莆林郡於此然未詳何時亦無經又按縣志云昔有二童子戲於山上各立部伍一號霸王一號漢王纍石為城縱橫里許一日而畢若有神助焉後漢王死而神降於山鄉人懼而禱之遂為立廟二説未詳孫恩城在黃巖縣南九十里嶠嶺髙四丈許周回六百步永嘉記云妖賊孫恩所築按晉書安帝隆安四年賊孫恩陷會稽元興元年臨海太守辛景擊斬之桃都山按郡國志在台州山上有大桃木木上有天雞日初出照桃木天雞即鳴天下之雞聞之而鳴木下有兩鬼持葦索執不祥之鬼食之壕頭在黃巖縣南五里世傳漢兵七十二陳沒於此劚地得箭鏃之屬旁有楓木二根大可十數圍葉皆靡地舊志云與漢思王冢上木西靡者相類其後傳寫愈謬乃於七十二陳上直目曰思王冢按漢書東平思王冢在無鹽非台也鎮亭在寧海縣西北八十里台明越三界間按西漢地里志鄞縣有鎮亭昔晉武帝析鄞置寧海今以地里考之尤信砂崎在寧海縣北五十里父老云即漢之鮚崎按西漢地里志鄞有鮚崎亭顔師古注鮚蚌屬長一寸廣二分有小蟹在腹中今縣北皆古鄞地而砂磧中有海族正如師古之説則父老所記不妄矣或曰鮚崎今戰崎未詳石壘寨在天台縣北五十里關嶺上壘石為之側有李相公廟蓋唐廣德元年王師討袁朝處今遺迹尚存父老皆能言之東西二仙源東源在黃巖縣東北五里地仙劉奉林主之西源在縣南嶠嶺九十里地仙張兆期主之見洞天福地記七籖夷州臨海記云在郡三十里衆夷所居秦始皇遣徐福將童男女入海止此洲山頂有越王射的白石又徐堅初學記云臨海有夷洲古無銅鐡磨礪青石以作弓矢回浦在臨海縣東南一百一十九里祥符寺前按後漢志章安本名回浦今即其地也沸瀆按臨海記在城南門中有沸水方三尺孫皓時奚熙受刑於此其後水常沸人疑其寃按吳志孫皓昏亂舅子何都狀似皓民間訛言皓死立都臨海太守奚熙聞之舉兵欲誅都都叔父植時為定海督擊殺熙以此觀之殆是為植所擊非受刑也洗馬潭在天台國清寺莊之外唐裘甫之亂王師戰於福聖觀前今有落馬橋是其處也時以國清建寨此潭與馬敞墠三墩堂皆諸將議事之所又有王軍塘為犒軍之所古放生池在臨海縣之海際陳大建中僧智顗見居民以滬魚為業綿亘四百里遂以所得施利買民田為之事聞詔禁採捕國子祭酒徐孝克為之記今廢久矣赤蘭橋在縣東南一百二十里舊志云晉成公綏為章安令登橋望江製雲賦焉又見初學記歇亭在天台禪林西北一十五里唐孟蘭廉察浙東日捐俸建為遊人憩息之地柔金銅柱按張勃吳録及初學記云臨海中有小洲生柔金自北而南三十里有銅柱西屬國人自稱漢子孫乃漢疆場之表赤城志卷三十九
