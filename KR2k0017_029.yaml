body:
  text: 赤城志巻二十九宋陳耆卿撰寺觀門三寺院仙居禪院一十有六顯慶寺在縣西五十步舊在紫籜山下名顯元梁天監二年建隋大業元年廢唐貞觀十年重建天寳六年有神光現今址遂徙之改光明山㑹昌五年廢大中二年重建國朝祥符元年改今額舊傳大觀初僧象寧謀剏應真閣夣二神僧丹衣告曰鉄山潭有鉄柱宜往取之及寤往視柱果出波上人以為異遂樂成之興道院在縣南三里南峯舊名興善慶歴中建治平三年改今額上有浮圖曰南塔及涵清亭藍光趨稼二軒瞰大溪為放生池焉陳襄詩云今日登南塔懐愁不自勝年華催髩髪身計憶岩稜道業愁諸子根源畏老僧何當論去就細得問龜朋劉光詩云百尺擎空窣堵波羣峯奈此獨髙何鼔鐘鳴處是非外天地望中蒼翠多閒㸔野雲披玉柱醉眠秋浪捲銀河問師乞取軒前月一榻清風許我麽浸郭明甫題涵清亭有云山光竹影交寒輝下有碧吹漣漪沙痕隠隠白鳥去石聲鑿鑿扁舟歸蕙蘭發馨禪味逺雲霧吐秀人家稀湏知春事不可挽杜䳌已遶林中飛此令楊筠題云水縛山腰㸃萬松雲扶翠岫挿寒空溪定入桃源去時見波間有落紅又云民既無争景自長淡然相對一爐香欲收鼻觀還無暇寄謝南山古道塲葉翥題藍光軒云出郭纔咫尺便覺山意幽招提立絶頂寳塔凌空浮小軒足娛容下有清溪流翠岫供逺眺真欲明雙眸平蕪草肥軟飽飼眠吳牛沙頭水色静飛上馴白鷗人稀日亭午野渡横孤舟坐久意逾爽吹𬒮風颼颼想當三伏天凛然如素秋簿書叢裏來恱若脫覊囚乗興偶登覽不謂成勝逰平生志所願一壑與一丘脚力到佳處須作信宿留南峯只在眼不必勞㝠搜當時輞川圖景物有此不學貴守所見出處各異謀淵明亦髙哉未肯屈督郵廣度院在縣北三十里紫籜山上舊在西隅百步名瑞峯唐天寳元年建㑹昌中廢晉天福中重建國朝宣和中改今額紹興二十年僧藴璋徙今地地枕溪帶壑林麓衍美居者多蓻术焉郭三益題云羲和均四時曜靈有急莭沈迷簿領書坐嘆春事歇及新雨收西郊軔初發蒼頑山氣嘉奔悍溪流活風驚麥翻浪水净秧抽髪漸窮蕭寺幽頓使煩襟豁蜂喧釀蜜翅鳥落啼林血髙僧日無事㣫术畦畆闊緑苗已紆紫紫花行復結吾欲訪長生終嵗期採擷奉聖院在縣西南一十里隆興中建舊傳僧宗秀誦蓮經有蓮華自地湧出故俗稱蓮堂云東寳相院在縣東一十二里舊名普勝塔院唐昭宗時建國朝天聖四年改今額淳熙二年重建三學院在縣東二十里舊名西仁吳越時改遇明國朝景徳二年改今額多福院在縣東二十五里慶歴三年建一云治平二年有分翠軒宣妙院在縣西北三十里劉漢乾祐元年建紹興五年重建法明院在縣西南四十里舊名景星唐乾符三年建治平三年改今額殊勝院在縣西北五十里舊名奉國紹興九年重建國朝治平中改今額西寳相院在縣西五十里舊名梁興梁天建三年建國朝大中祥符元年改今額紹興二十二年重建治平院在縣西七十里舊名廣業唐建中三年建國朝大中祥符元年改今額慈安院在縣東北三十里建炎三年建興化院在縣西北三十五里開寳八年建䕶聖院在縣東南五十里唐乾寧元年建廣嚴院在縣東一十里慶歴三年建教院三集福院在縣北一十里天聖二年建崇教院在縣南二十里大中祥符二年建靖康元年重建普信院在縣南四十里舊名興國開寳八年建治平三年改今額甲乙院二十有三金像寺在縣西三十五里舊名聖像五代時韋氏子捨宅建以其初斸地得石佛故名嵗久無碑識惟石幢巋然唐垂拱三年立也舊傳自海上浮至色如乳人取其屑以愈疾焉國朝治平改今額浄梵院在縣西南一十五里梁天監中建國朝宣和中僧梵臻重建吕本中記云佛之為説與孔子異乎不異也何以知其不異也以其為教知之孔子以知止而后有定定而后能静静而后能安安而后能慮慮而后能得也孔子傳之曽子曽子傳之子思子思傳之孟子矣而佛之教由戒生定由定生慧盖與大學之説無異者孟子以萬物皆備於我反身而誠樂莫大焉而佛之説以天地萬物皆吾心之所見山河大地皆吾身之所有正與孟子之說同吾以是知佛之説與孔子不異也然而區區施設則有若不同者世人惑焉而生異論竭智畢精以相攻詆而卒不測其要則不知其所以異者迹然也雖然迹安所自出哉此非黙識心通實至此者不能知其實然也彼方且從事於文字言語不揣其本而欲判其果同與異則亦易惑矣雖然物有本末事有終始自佛與孔子使學者知所後先皆然未有不思而得無為而成由思至於無思有為至於無為然後為學之正有意於善者不可忽也妙湛禪師思慧以道徳譽望震耀一時具所以教其徒者有終始本末如吾前所陳自頃所闕来所至兵火佛與殿廢不支者多矣台州仙居縣净梵院去邑十五里許首建梁天監中宣和盗起清溪延蔓遍浙東院為賊所焚僧梵臻力行士也慨然憫之廣求信士銖積寸累因院舊基規模宏大而一新之誨僧惠宗為之勸首數年而工畢不知其兵火之餘也天台之人咸嘉臻之勤而重其志始佛殿未成衆患無大木可就一夕溪水漲得大木沙磧中殿遂成識者知其有神相也吾以是知有為之功為不可廢由思至於無思冇為至於無為天下通論不可易也而世之學佛者率抱虚自大自誦佛號作觀持禁戒悉棄不為曰是冇為者非吾所致力也彼盖不知二者之相須闕一不可本末次第不可誣也觀臻之所以全復舊宇崇飾備具亦可少媿矣梵臻舊從妙淇師遊漸滋餘潤固久院成妙湛属本中為記大概不可以已故以佛孔子不異者并告之庶居其屋而遊其中知有為無為之相須而佛孔子之所以不異者或有得於斯言也萬安院在縣西南四十五里舊名萬夀唐乾符中建國朝天聖六年改今額其地深窈與塵境絶山環水抱有茂林脩竹之勝土號方竹源左升崇岡重巒複嶺如屏列可眺可詠舊有斗起亭建炎中薛左丞昻避地居之福延院在縣西四十五里天禧三年建舊傳僧請徹卓庵于此有猛虎馴伏焉許操題云一山屈曲如回肘前有虎眠當水口隂森萬木緑參天秀色崢嶸欲飛走神仙渺邈不可問簫鼓尚能喧耳否朝風暮雨無嵗年應是蒼苔暗科斗大興院在縣東闕十五里開寳八年建四峯環遶前瞰大溪有巨石屹横流中狀若牛然故俗號石牛云正覺院在縣東南七里舊名珠頭岩開寳八年建治平三年改今額崇相院在縣西二十五里舊在溪西平坡名靈峯開寳中建天禧元年以圯于水徙今地仍改今額精嚴院在縣西三十里舊名靈泉唐乾符五年建國朝治平三年改今額普勝院在縣東北三十里後唐長興二年建國朝治平四年賜額鷲峯院在縣東南三十里舊名幽禪宣和中有貞教師主白蓮後學宗之至今懴法禮鷲峯尊者云靖康元年重建浄居院在縣西北四十里後廢乾道中吳康肅芾俾僧行機重建善因院在縣南五十里舊名招福唐廣明八年建國朝治平三年改今額正貞院在縣東南五十里唐末僧闕静建國朝紹興二年重建浄樂院在縣西七十里唐咸通二年建舊名興樂國朝治平三年賜今額廣福院在縣西一百四十里咸平三年建明聖院在縣西一十五里景祐五年建清修院在縣西二十五里開寳中建後廢開禧元年重新之寳積院在縣東南三十里治平三年建慧門院在縣西三十五里景祐五年建仍賜額梵嚴院在縣西四十里元祐六年建普光院在縣西南八十里漏澤院在縣西北二里崇寧三年建盖奉詔瘞叢骸之地今廢覺海院在縣東三十五里建炎三年建今廢尼院四浄勝院在縣西南五十里舊名寳勝俗傳唐時陳長者捨基建晉天福中賜額國朝治平三年改今額大仁院在縣西南四十五里紹興十七年建明覺院在縣南三十里紹興二年建夀寧院在縣西二十里大觀元年建今廢寧海禪院一十有二崇教寺在縣西二里舊在縣北三十里名清泉梁天監元年建隋大業元年廢唐乾元元年徒今地㑹昌中廢大中元年復建國朝大中祥符改今額舊有筠軒左緯詩云只把山為界紅塵自此分竹窗吟聴雪苔石坐㸔雲意静詩先到心清道自聞深慙王許軰猿鶴舊同羣先羅適筠軒詩云夜憶清軒上都忘居㑹稽秋聲在竹月色最宜溪銀漢簷前直玉繩天外低何人倚欄檻為聴下莊雞夀寧寺在縣南一十里舊名白水庵晉義熙元年僧曇猷建時猷自海乗槎至卓錫泉湧故以為名晉天福五年改名海晏國朝淳化元年改今額門外有猷所携石髙數尺許石上有紹聖中髙述陳安道以下題字其西三十步有洗腸井其水白色旱澇不損益太宗搜訪名山工部侍郎王化基奏聞至道元年遣内侍裴愈手御書三十軸以賜後多散逸云浄土院在縣東四十五里舊名資國唐武徳中建國朝治平三年改今額周弁詩云一逕森森入翠㣲翠㣲深處見禪扉倚雲殿閣金相照蔽日松杉碧四圍竹引澗泉寒遶屋雨蒸山靄潤侵衣十年逰宧今重到景物依前舊識稀楊傑詩云岩谷連天嶺杉松徹象山路從雲外入人自海邊還禪榻紅塵斷經牕白晝間玉蓮生有處香滿翠徽間慮孫大亷詩云流水元依澗孤雲不著山萬縁機斷一㸃净明還立雪人何在銜花鳥自閒羣昏疑網破雄論落人間塵又詩云白蓮開緑水佛子舊家山浄境無南北心有去還林深天籟逺風定水雲間何日逢征騎重來翠巘間寳嚴院在縣北九十二里舊名茶山寳元中建相傳開山初有一白衣道者植茶本于山中故今所産特盛治平中僧宗辯携之入都獻蔡端明襄蔡謂其品在日鑄上為乞今額清居院在縣東一十里治平三年建仍賜額山絶頂如菡蓞舊傳僧曇猷乗槎自海至嘗卓庵焉廣潤院在縣西南五十里舊名普濟晉僧曇猷建國朝大中祥符中改今額演法院在縣西南六十里唐景福中僧行恭建國朝大中祥符元年賜額慈源院在縣東南一百五十里舊名龍泉晉天福七年建國朝治平三年改今額法安院在縣東一百五十里一名古洞淳熙三年僧惠本重建廣福院在縣東二百五十里舊名資國太平興國闕年建治平三年改今額大覺院在縣西南五十里開寳中建妙勝院在縣東海中二百里開寳中建教院一十有四永樂院在縣西南五十里舊名海雲梁天監中居人蔣政捨宅建政蜀人琬之後嘗隠于此故其地名蔣山隋更名海月唐乾符中僧道隆重建更名永安國朝治平初改今額元祐中僧禹昭又新之羅提刑適記云余成童時好讀書而郷中無文籍唯鄉先生朱叟絳世傳論語毛詩皆無註解余手寫讀之茫然不知義旨之罅隙唯永嘆而己慶厯中有僧智賢師禹昭師皆里釋之秀者同遊錢塘傳智者教以餘力事明静大師惟賢通儒書能講五經論語二師性明敏志堅而氣剛各以儒釋二家自負不少下人余因得與二師遊假其書叩其論議日浸淫開發聞此達彼由是知聖賢之門墻有可入者遂尋師訪友以終所業余知經術之為樂權輿於二師也熙寧初余以赴泗水令去鄉凡二十有五年元祐六年始按刑二浙明年春扺鄉曲智賢己謝世惟禹昭師迓余於王愛嶺師雖雪眉松骨老瘦成翁其神清氣静儼然若昔時叙别話舊傷往而感來遂相與泫然流涕師且告余曰此去東南三里即蔣山其院名永樂老身之故棲也願公臨之因與之踏雲躡翠入長松之徑登堂皇巻亷四顧羙乎哉前岩後峯左岡右隴流泉若蛇盤屈而東注東北有峯最髙曰石柱師曰以多大楞名之也是時春色在物夕陽滿山野花開而百鳥啼㣲風起而白雲亂幽芳可擷逸興俄生於是與師扶欄握手相顧而笑論無生之法盡滌闕因求秒作記具闕文通避地居闕中捨宅諱政字為海雲寺隋改曰闕鄉人王闕越所焚錢氏乾符中王易名永安本朝淳化中貞闕禹昭闕隳覺亦増葺焉治平初賜今額勸檀􆂮之植福有麻氏者鳩信士闕庫及賔大殿作三門次建法堂僧堂方丈僧闕客之舘凡七十楹皆撒舊成新易卑為髙始熙寧五年終元祐八年功告畢余得闕録久弗暇書易路幾右坐𨽻昌府久要堂竊闕之自余登第三紀矣郷曲少年無登第者亦無僧以儒釋學自負如二師者然則山川秀氣豈總於吾黨也必將有豪傑之士發憤自舊或儒或釋揚名天下者矣然則余老矣不知能及其見否也因取其所録暨余與二師相遇之始末及前日歸鄉之新事載之鄙文使吾黨少年他日觀吾文知我起白屋之艱若在故舊之難㤀能自激昻以成厥志此余作記之微意其院之畛域則紀于碑隂云爾法昌院在縣北二十五里舊名赤山菩提唐大順三年建後又改靈山國朝大中祥符三年改今額玉溪院在縣東南八十里舊名湫水唐元和五年以湫水潭應禱而建國朝大中祥符元年賜今額丹丘院在縣南九十里宋元嘉二年梅長者闕其誦經感丹鳳賜名丹丘闕改為院大中祥符中賜今額闕百里五代時軍將王徳闕址也周廣順元年賜名闕三年改今額闕縣北一十五里太平興國八年建治平闕年賜額慈尊院在縣東二十里晉時建國朝大中祥符元年賜額延夀院在縣東南三十里舊名保安崇夀乾徳二年建大中祥符三年改今額興梵院在縣南五十里舊名興國開寳中建治平闕年改今額慈勝院在縣南七十里舊名慈安景徳元年建治平三年改今額靈峰院在縣東北八十里吳越尚書葉預捨宅建國朝開寳中賜名三峯治平三年改今額多寶院在縣西九十里舊名龍祥晉僧曇猷建國朝治平三年改今額闕西南一百里大龍山舊名興國治闕闕里治平三年建甲乙院一十有九崇福院在縣西南二十五里梁王山俗號梁王寺舊名資福唐武徳中建國朝大中祥符中改今額元祐四年僧懐智造藏殿羅提刑適為之記有主簿洪皓祠前有古松盤偃詰曲若蛇龍然相傳數百年隂葢數畝雖畫工不能竟其状紹熙四年令方懋烈亭其側王常博澡為之記妙相院在縣東五十步舊在縣西三十步又名赤山梁天監元年建隨大業中廢唐乾元元年徙今地呉越寳正三年改海晏國朝大中祥符元年改今額慈雲院在縣西一十五里舊名齊雲唐咸通三年建國朝治平三年改今額羅提刑適詩云七十有餘嵗不曽逰此山因尋白雲路深入翠㣲間曉澗烟霞合春巖草木斑誰灰心地火占取一生閒瑞相院在縣東三十五里唐貞觀二年建吳越時葉大傳景泰捨基闢之國朝治平三年賜額吉祥院在縣西北四十里舊名雁蒼唐武徳元年建有旃檀觀音僧了性事之甚嚴每禱輙應又有蓬萊徑氷泉皆唐人所名國朝治平三年改今額福興院在縣南一十里舊名福全庵開寳中剡人王氏捨基建治平三年改今額廣修院在縣西南一十五里舊名觀音唐大順中建國朝治平三年改今額明智院在縣北二十五里舊名鄞水石晉㑹同中建國朝治平三年改今額大智院在縣北三十里舊名觀音乾徳中建治平三年改今額永福院在縣西四十里舊名柯山太平興國中建盖僧曇猷駐錫之地普福院在縣東五十里舊名保福乾徳中建治平三年改今額明恩院在縣東北六十里唐乾元中建國朝治平三年賜額大寧院在縣北六十里舊名新寧晉天福中建國朝治平三年改今額保寧院在縣北六十里舊名保安雍熙中建治平三年改今額明因院在縣東南一百三十里晉㑹同中建國朝治平三年賜額安住院在縣東南一百六十里舊名安和唐大順中建國朝治平三年改今額福聖院在縣東六十里開寳中建䕶法院在縣東海中二百里太平興國中建天真院在縣東海中二百里治平三年建尼院一廣報院在縣西二里嘉定十一年尼普文建十四年賜額赤城志巻二十九
