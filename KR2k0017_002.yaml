body:
  text: 赤城志卷二宋陳耆卿撰地里門二自古建郡若邑倚城以為命然必擇勝地焉今章安鎮側有古城蓋吾州舊迹也荒雉墜堞巳隨秋草然亦疑其逺州比海魚龍所腥非高塏可久之地以今城壘騁目而望據大固山介天台括蒼間中峯對峙如入几席天台仙居二水别流至三江口而合縈紆演迤環拱其郛岩光川容吞吐掩胦於煙雲縹眇之際真足以奠城社表宅里聚㕓市以雄跨一方矣城郭州城按舊經周回一十八里始築時不可考太平興國三年吳越歸版圖隳其城示不設備所存惟繚墻後再築慶厯五年海溢復大壞部使者田瑜以聞詔新之乃命太常博士彭思永攝州事命縣令范仲溫等分典四隅從事蘇夢齡等總其役三旬而畢明年元守絳至乃因新城增甓之作九門捍外水之怒十竇窗疏內水之壅又鑿梁貫城厮為三支閲嵗訖工是秋水不為災至和元年復大水城不沒者數尺孫守礪再加增築嘉祐六年大水復壞徐守億謂城南一帶當水衝用牛踐土而築之每日穴所築地受水一盂黎明開視水不耗乃止熙寧四年錢守暄又纍以密石且慮水齧其足遂浚湖以其土實之乾道九年火及闉淳熙二年趙守汝愚又繕築焉先是郡有壯城遇水患合司其役巳乃屬役於士庶吏誅求不饜則捃托鞭箠至有殞於非命者公從州士請歸其役於壯城民用以寧三年秋大雨城又幾墊尤守袤極力隄護事竟復修城城全邦人歌之按故基東自小鑑湖循清心嶺而南縈抱舊放生池直接城山嶺古通越門土地廟處蓋今湖昔地皆闉闍中物也後乃徙而之西縮入里餘衆謂起元守絳今按元雜記但載修城無徙入之文後按汪泌共樂堂詩歷敘城事有外遺數百家室屋鱗參差之語意其為錢守暄也全篇見東湖嘉定十六年齊守碩復經界有以故基為言者亟遣官吏按視則知城趾廣踰四丈中有二斗門㵼水遺迹具在而以居人奄據或田或囿嵗久懼愈湮乃於其中酌存丈許旁揭牌以為表識其奄據者貰不治而聽其承佃如官店基法焉新城既全而舊城且不泯矣城今有七門各冠以樓南曰鎮寧門樓名神秀曰興善門樓名超然東曰崇和門樓名惠風西曰括蒼門樓名集仙東南曰靖越門樓名靖越西南曰豐泰門樓名霞標西北曰朝天門樓名興公蓋自尤守以前城凡八修繼是雖間修非大役故不書吕成公祖謙修城記云臨海郡南東西三方岸江湖秋水時至北限大山蹙不得騁怒齧隄足生聚凛凛恃城以為命距海餘百里逋亡剽俠之所曹惡嵗輒睢盱州溆睥睨郛郭徼警者不敢弛柝故閉修之政在是郡為首務蓋所以逺災害銷姦萌非徒區畫封表備侯邦之制也慶厯之水幾不為郡元章簡公絳來守城復立宣和中盜發仙居闖虛罙入突薄欲登時則有户掾滕君膺帥厲吏士圉以方略冦不為患父老紀焉乾道九年里旅不戒於火延及郡城堵隤甃弛徑踰無禁災氣未格民訛不寧間一嵗大史趙侯汝愚自信徙鎮暇日循行牆落屬丞掾而告之曰置守所以衛民顧屏蔽廢徹若是其何以待不虞土功於古雖有常律傳春秋者復出啓塞從時之例豈非城闉之啓閉實有邦之大紀隨時築治有不得而已者邪况壯城之卒月粟嵗帛凡以為此益其廪而寬其程宜無不可於是軍事判官蘇延壽受役要司輂輦金穀之稽兵馬都監胡勝督栽巡功察其勉與不勉者命羣有司各保其所奠地守傅衆力埤增卑薄塗塞空卻環城諸門作新者四曰鎮寧曰興善曰豐泰曰括蒼修舊者五曰崇和曰靖越曰朝天曰順正曰延慶起淳熙二年六月癸酉訖閏九月戊辰纍日積功凡一萬五千三百七十有六大抵取具於壯城之籍間民願即工者厚酬之不欲勿強會其數視役兵財十之二鍛斫鏝埴黝堊之工畀僦直如其素醪醴之饋勞來之吏相及於道其材瓦石甓之用積二十一萬七千九百錢以貫計米以石計者合四千六百有奇維侯憂民急病之意既達於下而精知周慮又足以綜理之故公無羡費人無留力工無餘技役事首尾歷再時版臿並作觀堞崛興而近郊之氓初未嘗釋隴畝也始侯之至詔奉計最朝十月報政之期甫半嵗而贏或謂是邦特侯假道休沐之地繕營之巨者必姑存以須後乃獨於入國阡陌未習之時驟舉力政百年之迹還於指顧邦人德其賜而樂其成請書勞於石抑不知因事而功見已事而迹泯一壘培之緒業於侯何有哉至於不以久暫易意眇然長慮於耳目之外以無負於寄委識此者蓋亦鮮矣遂書以諗台之君子子城按舊經周回四里始築時不可考或云州治舊在大固山上有子城故趾焉後隨州治徙今處其門有三南曰譙門上有樓不名東曰順政門樓名東山西曰延慶門今名迎春城之南內外號裏班內班舊傳錢王俶守台胡進思自此迎立之有班直分寓于此故名臨海城按縣須知周回二百九十五步按縣治附州城他無郛郭或云今左右繚墻沿城隍廟至天台館達上古巷其步數實合意舊有城而後易為墻也黃巖城按舊志云周邑九里三十步又云周回四百五十步唐上元中築今皆無考天台城周回四百步吳永安中築按甎刻宣和三年重修今稍頽圯有二門東曰應台西曰通越仙居城周回六百步唐上元二年築國朝宣和冦亂統制姚平仲張思正駐兵於此因再築焉寧海城周回六百步舊在海遊唐永昌元年徙今地或云唐大厯間四隅舊各有門後廢令陳宗仁於西北驛道立其二曰望台曰朝京鄉里臨海一十五鄉四十四里大固鄉在縣東祥符中管里一曰交里今管里六丘祥舊名休祥紹興中道士費德泓得晉碑土中猶以此名里後避真廟舊諱改今名臣公恩義崇和衮繡慶元六年葉守籈為謝丞相深甫立世衮嘉定元年李守兼為錢丞相象祖立興國鄉在縣西北祥符中管里一曰瓦窑今管里二慶善舊名迎恩因陳貽範有藏書樓曰慶善後同弟貽序中第子師恭亦舉八行故改今名丹丘義誠鄉在縣南一十里祥符中管里一曰新城今管里三按唐乾寧間曽洵作杜雄墓銘義字下作誠字俗呼為城者誤正節按杜雄墓銘云葬于義誠鄉正節里則得名久矣豐化按張滌作駱延威妻杜氏墓志云光化二年葬臨海縣官政鄉風化里風與豐同音今恐訛也所謂官政鄉者得非今之義誠乎承光遂仁鄉在縣東南二十五里祥符中管里一曰江上今管里五永固蓋竹承明白鶴以山得名長石清化鄉在縣東三十里祥符中管里一曰山後今管里二遇明修景太平鄉在縣西三十里分上下二扇祥符中管里一曰若溪今管里二善政懷表重輝鄉在縣東北三十里祥符中管里一曰油溪今管里二合從修謹長樂鄉在縣東南四十里祥符中管里一曰磧村今管里三正教上義連碧明化鄉在縣東南四十五里分上下二扇祥符中管里一曰青令今管里二孝遜欽田安樂鄉在縣東北五十里祥符中管里一曰路前今管里三興善道德懷善延壽鄉在縣東北五十里祥符中管里一曰大東今管里三廟善干山延祚靜安鄉在縣西北五十里祥符中管里一曰七孺今管里四按靈鷲祖師幼璋遇異僧告云尋靜而棲遇安即止璋遂為靜安鄉創福田院俗以靜為靖誤也又此鄉今有地名七孺或傳古有七孺人居之祥符以此名里亦為是歟湖平王震大石小石于公鄉在縣東六十里祥符中管里一曰涇山今管里三清溪北湖纂化保樂鄉在縣東南一百一十里分西南二扇祥符中管里一曰百家今管里二按祥符中僧願鴻撰光相院記云師臨海寶樂人今以寶為保亦恐訛也永福崇仁承恩鄉在縣東一百五十里祥符中管里一曰又口今管里二廣濟磻石黃巖一十二鄉四十里仁風鄉在縣東二百步管里二光澤安寧三童鄉在縣西一十里管里二建平善政永寧鄉在縣南一十五里管里三砂門仙山善化鄉在縣北一十里管里五善鄰親仁道林石步臨海備禮鄉在縣西北一十五里管里四石步新昌建城大興飛鳬鄉在縣東南二十里管里七親仁海門懷禮安仁安樂甘泉青鳬靖化鄉在縣西南二十里管里二按祥符圖經有永泰無靖化或云永泰蓋哲廟陵名意以是改為靖化也苦竹浮南靈山鄉在縣南三十里管里二貴豐塘下馴雉鄉在縣西南三十五里管里五古城仙岩湖南湖北白塔繁昌鄉在縣南七十里管里三舊名萬嵗政和八年以鄉民陳丑兒妻一産四子州以聞詔改今名贊善橫嶼回浦來逺鄉在縣西南九十里管里二清江浮山太平鄉在縣東南一百里管里四三門練溪白水遊嶼天台四鄉一十二里太平鄉在縣東管里三五支三歸楢溪永保鄉在縣西管里三按崇道觀元命殿前石香臺鐫云咸平三年天台縣寶祚鄉塘西保士庶置詢之父老即此鄉也豈吳越時鄉名而咸平後易之耶塘西乃山裏宋氏所居之地名定公長松兩岐祥鸞鄉在縣西二十五里管里三桐柏大固興正積石鄉在縣西三十五里管里三三異曲池同仙仙居六鄉三十一里升平鄉在縣郭東西管里六永欣白水以溪水湍流而白色故名新建石牛以有怪石狀似牛橫枕溪中流故名狀元舊名安仁開禧元年令趙汝逵以胡謙魁特科改今名孝義慶元二年令趙幼聞以吳沆母病刲股而名慶雲鄉在縣東一十里管里三浮都班溪甘露按純熙觀記云葛元於括蒼洞煉丹有慶雲甘露之瑞故以慶雲名鄉以甘露名里云開元鄉在縣西二十里管里六羌山以韋羌神靈驗故名莒溪元文高遷靈峯折桂以吳給事芾兄弟子姪相繼擢第而名歸仁鄉在縣東南二里管里七清湖舊傳以湖水清故名隱賢清河石感武德誠信吉陽清風鄉在縣西四十里管里七永昌薦正甘泉皈政紫岩以紫岩山石産紫草故名辛昌溫泉遂寧鄉在縣西六十里管里二懷化赤城以山得名寧海六鄉一十九里朱開鄉在縣東北七里管里五廣度辟邪時康堠城橫溪連理鄉在縣西南一十里管里一父老云溪南昔有櫟成林一夕風雨林中作數百人聲旦視枝幹皆連理故以名鄉宣陽永康鄉在縣西南三十里管里三新建清溪桐柏仙巖鄉在縣南六十里管里三井山梅枝合歡新寧鄉在縣北七十里管里二仙人舊名閬風善政寧和鄉在縣南七十五里管里五清溪懷遜奉化萬嵗新進坊市州狀元坊在州東一里以陳侍郎公輔釋褐第一故名登俊坊在州東南九十步以州學在焉故名惠化坊在州東二百步春祺坊在州南一百三十步移風坊在州東南二百步以臨海縣在焉故名順昌坊在州東三百步通逺坊在州東南三百五十步以稅務在焉故名嘉定十六年居人自此坊側重甃衢路至州橋得舊甎二一鐫端拱四年一鐫淳化元年又石版內鐫景德寺僧簡瓊再修今舊經有景德寺砌街記蓋此時也延康坊在州東南一里永平坊在州南一里寶華坊在州東南一里二百步以報恩寺在焉故名右十坊舊有之後廢嘉定四年黃守畇重修狀元坊在州南七十五步嘉泰二年黃守英雋以葉淙魁武科故名悟真坊在州東北二百五十步慶元三年葉守籈以張平叔居此著悟真篇名今有祠興賢坊在州東南一里嘉定十五年齊守碩建以貢院在焉故名美德坊在州東北一里開禧三年李守兼以錢丞相居此故名節孝巷在州東一百五十步淳熙二年尤守袤建以朱伯履妻陳氏旌表故名户曹巷在州東一里以唐鄭虔為户曹日居此故名杜甫題鄭著作詩云台州地濶海冥冥雲水長和島嶼青亂後故人雙别淚春深逐客一浮萍酒酣懶舞誰相拽詩罷能吟不復聽第五橋東流恨水皇陂岸北結愁亭賈生對鵩傷王傅蘇武看羊陷賊庭可念此公懷直道也霑新國用輕刑禰衡實恐遭江夏方朔虛傳是嵗星窮巷悄然車馬絶案頭乾死讀書螢所謂窮巷即此也又有詩云天台隔一江風浪無晨暮鄭公縱得歸老病不識路昔如水上鷗今如罝中