body:
  text: 赤城志卷十三宋陳耆卿撰版籍門一州負山瀕海沃土少而瘠地多民生其間轉側以謀衣食寸壤以上未有萊而不耕者也按紹興十八年李侍郎椿年建行經界俾編户實書其産依土風水色認兩稅履畝授砧基二藏之官於是州縣無隱田余聞長老言李健而明吏不得弄毛髮以故得事集集後無敢議者今七十有五載猾胥豪民相倚仗為蠧賦役厖亂遂有舉行前説者焉往歲寧海黃巖嘗行之矣臨海仙居則方行而未備也如得清徑不擾之令佐均秩布置取平而不求贏焉其豈非朝廷郡國之本指而齊民之幸會歟今且以五縣近數列於編學田寺觀田次之學田學舊有田自宣和三年罷學舍歸之有司其在學者不闕中陳貽範所輸數十畝李守纁闕陳景攝教事一經理之既而臨海丞姚漺請于郡於啇闕頭之餘十之七以助學十年間得三百畝其後教授闕請籍負郭闕補其乏乾道元年有司將鬻以豫民黃守然易而歸之為九十三畝有竒三年有司又有鬻其餘李守浩又易歸之為九十六畝有竒淳熙四年李守宗質議增給而諸邑有樂義者三人獻其私八十五畝嘉定四年黃守畇撥四十三畝且儲錢千緡為增闕俞守建助之得二百闕畝又撥後入田一十五畝康守仲𨽻撥三十畝喻守圭撥二十五畝齊守碩撥闕十畝合先後瑣悉歲得榖僅一千九百石視遐邦所入未為凋陋然吾州多士闕試于有司者幾萬而食于學者不滿百博士欲闕力窘輒止蓋今江浙學廪亦未有如此邦闕有聞而附益之者也赤城志卷十三
  hash: sha256:a75350e78dc72fc0e7fd0d670c4a3926f1414a336749459adda6e07e23071009
