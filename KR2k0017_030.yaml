body:
  text: 赤城志巻三十宋陳耆卿撰寺觀門四宫觀州天慶觀在州東北一里一百步面挹雙峯背負重崗號城闉勝地舊為白鶴觀按尤守袤昊天殿記未詳建立嵗月夏英公竦三官堂碑云因茅盈駕鶴上仙故名然按杜光庭靈驗記云天皇東封鶴集其壇俾諸州為老子築宫號以白鶴陳師道詩話亦曰唐髙宗東封有鶴下焉乃詔諸州為老子築宫以白鶴為名此建觀之始夏說誤也後廢至開元中獲天寳度人經建天寳臺扁榜乃徐浩書上有銅鐘開元十二年所鑄復建觀榜曰開元天寳中鑄銅老子像晉天福五年道士黄永乾居之國朝大中祥符元年更名䕶國先是景徳五年已丑左承天門天書降戊辰改元大中祥符以其日為天慶節二年詔東京建昭應宫天下建天慶觀且加九天司命尊號曰保生天尊五年十月二十四日天尊降延恩殿按應天降落碑上親奉聖言吾人皇九人中一人也是趙之始祖有功扵世再降乃軒轅皇帝凡世所知少典之子非也吾於後唐時奉玉皇命典趙族已百年矣詔以其日為降聖節剏聖祖殿賜金寳牌以玉清昭應宫成天尊萬夀金寳為文政和六年剏昊天殿淳熙四年錢參政端禮復新之聖祖殿前有兩鉅松甚怪世傳茯苓産其下又道士壁間有范子氓所繪牛及林禽人傳其妙云栖霞宫在州西北二百六十步舊名白雲菴唐中和中建道士王乾符朱霄外主之霄外以道術為錢忠懿王所知遂葺庵為觀與天慶觀號東西二宫國朝淳化中頒宸翰大中祥符中賜今額元豐三年建嶽殿于其西有五嶽真形圖在焉僧長吉詩云龍虎丹砂煉已成方瞳緑髪仙骨輕石床半醉海月冷芝軒長嘯天風清時泛緑觥陪俠客終騎赤鯉歸蓬瀛朝相訪惜迴馭屢奏瑶琴太古聲臨海棲貞觀在縣南三十里舊名葢竹葢許邁故居晉時建舊在山外有石室登霞臺葛元禮斗壇卧龍墠隋大業中廢國朝政和八年重建宣和元年改今額淳熙八年唐守仲友徙今地丹丘觀在縣西北三十里舊名成徳梁時建隋大業中廢國朝政和八年重建改今額燈壇觀在縣西南六十里按舊經云晉陶𢎞景結廬于此後以為觀隋大業中廢龍興觀在縣東北三里唐神龍元年建沈佺期為之記後廢景星觀在縣南一里唐乾元中建後廢黄巖定光觀在縣西北一里舊名龍光吳黄武中建一傳朱霄外建初觀北江流渾翳中一潭獨澄泚有龍居之時亢旱忽水自潭湧赤光燭天故名其潭曰龍光因以名觀赤烏中改今額前有二池葛元嘗以其一煉丹水特清旱不枯涸每有靈恠蕩激而起其波髙文餘集真觀在縣南四十五里白峯山下紹興中劚地得石鐫集真二字故以為名天台桐栢崇道觀在縣西北二十五里舊名桐栢唐景雲二年為司馬承禎建回環有九峯玉女卧龍紫霄翠㣲玉泉蓮華華林香琳玉霄自福聖觀北盤折而上至洞門長松夾道孫綽賦所謂䕃落落之長松是也吳赤烏二年葛元即此煉丹今有朝斗壇洎承禎所建堂有雲五色因禁封内四十里毋得樵採又傳承禎所居黄雲常覆其上故有黄雲堂元晨壇自頌云堂號黄雲俯䕃真炁壇名元晨仰窺清景鍊形室鳯軫臺朝真龍章閣又有衆妙臺盖以篆𨽻八方三體寫道徳經於巨幢置臺上故云臺下有醴泉後皆蕪廢太和咸通中道士徐靈府葉藏質新之梁開平中改觀為宫有錢忠懿王所賜金銀字經二百函及銅三清像忠懿自為記夏英公竦亦有經藏記周廣順二年朱霄外建藏殿國朝大中祥符元年改今額政和六年建元命殿又有御書閣閟三朝宸翰及髙宗所臨晉唐帖閣今不存紹興二十二年楊和王存中重建三清殿曹開府勛建三門曹又於觀北結庵賜號沖嗇云唐崔尚碑云天台也桐栢也代謂之天台真謂之桐栢此兩者同體而異名同契乎𤣥道無不在夫如是亦奚必是桐栢耶非桐栢耶因斯而談則無是是無非非矣而稽古者言之桐栢山髙萬八千丈周旋八百里其山八重四面如一中有洞天號金庭宫即右弼王喬子晉之所處也是之謂不死之福鄉養貞之靈境故立觀有初强名桐栢焉耳古觀荒廢則巳久矣故老相傳云昔葛仙公始居此地而後有道之士往往因之壇址五六厥迹猶在洎乎我唐有司馬鍊師居焉景雲中天子布命于下新作桐栢觀盖以光昭我元元之丕烈係綏我國家之永祉者也夫其髙居八重之一俯臨千仞之餘背隂嚮陽審曲面勢東西數百步南北亦如之連山峩峩四野皆碧茂木欝欝四時並青大岩之前横嶺之上雙峯如闕中天豁開長澗南㵼諸泉合潄一道瀑市百丈垂流望之雪飛聽之風起石梁翠屏可倚也琪木珠條可攀也仙花靈草春秋競發幽鳥清猿晨暮合響信足賞也始豐南走雲嶂間起剡川北通煙岑相接東則亞入凔海不逺蓬萊西則浩然長山無復人境摠括奥秘欝為秀絶苞元氣以混成鎮垕地而安静非夫神與仙宅仙得神營其孰能致斯哉故初營天尊之堂畫日有雲五色浮靄其上三井投龍之所時有異雲氣入堂復出者三書之者記祥也然后為虚室以鑿户起層臺而絫土經之殖之成之翼之綴日月以為光籠雲霞以為色花散金地香通元極貞侣好道是遊斯息㣲我鍊師孰能興之鍊師名承禎一名子微號曰天台白雲河内温人晉宣帝弟太常道之後祖晟仕隋為親侍大都督父仁㝡唐興為朝散大夫襄州長史名賢之家奕代清徳慶靈之地生此仙才以為服冕乗軒者寵患吾身也擊鐘陳鼎者味爽人口也遂乃捐公侯之業學神仙之事科籙教戒博綜無所遺窈㝠夷希㣲妙詎可識無思無為不飲不食仰之彌峻巍乎其若山挹之彌深湛乎其若海夫其通才練識瞻學多聞翰墨之工文章之美皆忘其所能也鍊師藴廣成之徳睿宗繼黄軒之明齋虚而求將倚國政侃侃然不可得而動也我皇孝思維則以道理國叶帝堯之用心寵許由之髙忠故得放曠而處逍遥而遊聞鍊師之名者足以激勵風俗暏鍊師之容者足以脱落氛埃以慈為寳以善救物神以知来智以藏往允所謂名登仙格迹在人寰奥不可測己矣道生乎無名行乎有精分而作三才播而作萬物故為天下毋脩之者昌背之者亡故為天下貴况絶學無憂長生久視也哉道之行也必有階也行道之階非山莫可故有為焉有象焉曕於斯仰於斯若舎是居教將奚依損之又損以至於無為𤣥門既崇不名厥功朝請大夫使持節台州諸軍事守台州刺史上柱國賈公名長源有道化人有徳養物甞謂別駕蔡欽宗等曰道以含徳徳以致美美而不頌後曰代何觀乃相與立石紀頌以奮至道之光其辭邈彼天台嵯峨崔巍下臨滄海遥望蓬萊漫若天合呀如地開煙雲路通真仙時來顧我鍊師于彼瓊臺鍊師鍊師道入𤣥徴噏日安坐凌霄欲飛興廢靈觀鍊師攸賛道無不為美哉輪奐窈窈茫茫通天降祥保我皇唐如山是常按此碑乃韓擇木書至今珍尚之元稹記云嵗太和已酉修桐栢觀訖事道士徐靈府以其狀乞文於余曰有葛氏子昔仙於吳迺觀桐栢以神其居葛氏既去復荒于墟墟有犯者神猶禍諸實唐睿祖悼民之愚乃詔郡縣厲其封隅環四十里無得樵蘇復觀桐栢用承厥初俾司馬氏宅時靈都馬亦勤止率合其徒共執鋸鋁獨持斧鈇手締上清實勞我軀稜稜巨幢粲粲流珠萬五千言體三其書置之妙臺以永厥圖不及百年忽焉而蕪蕪久將壊壊其支乎神啟密命命攴于徐徐實何力敢告俸餘侯用俞止俾來不虚曽未訖嵗奐乎于于乃殿乃閣以廩以厨始自礎棟周于鏝圬事有終始候其識歟余觀舊誌極其丘區我識全圮孰頌錙銖免合徐志馮陳協夫江唐𤣥宗送司馬詩云紫府求賢士青溪阻逸人湖與城闕異迹且殊倫間有幽栖者居然厭俗塵林泉先適性芝桂欲調神地道踰稽嶺天台接海頻音徽從此間萬古一芳春宋之問寄詩云卧来生白髪覽鏡己成絲逺愧飱霞子童顔長自持舊遊惜彌曠㣲尚日磷緇不寄西山藥何由東海期聞李嶠送詩云蓬閣桃源兩處分人間海上不相一朝琴裏悲黄鶴何日山頭望白雲尋孟浩然宿觀詩云海汎信風帆夕宿逗雲島緬滄海趣近愛赤城好捫蘿亦踐苔輟掉恣窮計息䕃憇桐栢采秀弄芝草鶴唳清露垂鷄鳴信潮早願言解纓紱從此去煩惱髙步凌四明𤣥蹤得二老紛吾逺遊意學彼長生道日夕望三山雲濤空浩浩鄭薰宿詩云深山桐栢觀殘雪路猶分數里踏紅葉全家穿碧雲月寒岩嶂曉風逺蕙蘭芬明月出林去吹笙不可聞任翻宿詩云飄飄雲外客暫起宿仙堂半夜人無語中霄月送凉鶴歸髙樹静螢過小池長不得多時住門開是事忙霞李白題云天台隔四明華頂髙百越門標赤城樓棲滄島月屐逺登覽直下見溟渤雲垂大鵬飛波動巨鰲沒風潮争泊湧神怪何翕忽觀竒跡無倪好道心不歇欎條摘珠實服藥煉金骨安得生羽翰千春卧蓬闕人周朴題云東南一境清心目有此千峯挿翠㣲在下方衝月上鶴從髙處破煙飛岩深水落寒侵骨門静花開色照衣欲識蓬萊今便是更於何處學忘機章得象詩云萬仞攀蘿上翠岑豁然平地九峯心參差珠樹和雲出咫尺丹霄有路尋洞口碧畦長種玉壇邊古篆欲生金桑田未變桃先熟唯見蓬萊水淺深元積中詩云九峯巍絶亂雲屯石室瓊臺舊址存山嶮宻盤之字徑洞深髙闢丙方門碧桃花爛春溪暖紫玉簫沈月榭昏未覺臺中光景晚人間歸去見來孫神羅適詩云欲訪琳宫入翠㣲滿山煙雨正梅時仙事秘人難問造化功深世莫知海近應通三島信年多空見八分碑身中龍虎吞天地誰肯留心繼鍊師福聖觀在縣西北一十五里桐栢山西南瀑布巖下吳赤烏二年為葛元建舊名天台額乃元飛白書西北枕翠屏上有三井號三絶之一洩為瀑布蔽崖而下狀垂蜺數百丈有濺珠亭觀前對靈溪東有栁泌史君宅號紫霄山居又有隠真中峯葢梁徐則所居之處唐咸通中刺史姚鵠因建老君殿得玉簡上之刻曰海水竭台山闕皇家寳祚無休歇詔付史舘國朝大中祥符四年改今額天聖五年遣中侍投金龍有布衣孟合附詩以進詔重新之紹興十一年置九天僕射祠按衆真記闕天台為九天僕射治山三十年楊侍郎偰妻趙以老君殿建三清殿栁泌玉清行云遥遥寒冬時肅肅躡太無仰望蘂珠殿横天臨玉虚下看白日流上造真皇居西牖月門開南衢星宿踈王母来瑶池慶雲擁瓊轝巍峩丹鳳觀長曳紫霞裾瑩徹聖姿嚴飄飄神步徐仙郎執玉節侍女捧金書靈香散彩煙北闕路駢闐龍馬行無迹歌鐘聲沸天馭風昇寳座停景宴華筵妙奏三清曲髙羅萬古仙七珍飛滿座九液酌如泉靈珮垂軒下旗旙列帳前獅麟威赫赫鸞風影翩翩顧盻乃須㬰已是數千年劉昭禹詩云鼇海西邊地霄吟景象寛雲開孤月上瀑噴一山寒人異髮常緑草靈秋不乾無由此棲息魂夢在長安布張無夢詩云大台瀑布落青天觀在天台瀑邊道士祇今燒藥處仙翁曽是種芝田龍居古洞遺殘雨鶴出高巢㸃破煙暫别靈溪遊五嶽不知重到又何年李建中詩云永懐閑訪道斗上上仙居瀑水磬聲外桂花林影疎山名孫綽賦觀額葛元書已負秋来約誅茅興有餘曹松題瀑布云萬仞得名云瀑布逺看如織拄天台休疑實尺難量度直恐金刀易剪裁噴向林梢成夏雪傾來石上作春雷欲知便是銀河水墮落人間合却回白雲昌夀觀在縣西北二十五里崇道觀西唐大中六年建舊名白雲庵乾道四年内侍郭守寧棄官入道乞改庵為觀遂賜今額洞天宫在縣西北三十里玉霄峯上唐咸通五年道士葉藏質創道齋號石門山居十三年奏為玉霄宫周廣順元年朱霄外建三清殿徐靈府小録又云道士陳寡言嘗隠於此號華琳今遺蹟不存國朝大中祥符元年改今額有禹鐘髙二尺其狀如鐸上有隠文又有一大鐘漢乾祐三年所鑄光明宫在縣西北二十八里按唐徐靈府小録南桐栢北上一峯可五里許長慶元年靈府定室于此寳厯元年賜號方瀛國朝大中祥符元年改今額昭慶院在縣西北二十五里舊名佛窟唐大中六年建葢僧遺則卓庵之地唐㑹昌中廢後道士劉處静復創聖祖殿越州刺史李褒奏聞賜號導元張仁穎為之記國朝大中祥符元年改今額中有七星閣唐咸通中物也法輪院在縣西北二十五里吳赤烏元年葛元卓庵於此感三真人降授以真一勸誡法輪妙經按王簡行院記真人曰蔚羅翹光妙音真妙光遂建臺號曰降真漢乾祐中錢氏復為朱霄外新之仍造檀香像一百軀國朝祥符元年改今額妙樂院在縣西北二十五里即王喬仙壇舊名仙壇院吳赤烏二年建殿前有石泉名醴泉泉南有上真亭壇東有八角壇今廢獨院東有太子庵朝斗壇吹簫臺瀛峯室故址尚存銅鐘一唐景龍二年所鑄國朝治平三年改今額法蓮院在縣西北三十五里舊名蓮峯唐咸通十三年道士葉藏質建國朝治平三年改今額聖夀院在縣北二十五里舊名延夀周廣順元年建朱霄外庵址在焉國朝治平三年改今額仙居純熙觀在縣東南一十五里括蒼山下羣峯迂抱谿谷水潺潺然舊名峽山吳赤烏元年葛元建初元遊歴至此山有景雲覆西北遂築室為錬丹之所詔遣官吏建候神舘仍賜號焉今丹井尚存後周長夀中詔加崇飾唐中和中火乾祐中觀之龍虎神夢於吳越王復新之國朝慶歴中又夢於邑士吳用堯修堂殿廊廡道士胡道崇剏建昊天閣政和中用堯之裔孫請改今額宣和二年燬于冦紹興五年又重建隱真宫在縣東南二十里舊名隱𤣥梁天監五年建本吳蔡經故宅先是有漢人王逺得道飛昇三國時遊括蒼山過經家謂曰汝有仙骨而未知道以金丹餌之及卒舉棺甚輕啟函視無有越四年復返姿益少謂家人曰七月七日王真人當來其日王果至駕五色龍旌節導從甚都召經父兄見之又遣人召麻姑至曰不接奉五百年矣乃迭進肴饍有金盤玉斚焉王又以酒一斗勻水五升飲經家人後舉室上昇今有石臼杵尚存事聞詔建觀以奉之曹唐題王逺室麻姑詩云好風吹樹杏花香花下真人道姓王大篆龍蛇隨筆札小天星斗滿衣裳閒抛南極歸期笑説東溟飲興長要得麻姑同一醉使人賖酒向餘杭蔡向詩云福地流傳號隠真麻姑曽欵蔡翁門臼舂雲子自堪飽井溢丹泉便可吞山露五峯疑指𤓰溪盤百疊想裙痕我来既躡靈蹤後知是仙家第幾孫凝真宫在縣東南三十餘里括蒼洞唐天寳三年因洞而建詳見括蒼洞國朝天禧二年改今額宣和中燬于㓂建炎初重建淳熙九年道士陳㑹真得内賜道藏以歸鎮之章憑詩云昔人騰碧落餘地掃岩隈石壁雲長在松稍風自来暗扉通浩蕩古蔓接崔嵬更欲窮幽隠仙源路己回尋張無夢詩云五雲深鎻洞門深躡履攀蘿特地烟靄不藏塵外路神仙遺下水中金喜遊汗漫華胥宅重憶崆峒至道心不得方平同一醉紅霞零落我罇琴寧海天慶觀在縣東二里舊在縣東北五里道士橋側大中祥符三年詔縣鎮亦立聖祖殿邑人陳繼能捨基而建康定元年徙今地桃源道院在縣東南一百九十步赤城志巻三十
