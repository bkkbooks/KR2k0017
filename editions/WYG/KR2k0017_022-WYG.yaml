body:
  text: 赤城志卷二十二宋陳耆卿撰山水門四山仙居括蒼山在縣東南五十里髙一千五百丈周回三百里羣山中􅇰號巉絶有八向焉一向凝真宫其七則臨海黄巖仙居永嘉樂清縉雲東陽七縣界皆山脊綿接今縣西蒼嶺亦其所通也按寰宇記云括蒼山在州西四十里今臨海真隠山本號括蒼而天台之東亦有蒼山蓋一山而綿亘三邑云韋羌山在縣西四十里絶險不可升按臨海記云此衆山之最髙者上有石壁刋字如科斗晋義熈中周廷尉為郡造飛梯以蠟模之然莫識其義俗傳夏帝踐厯故刻此石其後守阮録携吏民往觀雲雨晦冥累日不見而旋舊有緑筠庵按舊志載運羌山亦名天姥或又曰緯鄉俗語訛也然髙僧傳載曇蘭憇赤城事則曰韋鄉山在樂安縣陶𢎞景玉匱則曰括蒼西南一百餘里有偉美山登真隠訣則又曰偉羌山多神異之事然則韋鄉一山而六者之名不同未詳孰是千陳襄題云去年曽覧偉𦍑圖云有仙人古篆書尺石巖無路到不知科斗字何如盤盤英氣四紆餘定有神仙此地居天子正求伊與吕如何不見起耕漁天鞫精靈乆貯儲中間豪傑出無虚鄉民世世家居此争使兒孫不讀書山峭壁回環㡬百區其間巖石可耕鋤如何得片如此白首相將老母居西古意㠝岏與世踈一官覊絆可歸歟此山未及山好下有仙人結草廬將四友之賢世莫如白頭終作一鄉居此山不惜錢買歎惜無因共結廬郭三益題緑筠庵詩云道人棲碧山雲居在空曲十年海潮音利物縁已熟更尋妙髙頂超然具幽築古木挿空青寒筠抱巖緑時携貝葉書歩入深林讀雲影冷蕭條靜對含烟玉客来境非喧客去境自足宵眠護禪虎畫引銜花鹿庵中三昧語藥我貪嗔毒何當晚䨇鳬藜杖追髙躅福應山在縣東二里隂陽家謂其居邑龍首得地之勝居人建浮圖其上自是取青紫不乏焉上有盡美亭其下枕溪巖壑俱秀張景脩記云仙居邑之美者也而一山盡焉福應山之美者也而一亭盡焉盡美亭者非盡一山之謂盡一邑之謂也朝奉大夫龐公倅台之二年季按屬邑轍環七百餘里可謂勞矣然至於仙居福應則徘徊四覧嘯咏終日欣然忘其歸信乎美哉一日謂景脩曰昔朱超石云登北邙逺眺則衆美都盡予於此山見之矣山距城二里崢嶸獨秀浮圖居其上而亭居浮圖之南予名之曰盡美矣子為予記之景脩曰唯唯雖然公之意豈有窮耶不遺一景一物兼収而並采猶東西之不可相無也邑之括蒼章甫紫籜韋𦍑皆峯巒險絶巖洞環恠而溪流森然烟雲晦冥鷗鷺出没平波漁唱斷隴樵歸有騷人盡史不能工也夫豈易名哉邑令劉君襲明雅為公知圖序以告於是又知福應山者皇祐間令樞宻直學士陳公述古名之也陳公賢先生勸學文垂於世踰四十年公實作是亭公賢宰相子人門冠代不驕冨貴而意乃在乎山水之間愚將見其美不専於竹石花木風晴雨雪之際而在乎學者之材也噫美於是盡矣又題云南亭不減北邙髙美景因公見一朝已㸔溪山如在畫更傳風雅似聞韶栽桃定有仙家住種竹寧無隠者招秀氣當為多士福未應都放與漁樵我楊崈題云清風送月上欄干雲雨溪流破王寒有三峯髙興在漫堂聊作畫屏㸔尋醉後愁生任數竒僧牎借夢入新詩覺来著意桃李除了春風總不知安洲山在縣東南五里舊名管山又名九旬上有潭按舊志唐武德中僧灌頂講經於此時漁者甚衆頂勸止之忽一夕風雨旦視之則為洲矣故更今名又按羅題刑適灌頂行業記云師卜居安洲以波瀾四絶人迹不通乃誓曰若使此地坦夷来此講經未泱旬白沙湧出地平如砥乃講金光法華二經以答嘉貺此與舊志語㣲異今兩存之放光塔山一名綵仭山在縣北二里峯巒綺錯秀迤可愛上有浮圖蓋周顯德六年僧德韶所剏與福應山興道院塔列為三二溪駃其下隂陽家曰浮牌形云孟大武詩云綵仭氣浮三塔聳浮牌聲振兩溪寒人以為能狀一邑之嘉致紫籜山在縣北三十里舊名竹山與天台接唐天寶中明皇夢一人紫服而朝自稱竹山神來呈瑞鳯翌日果有鳯翔焉遂改今名今其側有瑞峯又上有棲鳯亭王戬詩云竹山絶頂古招提景異相將竺國齊靈鷲雄吞台嶽小瑞峯髙壓斗牛低雲深石恠冝僧隠水靜林幽樂鳥啼記得當年封紫籜只因丹鳯此中棲錢竿詩云雲鎻藤蘿石路深旃檀林裏有叢林萬山重疊雨添翠一水灣環風漾金午飯欲陪龍象住夜眠要聽鳯凰吟更求竹鏬安禅處老却平生名利心峽山在縣東南一十五里下即純熈觀按吕寶琛記云衆峯拱揖列岫迂廻遼展畫屏髙褰翠幄谿澗隠映致侔川峽故名峽山觀此秀槩可想也餘見純熈觀張阜山舊經作張父在縣西二十五里自州而西至常風望之山巋然東瞰縣治譙樓南環以溪北則有㠗及柘溪源等處其泉谷深秀舊傳逸民張阜居焉水簾山在縣西南四十里與永嘉接其中崖壁横峙有瀑自顛㵼宛若簾垂四時不竭昔人留題有今古長垂地晨昏不上鈎之句巖下有石室殊廣可容三十人萬竹山在縣西南四十五里絶頂曰新羅九峯回環道極險隘嶺上見叢薄敷秀平曠幽窈自成一村薛左丞昻詩所謂萬竹源中數百家重重流水遶桑麻是也薛又有記浮石山在縣南三里南峯山南下有巨石屹溪中視之若浮動故名漁潭山在縣東南七里下瞰溪潭居人嘗漁於此故名孟溪山在縣北一十里與彭溪等山接東北界天台西北連婺女其中丘谷深窈且多茂林樵採者日往焉青尖山在縣北一十里雄据邑後若擁障然其中一峯極峻而尖又以逺而長青故名石龕山在縣東一十五里上有石室深三丈廣踰一丈俗傳神靈棲焉石瓏崆山在縣西南一十五里上多巨石玲瓏可愛似仙都諸山云靈山在縣西二十里浄梵院上按舊志以禽鳥不棲故名項羽山在玉几山東三十五里相傳項羽少時駐馬於此有石馬跡尚存彭溪山在縣西北四十里與孟溪及天台界接其間林木可十頃五榖雜貨略具民樂居之馮師山在縣西二百一十里與括蒼嶺接舊傳馮氏女學道於此故名枕溪山在縣東南九里以其瀕大溪故名白巖山在縣西南一十五里以其有白巖故名三井山在縣北三十里以有三龍湫故名桐林山在縣南五十里居人以造楮為業焉枕海山在縣西六十五里以其趾挿海故名赤城山在縣西七十里以其山土石皆赤色故名曹官山在縣西八十里一名曹潭石疊山在縣南三十里玉几山在縣西五十里南峯在縣南三里俗以一峯南立故名其巔四面軒舒山水環擁為邑人逰覧之􅇰有題詠甚盛令劉光詩云百尺擎空窣堵波羣峯柰此獨髙何皷鐘鳴處是非外天地望中蒼翠多閒㸔墅雲披玉柱醉眠秋浪捲銀河問師乞取窓前月一榻清風許我麽雲峯在縣西二十五里以雲出小洞故名瑞峯在縣北三十里麻姑巖在縣西南二十五里一名仙姑巨石谽谺矯如人立昔麻姑訪王方平蔡經嘗隠於此故以名巖其上有洞旁兩石相峙髙深各踰丈俗呼風門有麻姑像存焉葉發詩云恠石倚空碧傳有神仙迹元放古来逰孝先應曽厯山前無斷碑往事杳難覔麻姑去不来青鳥無消息太翁巖在縣東四十里玉几山東太翁者不知何許人相傳國初居此山髙無水卓錫得甘泉遇旱不枯宣和中多避㓂於此景星巖在縣西五十里萬仭壁立髙處見井邑如錯綺繡僧行機嘗縳茅以居今為尼庵上有鹿頸巖以其形似之而名長數丈坦曠可歩左右崖壁更峻絶云漴水巖在縣西南十五里水自層崖飛㵼薄如水簾狀陽公巖在縣西北三里北有洞髙廣如屋三楹珠頭巖在縣南七里赤城巖在縣西六十里護民巖在縣南六十里蒼嶺在縣西北九十里髙五千丈周回八十里與縉雲界接重崗複徑隨勢髙下其險峭峻絶為東淛之􅇰行者病焉唐劉昭禹詩云盡日行方半諸山直下看白雲隨歩起危逕極天盤瀑頂橋形小溪邉店影寒往来空太息元髪改非難東嶺在縣東一里與臨海界接上有旋憇亭令趙幼聞以山坳多晚風故為此以障之馬蹤嶺在縣北一十里與永康東陽界接多草徑﨑嶇云界嶺在縣東三十里以與臨海界接故名十丈嶺一名小峽嶺在縣南五里闕嶺在縣闕北五里江家嶺在縣南七里界嶺在縣南一十里北㠗嶺在縣西北一十里闗嶺在縣南二十里石姥嶺在縣東二十五里括蒼洞在縣東南三十里括蒼山之間按塵外記括蒼成德隠元之天蓋第十洞天列仙所居在台之樂安即仙居舊邑也又寶藏名山記云括蒼洞周回三百里徐真人所治真人名來勒嘗得道上昇至東漢為太極法師蒞職洞天緫司水旱罪福之籍唐天寳七年有慶雲覆洞太史奏有真氣見於台宿詔建洞宫榜曰成德隠元舊傳此洞與處之玉虚宫通自括蒼嶺而言東則属台西則属處是謂天門地户故不特處名括蒼而台之括蒼門與此邑之括蒼驛亦皆是得名焉寶厯中道士葉藏質重修之國朝天禧二年投金龍白壁賜額凝真宫崇寧二年令蘇敖奏聞封靈應真人光宗在儲宫書瓊章寶藏四字鎮之金上龍潜亦賜奎畫及金鑄星官像由是洞宫増重矣洞口有石雲其山曰福星山道士馬自善所手培云雲笈七籖云羊愔以夾江尉罷歸隠括蒼山一日與道士飲忽仆而寤云有一人自稱靈英邀入洞中須臾石間迸出一物指曰此青靈芝也食之仙愔所食甚美自是惟飲水覺身輕骨鳴時兄忻任樂安令每往省之朝去暮還後入委羽山人莫之見令劉光詩云古洞藏真不記年翠崖蒼壁故依然恠來一夜清無夢身在仙家第十天寧海蓋蒼山在縣東北九十里一名茶山瀕大海絶頂睇諸島溆紛若棊布以其地産茶故名上有水簾側有觀音巖舊傳大士自海上至隠於此其中一鏬透頂每日光注射見玉瓶青鉢焉東又有巖刻真逸二字按真逸乃陶𢎞景道號昔往來寧海從張少霞逰今焦山風濤間有瘞鶴銘自題華陽真逸又顧况嘗寓臨海亦以此自號未詳孰是山上有火熖巖赤色閃爍欲動有仙人棊局及石船在其上焉桐栢山在縣西四十里連天台山按神邕山圖云桐栢在天台極東寧海界上父老又傳梁王山即古桐栢昔未建寺時葛元嘗居之初元鍊丹寧和山中為鬼物竊去遂徙此後隠天台故寧海天台皆有桐栢焉今梁王山下尚有桐栢里旁復有仙人里且多葛姓蓋元之苗裔云天門山在縣北六十里按漢地理志㑹稽鄞縣東南有天門水入於海陶𢎞景真誥亦云天門山在鄞縣之南寧海之北山半亞海今柵墟鐡塲正其處蓋從嵊剡金庭發足繚繞三百里至此謂之天門者言其髙也王愛山在縣西六十里與天台分界唐咸通中剡㓂裘甫㨿寧海殺其令陳仲翁懿宗遣王式發兵收之戰於海口縣北五十里上疁縣西北七十里海㳺三處甫遂從此山遁去今父老猶能言之通鑑作黄罕嶺誤矣硤石門山在縣西北五十里兩峯夾起矗立千仭俗傳神人欲以剡為海夜驅隂兵舁巨石絫於山趾如堰埭之狀功未竟比曉而止今有巨人跡丈餘崖上石刻恠竒不可讀梁王山在縣西二十五里舊傳梁太清末侯景作亂陳覇先兵起有一王子避地於此史失其名後人但稱梁王因以名山或以為梁宣帝詧也詳見梁宣帝廟大中山在縣北一十里其岡四斷昔有僧卓庵其上掘古塜得磚焉上刻大中二字遂以名山大中唐宣宗年號也或以為山當縣之正中云三十六靁山在縣西三十里自松壇至西溪新田沿棧道而上峰巒纍纍如貫珠凡三十有六折葛元鍊丹處也面北通馬墺三坑龍鬚山在縣西北五十里其岡四斷恠石屹立産銅鐡及苓把䓁靈藥有龍湫三四世傳鬼神出没其間云靈鳯山在縣南七十里宋元嘉中有梅長者休官隠於此誦蓮華經忽有鳯裴回庭下如諦聽之狀嵗餘方去長者死遂以名山白巖山在縣東一百里其左一峯筆立山圍繞如屏旁有赤白巖輔其下形肖石皷又梅林及永樂山鄉亦有白巖山與此為三卧龍山在縣東南一里一名應家山以其岡勢蜿蜒如龍偃卧更今名舊有鶴林庵白嶠山在縣東五里下有嶺焉晋武帝初置縣於此今或於沙磧中得斷甓云石臺山在縣東六里數石屹立遥望如臺故名有昔人登髙題名經野燒漫不可讀塔山在縣西南三十里狀𩔖馬鞍以其上兩塔對峙故名舊有一庵今併塔亡之矣鴈蒼山在縣北三十里西南連桐栢上有石如鴈齒且色蒼故名上有石牕鳯凰臺山在縣西四十里一名石臺盤其上有石方濶十丈有巨人跡焉柯仙山在縣西四十里舊傳僧曇猷棄槎入天台駐錫於此故名其地産牡丹特盛赤搯山在縣北五十里東跨鄞江西連鴈蒼山北抵奉化獅子山在縣南九十里絶頂有巨人跡長一尺五寸入石一寸世傳為仙跡云屈毋山在縣南九十里即龍毋山舊傳屈氏母子徙居此其母死且葬焉仙巖山在縣南一百里以絶頂二石如仙人偶坐故名有石洞地多竒草靈藥云龍姥山在縣東南一百二十里視衆山􅇰髙世傳有龍姥隠迹於此故名三門山在縣東二百五十里海中以三峯如門鼎立故名蛇盤山在縣東海中四圍有水相顧盤屈如兩蛇故名蓋台明二州分岐於此石鼻山在縣東南一十里以其中有石如鼻故名南田山在縣東海中上有平疇可三十頃石佛山在縣東海中以其狀若佛故名杜䳌山在縣東一十里赤柱山在縣北三十里横塘山在縣南五十里黄珠山在縣東二百里海中蒲田山在縣東二百里海青珠山在縣東海中㡌尖峯在縣北二十里以山形如㡌故名旱嵗或有㣲雲覆之翌日必雨上有龍湫天女峯在縣北四十里望之凝然如新髽女狀故俗名丫髻上有小庵凡無子者禱焉往往多得女海中人云每厯台境望餘山皆伏唯天台華頂與此峯卓然屹立云鹿頭峯在縣西一百里與天台接舊傳人有登其巔者西望林壑中一所隠隠七八家冬有花如桃李訪其處則無之石笋峯在縣東南一百二十里聨臨海仙巖洞瀛巖在縣東二十五里崖㟧險絶下蘸海中上有小亭石壁刻瀛巖二字令髙襲明所書梁間有一詩云温台萬丘壑走遍成重胝佳山落床頭咫尺反不知我聞野老説山乃神所移蓬莱本三峯一峯今失之上干雲霓秀下壓鰲背欹夜半見海日紫暈開咸池魑魅著老木狌䑕向人啼危亭無遺棟絶壁無舊題夫子勇過我竦身敢獨躋我病不能從夢寐常追隨秋風海上来霜清鱸正肥行尋越溪畔息此塵外機東郭巖在縣南一百里秀石岝􅣉匯為一壑隂風襲體夏無暑氣石間生卷栢菖蒲水梔東西瀕海多薑术嶼湖巖在縣南一百里㠝岏玲瓏參空秀起外環以水如盆中所貯菖蒲石然夀星巖在縣西南一百二十里一名老人以山如老人狀故名山旁皆盧姓俗傳冡墓對此巖者其子孫必夀故更今名闘鷄巖在縣北三十里以兩巒對峙如闘鷄狀故名囥佛巖在縣北四十里髙崖中有石窟深丈餘無徑俗傳日西照時望其中若佛然故名帳設巖在縣北四十里以其綿延數里如幕帟故名千丈巖在縣東南二里香巖在縣西北五十里摘星嶺在縣南二十五里舊名新嶺宣和中廉訪使劉長卿自北至以其山髙峻更今名盧駿元題云自知牛鬬耳不柰晚猿何客鬢愁中老秋山别後多扁舟桃葉渡夜雨竹枝歌頼有臯盧盌時堪戰睡魔左緯詩云巳知星可摘須信路皆通日影穿雲薄天形入水空遥㸔梁苑雪獨揖楚臺風指㸃中華地山河萬國雄楓槎嶺在縣南一十五里舊傳僧曇猷自海至棄槎於此故名桐巖嶺在縣西南一百二十里舊路由狼坑縣渚海㳺靖康後軍書警急遂取道於此民至今便之石姥巖嶺在縣南九十里一名寧和以上有石姥神故名大龍嶺在縣西南一百里回旋折曲凡三十五盤武嶺在縣西北三里寺嶺在縣西五里白沙嶺在縣西一十里牌嶺在縣東北二十里古鷲嶺在縣西二十里梅枝嶺在縣東南二十里相見嶺在縣西南二十里盧西嶺在縣西北二十里筋竹嶺在縣南二十五里許家嶺在縣北三十里西溪嶺在縣北三十里紫溪嶺在縣西南四十里柴溪嶺在縣西北四十里西倉嶺在縣東北五十里桑州嶺在縣西五十里瀝洋嶺在縣東北五十里吴洋嶺在縣北六十里黄公嶺在縣西六十里柵墟嶺在縣北六十里海㳺嶺在縣北六十里東倉嶺在縣東北六十里眺頭嶺在縣南六十里石广嶺在縣北七十里杉嶺在縣北八十里紫溪洞在縣西北四十里地幽阻僅線路唐寶應元年袁晁㨿浙東河南副元帥李光弼擊斬之晁弟瑛徔五百騎遁入洞中光弼駐兵洞口絶其糧道其徒竟餓死今巖石中多得刀劒鼎鐺云佹橋在縣南一百里兩石峙立所謂石門門間六尺不通車馬以小木橋跨道徔石門入自木橋下行轉上木橋始接石橋所謂佹橋長㡬三尋背如劒脊下有湍泉橋旁有石門門間八尺自此下嶺西一石峯撑空特立名石柱峯石上㸃白如梅花片又名梅花巖東石洞深二丈横廣倍之兩旁壁立仰若承塵中有泉穿洞而出前後兩石門皆蝙蝠棲宿南冷泉竇窪僅置杯味甚甘隨酌隨滿循東石門旁行一峯削成數仞頂上一棊局方廣丈餘夜分或有雲氣輒聞棊聲西石門即聖潭潭石明净如拭盡日續蔓深不可窮潭有蛇能乘風飛行近歲有樵者入山聞霹􅋬聲就視則潭旁巨石直裂如劈中有青泥流出掬之成石好事者取之掌痕猶在石崖髙絶蠣房層生今去海十里不知何時物也浮門在縣南一百九十里土多陳姓盖六朝時覇先之後隋滅陳盡室避亂於此厯唐五代以貲雄其家磚甓皆湖州物人取以為砥瀕海産乳柑紹興十五年漁人於海上獲一琴視其腹題云臣雷某造縣以獻於朝髙宗見之淚下乃建炎時渡海所失物也丹丘在縣南九十里葛元鍊丹處孫綽賦所謂仍羽人於丹丘尋不死之福庭是也閬風臺在縣北五十里天門山西麓㧞起數千仭旁有香巖石井釣臺洎竹岡馬跡石在縣西七十里靈公山中以其如馬足紛蹂之狀故名石屏風在縣西四十里蒼崖壁立足浸潭瀬中巖腹有棧道陟降者謂若入蜀云石棺在縣北四十里兩山夾峙如門中有一石如棺狀故名石鏡在縣北八十里西張山上風穴在縣西四十里海㳺嶺下舊傳僧曇猷暑行至此以鐡錫拄杖卓石取風故名今其蹟尚存赤城志卷二十二
