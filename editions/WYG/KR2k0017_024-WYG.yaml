body:
  text: 赤城志巻二十四宋陳耆卿撰山水門六水黄巖永寧江源出縣西北三百四十里按舊志有大小二源大源出塵山東南流廣一十五里二百一十里至左溪村小源出黄巖山東北流廣五歩一百里至大溪與大源合然平淺不通舟又東流三十里至官奥村無灘磧直下永寧江廣逾百歩又東流一百里從縣北過三十五里㑹臨海縣海口入於海從源至海水程四百八十里寰宇記稱東山北臨永寧江謝靈運嘗登焉運靈有望海詩云開春献初歲白日出悠悠蕩志將愉樂瞰海庶忘憂策馬歩蘭臯緤鞚息椒丘採蕙遵大薄搴若履長洲白華縞陽林紫翹曄春流非徒不弭忘覽物情彌遒萱蘇始無慰寂寞終可求陳與義詩云宴坐風前衝雨急黄巖縣𠂻借舟遲百年癡黠不相補萬事悲懽豈可期莽莽滄波兼宿霧紛紛白鷺落山陂只應江海淒涼地欠我臨風一賦詩縣河在縣郭由官河東出支而為流者五深廣眎官河出慶善坊者舊大寺巷至寺門而斷出叢桂坊者半民居而斷出孝行坊者踰華嚴閣西而斷出奎文坊者則入前洋而西逹於浦惟出景賢坊者處五河之中過錢家橋而北直郟家橋永寧橋分為别流西匯於城隍祠下則經於縣治之前又北抵於夀寧坊則經於縣治之後復南流與縣前河接環抱縣圃西㑹於洪家巷以逹於江官河在縣東南一里自南浮橋南流至嶠嶺一百三十里陸程九十里廣一百五十歩又别為九河各二十里支為九百三十六涇以丈記者七十五萬分為二百餘埭其名不可殫紀綿亘靈山馴雉飛鳬繁昌太平仁風三童永寧八鄉溉田七十一萬有竒舊建閘一十有一以時啓閉其𨽻仁風者曰常豐清混斗門𨽻飛鳬者曰交龍𨽻靈山者曰鮑家歩長浦𨽻繁昌者曰周洋回浦永豐黄望金青其區畫之詳昉於元祐中羅提刑適廣於淳熈中勾提舉昌㤗既而李謙李大性踵將使指又重修焉役大費鉅至煩朝廷撥封樁降度牒以附益之規模閎逺矣彭殿撰椿年為之記黄巖溪在縣西一百里源出黄巖山前所謂小源者也其濵有黄石五區如相拱揖云孫應時詩云得雨溪聲壯終風雲氣多山花依翠竹灘石亂寒莎樵父谷中出牧兒牛背歌逢人問塵世擾擾意如何三童溪在縣西南三十里源出三童山東流一十八里入永寧江日溪在縣西六十里古號新城西北有小谷曰金玉彎横溪在縣南九十里白龍潭在縣東一十里方巖其穴有三大僅如甕常有雲氣罩之居人見龍出入因其色白故以名潭嘉祐初禱雨未騐夜分有大呼於野者曰龍巳居西矣旦以䟽投西潭一蛇躍出烈日飛雪繼之以雨歲大稔白塔潭在縣南四十五里土人常見龍出入舊傳潭在山頂廣不盈尺牧童續蔓墜石累十數莫能測俄大雷雨羣兒驚走翌日過之已失潭所矣嘉定十一年里人禱之巖鏬水流如線忽有小鼈從旁竅出盛之以歸既而大雨方山潭在縣南一十七里一名金鵝俗傳舊在吉墺山有金鵝自潭飛出逾五里止於方山隅竟夕風雨雷震旦視則為湫矣霧露潭在縣東南二十里下有泓水深僅尺許每欲雨則雲氣直升或如靄霧紛凝則數日方雨雙魚潭在縣西南三十里砂歩佛嶺俗傳有雙魚各尺餘金色從溪逆上漁人網之不得竟入石巖下有一小坑湧水成潭每禱輙應湖師潭在縣南三十里舊傳有巫家女嘗浣紗溪上為龍捲去其屍乆不出後有漁人云見一女乘龍自南海升天遂以名潭每欲雨則有雲霧畫潭在縣西五十里山如餅爐潭居底旁無通蹊將詣潭必從上而下嘉定八年不雨權令陳逵將投鐡簡而雷發潭中有五色雲出焉俄大風雨赤頰潭在縣西五十里亂山中龍出入必大風雨故近山無居人旁有大木皆無膚葉父老言有龍黒身而赤頰遂以名潭晉源潭在縣南八十里百丈巖側相距一澗水常洶湧中有巨石如斗欲詣潭則俯循牛背以度歲旱致禱或雷聲發於潭底則大雨隨之柵眉潭在縣西九十里栢都洞南恠石壁立過者悚慄年豐則有雲氣覆其上雖炎日中不散歉則否三井潭在縣南九十里穴恠石上龍出入則雲氣蓊然又縣西北一十五里地名錢本坑下有井如品字亦號三井潭藏雪潭在縣西北一十里即鳴山之鳴川潭舊傳五六月間積雪不消遂更今名米篩浪潭在縣西五十里四面多恠巖雖無風而水常有浪如米篩紋云聖巖潭在縣西六十里日溪側有瀑布自北山注潭中上有石可宴坐靈龜潭在縣西六十五里求仲弓詩云江潮雖濶多罾網幽澗清虚且勉旃待我功成買雙鶴歸来伴汝一千年樓﨑潭在縣南七十里每欲雨則雲遶半山土人謂樓﨑尖褁㡌云寒坑潭在縣西一百三十里兩崖夾山為澗時有黒風自潭出每禱乘木筏以入㣲不謹則有驚怪靈巖潭在縣北一十里靈巖下戚五娘潭在縣西北一十里横山潭在縣西北一十五里岱石潭在縣西南一十七里石大人山側望海尖潭在縣西三里靈石山北巔夏烏潭在縣西南六十里夏烏山側圎巖潭在縣東南一百二十里松門山天賜湖在縣東南五十里阻浪山下水極清泚歲旱溉田千頃故老相傳以為不假浚鑿天實賜之横湖在縣東南八十里百丈巖下凡東南溪流三十有六皆㑹焉消湖在縣東南九十里五龍山北溪口湖在縣南一百一十里源出王城山東北流入浦茭池在縣南三里中有石塔泉與鉄米篩井通僧浄真溝之入市今塞矣大澤塘在縣西北四十里瑞巖山上僧慈保即一大壑為之下絫石上築以土旁為十門分數道以逹於田錢叅政端禮題云塵纓乆欲濯滄浪今日来逰大澤塘水似我心心似水更無一事可商量石井在縣西九十里栢都洞下上有石穴如舊圎而深雖刋鑿之巧不如也水自山流注旱澇如一一日牧童續蔓墜石探之莫測其深有木葉墮其中旋自其南龍湫流出意其下相通云常樂寺井在佛殿前大旱不枯慶元二年大雨溪溢水及寺半壁忽於井處作大盤渦撮水入焉湏臾見平地鐵米篩井在縣東三里九峰寺南源自山出其行如溝入井處僧以鐵忩限之故名米篩邑人皆汲焉令常濬孫榜曰不竭泉且亭其上魯神井有三在縣東五里魯神廟側一在神像下不可汲二在廟後回環皆巨木葉墜獨不入井中人以為異委羽井在縣南五里洞南百歩深不二尺旱澇不損益其味甘尤冝釀酒甘露井在縣西八十里浮山寺舊傳有西僧講仁王經而甘露降故名泉宜造茶古漩井在縣南三十五里平陸中鎮頭山井在縣東南五十五里清可見底味尤甘水簾在縣東八里箕巖側派流甚廣以其飛㵼如簾故名滴水灣在縣北一十里自馬鞍山滴水成灣甘潔可愛東監水在縣東南五十里自監山東流一十里僅勝十石舟又一十五里入官河水眼在縣東南五十里泥奥山下廣僅如盆深不滿三尺大旱時隨汲隨滿人頗異滴滴泉在縣西北四十里瑞巖舊傳有如意道人者居之嘗絶糧神氣不减庵前有泉泓潔可愛令王然作頌有庵前滴滴泓泉水流出心源嗣祖風之句遂取以名智者泉在明覺院非溪非井但於叢林根有小竅挿以筠筒引至石槽晝夜㸃滴不絶上槽既溢流及下槽其水僅供緇流一日之用無餘無欠天台大溪在縣西南五十歩源出婺州東陽縣以其受始豐天台桐栢之水故名順流而下凡一百一十七里至州始豐溪在縣西南百歩源出大盆山東溪一百八十里與天台桐栢二水合始入大溪青溪在縣西五里源出天台山南流至桐栢又南流三里經三井下流為瀑布方南入大溪按謝靈運登臨海嶠詩云旦發青溪隂唐𤣥宗送司馬承禎詩云青溪祖逸人皆作青字俗呼為清者誤楢溪在縣東二十里孫綽賦所謂濟楢溪而直進是也杜甫詩亦云飢拾楢溪橡徐靈府記注云楢溪源出華頂從鳯凰山東南流入溪則得名舊矣或又名歡溪齊顧歡嘗居焉靈溪在縣西北一十五里福聖觀前孫綽賦所謂瀑布飛流以界道過靈溪而一濯是也今縣東二十里亦有靈溪盖其名適𩔖云乾溪在縣南一十五里舊傳僧曇猷訪赤城有一媪與之語神怒投媪於淵猷飛鍚救之其溪立涸故以為名神迹溪在縣東北五里與國清溪共流至神迹廟分支一入臨川橋一入孝義橋左溪在縣西三十里夀昌路上與闗嶺接委蛇曲折凢七十里至大溪福溪在縣北四十里按晋束晳啟蒙記注天台山去人不逺路經福溪水險而清盖是時已有此名矣折溪在縣東北五里舊經作浙溪國清溪在縣西北一十里流九里入大溪玉女溪在縣西北二十五里桐栢觀前界溪在縣東四十里一名介溪羅木溪在縣北六十里羅公嶺東南水母溪在縣北一百里摘星嶺南赤城溪在縣西北五里入大溪南㠗溪在縣西北七里響山溪在縣東一十五里幽溪在縣東北二十里浄明院前闗嶺溪在縣西四十里惠濟潭在石梁下嘉泰初禱雨現異黿四年夏雷雨涌出金銀藏錢圎徑六寸餘文曰太平通寶實太宗朝賜以鎮潭者側有佇真亭百丈潭在瓊臺雙闕間翠蔓蒙絡水聲潨然盤澗繞麓入為雲溪云靈澤潭在縣東四十里舊名蒼山三潭列其下深廣瑩徹其龍最靈嘉泰元年禱雨現異蛇石蟬潭在縣東五十里小溪亂石中水深無底其靈眎靈澤潭金橋潭在縣西北一十五里水清徹可鑒旱澇不損益深坑潭在縣南二十五里筋竹嶺側瀑布潭在縣西南三十五里無相院側一名戲龍河𦙍潭在縣西七十里下上雲雨土人敬事之雷馬潭在縣西九十里雷馬山上鼻山潭在縣西一十五里莫婆潭在縣北一十五里丹霞潭在縣西北二十里翠屏潭在縣南三十里泉湖在縣西五十里茅君傳云霍林司命治赤城玉洞之府齊永明中忽冇羣鵠從西北來下集霍門溪谷填塞彌蔓數里多所蹹籍狀如為物所驚一夕退飛向西北去殆是赤城上都泉湖中物也始豐湖在縣南四十歩今為大溪水衝壊併為一矣降真塘在縣北二十里徐靈府記云桐栢觀前一里石壇前有塘名降真中植荷荇今自塘一里出洞門西峯即王真君壇也三井在縣北二十里昭慶院東唐時嘗遣使投金龍白璧舊傳為尼所觸一井自塞其二深不可測每春夏時雨則衆流灌注激湧雷吼或云通海又云海眼李郢詩所謂三井應潮通海浪是也咸平中醮祭投龍夏英公竦銘云石鏬山半三井如鑿員不可規深不可度亂澗四入飛流外落墜石不盈驕陽不涸冷激松檜碧混崖崿山靈所衛神物攸托簫鼔一鳴雷雨偕作湧泉在縣西一十五里巖泉在縣北六十里龍鬚泉在縣西七十里龍鬚洞口以其噴薄如龍鬚之布故名赤城志巻二十四
