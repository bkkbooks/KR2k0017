body:
  text: 赤城志巻四十宋陳耆卿撰辨誤門魚魯豕亥之訛自昔病之而况山川地理之大乎近之為碑刻逺之為載籍紛茸厖雜與麻葦俱甚至先後佩劍彼此立㦸有未易判者余旣循其本自釐而正之矣他未遑暇也兹巻本出陳維余愛其辯博可据因為裁次附焉其間正誤質殊有本有末有徙而屬他郡者有訂而歸吾土者覧者詳之亦足以知談今之易而考古之難也噫於是此書粗詳且備矣列子載黄帝遊於華胥氏之國在弇州之西台州之北不知斯齊國註斯離也齊中也幾千萬里盖非舟車足力之所及神遊而已張湛註云不必便有此國且引淮南子語以為正西曰弇州西北曰台州舊經因之遂謂台之得名其来自古不知以台名州實肇於唐之武德因天台山爾且在東隅亦非西北列子淮南皆一時寓言無庸援以為據陸長倩題廣軒詩云為是㑹稽東郡國不教更號小蓬莱郡國志永和三年以章安縣東甌鄉為東部侯國東部元理回浦後屬㑹稽四浦鄞地㑹稽越地元鼎五年嘗立東部都尉冶光武復改回浦曰章安以冶立東候官通典云東部臨海是也陽朔元年徙冶鄞或有㓂害復徙冶句章臨海雖東部侯地然則亦屢徙矣諸説皆云東部惟顔師古注漢地里云回浦南都都尉冶未知孰是漢書元封元年東越降帝以其反覆遷之江淮間虚其地為冶縣顔師古注冶縣曰本閩越地注回浦曰南部都尉是也宋志乃引司馬彪曰章安故冶地則臨海亦冶地乎然冶本屬閩故髙帝時以無諸都之無諸既都冶而摇都東甌自是兩處若置冶縣豈於東甌界中又治閩閩去臨海一千二百里若嘗置縣在此則前漢表縣大率方百里安得一縣如此之逺况冶縣改為章安續又分章安南為永寧不應永寧介乎其中南北斷為兩境皆名冶縣雖後漢至吳多指東越之地為東冶實稱㑹稽故其治有東冶山亦非今臨海也舊經序云光武時始改回浦為章安置臨海縣屬㑹稽郡按吳少帝太平二年方分置臨海何由光武前二百年而置之乎又云吳太平二年分章安立羅江按長樂志改章安為羅陽在建安二十三年而吳太平二年亦但分羅陽等縣屬臨海郡時則有羅陽王表見於吳紀非羅江也又云晉太康四年以羅江屬晉安郡按長樂志載晉太康三年始以侯官為晉安郡領縣八羅江在焉至宋有晉安太守領縣五羅江仍與則舊經謂晉太康間羅江屬晉安雖得之若言立於吳太平中則當作羅陽豈得言羅江哉羅陽今温之瑞安元隸臨海故房元齡晉書地理志臨海郡呉置統縣八無羅江縣舊經云呉少帝太平二年分章安地置臨海縣又分章安地立始平永寧松陽安陽羅江合七縣立臨海郡按分章安置永寧在永建四年分二縣地置松陽始平在興平四年析永寧立羅陽在吳赤烏二年凡置五縣皆不在少帝時今云太平二年方立合而為七此盖不考之過今㑹稽志但云太平二年分章安始平永寧臨海羅陽松陽六縣屬臨海郡謂之分則舊經以為立非也然則少帝時所領止六縣耳晉地理志雖云又置臨海郡統縣八然改始平曰始豐羅陽曰安固分安固曰横陽析永寧曰寧海實在晉時豈得謂之吳置耶唐地理志云武德四年置寧海今以晉志考之臨海郡所統縣八寧海已居其中安得謂置於武德四年也按寜海置縣自晉武平吳王濬以兵徇地請以鄞八百户臨海之地二百户為之今白嶠是也至隋開皇九年平陳廢縣入臨海郡唐武德四年改郡名台州復置縣今海游是其處七年復廢至則天永昌元年復置遷於廣度里則今縣治是也故寧海剏自西晉以迄隋唐凡兩廢三遷然後定夷考顛末殆是晉武帝剏之唐髙祖與則天乃起廢者耳唐地理之説非也又寧海令髙述作縣學頌云濵海之西台阜之東有漢古縣屢遷儒宫寧海為縣既方剏於晉武而髙以為始於漢又大誤矣黄巖古之永寧縣今考其地曰鄉曰江曰驛曰山方山舊曰永寧山皆名永寧又瑞巖寺住持碑并古碑後序資福院佛殿碑皆曰台之永寧縣存本名也永寧置縣始漢永建四年至呉以孫琳為永寧侯韓晏為永寧長盖此地也今永嘉本古永寧縣分置故永嘉志云晉明帝太寧元年分臨海之嶠南永寧立永嘉郡孝武寧康二年又分永嘉郡之永寧置樂成縣隋開皇九年平陳郡廢改永寧為永嘉縣隸括州大業初郡復置縣仍屬焉唐武德五年以永嘉縣置東嘉州領永嘉永寧等縣貞觀元年州廢省永寧隸括州然則永寧盖嘗屬温與處矣黄巖雖古永寧而古永寧地廣今之永嘉樂成皆其地也自晉分臨海嶠南為永嘉地始屬之嶠南今之嶠嶺與樂清分界唐上元二年始分臨海縣置永寧縣至武后天授元年更名黄巖然則古永寧甚廣今之黄巖特上元間分臨海而置耳天台山賦云濟楢溪而直進落五界而迅征吕向注但云五界峻道名濟此險阻經峻道而疾行也惟李善注此獨云五界五縣之界且授孔靈府㑹稽記曰此山舊名五縣之餘地謂餘姚句章鄞剡始寧此説是也然登真隠訣謂大小台處五縣中央五縣謂餘姚句章臨海天台剡縣則與善所注㣲異今兩存之舊志載張遼為盪冦將軍陳簡梅成叛太祖討之簡入山中有天柱山遼遂進軍斷簡成首太祖謂功曰登山履險遼之功也増封假節按臨海之延恩寺後天台之縣西雖皆有天柱山而遼未嘗進兵至此舊志果何據而云乎今㑹稽縣宛委山一名天柱臨安亦有天柱山不應便指為台之山也夏英公為倅日作延慶院記云臨海濟靈江而西越萬歩至括蒼山與真隠山並間有垂流千仞潄石成淵蛟龍宅之按舊志真隠山在臨海縣西南十五里本名括蒼山又名天鼻唐天寶中改名真隠則括蒼即真隠英公析而為二非也孫綽天台山賦有云䕃牛宿以曜峯託靈越以正基盖言天台山據越地之靈而正基址爾非專以靈越為台山也江總修心賦曰喜南斗之分次肇東越之靈秘又晏元獻石氏山齋詩云書僊十闋壯儒宫靈越山川寶勢雄以是攷之則㑹稽本名靈越非止台也㑹稽志載天姥山在新昌縣東南五十里東接天台華頂峯故李白天姥歌有天姥連天向天横勢㧞五嶽連赤城之句然郡國志載天姥山乃在臨海郡山嶠與括蒼山相聨或云在越或云在臨海疑此山綿亘相延故二處皆有之然臨海記但言此山在臨海按舊經運羌山亦名天姥山在僊居縣東連括蒼且云石壁有刋字如科斗春月樵者聞笳簫之聲與臨海記同則天姥山又僊居之韋羌山也真誥曰越有桐柏之金庭今剡縣金庭館乃沈約造本觀記云約定居桐柏嶺建館曰金庭則是剡之金庭亦號桐柏也今天台縣洞宫以桐柏名始於唐景雲二年司馬承禎所置而寧海縣之西南亦有桐柏山連天台山故神邕天台山記力辯云從極東至寧海界有桐柏山其狀髙峻道士司馬承禎云瀑布山頂是桐柏山因置觀不知山固在寧海也又太平寰宇記云在寧海西五十里今其地猶有桐柏里是剡縣天台寧海皆有桐柏然道經云越有金庭桐柏與四明天台相連真誥又云桐柏山在剡臨海二縣之境一頭在㑹稽東海際其一頭入海中然則山之綿亘如此三邑接境宜皆指為桐柏也陶𢎞景真誥云天台山髙一萬八千丈李白夢逰天姥歌乃云天台四萬五千文對此欲倒西南傾疑不同也又國清寺在縣北十里長松夹道翠緑縈紆故賈島送僧歸國清寺詩石澗雙流水山門九里松張祜逰台山詩盤松國清道九里天莫覩至李白詩乃云天台連四明日入向國清五峯轉月色百里行松聲百字合作九字豈傳之訛耶蓋竹山為洞天福地今婺之東陽温之樂清台之臨海黄巖天台皆有之東陽志云在縣東南三十里泗渡澗之南巖有石室三間號為蓋竹福地樂清志云蓋竹山去縣二三里後山絶頂有巖洞可環坐數十人俗名楊八洞七十二福地圖云第二福地盖竹山在台州黄巖縣玉清璇極洞天圖云第十九盖竹洞周回一百八十里在台州黄巖縣而天台志云舊傳石梁側有盖竹洞天何公持節澄按嘗夢遊其地後邑宰窮探得之洞深可三丈餘中有二峡觀諸志所載不同詳攷是山實在臨海縣東三十里地名長石故塵外記以為山在臨海有洞周回八十里僊人陳仲等居之而輿地志亦云臨海郡之章安縣西北有盖竹山山有石室晉許邁住此以此觀之不在他處明矣唐守仲友記云山經地志盖竹山皆寓台之黄巖今在郡城東南三十里介臨海黄巖間雖謂之在黄巖可也玉京洞在赤城右脇盖十大洞天之第六周三百里見登真隠訣及名山福地記然㑹稽志載越之諸暨亦有玉京洞呉處厚題云秉燭携笻却歩前玉京迢逓訪神仙四時自有壺中景一罅都迷物外天洞在天台不應又在諸暨及考徐靈府小錄云其下别有洞臺方二百里南馳縉雲北接四明東距溟渤西通剡川台越既接境而洞之廣復如此疑相通也謝靈運有登臨海嶠初發彊中作與從弟惠連詩五臣文選注但云臨海郡名彊中地名其實彊中在剡縣非郡境也彊強同音故剡中今稱强口市盖近彊中也强口者去剡一十五里其溪水尤紺澈可愛世傳王謝諸人嘗以雪後泛舟至此徘徊不能去今㑹稽志巳載此詩矣謝靈運遊赤石進帆海詩揚帆采石華掛席拾海月即其地也是詩巳載樂清詩集矣今復載之天台集可乎按靈運名山志云永寧安固二縣中路東南即是赤石永寧雖今之黄巖在靈運時已分於永嘉而安固又今之瑞安也又按顧野王輿地志云樂成縣西北有赤巖山赤水所出道書云其山正赤一名燒山又曰赤山正對臨海縣南與永嘉接石映水通赤有石室從柟溪東北入樂成今温之樂清也然則所謂赤石者殆不在天台矣郡倚山瀕海易以捍守自晉唐間嘗經孫恩袁晁裘甫劉杜之擾至本朝宣和復罹睦冦餘孽故五邑聚落往往以城砦營柵屯戍得名如臨海之新城城門黄巖之漢城古城建城莆林城孫恩城寧海之堠城則以城名如天台之始豐寨壽昌松門闗嶺等寨則以寨名寧海之柵墟黄巖之柵嶺柵浦臨海之柵橋柵村則以柵名又如大郭營之在臨海其地至今有方將軍廟相傳舊立營於此有上營下營之名大營前之在寧海女營之在黄巖營在栢都有潘大夫廟舊傳晉人嘗攻賊於海島遂血食其地則以營名黄巖有戍浦村戍浦嶺郡城東十里有屯頭則以屯戍名也􅤤洋在縣東南五里今名下洋乾道之火郡人營造鄉民坎土入城市之下有魚網敗舟之屬疑此地舊嘗為江也宣和間居人有獲壞碑者曰唐龍紀元年處士李罟𦵏於􅤤洋之濵則知得名久矣黄巖屏山之南有墺曰晉墺湖曰晉湖山曰晉源相傳晉王之裔嘗居此故名按山半有明覺寺寺有小碑曰晉王遊適之地則又非其裔矣大抵昔人遊行之地後人思之故因而得名不記其始耳如臨海之招賢洞有晉潭殆亦此類又寧海梁王寺梁王墓舊傳為梁王詧而王亦未必至此黄巖有墺曰徐墺山曰徐山或云徐偃王之廟或援古建台州記云地主任氏女感闕精而生男有文在其手曰徐因號東海闕徐闕長竊據自號徐王死𦵏此山其言不經殆未可盡憑也㑹稽志載司馬悔橋在新昌縣東南四十里闕唐司馬承禎隠天台山被召至此而悔因以為名竊謂此橋當表而出之以為闕為悔曰司馬悔橋闕七籖載司馬悔山在台州天台山闕地李明僊人所治之處山在天台新昌闕故橋以山得名有過客題詩云道書司馬悔福地在天台兹山秀盤古億載青崔嵬如何越中志紀載殊未該浪云唐子㣲曽過兹橋来奉詔悔輕出欲勒俗駕回至今名字存脩梁架巖隈圖諜已大戾土俗尤疎哉以悔為晦名大字標版牌流傳愈訛舛雲笈君試開讀此詩可見其槩矣壁紀載曹𢎞達天祐十年到任繼之以孫琰天祐十四年張從保天祐十七年錢鎰天祐十九年今考之唐史天祐乃昭宗末年紀號至哀帝不改舊號終於天祐四年而止是年禪位於梁梁改元開平凡四年又改乾化凡二年固未嘗有天祐至十九年者而壁紀所記如此詳思之唐末錢鏐據有吳越唐政既出於梁故錢氏但循唐之紀年不改舊號臨海又其所隸故郡守更代亦止用唐正朔故書天祐至十九年也然通鑑所載則有可疑梁紀載開平初但云是時惟河東鳯翔淮南稱天祐西川稱天復餘皆稱梁正朔又云是年以鎮海鎮東節度使錢鏐為吳越王則錢氏盖受其封拜用其正朔矣觀壁記所述乃用天祐至十九年而不易其心不忘唐如此哉魯洵作杜雄墓碑稱雄字昌符京兆人徙台與劉文起事劉知明州因人之欲請主郡政㢘使承制加御史大夫明年兼大司憲轉左貂錫以竹使符詳攷其辭則是劉文自使之守郡後方本道畀之郡符耳又云光啟三年加工部尚書是秋遷刑部尚書今聖嗣位盖昭宗也嘉其威武謂執政曰寰宇方擾獨海郡有武不用非以德行化乎因命以德化為軍號文德元年加兵部龍紀初加右揆大順初加左揆乾寧二年加司空乾寧四年冬十月卒今壁記載杜雄中和三年到任至乾寧四年方稱駱團繼之殆與洵所製碑合攷之唐史紀年則雄在郡首尾凡十五載然洵乃雄吏其辭自稱門吏德化軍廵官魯洵則誌文未免失實且言語淺俚無足觀又一事可疑其云中和三年太守劉公改刺四明雄主州事而唐書僖宗紀云光啟二年十二月丙午台州刺史杜雄執劉漢宏降於董昌資治通鑑中和元年云臨海賊杜雄䧟台州光啟元年台州刺史杜雄誘漢宏降執送董昌斬之唐書稱執漢宏事在光啟二年十二月而通鑑稱元年年既不同而五代史九國志所載殆是漢宏因錢鏐為董昌取越州故奔台州雄執之以送昌非漢宏降雄也通鑑少誤檢校尚書工部郎中前兼台州刺史李師望大中十四年三月十七日凖詔領義成武寧兖海宣閏等道兵士一千七百人乗馹赴任討除草賊至其年四月二十三日戰於天台觀前其日收復唐興縣自此六戰斬首四千級招降九千人至九月方平寧咸通三年罷郡九月十一日北歸因留題以上皆師望自紀見於桐柏觀元稹碑隂觀其所刻盖捕裘甫時也裘甫衆至三萬有劉暀劉從簡輩頗勇焚掠城邑聲振中原王武為浙東觀察使請兵以行懿宗詔發忠武義成淮南等道兵授之浙東軍連戰不利故師望分統此兵方克奏㨗然師望所刻作大中十四年而通鑑以為咸通元年盖懿宗即位於大中十三年八月改元必在次年逺方自稱為十四年雖咸通三年所題仍舊號而史家書法只以改元標於即位之始年故也後六年師望以鳯翔少尹請分蜀建定邉軍遂為嶲州刺史台州天慶觀有唐開元真容應見碑盖開元二十九年立也後題朝散大夫使持節臨海郡諸軍事守臨海郡太守賈長源及桐柏觀碑天寶元年立則作朝請大夫使持節諸軍事守台州刺史上柱國賈長源此一人耳所載官稱及郡號不同如此盖嘗攷之唐至天寶元年改台州為臨海郡至乾元元年復為台州不應開元二十九年便稱臨海郡天寳元年却稱台州又唐自武德元年改郡為州太守為刺史加號持節後為使持節諸軍事至天寶元年復改刺史曰太守亦不應開元二十九年已稱臨海郡太守而天寳元年既改作太守復號刺史非二碑之誤則史之誤也舊經以千姓編云蕢雲陶唐時居白鶴觀遂冠之僊隠門非也按靈笈七籖女僊傳稱徐僊姑徐之才之女咸通初謂剡縣白鶴觀道士蕢雲陶曰我先君仕厯周隋以方術聞剡縣即今之嵊縣錢氏以剡字兩火一刀不祥改為嵊然則蕢雲陶非在台之白鶴觀舊經誤矣曽守幾作遺直堂詩力辯孔文仲為州推官非為司戸文仲曽舅也故公序其事云或云孔公應制乃台州司户叅軍非推官也幾謂公為舅知公所厯無疑試問其説則曰實録㑹要云爾幾曰是固書之少誤州有公所譔修城記曰從事有天台詩集有浮碧軒榜有官文書皆曰推官可覆視也或曰安知不嘗為司户乎曰公之墓誌丞相蘇公之文也一命試秘書省校書郎杭州餘杭尉再調南康軍司理昇台州軍事推官對制䇿趣還本任未嘗為司户也舊傳危樓髙百尺手可摘星辰不敢髙聲語恐驚天上人為楊文公㓜時詩邵氏聞見録又云舒州峯頂寺有李太白題云夜宿峯頂寺舉手捫星辰不敢髙聲語恐驚天上人前二句既不同而其説復異今天台華頂峯有孟觀詩云偶因華頂宿擡手摘星辰不敢髙聲語恐驚天上人盖華頂一峯天台山之最髙者故觀詩有此語今峯傍有摘星嶺因詩立名則前所指為太白文公語疑好事者改之爾赤城志巻四十
