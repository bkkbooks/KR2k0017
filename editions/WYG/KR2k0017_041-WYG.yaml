body:
  text: 今天下郡縣皆有紀錄台獨為闕典問之故府則知前乎此者盖嘗㑹稡而踈畧未備也碩承乏之初固竊有志而事方有所未暇越明年歳以稔告郡家粗可支吾於是命郡博姜君延集人士相與討論而屬筆於篔牕陳君閲數月而後成書吾州在浙左為佳郡讀孫興公一賦則知山川之美實甲東南况自晉唐至今前後曳組于此多一時名勝士至于騷人墨客搜竒抉秀皆班班可考然則是書之作豈特可以補職方氏之闕雖山川人物亦將由是而發揚呈露於天壤間其為益於台也深矣嘉定十六年郡守青社齊碩書成化丁未余始得是志於秘閣中遂手録以出於是故亞卿林公鶚黄公闕皆從余本而翻録之盖是志作於宋嘉定中至是幾三百年其藏之民間者葢鮮克見念欲因此閣本特存其舊以廣其傳未能也去年秋太守陳公相以郡志屬余重修因訪得東門周氏本未幾拙訥葉先生之孫定中亦以其家所藏者来告盖皆嘉定刻本也嘉定後不十年又有所謂續志三志者續志雖存而其所載無大闗渉三志則并其本而亡之故今祗取閣本叅二家而校之大抵二家者行欵雖無甚異而視閣本則又有不同矣盖其時所刋者各自有此三本因得彼此互訂以從其是太守公遂取而重刻之與新志並行於是一郡之因革顛末皆可考而見也噫公於吾台之文獻其用心不亦勤矣哉𢎞治丁已秋八月八日郡人謝鐸識於方巖書院
