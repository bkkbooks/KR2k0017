body:
  text: 赤城志卷二十宋陳耆卿撰山水門二山黄巖委羽山在縣南五里俗號俱依山東北有洞世傳仙人劉奉林於此控鶴輕舉嘗墜翮焉故以為名按登真𨼆訣真誥皆云委羽山天下第二洞號大有空明之天又十大洞記委羽山大有空明洞在黄巖縣南數里即大有真人之所治焉一云青童君主之又雲笈七籖載司馬季主携其子女𨼆兹山鮑叔陽段季正亦於此得觧化之道則其為仙窟舊矣地所産石無大小百碎皆方正有稜以煑湯可愈疾其前有道院丄蔡謝伋記云台州黄巖縣西五里有山岡阜連属草木茂宻其洞曰委羽父老相傳數十年前常有青衣童子戯洞口居人以滓穢溷之童忽因不見紹興中有石城使君李侯端民令兹邑暇日勸課農桑至其處始擇道士董大方主之稍給香火𤓰華之用大方以符水治疾病輙即愈邑人重之以是二十年間堂殿門廡髙明靚凈庫􅌮湢浴具體而有始變荆榛為勝地按大洞記甌粤之間大海之涯地産方石真人劉奉林所居也奉林嵩髙逸士避周季世棲焉控鶴輕舉墜一大翮人名其山曰委羽伋寓居三童山鐘皷相聞嘗一冄至及守縉雲大方遺書求文記其事復曰我本山林人主郡非其好也盍俟歸及使浙右又以書來曰公又渡浙而西矣歸其寧可以日月兾哉且𢎞農寓公重道相悅欲成兹事許列銜石上矣敢固以請乃序而為之銘銘曰昔有仙人􅆗金刀鷄犬同升記阡陌九臯聲聞至今存上天下天曽委翮仙人一去㡬千載閱世真同駒過隙長官好事經李侯大洞主人親推檡穹隆堂殿復一新照映林巒非夙昔寓公耆德上清都豈有他楊畢兹石碧落侍郎寜復來葉令飛鳬塵㡬隔太一青藜倘可尋去共研硃㸃周易杜元庭詩云窅然靈岫五雲深落翮標名振古今芝术迎風香馥馥松檉蔽日影森森從師只擬尋司馬訪道終期謁奉林欲問空明竒勝處地藏方石恰如金左緯詩云委羽不知何處是倩人扶上木蘭撓欲尋去路花梢宻争認行雲酒浪揺流水忽如山脚轉洞天疑把杖頭挑逡廵不覺東風晚始有仙人弄玉簫扄王十朋詩云龜山軟翠日開屏羽客逍遥此閉早起留雲閑放鶴夜來伴月靜㸔經巖前方石有多好􅍳裏丹砂且是靈應有赤城鸞鳯過一聲長嘯入青𡨕王城山在縣南七十五里石累疊如城本名方城山王羲之遊西郡記云臨海南界有方城山絶巘壁立越王失國嘗保此山天寶六年改今名俗又呼方巖中有漁翁巖石柱峯仙人濯足灘鷄母石石棊盤平霞嶂露臺石仙棺巖牛脊隴水簾谷至平曠處可百餘畆有力者墾之號仙人田五龍山在縣東南一百里東連大閭山臨海記云五龍山脊有石聳立大可百圍上有叢木如婦人危坐俗號消夫人父老云昔人漁於海濵不返其妻携七子登此山望焉感而成石下有石人七軀盖其子也今人或曰石夫人山或曰消山盖石夫人在其巔消山在其足其實一山爾又按輿地志消山南下有消夫人寰宇記臨海縣消山北湖隂蕭御史廟有石孤聳如婦人狀則御史廟與石夫人不逺矣然則二書謂消山消湖而今或謂蕭山蕭湖不亦誤歟黄巖山在縣西一百二十里一名仙石山有路可通郡今廢按臨海記山上有石驛三面壁立俗傳仙人王方平居焉號王公客堂南有石歩廊又云山頂有黄石故名東鎮山在縣東二百四十里臨海記云洋山東百里有東鎮大山去岸二百七十里生昆布海藻甲香礬等物又有金漆木用塗器物與黄金不殊永昌元年州司馬孟詵以聞中有四墺極嶮峻山上望海中突出一石舟之往髙麗者必視以為凖焉永寧山在縣東五里舊志云因古縣而名巖壁峻峙四望皆方正故俗號方山舊傳僧懐玉於此飛錫落臨海任氏家山下有亭夾岸梅花相續十餘里不絶三童山在縣西南一十七里舊志云山有三峯各髙十餘丈逺望似童子香積寺記云昔有三童子出没其側迹之皆化為石故以名山按寰宇記云山在臨海今實黄巖也靈石山在縣西五十里與烏巖接以甘露降名甘露山按臨海記云山上有寺當孫恩叛毁木為船石從空自墜賊以傷去故號靈石或云此石自西北飛至故名三􅡲山在縣西六十里初至下􅡲則兩山夾一水而入其勝處號雲荘風磴俗傳仙人奕棊其上至今苔蘚不侵次至中􅡲二里許两石蹲踞號石門其前巨溪洶激中石柱屹立人謂有龍蟠焉紹興間一夕大風雨龍見石忽摧折今所餘猶數十尋又四里即上􅡲有洞空闊尤勝大率三􅡲之勢髙下皆可觀而田疇實少居人以造楮為業云岱石山在縣西南一十七里西北角有巨石挺立𩔖人形俗呼為石大人又有一石横前如櫃號石櫃山今其村號石櫃村又號岱石村鷄籠山在縣南二十五里俗傳星月晦㝠則光起燭天一日天隂忽晶采晝見視之則金寶滿山人往取之輙皆滅没故老呼為許公藏丹崖山在縣南四十五里崖石俱赤有金銀星焉世傳仙人煉丹於此故名有池深可尺餘羣烏浴其上俗名老鴉井或又曰煉丹井屏山在縣南八十里其東西二石聳立如屏故名東屏挺立無倚有古藤纏絡之冬寒不凋西屏因風雨仆為二矣盤山在縣西南四十里王詹事十朋詩云一嶺迢迢十里賖行人半日踏烟霞盤山遮莫盤千匝歸夣何曽不到家烏巖山在縣西四十里以中多烏石故名相傳其巔有廟云鳴山在縣西二十里旁有龍湫每遇旱致禱必聞飄風驟雨之聲白塔山在縣南四十五里舊傳上有石塔遇晦則晶采旁燭土人恠而撤之利墟山在縣西北五十里其水出利墟浦南入永寧江阻浪山在縣東南五十里其隂距海浪起時藉以為阻故名夏烏山在縣西六十里按舊經山之神名烏人至此稱烏字輙為蛇􅚣所嚙舊有龍湫在山要于浦鎮巖山在縣東南六十里中多竒怪有大石壁髙廣四丈顔真卿姓名刻焉浮山在縣西六十里特起田間四無聨屬俗傳一夕風雨浮至故名樓山在縣南六十里以其巔岩石突起狀如樓閣故名樓﨑山在縣南七十里極雄峙海舶視為向背下有石米通明如雪相傳有異人嘗飲啄焉龜巖山在縣東南七十里以其巔有石如龜故名下有井泉常白色獅子山在縣東南八十里上有石庵方廣五丈髙六丈五尺修鍊者嘗居之旁有道士巖葉茶寮山在縣南八十里昔有隠者于履居之號藥林嘗開山得楛矢焉紫髙山在縣南八十里土膏泉冽中産茶甚竒嶠嶺山在縣南九十里俗稱温嶺有東西兩峯東大西小故有大小嶺之名嶺與樂清分界西山在縣南九十里舊名西原與嶠山相望世傳仙人煉丹之地絶頂有池尚存訪趙公戴詩云西原仙境即西山流水桃花隔世間自笑重來湖海客紅塵惹到白雲闗松門山在縣東南一百三十里按王羲之逰西郡記云永寧縣界海中有松門島嶼上皆生松故名龍鳴山在縣南一百二十里上有龍湫舊傳龍鳴其上故名積榖山在縣東南二百五十里上銳下闊如積榖場圃狀故名或云則榖者誤塵山在縣西南三百里以山多塵􅅽故名永寧江源出於此馬鞍山在縣東北五里以其勢奔迸脊如馬鞍故名鷄鳴山在縣南六十里舊傳有天鷄鳴其上故名金山在縣南七十里上銳下闊宛若金字王侍郎居安築堂面之號金山堂畔闕山在縣東南七十里形如跌坐又名披雲山虚涵山在縣西南七十里一云牛極闕門山在縣北五里中有將軍巖甚鉅浄土山在縣東北一十五里東接臨海杜皮山大仁山在縣東北一十五里闕闕山在縣東南二百里闕有闕石如松狀闕石闕中則没舟行必避之世傳為如來出世上闕鎮一港云盤馬山在縣東南九十里海中以其形四斷盤旋如馬故名賞頭山在縣東南一百二十里海中下有石闊尋丈竇而得泉居人皆汲之悟空山在縣東南三百里海中以悟空寺在焉故名巖頭山在縣東七十里海中夀門山在縣東南一百二十里海中赤礁山在縣東南二百里海中飯閟山在縣東南三百里海中九峯山在縣東南三里中有庵焉庵前九峯環立下至溪則無所見人指之為勝地今庵不存左緯詩云入山湏判宿不宿謾區區泉脉尋還有蘭香嗅却無杉髙方見直石恠不成麄若到三潭頂歸時路更迂白峯在縣東南三十五里靈巖在縣北一十里又名鷲峯後有飛瀑垂崖而下石根挿水瀦為一潭樵人續藤繫石測之無極慶元四年令常孫亭其上曰擘翠又一石洞在嶔􅏟間號天風門又名小空明左緯詩有恠巖摩足力空谷答人聲之句松巖在縣西一十五里沿崖而上凡七里始登石梯梯數百級勁直如削名曰古仙百歩街其上平廣䕃以古松下有碧潭龍出没能為雲雨東南一土庵特異有石棋盤仙人跡焉巖上又有剪刀㾗或云王仙姑輕舉之地蛇首巖在縣西六十里舊有石刻蛇首巖三字故名求仲弓詩云石如蛇首隠林端未得風雷且蟄蟠俗眼莫嫌無變化待生頭角始堪觀子晉巖在縣西北六十里平夷可宴坐俗傳王喬嘗吹簫於此故名戴公巖在縣東南七十五里上有絫石池水極甘冽舊以戴氏居之故名皷巖在縣東南七十五里两石相絫髙廣可三尺伐之如皷聲故名百丈巖在縣南八十里明覺院側險不可躋惟傍院而登則其平如掌上有石峯聳立望之凛人毛骨焉應聲巖在縣南八十里葉茶寮山側下有石屋可容數十人或笑語則谷聲響答一名響巖獅子巖在縣南九十里與王城山對以其狀𩔖獅子故名觀音巖在縣極東下瞰海有穴可坐數十人以其中常有光明故名鶩嶼在縣南五十里以山形如鶩故名上有金鷄坑夾嶼在縣南六十里兩山夾峙僅容河流旁有二小山相對如眉名夾嶼門小嶼在縣東南七十里面南其東當十之二絶無林木遇夜有赤光焉俗傳寳所藏也撮嶼在縣南七十五里以山形如拳手可撮取故名盧嶼在縣西一十五里桐嶼在縣東南二十里九嶼在縣西三十五里錢嶼在縣南三十五里龔嶼在縣南四十五里茶嶼在縣南四十五里褊嶼在縣南四十五里杉嶼在縣西南四十五里洋嶼在縣東南四十五里闕嶼在縣西南五十里闕嶼在縣南六十里蝦蟆嶼在縣南六十里闕家嶼在縣南六十五里腰嶼在縣南七十里建平嶼在縣南七十里筭嶼在縣南七十里長嶼在縣東南七十里羅嶼在縣南七十三里謝嶼在縣南七十三里瓦嶼在縣南七十三里葉家嶼在縣南七十三里林家嶼在縣南七十五里金華嶼在縣東南八十里半嶺在縣南一百里舊志云地甚廣初欲以建州云五部嶺在縣西一百一十里東連五部村西連樂清孤田村西北連永嘉鋪嶺東北連蒼山東南連桐嶺故名五部戌闕嶺在縣北一十里為入州通道俗名黄􅁟嶺闕在縣西八十里按臨海其南二十五里闕闕在縣東南一百里接樂清闕嶺在縣東一十五里闕嶺在縣東一十七里闕嶺在縣東二十里小塘嶺在縣西南二十七里大塘嶺在縣南三十里繡嶺在縣南三十里林和嶺在縣西四十里胡墓嶺在縣西南八十里車嶺在縣西一百里惺惺石在縣北四十里瑞巖山舊傳僧空照披荆榛而入得一盤石据之宴坐自喚曰主人翁惺惺著後因以名且立堂曰喚堂赤城志卷二十
