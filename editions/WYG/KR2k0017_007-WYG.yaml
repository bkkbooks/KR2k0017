body:
  text: 赤城志巻七宋陳耆卿撰公廨門四倉庫財用之所藏也塲務以下財用之所出也古者山澤之利與民共之後世既專之官而茶鹽酒稅之禁日湧月溢雖明知其朘削而郡國之百須在焉欲罷葢不能也台瀕海故有鹽負山故有茶民力役勞生故不能無酒昔固籠而之公上矣比嵗茶塲既廢二鹽監改隸他郡所謂酒坊敗闕亦累累有之獨官酤僅行商稅尚亡恙均節劑量使州用無匱而民力不傷此固善為政者之所樂聞也倉庫州都米倉在州東北二里至和二年孫守礪建糯米倉在州東三里舊在州南演教院側乾道九年火附惠濟院嘉定十四年趙守彦紓徙今地都鹽倉在州東南二里崇法院舊在報恩寺後又於子城裏置北倉今有廟存焉後廢併徙今地手詔庫在州治設㕔東軍資庫常平庫在州治西廡省庫同糴本庫同經總制庫在通判㕔西公使庫酒庫在㕔東錢庫在使院東銀器庫在小㕔西帳設庫在軍資庫西設厨在設㕔東甲仗庫在州治西廡樓上架閣庫在州治東廡樓上百物庫在州治西廡牙契庫在通判㕔西鹽本庫同諸司庫同都醋庫在鼓角樓下街西抵當庫在州治西二十步合同茶塲左嘉定四年黄守㽦建先是軍民當春冬雪寒質貸多弗售公乃捐錢二千緡為此以便之自十月至三月每質不過五百拘息一分為簿書油索費今廢臨海省庫在縣治東廡淳熙六年令彭仲剛建常平庫同茶鹽庫同章安酒庫在縣東南一百二十里章安橋西舊係人户買樸後因敗闕淳熙二年州申上司興復撥付本縣自備本造酒補發糴本等錢續以補酒擾民民户陳乞以家沽均抱州從之章安醋庫在縣東南一百二十里章安鎮側今廢舊例州委巡檢管幹敷船户納錢兵級乗以擾覔令彭仲剛乞併委酒庫官以糟水造賣月納醋庫錢一十七緡黄巖米倉在縣治東二十步慶元元年令盧永年重修常平倉在縣治西廡嘉定八年令胡衍重建省倉在縣治西廡二十步今廢天台米倉在縣東七步助濟倉在縣西七步嘉泰元年令丁大榮建宋閣學之瑞為之記續食倉在崇報院西嘉泰三年令丁大榮建今廢省倉常平倉在縣治東廡舊在縣東嘉定三年令詹阜民徙今處省庫常平庫在縣治左仙居米倉在縣東六步麥倉在縣儀門東省倉常平倉在縣儀門東經總制庫同物帛庫同醋庫在縣治門右開禧三年令姚偓建後廢寜海米倉在縣西四十步縣渚倉在縣南七十五里港頭倉在縣東南一十五里後省罷省庫在縣治西廡常平庫在丞㕔北廡場務鎮監坊附州合同茶場在通判㕔東今廢都酒務在州東南一里房廊務造麯庫附焉乾道九年火尤守袤重建商稅務在州南一里抵當庫平凖務附焉乾道九年火尤守袤重建臨海大田稅場在縣東三十里元豐中建淳熙六年省罷未幾復建嘉定元年又罷二年復建章安鎮稅場在縣東南一百二十里今廢杜瀆鹽場在縣東北一百二十里熙寜五年建按每嵗舊納正鹽二萬一千八百石續増明州寄買六千二百石總計鹽二萬八千石其始置鹽軍八十人崇寜元年以課額不足胡提舉申請汰鹽軍減鹽四千三百石令亭户承認二萬八千石每一石五十斤請錢八百文省其耗鹽八千四百石不請官錢總為三萬六千四百石每嵗八月後即拆竈住煎不妨農務紹興中因官吏希賞申増二分正鹽五千六百石耗鹽一千六百石通前額總計四萬三千六百石自後終歲煎煉窮日鞭笞終不足以登其數是時管柵一十有八亭户一百三十有六竈五十有四淳熙元年劉提舉奏陳額重得㫖將竈座減併作三十有五終嵗正耗鹽減作二萬五千石每旬合買六百九十四石五斗每六石為一袋零一石五斗候支發増衍日復額上司委官徧往監拆仍呼亭户供認内有力厚而逓年登足者減一分其無力者均減五分六釐九毫總不過二萬五千之數自後遂為定額矣歸溪鐵場在縣西六十里大石鐡場在縣西北五十里今廢雄溪鐡場在縣東南一百二十里今廢昋公鐵場在縣東南一百五十里今廢廣濟鐵場在縣東南一百五十里今廢高梁銀場在縣西北六十里今廢茶場在縣東南一百三十里今廢新亭鹽監在縣東南六十里今廢按武烈帝廟記乾符二年新亭監給官莫從易重建堂宇又九國志亦載元徳昭知台州新亭監曷浦酒坊在縣東南二十里長石酒坊在縣東南二十里燥溪酒坊在縣東南二十里柘溪酒坊在縣東北二十里半坑酒坊在縣西北二十里樓石酒坊在縣東南四十里白茆酒坊在縣西北四十里湧泉酒坊在縣東南五十里黄奢酒坊在縣西北六十里常風酒坊在縣西北六十里潮際酒坊在縣西北六十里大小石酒坊在縣西北六十里石新婦酒坊在縣東南八十里上庫酒坊在縣東南九十里歸溪酒坊在縣西北九十里外有家子城門開石南湗江口西岑新亭魚西涇山絢珠大田章安肯步一十三處今敗闕黄巖于浦鹽場在縣東南七十里咸平三年建今鹽額隸温州酒稅務在縣東北一里紹興二十一年令楊煒重建側有雲波亭路橋鎮在縣東南三十里舊名新安後省罷嶠嶺鎮在縣南一百二十里後省罷石塘酒坊在縣東南一百里賞頭酒坊在縣南一百三十里東鎮酒坊在縣南一百三十里外有長嶼橋嶺溪口紫高夾嶼監北岸桐嶺寜化漢城備禮十坊今敗闕天台赤巖銀場在縣西一十里元祐四年因鑛發而建今廢為鉛坑舊置巡檢監場監鎮等官按浄慧寺碑政和三年有秉義郎充赤巖場巡檢張綬是也又嘗開運河一帶與大溪相接入州後居人占為田有遺蹟焉楢溪鐵坑在縣東三十里天柱山鉛坑在縣西九十里稅務在縣東一百二十步舊兼酒及茶鹽後以行萬户廢酒務惟存稅務嘉定元年令詹阜民重修詳見浄慧寺碑孟岸酒坊在縣北一十五里鮑岸酒坊在縣東二十里鼻山酒坊在縣南二十里飛泉酒坊在縣北二十五里下泉酒坊在縣西四十里上泉酒坊在縣西五十五里仙居安仁鐵場在縣西一百二十里開禧元年建酒稅務在縣東五十步柯村酒坊在縣東一十五里下角酒坊在縣東南一十五里後陳酒坊在縣西三十五里皤灘酒坊在縣西四十五里巖前酒坊在縣南六十里寜海長亭鹽場在縣東一百二十里舊在港頭大觀三年徙今地今鹽額隸慶元府浮溪稅場在縣北三十五里後省罷柴溪鉛場在縣東北七十里今廢梅墺鐵場在縣南一百里一都鐵場在縣北六十里今廢六都鐵場在縣西一百里今廢酒稅務在縣東二十步前有熙春樓港頭務在縣東南一十五里嘉定十四年省罷縣渚鎮在縣南七十里唐武徳中建塘下酒坊在縣西四十里砂碕酒坊在縣北五十里石馬林酒坊在縣南六十里馬筋酒坊在縣北過海難以里計外有柘浦亭傍紫溪鐵場黄肚嚴壇桐山東倉須墺九坊今敗闕赤城志巻七
