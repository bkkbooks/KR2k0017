body:
  text: 赤城志巻二十七宋陳耆卿撰寺觀門一自佛老氏出摩盪掀舞環一世而趨之斯道殆薄蝕矣粗之為禍福使愚者懼精之為清淨寂滅使智者惑葢其竊吾說之似以為彼術之真如据影搏物而熟眎之則非也以故台之為州廣不五百里而為僧廬道宇者四百有竒吁盛哉今吾孔子孟子之像設不増或屋仆漫不治而穹堂偉殿獨於彼甘心焉豈其無禍福以懼人而無思無為之㫖反出清淨寂滅之下邪今備録之非以滋惑亦使觀者知彼之盛而防吾之衰庶少輔世教云爾寺院州禪院五報恩光孝寺在州東南一里一百步巾子山下唐開元中建舊傳有小刹七曰楞嚴水陸證道積善天光景徳藏院至是合為一賜額開元國朝景徳中更名景徳崇寧二年因臣寮奏詔天下建崇寧寺州以此寺應詔加萬夀二字遇天寧節度僧一人殿後有戒壇一元祐五年僧元照建也楊傑為之記政和元年改崇寧為天寧紹興七年改天寧為廣孝十五年以追崇徽宗改今額乾道九年火僧徳光有權踵新之淳熙三年錢參政端禮建僧堂十年其孫丞相象祖建佛殿寺始復舊觀惟羅漢閣無重剏者寺東有古塔一或傳梁岳陽王得釋迦舍利建塔七今所存止此又傳有齊眉大師趺化如生塔于寺之東隅今貢院後有小浮圖在焉銅鐘一葢唐乾元癸亥所鑄又有佛牙二株沈香觀音像及累朝所賜宸翰甚衆尤守袤僧堂記云淳熙三年秋七月故參政觀文錢公施其私財於台州報恩光孝禪寺復建僧堂明年九月十二日經始後十五日而公薨又明年六月二日堂成中為大屋七間髙七尋其廣四十有二尺其深十尋前列修廊後布廣廡其楹髙與廣皆如其堂之數而崇深殺之貫三夾廊為二井匽凡為屋之楹大小二十有四規模雄壯悉倍於舊公之孫承議郎前知處州軍州事象祖題其榜曰選佛合道俗以落之又明年長老惟禋命其徒了性持書求文於錫山尤袤而記之曰天台為邦仙聖所遊佛法之盛冠于東州有大叢林舊名景徳衆妙荘嚴近在城域政和之初賜額天寧紹興之間始易今名是為祐陵追福之地列屋千楹有衆萬指乾道癸已鬱攸扇災紺壁穹堂化為飛灰時大比丘徳光長老立志堅忍誓必再造乃泛扁舟浮海而南持鉢于泉半嵗乃還憔悴辛勤寸絫銖積乃建衆寮乃營丈室規創後壁架虗鑿空商工度材施者恐後惟光之名進于帝聴有詔自天命主靈隠袤時假守睹是勝因求繼光後實難其人萬口一詞曰有權可乃屈致之權不拒我於煨燼中啟大法筵逺近歸依輻輳駢闠寳殿迄成於從空墮權未嘗為不起于坐有大檀施觀文公錢與是比丘有大因縁私自念言安聚衲子以有伽藍為一大事導師所在龍象駿犇四方學徒其来如雲而此僧堂獨不建立起寺之廢莫此為急我當布施為衆萬先捐三百萬於指顧間公之視財如視土壌我無所施隨取而予權之受施如谷受風我無所受有来則容權謂其徒監寺了性汝敏而勤命總其政性亦受令犇走後先陶瓦成山伐木蔽川權来權藏四衆嗟惜予選惟禋嗣其法席禋之始来衆曰囏哉禋来一年衆志允諧巧者獻伎壮者出力涓日庀徒並舉百役乃立斯堂其大七楹髙廣深邃寒温暑凊前榮後廡兩倍其數寢食有位宴息有所偉哉斯堂肇自錢公不逮其成而公已終惟公有孫銜訓嗣事爰飾几榻至於塗塈齋鼔粥魚隠隠隆隆攝齊升堂肅肅雍雍舊觀復還百廢具舉如聵得聴若瞽而睹數有成壊時有廢興法力願力為無不成惟三比丘與二居士徃昔靈山並受佛記作此勝事刹那頃中化瓦礫埸為梵帝宫咨汝大衆享此安逸云何修行報此恩徳當念作者法力宏深勇猛精進無起退心當念施者願力堅重量彼来處無妄受用惟上祖師穴處巖居今汝不然夏屋渠渠惟上祖師行乞取足今汝不然飽飯果腹廣席連床窓户明虗心境洞然萬法一如卧具巾簟隨用無乏困歇饑餐莫非妙法汝若一念證常寂光華嚴境界即是此堂汝若不㫁五欲三毒當知此堂即是地獄巾山崇崇與堂無窮我為斯文相其鼓鐘兜率寺在州東南二里周廣順三年吳越王建舊有勝光和尚居之名勝光安國國朝大中祥符元年改今額上有觀音殿即舊景徳寺水月像也翟參政汝文謫居時形之夢欲改塑凡三四弗類工泣禱是夜夢白衣高髻如生塑而成趙守企詩云一到巾山眼界寛招提直在翠微間黄鸝過處金穿栁白鷺飛時雪㸃山魚艇兩三隨月上海帆八九趂潮還歸時聴得梅花角落日西城未掩闗嘉祐院在州北一里舊名淨名庵後改今額僧長吉嘗遊京師得宋㕘政庠以下一百四十五人所書般若經建臺以實之復自刺血書維摩經附焉宋諫議庠記云建塔廟散香華奉經典攝受妄迷而為功徳有為者為之雖然佛滅度三千年世與法交相喪濁刼下根訹為愚㝠非廣示像法無以震動而傾駭之使趨善良神道化時叵得而已沙門長吉當兹世為功徳者也初師以釋子之秀来上都㑹譯場高選義學僧敷演祖教名在籍右始與龍象為徒而覺華餘輝注射物境頗作歌詩雜擬輒自翼其宗由是益為人聞俄詔賜紫方袍號梵才大師勝流欽風多所延供久之厭著謝去復山林之遊嵗在降婁始還台州州守悦其風虚淨名庵以舎之惟師行嚴而身修寓曠而氣安能示方便悦可大衆居三年道益光明台人異焉捐金抵壁踵徃瞻事四方来者與麻葦俱乃闢精廬而肆之刋林衡鏤巖椒棘如而堂煟如而庭者且數百筵朝薰夜袚供擬尤具九年復作一成臺置大般若經六百篇及刻千刼佛像彼貨與力不募自至弗可貲紀師復砭膚取血書維摩經質神為要又欲推慧命而廣之乃謀於公卿大人於是龍圖閣直學士南陽葉君倡始籲謀分繕寳與凡臺閣方面知名士數十族叢喜迭捨參訖冩庸閲三年臺成納經奉像庋而安之黒白相趨距躍圍繞以為去聖滋逺有能駕其説植徳於人令夫威神嵬巍現前知親炙面命不在是經乎因是經讀誦悟入掊五藴泯空色攪萬異為闕真其為福又可勝量耶僕頃與師游樂其誓願之就且枉錫顧我丐辭以永傳因宣是義而偈之曰臺屹而崇摧我慢而恭兮經華而精竦我怠而誠兮像嚴而顯被吾魔而善兮報我四恩常不減而存兮師聞之謂余言為信若其營綜之烈投施之衆日月之謹大槩具之至夫筆不可文言不能宣者僕與師均寄一歎而已宋祁詩云故人詩未報恨恨復經年夢去長江路心知寳所天身依巖桂老詩與暮雲傳無柰纓緌累猶䝉方外縁臺又詩云名高身愈隠孤錫倚巖扄園布黄金地藏白馬經庵雲吞暝燭澗月㵼虚瓶坐想谿橋路莓苔又㡬青辨周延雋詩云幽致極東南青隂潤客衫林深纔徑雲滿欲藏巖琴想山猿伴花憎谷鳥銜孤標如可挹墜藁悵開緘錢惟演詩云漢苑辭千柰仙丘訪五芝汲缾春溜滿巻衲曉雲滋望刹青龍起觀濤白馬馳紅樓曽應制佳句詠朝緌蒋堂詩云老被詩名繫此身思山深去避人羣寳臺千尺隔江見清磬一聲歸路聞巖上開扉燈照月庵前掃地雪和雲終焉此是清涼處浄住無慚相國文普寧院在州東北二里舊名上方資國建隆中錢忠懿王建大中祥符元年改今額崇法院在州東二里舊名紫凝周顯徳元年建國朝天禧元年改今額今廢教院五寧國院在州東二里舊名六通晉天福二年建國朝大中祥符中改今額有銅鐘一梁乾化中所鑄延夀院在州東一里三百步皇祐五年重建或云即古倉基大中祥符元年賜額舊有凌雲軒後廢開禧中雨後壁壊有黒米之異普濟院在州東北一里三百步舊在州東一里名普賢今狀元塘是也大中祥符元年建治平三年改今額崇寧元年以其址卑濕徙今地順感院在州東二百步舊名報國晉天福二年郡人凌延熙捨宅建國朝大中祥符元年改今額舊有觀閣今廢趙守企題云一上危梯一解顔重崗複嶺四周環山川盡出登臨外天地都歸俯仰間飛鳥直墮雙目斷遊雲長與片心閒文書了却無餘事日午須來日落還福安院在州東一里二百步舊名興福保安治平三年改今額今廢惟殿堂兩廡僅存詳見貢院門律院一崇壽院在州東北二里舊名彌陀建隆元年錢忠懿王建大中祥符元年賜今額淳熙三年其孫參政端禮重新之錢自為記嘉定十六年齊守碩請以禪為律甲乙院十永慶院在州北一里即古郡治舊名白雲延夀庵太平興國二年錢守昱建咸平二年賜今額寺後有泉庵以其旁泓水故名唐守仲友題云萬斛出時非擇地一泓澄處本無心西有翠屏亭一覽亭今皆廢丁注題一覽亭詩云插迥飛簷聳凌虗疊砌危四天欄下揖萬象掌中窺目力不到處雲容無盡時塵塵皆勝事凭檻幾人知張景修題云衙城直上有煙巒亭在重崖絶壁間幾箇白頭忘嵗月一生青眼看江山秋風落木樓臺出暮雨籠沙鷗鷺閑珍重京西繡衣使作書題榜許追攀明慶塔院在州巾子山上舊名淨光塔院乾徳五年錢守昱建大中祥符四年賜今額按僧子文結界院記有芟洗蘿蔦披伐榛荆鱗布層基翼建寶塔森沈月殿蕭洒星廊之語其詳及題詠附見巾子山寶城院在州東一里舊名護國唐光啟三年僧道元建國朝大中祥符元年改今額章郇公得象為之記舊有清熙堂陳右司瓘為作夏講䟽按瓘政和六年以詆誣羈管居此時蔡氏黨方盛每宻諷守石悈脅而殺之呵守嚴甚又嘗召至庭怖以後命瓘竟不屈嘗為寺作修造等疏見集中惠日院在州東一里舊名羅漢晉天福五年建國朝大中祥符三年改今額有大塔幢鐫唐大中十一年妙勝院在州西一百步一名石佛舊傳闢基時得石佛三軀塑之殿故名按題梁紹興十五年重建鍾乃顯徳二年錢王女所鑄小兜率院在州東一里天聖七年建祚聖院在州東北一里一百三十步白雲山下舊名白雲按傳燈録唐欣禪師嘗受業焉沈佺期餞台州刺史序云懐白雲之蘭若葢指此也國朝乾興元年重建大中祥符元年改今額今廢資聖院在州東南二里建隆四年建有定光巖昔有僧於此誦法華經俄而光現故以為名治平二年賜今額今廢福聖院在州北一里大觀三年重建今廢舊有松軒趙守企題北山松軒詩云萬木有榮謝此松無盛衰夢闌秋韻起碁罷午隂移般匠顧不顧秦君知未知亭亭高節在看取雪霜時公張景修題云雪天蒼翠暑天風珍重僧軒十八不是詩人少吟詠世間花草易為工勝因院在州東二里治平二年建今廢尼院二淨慧寺在州南三百步唐武徳元年建乃妙善公主道場二年賜額國朝淳熙二年重建演教院在州東三百五十步淨慧子院唐武徳元年建二年賜額臨海禪院二十有六惠因寺在縣東南一百二十九里舊名禪房宋元嘉四年僧應俊建國朝大中祥符元年賜名惠因熙寧中僧了塵重新之紹興三十二年錢太師忱家乞為香燈院加崇親其後孫丞相象祖還諸朝復今額報恩衍慶院在縣東四十五里舊名興福俗又名龍華晉天福六年建國朝紹興六年范丞相宗尹家乞為香燈院遂改今額初范公遊此愛其幽勝題詩有兹逰恐不再聊寄小詩中之句人謂非佳讖月餘薨竟𦵏其中隆恩院在縣東南一百二十五里舊名明恩大中祥符九年縣人周圜捨基建先是唐武徳初有蓊蕚禪師卓庵於此治平三年改今額乾道元年稍徙髙爽一新之褒忠顯績院在縣西三十里舊名景福唐武徳二年建應順元年改慈聖國朝紹興九年吕丞相頤浩家乞為香燈院遂改今額保福院在縣南一十五里周廣順四年建晉開運四年賜額青蓮院在縣西北二十里舊名興善大中祥符元年改今額紹興十年重建具足院在縣東北二十五里舊名百文晉天福六年建國朝治平三年改今額慶恩院在縣東南二十五里舊名報恩石晉㑹同元年建國朝乾徳三年改今額昌國院在縣南二十