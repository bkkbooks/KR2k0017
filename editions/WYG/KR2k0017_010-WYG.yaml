body:
  text: 赤城志巻十宋陳耆卿撰秩官門三國朝乾德初詔諸州各置通判藝祖下湖南命所管州各置此官以刑部郎中賈玭等充懲藩鎮之弊也建隆後大郡置兩員餘置一員元祐中知通並兼管勾勸農事崇寜三年行三舍帯管勾學事宣和三年罷紹興十三年帯主管學事淳熙三年復罷宣和初詔特置添差初置無常員或以特恩或以宗室戚里紹興八年始命州各一員近歳多闕不除熙寧初詔于舉人最多州郡置教授初乃轉運司辟充至是始屬吏部建炎三年罷紹興三年復置四十四州十二年詔闕官處通置若試教官則始於元豐七年添差教授則始于政和三年是時諸方建置後先不齊若夫台則又未知始何時也余謂郡貳之設所以佐侯宣化贅員同正置若文學掾則風教繫焉皆不容以無述也稽遺刻諗故牘盖自端拱以後始略有可紀者然多壁記所未載今叅附為一編而以前朝位司馬者冠諸其首亦存古之意也赤城志巻十
  hash: sha256:7b84f881c80073241df2d9ed915588677a504f06b635bd0b2793a912e5dd07bf
