body:
  text: 赤城志巻二十三宋陳耆卿撰山水門五水自昔稱山明水秀二者不可得兼也而兼之者勝焉山猶精神水猶血脉無精神則鑠無血脉則枯三江五湖未易道也然隨其境之所遇距海止百里羣川衆流演迤環㑹或奔焉如駚或汨焉如注或坎焉如竇或停焉如瀦以之分溢灑枯鍾美流惡無所不可故吾州號山水窟非虚語也惟天台仙居二溪併合於州西二十里之外秋潦至或有齧堤蕩郭之憂然自慶元中有之今則晏如也州州河在城中按舊經源始平橋平橋始石佛寺後山流於括蒼門後頗堙塞自括蒼門衍於州南橋東北流至東橋並栖霞宫又東北流越悟真橋觀橋䟽而為二一南流至都酒務後凡白塔橋尼巷之水皆入焉又東則入楊柳巷出寶城巷水門一東流直出都米倉前稍南復東出崇和門水門餘水南流亦㑹於寶城巷自餘兠率六通一帯之水又出小固山水門大抵地勢西仰東卑故河流亦如之昔傳河之名有三曰清漣曰新澤曰清水今皆汚壤通㳙流而已先是城中水多壅塞自括蒼門䟽而之東南由東北豐衍倉東南上崇和門水竇又東越酒務又東匯於崇和門以池積水號廣惠渠自錢氏歸版圖堙為平陸每霖雨則内水淹沮值潮溢迸城飄蕩相望元守絳始開鑿通舟建十石梁以度車馬焉又天禧中通判辛若濟以州泉汚涸郡釀尤不給乃自東北山流瀑斵石為漕注入天慶觀西南為一圎井又三百六十歩為一方池自池一百四十三歩以逹於務人頼其用號辛渠且歌之歌曰辛渠之水来源十里其易若何如臂使指澇亦不汚旱亦不止職方有圖千齡萬禩歲乆梁廢池亦堙獨石槽畧有存者若廣惠渠故跡既泯而元守鑿以通舟之處亦以居人櫛比閼而小之今不惟舟不得通而車馬之路亦轉側無所容矣又按唐許渾有陪鄭使君泛舟晚歸詩云南郭望歸處郡樓髙捲簾平橋低皂盖曲崖轉丹襜如此則郡通舟楫唐時已然元公増鑿之爾狀元塘在州東一里舊為普濟院陳侍郎公輔居其西焉時陳尚布衣忽有客以謁入語其父曰此寺為池當有擢上第者人未之信寺僧後以地汚下徙於州東北未㡬竟為池政和二年陳果魁辟雍遂以名其塘云三台泉井一在宣詔亭左為上台一在司法㕔右為中台一在知錄㕔左為下台嵗乆惟中下二泉僅存上泉無知者嘉定四年黄守㽦物色得之乃亭其上且親題扁額云龍井在巾子山西麓舊傳龍伏於此常有雲氣騰空後建浮圖鎮之而止玉泉在白雲山下楊傑題云白雲山下泉㡬年石中韞但見玉色明孰能究源本黄卦題云水性能方貟泉色常珪壁雲山靜有輝瓊液来無迹泉上修禪人􅈠溪分一滴鑑止更澄源紛紛萬緣息雲張景修題云長疑數尺玉乃是一方泉粉色和汲茶香帯石煎鑑未誠美矣聞處合鏗然白首惠山客也湏吟此篇丹井泉在天慶觀昊天殿後舊傳茅盈錬丹於此尤守袤昊天殿記有云厥初茅君上飛仙靈蹤淠沸丹井泉盖指此也佛泉在義靈廟山巔泓水澄潔源出石鏬雖大旱不竭以巖上刻佛字故名蒙泉在崇夀寺後取山下出泉蒙之義郡嘗汲此水釀酒且以為名臨海靈江在州城外其水自三江合流環遶郛郭舊傳有赤城地靈江水丹丘井之謡又延慶院記云濟靈江而西盖指此也中有一所名陳婆坳泓水極清巨潮澎湃不為動州舊以此水釀酒焉嘉定中嘗以靈江風月名郡醖自朝天門外而渡則曰西江自興善門外而渡則曰南江自靖越門外而渡則曰東江其實一水也俗號上中下三渡三江在縣西一十里源自天台闗嶺仙居永安二溪至此與江合盖三水所聚故曰三江然其流中分溪清而江濁百歩溪在縣西北六十里前後二灘石險湍激俗號大小惡舟者病之唐孟浩然尋天台山詩所謂欲尋華頂去不憚惡溪名是也淳熈中令陳居安命工淬鑿始無患虎溪在縣東六十五里東掖山舊傳獻穆公主有目眚僧法腴洗以呪水而愈奏置十八賢座倣廬山逺公故以為名且名其泉曰大悲云寨溪一名板沸溪在縣東七十里舊傳唐末有㓂難遣方將軍者駐兵於此側有地曰大郭營盖其舊號有鐡杵臼尚存灘溪在縣南四十里接三十六渡東連南奥西入潮漈或名紅溪以宣和間勦㓂流血而名潮漈溪在縣東四十三里自縣界四十里下流至大田港入江赤頰溪在縣西南四十九里源出赤頰潭至曷浦口入江仙人溪在縣西北六十里入江以其側有仙人奥故名玉溪在縣西一十里浮岡俗稱朱師溪小溪在縣西二十里源自清潭溪東注於江磨頭溪在縣西北二十六里下流入太平鄉油溪在縣南三十里受新嶺瑞巖嶺二水塘上溪在縣西北三十里接仙居溪中沙溪在縣東三十五里接桐巖山沙潭溪在縣西北三十九里經縣界入江周家溪在縣東四十里接延夀鄉龍湫東溪在縣東四十五里受東掖兩山之水雲溪在縣東四十五里出大田港銅溪在縣西北五十里以其水如銅色故名長潭溪在縣西北五十五里接沙潭黄肚溪在縣東七十里桐巖山下小芝溪在縣東七十六里自大田港入江金溪在縣東一百三十里以其流有金沙故名柘溪在縣東二十二里西溪在縣東四十五里杜瀆在縣東一百八十里禦海潭在縣西南二十四里上有瀑飛灑近十餘丈望之如曳練下注為潭流入永安江娑竭潭在縣東南三十里紹聖中禱雨現金蛇赤頰潭在縣西南五十里元祐二年禱雨有金龜之應白龍潭在縣東北五里戯龍潭在縣西一十五里流至烏雞浦入江新現潭在縣西南一十五里烏石潭在縣北一十五里白鬚潭在縣東北二十五里碧雲潭在縣西五十里百丈潭在縣東南六十九里白巖潭在縣東七十里碧瀛潭在縣東一百二十里淡水潭在縣東南一百三十里海中桃枝潭在縣東南一百四十里海中東湖在崇和門外三十步初為船場水軍營葢端拱二年張守蔚所建也景祐中運使段少連廢船場歸温明二州嘉祐中徐守億徙水軍營入城熈寧四年錢守暄始開為湖時方絫石修城以水至漂溢故鑿湖以受衆水且以其土隄城之東絶後患焉紹興二十年蕭守振載加修闢乾道五年向守汮復披故道剙城闉斗門上覆以亭又即故斗門築三閘以通江淳熙十一年江守乙祖亦復修焉度其地凡一萬六千步中有堂曰共樂堂之前有亭曰流盃皆址於湖心錢守所立水光山色涵映虛曠為春夏行樂之冠慶元三年劉守坦之易名知樂人止稱共樂也通判張毣詩云解愠薰風拂面涼藕花極目送清香三千宫女青羅盖都作酡顔酒翬粧又云蜀錦誰將到海涯水仙鋪作地行衣回堤却是元宵路抛擲紅燈戴月歸錢守暄題共樂堂云疏就湖山秀氣濃花林茂列景争雄管絃交奏客懽合臺榭競澄人喜同環障鷺行飛早晚平波魚陣躍西東荒蕪芟去成佳致換得汀州月與風汪泌題云臨海城東湖氣象清且竒無風緑色浄十頃澄瑠璃中有共樂堂今其名者誰人有荅我問大守下車時訪民所疾苦民曰水最危其水或暴至城壊民流屍公謀得上策疊石全城基纔遺數百家室屋鱗参差水至無所障適與晚潮期又欲隄其東苦乏土石資開湖足取用隄勢横虹霓湖光占空濶物從鑑中窺紫翠前後山環列如屏帷結堂就虚曠與俗同㳺嬉太守宴堂上逰人歌水湄歌云從公來除患補瘡痍况有此壮觀不樂何以為有如登春臺人心舉熈熈從事能文者作辭書之碑庶其不朽功上徹堯軒墀柳安道題云平波數頃萬峯前一片丹青畫不全幽榭小橋横翠水茂林脩竹鎖輕烟綺羅絃管追懽地雪月風花爛醉天争奈及𤓰歸覲去湖山無復苦留連綵姚舜諧題云秀氣清隂日滿前仙瀛蓬閬景都全舟畫楫魚噴浪綺席金爐麝吐􅃄懽勝更思明月夜飲酣惟恐夕陽天主人報政榮途近淮浙重逰路接連曽守宏父懐洪适題云東湖徑仄半蒼苔問訊紅蕖幾許開渺渺波光侵坐席霏霏荷氣著尊罍片雲正為詩情起小雨更將涼意来别乗朝来知健否頗思劇飲抝蓮䑓誰又題東湖云三年領客醉東湖欲去猶携竹裏厨解挽留狂太守風荷十頃翠相扶小鑑湖在東湖北乾道中賀叅政允中建時公罷政寓此以唐賀知章嘗請鑑湖一曲故以為名有占春堂枕流潄石二亭今廢破石湖在縣西三里故老云破石為湖故名側有巨石及古塔僧禪鑑嘗卓庵焉髙湖在縣南九里近江呉太常卿髙公察置溪口湖在縣東南一百三十五里源出碧瀛溪苽湖在縣東一十五里仁湖在縣東七十里章安湖在縣東南一百二十五里闕塘在縣南一十五里闕塘在縣東北一百八十里交塘在縣東一百九十里呪水井在縣東七里驛路傍元符中僧法腴誦觀音呪水湧井以療疾輒愈羅提刑適為之記井上為屋奉觀音像云黄古井在縣東南一里舊傳有黄其姓者浚之故名義井在縣西北五里威神院側乾德四年僧守聚浚之鶴井在縣東一百二十里杜瀆監側舊傳鶴舞其上故名九井在縣東南七十里石新婦廟前忠孝泉在縣東四里父老云錢忠懿王以城闉罕水命僧德韶行視鑿焉泉清洌且甘乆旱不涸城内外飽其潤故以忠孝名之舊傳巾子山二塔常欹側自鑿此泉即正隆興初令徐讜剏亭立碑康濟泉在靈康廟後之西乾道三年令顔度禱晴於廟見寢殿前堦水津津溢地穴之得泉故名度有詩云三年官事渾無補一片深心徹底真惟有靈康是知已新泉為我現津津菊泉在縣南二里珍珠泉在縣西北二十八里穴二十有一其水甘香滚滚如珠瀑布泉在縣北五里白龍潭上垂流千丈宛如白練章守得象詩所謂千尋練掛䨇流瀑是也湖苔泉在縣南二十五里穴三十有六源出古塘門溉田甚衆碧泉在縣西北一十三里夀安院靈濟泉在縣東南二十五里靈康廟後之東甘泉在縣東南四十里澄靈院側木馬泉在縣東四十五里與呉承有堰通赤城志巻二十三
