body:
  text: 赤城志巻十三宋陳耆卿撰版籍門一州負山瀕海沃土少而瘠地多民生其間轉側以謀衣食寸壤以上未有莱而不耕者也按紹興十八年李侍郎椿年建行經界俾編户實書其産依土風水色認兩税履畆授砧基貳藏之官於是州縣無隠田余聞長老言李健而明吏不得弄毛髪以故得事集集後無敢議者今七十有五載猾胥豪民相倚仗為蠧賦役厖亂遂有舉行前説者焉往歳寜海黄巖嘗行之矣臨海仙居則方行而未備也如得清勁不擾之令佐均秩布置取平而不求贏焉其豈非朝廷郡國之本指而齊民之幸㑹歟今且以五縣近數列於編學田寺觀田次之學田學舊有田自宣和三年罷學舎歸之有司其在學者不闕中陳貽範所輸數十畆李守纁闕陳景攝教事一經理之既而臨海丞姚漺請于郡於啇闕頭之餘十之七以助學十年間得三百畆其後教授闕請籍負郭闕補其乏乾道元年有司將鬻以予民黄守然易而歸之為九十三畆有竒三年有司又有鬻其餘李守浩又易歸之為九十六畆有竒淳熙四年李守宗質議増給而諸邑有樂義者三人獻其私八十五畆嘉定四年黄守㽦撥四十三畆且儲錢千緡為増闕俞守建助之得二百闕畆又撥後入田一十五畆康守仲𨽻撥三十畆喻守珪撥二十五畆齊守碩撥闕十畆合先後𤨏悉歳得榖僅一千九百石視遐邦所入未為凋陋然吾州多士闕試于有司者幾萬而食于學者不滿百博士欲闕力窘輒止蓋今江淛學廪亦未有如此邦闕有聞而附益之者也赤城志巻十三
  hash: sha256:777e3979f527572c1e183e161477412330a6cef6e44b9e61fa1445f0321d5ed6
