  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0017_WYG_018-1a, image: WYG0486/WYG0486-0735a.png}
body:
  text: 赤城志巻十八宋陳耆卿撰軍防門國初惟三司卒稱禁兵其次惟三邊或有故升禁兵諸州軍未之有也嘉祐後九大郡始置威果其後以廂兵團併為額則置崇節以教閲别為額則置雄節元豐初以雄節之𩔖升同禁兵由是禁兵滿天下養之以天下之力而猶憂其乏焉開剏之逺謀既不可不思而承襲之近規又不能不守儻使嚴蒐閲謹招刺収一兵而得一兵之用則雖養之以天下之力而又何憂乎自牢城至鋪兵建置各有指今以新舊額附見雄節第六指揮營在州東北天慶觀前祖額五百人舊係教閲廂軍崇節指揮熙寧六年改今指揮今管四百八十九人内揀中三百二十七人不揀中一百六十二人闕額二十一人將校於額外置一十人排定陞轉階級將校一十人指揮使副指揮使各一人都頭三人副都頭五人節級四十人十將將虞候承局押官各一十人其請級凖熙寧三年宣下戍邊則例揀中月白米一石五斗料錢四百八十文春衣絹二疋折布錢一貫七百文冬衣絹二疋紬半疋綿一十二兩折布錢八百五十文不揀中料錢二百四十文餘依揀中法威果第六十指揮營在州東米倉前祖額四百人舊係威勝指揮宣和六年改今指揮今管三百六十七人内揀中二百六十八人不揀中九十九人闕額四十四人將校於額外置一十人排定陞轉階級將校一十人指揮使副指揮使各一人節級四十人十將將虞候承局押官各十人其請給凖紹興舊則例揀中月白米一石二斗料錢六百文春衣絹二疋紬半疋折布錢一貫八百四十四文冬衣絹二匹紬半匹綿一十二兩折布錢一貫八百四十四文不揀中料錢三百文餘依揀中法崇節第三十一指揮營在州東南靖越門内祖額五百人舊係第四十五四十六指揮元豐六年以前兩指揮併作今指揮今管三百八十三人額外置節級四十一人軍頭一人十將將虞候承局押官各一十人排定陞轉階級本州帖補其請給凖熙寧四年行到兩浙路則例月糙米一石五斗春衣絹四疋折布錢一貫五十文冬衣絹二疋紬半疋綿一十二兩折布錢八百五十文牢城第十三指揮營在州東都米倉前祖額二百人元豐初所定今管二百一十八人額外置節級三十人十將將虞候承局押官各一十人排定合陞轉階級本州帖補其請給凖元豐二年指揮月糙米一石五斗春冬衣各絹一匹折布錢一貫二百五十文壯城指揮營在州東崇和門内祖額一百人熙寧初所定紹興元年増五十人今管一百五十人排定陞轉階級並本州帖補十將將虞候承局押官各五人其請給照紹興府則例月白米一石五斗春衣絹二疋折布錢一貫九十文冬衣絹二疋紬半疋綿一十二兩折布錢一貫七百文剰員營無定處亦無額今管五十一人紹熙四年勅諸路提刑司毎遇廵厯就同守臣將揀中不揀中禁兵并廂兵通選一次其少壯及等者並充揀中禁兵反是者充廂兵其年老禁兵願充剰員者聴其請給月白米一石二斗春冬衣各絹二疋折布錢八百五十文諸縣弓兵臨海營在縣東北四里尉㕔東其請給月雇錢四貫四百一十八文祖額八十人今九十五人黄巖營在縣西四十九歩尉㕔西祖額九十五人今九十五人天台營在縣東一十歩祖額五十人今五十七人僊居營在縣東北八十歩尉㕔東祖額五十人今五十七人寧海營無祖額五十人今七十人諸縣寨兵臨海管界寨在縣東南七十里嘉定十五年齊守碩及臣寮奏言管界亭塲兩寨皆防托海道亭塲既處海門之北而管界乃入裏港之中甚亡謂也乞以管界徙海門南與亭塲對峙有㫖依今本州下縣體量於上馬巖改建焉其請給月白米一石五斗春衣絹二疋折布錢一貫七百文冬衣絹二匹有半紬半匹綿一十五兩折布錢八百五十文料錢三百文舊額一百八十四人今一百二十八人亭塲寨在縣東南一百二十里其請給月米春冬衣同管界料錢二百四十文舊額一百七十七人今一百一十二人呉都寨在縣東一百五十里其請給月米春冬衣同管界料錢同亭塲舊額一百六十九人今一百四人黄巖松門寨在縣東南一百二十里其請給月米春冬衣料錢並同管界舊額二百三十七人今一百二十四人僊居白塔寨在縣西三十五里嘉定十五年齊守碩及臣寮奏言曩以宣和吕㓂嘯聚於此因而置寨今承平日久巳為聚落而縣有蒼嶺當衢處􅄔三州崗阜深阻行者窮日而後度人煙迥絶㓂攘所憑徙彼而就此為便有㫖依令本州下縣體量於蒼嶺下戴村改建焉其請給月米春冬衣同管界料錢同亭塲舊額八十人今四十人寧海臨門寨在縣東海頭二百里其請給月米春冬衣料錢並同管界舊額二百三十三人今一百四十人諸縣鋪兵其請給月糙米一石五斗春衣絹二匹折布錢一貫五十文冬衣絹二匹紬半匹綿一十二兩折布錢八百五十文臨海崇和鋪在縣東二里舊額一十人今一十人白石鋪在縣東北二十里舊額五人今如之横溪鋪在縣東五十里舊額五人今四人城西鋪在縣西二里舊額一十人今八人八疊鋪在縣西二十五里舊額七人今五人小石鋪在縣西北四十里舊額七人今五人百歩鋪在縣西北六十里舊額七人今四人新城鋪在縣東南二十五里舊額五人今如之小嶺鋪在縣西二十五里舊額六人今如之黄巖戍浦鋪在縣北一十里舊額六人今如之店頭鋪在縣南一十五里舊額五人今如之魚沉鋪在縣東南二十五里舊額四人今如之白峯鋪在縣東南五十里舊額四人今如之天台花桃鋪在縣東二十五里舊額七人今四人二里鋪在縣西二里舊額七人今五人小田鋪在縣西二十五里舊額七人今五人闗嶺鋪在縣西五十里舊額七人今五人僊居縣東鋪在縣東二里舊額五人今如之夾嶺鋪在縣東南二十五里舊額六人今如之白塔鋪在縣西二十五里舊額四人今如之吕前鋪在縣西五十里舊額三人今如之鎮頭鋪在縣西七十五里舊額三人今如之蒼嶺鋪在縣西一百里舊額四人今如之寧海縣東鋪在縣東二里舊額五人今三人水逓鋪在縣東二十五里舊額三人今二人嶺上鋪在縣西南二十五里舊額四人今二人嶺下鋪在縣西南五十里舊額四人今二人縣渚鋪在縣西南七十五里舊額四人今一人寧和鋪在縣西南一百五十里舊額四人今三人梅林鋪在縣北二十五里舊額四人今如之海口鋪在縣北五十里舊額四人今如之赤城志巻十八
