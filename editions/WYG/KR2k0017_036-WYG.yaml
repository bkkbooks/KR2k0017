body:
  text: 赤城志巻三十六宋陳耆卿撰風土門一按周官職方揚州有金錫竹箭之利有穀與畜之宜隋志亦云㑹稽數郡饒於海陸一年蠶四五熟有夜浣紗旦成布者此通越與㑹稽言之非専指台也而台最瀕海且依山地育人培演迤深厚又與他州不類顧生之者衆而食之者亦殷則日貴月翔有過於渡江數倍者未可咎物産之薄而人之蕃息可賀也㑹歳屢豐粒米狼戾雖細民亦不欠一飽而暇責其餘哉余故自穀帛以下品列彚聚且䟽其名狀以俟博識冠之以土貢者亦尊君之義也土貢舊貢金漆其木似樗延蔓成林種法以根之欲老者為苗每根折為三四長數寸許先布於地一年而發則分而植之其種欲疎不欲宻二年而成五年而收收時每截竹管鋭其首以刅先斫木寸餘入管舊傳東鎮山産之以色黄故曰金漆云乾薑陶𢎞景云乾薑惟臨海章安二三村善為之其法以水淹三日去皮置流水中更六日又去皮然後曬乾置甕􅣙中謂之釀也今章安城門黄杜所出尤佳齊孔琇之為守至以為獻則其來久矣乳柑出黄巖斷江者佳他如方山下亦有之然皮未厚味酸且香韻亦差减每歲雨多則結實長霜以餉行都貴近謂之青柑其實長八九寸者絶為艱得園丁預擇以待貢獻曽守宏父詩有一従温台包貢後羅浮洞庭俱避席之句甲香一名流螺臨海記云生東鎮山傳信方亦云出台州小者佳其法先以酒煑去腥涎云可聚香使不散也南州異物志曰甲香大者如甌其面纔長數寸殻有刺惟以衆香和爇則愈芳若獨爇則否鮫華蘇恭云形似鰲無足而有尾山海經曰鮫沙皮可以飾劒今南人但謂之沙魚本草云皮有二種其最大而長喙如鋸者曰胡沙小而皮粗者曰白沙飛生鳥本草云鼠出山都平谷即飛生鳥也狀如蝙蝠大如鴟鳶毛紫色常夜飛生子南人多以為怪蔵其皮諺謂臨産者持之則易娩元和郡國志甲香三十斤鮫魚皮一百張元豐土貢錄九域志金漆三斤甲香三十斤鮫魚皮一十張今貢大禮銀六百五十兩絹五百疋瑞慶節銀一千兩絹五百疋土産穀之屬稲臨海異物志云丹丘糓夏冬再熟言其土所宜也夏熟者曰早禾冬熟者曰晚禾其最早者曰六十日曰隨犁歸曰梅裏白曰便糧其次早者曰白婢暴曰紅婢暴八月白晚者曰白香曰白堇曰大禮細禮若是數者名最著土人通藝焉又以色言之則大青矮青光頭青黄㪚秈馬觜紅金珠之類是也而馬觜紅尤香而甘以次言之則獻䑓相連寄生第二遍之類是也而獻䑓最貴至於旱稜宜旱倒水頼宜水是又其性之相反者也糯之種相傳有數十而可記者有流水糯白糯黄糯麻糯荔枝糯烏鹽糯皆以其色近似至葉婆糯郎君糯則因其人得名而矮子糯則以其穗短而稱焉占城自占城國至剡秈自剡至大中祥符五年以淮浙㣲早使於福建取稲三萬斛分給種之今土俗謂之百日黄是又其得之閩中者也名色雖多總其目曰秔曰糯爾雅所謂黏與不黏者是其别與麥有大小二種廣雅云大麰也小䅘也今小者有赤白二色以赤與白名者取其色又有名穬麥蠶麥者别種曰蕎麥秋花冬實麻胡麻可飯油麻可壓油大麻可為乳酪粟有秈糯二種江東呼曰粢荳有赤白紫褐黑五色又有形如虎爪羊角或刀鞘者又一種名白匾荳生籬落間可藥可食一種名蠶荳蠶熟時有之帛之屬羅越羅自唐有名杜甫繰絲行有越羅蜀錦之稱台越地也綾有花綾杜綾綿綾摴蒱綾四種絹出仙居黄奢者佳紗三伏時織者為上秋次之冬又次之絹亦同縐紡絲為之輕者曰縐紗宜夏重者曰紡絲宜冬紬以粗絲為之又有以綿繭搣之而成者曰搣綿搣繭布有葛紵麻三種皆績其皮為之史記以紵為纑貨之屬銀出天台赤巖鉛出天台赤巖郭婆坑等處銅出仙居天台等處鐡出臨海興國仙居安仁天台楢溪寧海東溪蜜州有蜜巖見梁傅昭傳蠟有二色黄者造燭白者醫家用之鹽屬于浦者成於土屬杜瀆者漉於砂茶按陸羽茶經台越下注云生赤城山者與歙同桑莊茹芝續譜云天台茶有三品紫凝為上魏嶺次之小溪又次之紫凝今普門也魏嶺天封也小溪國清也而宋公祁答茹吉茶詩有佛天雨露帝苑仙漿之語盖盛稱茶美而不言其所出之處今紫凝之外臨海言延峯山仙居言白馬山黄巖言紫髙山寧海言茶山皆號最珍而紫髙茶山昔以為在日鑄之上者也紙蘇文忠軾雜志云吕獻可遺余天台玉版過於澄心堂又米元章用黄巖藤紙硾熟掲其半用之有滑浄軟熟之稱今出臨海者曰黄檀曰東陳出天台者曰大淡出寧海者曰黄公而出黄巖者以竹穰為之即所謂玉版也紅花秋末種春末乗露采之可以染絳花之屬牡丹多種歐陽公花品序云南出越州呉越錢氏喜栽植其盛若菜畦今天台最著芍藥多種亞牡丹酴醿一名木香有花大而獨出者有花小而叢生者叢生者尤香舊傳洛京歳貢酒其色如之江西人採以為枕衣黄魯直詩所謂風流徹骨成春酒夣寐宜人入枕囊是也海棠紅色以木𤓰頭接之則色白又有二種曰黄海棠曰垂絲海棠垂絲淡紅而枝下向巖桂一名木犀紅者號丹桂又有黄白紫碧四色與重䑓及四時開者而黄者尤香山茶有紅白二色薔薇紅紫色枝榦有刺又有黄色者拒霜一名木芙蓉有紅白二種及百葉者山樊極香木髙數尺北人呼曰瑒花菊有四十餘種今可記者曰黄曰白曰紫曰御袍曰金銀荔枝之類則取其色曰甘則取其味曰毬子曰玉繡毬曰金盞銀臺則取其形之類曰酴醿曰桃花曰茉利則取其花之同至是而獨頭開者曰佛羅菊狀似孩兒者曰孩兒菊髙與籬落等者曰東籬菊自海外得種者曰過海菊餘不可勝載云瑞香張祠部以瑞為睡故其詩有曽向廬山睡裏聞之句而蘇文忠詠此花詞乃云領巾飄下瑞香風俗但稱瑞香丁香有紫白二色出海山杜鵑俗號映山紅一曰紅躑躅王荆公詩所謂亦見舊時紅躑躅是也又有一種紫色唐開元中僧自天台鉢中以藥養其根種闕林寺或見紅裳女子遊花下俗傳花神即此花也麗春莖生花媚而香金錢深黄花圓如赤仄玉簮質素而香其形似之金棣棠淡金色迎春一名黄雀兒花金沙有紫色者黄魯直詩所謂紫綿揉色染金沙是也錦帶長蓧而花綴其上有若錦然王元之目為海仙作詩云錦帶為名卑且俗為君呼作海仙花金鳯有數色狀若飛鳯一又曰鳯仙八仙狀如瓊花八蝶簇一心又有小蝶簇聚如碧玉者曰玉蝴蝶雪玫瑰白色又有紫色者曰徘徊花長春紅色一名月月紅滴滴金黄色一名滴露花山丹一歳著一花木筆初發如筆狀一名辛夷見韓退之感春詩凌霄附木蔓生有毒或凌晨仰視花露滴目則能䘮明木槿詩名舜花一曰日及花施肩吾詩所謂但看日及花唯是朝可憐是也玉繡毬白圓如毬剪金葉分數岐如剪裁之狀寶相蔓生類長春宻槱紅黄色千葉歐陽公牡丹記作此槱字俗云蜜友者非水仙本云雅蒜黄魯直謂質可比梅而枝不及有只比江梅無好枝之句又有一種曰金盞銀臺梔子一作支子一名鮮支上林賦鮮支黄礫司馬彪注鮮支支子也佛書稱簷蔔花六出按黄魯直云八出者勝近有一種花瓣尤多且大名川梔蜀葵爾雅曰眉戎葵釋曰蜀葵也一種曰夏葵有紅白紫三色石竹一名曰錦竹頗多種李太白詩所謂石竹繡羅衣是也百合紅白色根如胡蒜疊生二三十瓣又有川百合先實後花杏黄色上有墨㸃如洒墨然甖粟以狀如瓶甖其中似粟故名本草有甖子粟正用此字俗云鶯粟者誤鷄冠其狀似之佛書所謂波羅奢花是也紫荆藥之屬百藥祖黄寮郎催風使含春藤石南藤清風藤耆婆藤天夀根千里急紫葛烏藥百稜藤右十二品按本草皆出天台山黄精白居易贈天台鄭隠居詩有黄精花未茸之句山中人九蒸九暴而食仙茅一名山茅出天台洞天宫者最勝傳云千斤乳石不及一斤仙茅言其功力也术白者葉大有毛甘而少膏赤者反是貫休詩黒壤生紅术指天台也杜光庭空明洞詩芝术迎風香馥馥指黄巖也茯苓松脂入地而生傍根者為茯神根子出天台蒸餅峯後向東者佳今貨于市者多國清天封所産故不能愈疾附子出仙居黄皮山比蜀産為下草烏出蒼山芍藥有赤二種天南星葉兩頭相抱穗似榴子根似芋而圓如蒟蒻天門冬爾雅謂之蘼一名虋冬夏生白花秋結黒子苦參根黄莖並生一名水槐𤣥參陶𢎞景云道家用以合香薏苡形如珠而稍長地黄有三種以水浸試其浮者曰天黄沉者曰地黄半沉半浮者曰人黄然人黄為下枸杞一名王母杖茱茰似椒而淺青色者曰山茱茰粒大而黄黒者曰吳茱茰又有一種紫色九日人以泛觴白芷近城及天台仙居多種之巻柏叢生石上以葉似柏巻故名半夏獨莖生皮黄肉白椒紅色香勝蜀椒今天台獨勝細辛白者良陶𢎞景云出臨海牽牛子有黒白二色蔓生籬落間一名鼔子花碧色陶𢎞景云此藥始生野人牽牛以易之故名蛇床子一名蛇米毎枝上有花頭百餘結同一窠車前子土人呼為蝦蟆衣決明子葉似苜蓿而大實似馬蹄者號馬蹄決明又有草決明蒼耳一名羊負米何首烏赤者雄白者雌本名交藤因何首烏服之故名五味子以五味具故名俗名南藤菖蒲生石罅者曰石菖蒲葉細生陂澤者曰水菖蒲葉㣲大五倍子子青大者如拳覆盆子以老者食之可温水臓故名葶藶月令孟夏靡草死注云蘼草薺葶藶是也萆薢莖有刺者根實無刺者根虛虛者勝黄連狀若連珠具九節者妙苽蔞一名黄苽詩所謂果臝之實是也龍膽狀似牛膝味苦故以膽名艾俗名蓬蒿土人於重午前一日收其葉以製艾橘皮有青陳二種香附子叢生道旁一云蓑草萞麻紫莖子青褐色藷藥一名玉延一種出臨海寧海山中根圓而長名山藥其下品曰水藷藥又一種紫黄色曰虎掌藷以形似故名多出黄巖狶薟一名火杴草骨碎補一名胡孫薑唐明皇以其主折傷有竒效故名石斛按本草温台亦有之以廣南者為佳茵陳有山茵陳家茵陳二種蔢荷芎藭蒲黄天羅馬蘭羊蹄一名蓄或又名秃菓之屬梅多種花白者為盛餘則有緑蕚梅紅梅雙梅香梅千葉梅夏梅寒梅其實之酸則一也又有黄色者為蠟梅無實桃多種以天台水南為勝皆夏熟惟紫桃一名崑崙桃以秋熟更有名寒桃以十月熟又有實小如梅者曰御愛桃又有水宻桃綿桃餅子桃其無實者為碧桃緋桃李花與梨花類有緑李蠟李朱李紫抹李數種杏花類紅梅舊傳天台山有六出五色者號仙人杏梨花雪白有雪梨梅梨青消梨水梨紅縻黄縻等數種其大小不類蓮花有紅白二種俱結實又有碧蓮府蓮朝日蓮安石榴花有單葉百葉一種號花石榴蔵其實花開不壊枇杷葉隂宻不凋冬花夏實橘花頗香有榻橘緑橘乳橘朱橘等種金柑黄色如彈丸橙皮辛色黄有青橙皺橙香綿橙等種朱欒實大如甌理粗而皮厚其瓣堅酢不可食俗呼沙柑又有香欒蜜覃二種柚爾雅注云似橙實今土産大者如甌盂楊梅臨海異物志云子如彈丸赤色五月中熟近歳土人所植多大而甘櫻桃一名荆桃一名含桃一名鶯桃吕氏春秋以鶯嘗舎其木故名鶯桃俗但云櫻桃林檎本名来禽出天台者佳蒲萄二種紫者㣲酸青緑者甘甘者名水晶味尤勝出仙居栗本草栗注云剡及始豐皮薄而甜相傳有人病足往其下食數升即能起行始豐今天台也小者號茅栗榛似栗而圓小又有二種曰鈎栗俗呼巢勾椎小而圓黑又一種名櫧差大而味澁俗呼曰苦銀杏本名鴨脚後以其色白易今名􅀥有馬頭􅀥鍾􅀥鹽官􅀥數種又一種名棘子實小而圓柿有紅緑烏黄數色及牛妳八稜無核丁香等種椑形似柿青黒色一名緑柿楊桃臨海異物志云色青黄其核以􅀥蓋今山􅀥又一名羊桃本草云藤梨或名獮猴桃𤓰有金𤓰銀𤓰等種又有名八稜約青筭筩者木𤓰一名木梨比宣城為下榧花實相續而生天台仙居有之菱有牛頭菱緑菱三角菱等數種芡俗名雞頭陂塘間有種者荸薺生水田中藕出臨海蔡嶺者佳甘蔗有竹狄二種出黄巖亢山等處葛春生苖引蔓根大如臂茨菰即鳬茨東漢書作鳬茈葉有稏如燕尾生水田中今蔡嶺為多蔬之屬芥一名水蘇有紫芥黄芥青芥油芥數種出石罅者曰山芥味極辛出黄巖仙居菘大曰白菜小曰菘菜又有白頭牛肚早晚等數種波稜葉尖理細如波紋劉禹錫嘉話云出頗稜國有僧携子而至俗訛為波稜按唐西域傳貞觀十一年泥婆羅遣使入獻波稜菜非頗稜也蒿一名同蒿又有蔞蒿葉細而香薺有花薺紅薺二種韭一名草鍾乳四時纂要云一剪一加糞歲不過五剪云胡荽一名元荽㓜㓜新書又云鵝不食草蕨爾雅曰蕨鼈郭注初生者可茹土人多以配笋焉葱四時有之惟冬其白愈長萵苣遯齋閒覽云出萵國苦蕒字書曰苦蠶婦所忌莙薘其莖和灰汁可澣衣筍有早筀晚筀江南含肚石筍箭筍燕筍鞭筍苦筍等種薤似韮而葉濶多白莧有五種赤白紫三色又有馬莧五色莧葫大蒜也一呼曰胡蒜舊傳天寶中此州李木生一枚呼為胡蒜俄而祿山叛乃先兆也蕈多種出仙居稠臯者勝其地有左溪右溪中溪中溪者㝡香又天台萬年山出合蕈土人珎之多暴以致逺仙居亦有之薑本草云出臨海章安者佳萊菔俗名羅蔔宜於沙地出黄巖潮際者尤大牛蒡三歲一花根可食土人以中元日脯之木耳生木上又有生石上者曰石耳生木上而細者曰天花蕈𤓰有冬𤓰秋冬瓠𤓰稍𤓰等數種芋若蹲鴟謂之芋魁今出城西砂田者佳苔生海水中出寜海古洞者佳紫菜莖纎而稀生海崖石上土人以春初者為貴呉都賦綸組紫綘註紫紫菜也海藻生海中又一種甚大俗名大菜又一種細而紫色名鹿角菜香菜有細大二種蘇有紫蘇花蘇板蘇三種草之屬芝抱朴子云芝草生盖竹括蒼山晉許邁云天台臨海山多有仙人芝草耳目記亦云赤城山頂有青芝二根焉蘭每幹一花而香濃者蘭五七花而香薄者蕙萱埤雅云一名鹿葱可以忘憂夏開者髙而葉大秋開者短而葉細又有鞓紅百葉者有鵝黄而香者茜生山谷中三稜可以染絳茭生浦中束其葉可為薦藉有白色者其根號茭手可食蒲生陂湖中三白農人云三葉白則稲熟藍三種中有梗者曰木藍可為澱者曰松藍可染碧者曰蓼藍燈心澤地叢生莖細圓可為蓆馬鞭莖方花鈿色下如鞭鞘僊掌生石壁上如人掌故名蕢爾雅謂之江生者為淡蕢近海生者為鹹蕢土人以為䌫為席為屨萍爾雅萍注云小萍也江東呼為薸有素紫二色紫者以壅田極腴又圓葉白花者曰白蘋蓼江岸者曰紅蓼道傍者曰辣蓼可造麴蘖蘆或謂之葭小者曰藋木之屬金松按唐李德裕賦序云於顔太師猶子舊宅覩竒木枝似檉松葉如瞿麥訪其名曰金松得於台嶺故為之賦其畧云風入葉而成韻露垂柯而流液含春靄而葱青映夕陽而的皪疑翠羽之羣翔笑金潭之旁射亦猶處子在於隠闕竒材遺於山澤琪樹按孫綽賦云琪樹璀璨而垂珠李善註云仙都所産未言其狀也至唐人詩詠始盛李紳詩註云垂條如弱栁結子如碧珠三年子乃一熟每歲生者相續一年者緑二年者碧三年者紅綴條上璀錯相間此言其狀而其詩云石橋峯上棲𤣥鶴碧澗巖邊䕃羽人氷葉萬條垂碧實玉珠千日保青春月中泣露應同色澗底侵雲尚有塵徒使伏根成琥珀不知松老化龍鱗許渾詩云月明琪樹隂鮑溶詩閒踏莓苔繞琪樹皆謂此也松土産最盛天台有怪松大數圍髙不四五尺陸龜䝉嘗讚之寧海梁王寺亦有偃松極古怪柏葉匾而香檜有御愛檜海檜二種梓爾雅云椅梓注云即楸也桂天台山有八桂槐爾雅作櫰葉大而黒杉有刺杉細杉瑞杉等種樟色㣲赤氣辛桐有黄桐毛桐梧桐等種楓脂可為香名山畧記云天姥山有長楓千餘丈今無之檀黄色或名黄檀檉杜光庭題空明洞有松檉蔽日影森森之句楠根生瘤呉都賦云楠瘤之木攴謝靈運名山志云樓石山多有之實可食欓子似茱茰而香榆其類有十葉同而理異柞性堅得土之正可為梳材櫟葉似栗可染皂其實橡也朴皮粗楮一名榖舊傳皮斑而有瓣者為楮皮白而無瓣者為榖枕出樓石山冬青宫中號萬年枝四時常青樺桃皮可為燭唐人所謂朝天樺燭香是也金荆木堅有文可為床楝子可熟絹樗形幹類椿葉脱處有㾗如摴蒱子故名然無用莊子所謂匠者不顧是也黄心以其心黄故名烏桕實如鷄頭液如猪脂可壓油為燭栟櫚呉錄云出臨海山中一名㯶櫚柳其葉下垂細者曰西河栁又一種曰櫸杜甫詩所謂櫸栁枝枝弱是也黄楊歳長三寸遇閏則縮一寸東坡所謂厄閏年者是也水楊葉圓而濶且梗短生水濵苦條材可為弓桑有黄桑青桑花桑水桑過海桑柘葉不類桑蠶惟三眠者食之皂荚南史云黄塵汚人衣皂荚相料理又一種田肥皂可浣衣椆其實可食竹之屬斑暈紫黒而㸃大又號越竹紫紫色張文􅅗所贊紫君是也筀生二三月為早筀其皮暴乾可照夜生四五月者稱晚筀方以莖方故名出天台玉霄峯箭㑹稽之竹箭是也淡肉薄節間有粉可造紙南人多燒取瀝焉石節踈而平可編壁狗竹譜云節間有毛生臨海筋肉厚竅中可為弩慈又名子母竹叢生苦以筍味苦故名海物記云越人以苦毒竹為槍中虎即斃江南幹葉蒼翠異他竹佛面以根如人面故名釣絲可為釣竿桃枝爾雅云凡竹相近四寸有節者名桃枝今所産其節相去踰尺可為笈笥不假丹漆又曰蒲葵竹茅俗名笆籬竹公孫長尺許成叢四季長筍不絶篠葉云箬葉以褁物不漬潤畜之屬牛有黄牛水牛二種馬種有自他境貿易而至然皆駑材羊地宜草而肥息彘爾雅猪也色黒有白蹢者名花猪犬有黄白黒等種猫毛色等異鷄有黄白烏花色大者喜鬪又有潮鷄遇潮長則鳴孟浩然天台詩所謂鷄鳴信潮早是也鴨爾雅謂之鶩又有一種名野鴨鵝有蒼白二種禽之屬烏説文云一名慈烏以其能反哺而名其腹白者曰鵶又一種名寒鵶狀差小初冬来自西北云鵲俯鳴則隂仰鳴則晴聞其聲則喜故曰喜鵲鸛陶𢎞景云有兩種似鵠而巢木者為白鸛黑色曲頭者為烏鸛鷹蒼黑色亦名鷙息又有唽而聲悲者曰鷂蒼褐色而似鴟者曰隼鳩斑色方言曰鷦又一種色不斑人視其鳴為耕候名布穀黄鸝一名倉庚俗呼為黄鶯雉即書名華蟲竹鷄自呼為泥滑滑俗傳白蟻聞之即化為水山鷄觜與足皆紅色鵪鶉列子云蛙變為鶉又云鼠亦為鶉善鬪人以宻網取之鴝鵒人畜其雛以竹刀剔其舌可使能言似鵙而有幘者是鴿一曰舶鴿鷴似水鷄而色白翠碧毛可為飾南方人呼為紅翠郭公身赤而頭尾黒畫眉白眉褐質善鳴好鬪雪姑毛羽黑白相間白頭翁似雀而大首有白㸃謝豹一名杜鵑又名子規曰謝豹者以其聲雀斑褐色又有黄色者曰黄雀八九月羣飛稲田間人取為披綿鮓或曰海魚所化八月為雀十月復入海為魚啄木按本草褐者為雌斑者為雄穿木食蠧搗藥禽其聲丁當似之婆餅焦似雀而大羽褐色青絲似雀而小羽青色如絲山鷓長尾而碧色觜與足皆紅伯勞一名鵙一名博勞鵜鶘頤下有皮可容二升物又名淘河青菜嫩緑色腹下黄色黄頭褐色喜鬬鶚似􅉇而小一名鵂鶹鸂鶒臨海志云毛五色善勑水取魚鸕鷀口中吐雛土人以捕魚鷺足脩而羽白南越志云隨潮上下鷗臆白翅青南越志云能隨潮上下鳬飛甚速鴛鴦毛羽五色雌雄相逐水濵紅鶴身白觜與足皆赤鶻似鷹而小又有一種名鶻鵃似鵲尾短東京賦云鵑鵃春鳴是也花臈似雀而大色黄褐白黑相間如花善鳴噪天似雀而大色如之性善鳴愈鳴即飛愈髙百舌一名孟桑遇春初作百鳥鳴十二紅羽毛紅褐碧緑相間獸之屬虎豹有赤黒二種又有文圓者名金錢豹豺方言曰豺犬狼似虎而小野猪牙利如鎌刃毛黑如錐一名豪猪即封豕也山羊有筋力善走麂爾雅麂大麕也旄毛狗足又有一種相類曰􅕱香狸形如羊而小有力味甚珍一名牛尾狸兎博物志云望月而孕論衡云䑛雄毫而孕猿貫休詩黄猿領白兒許渾詩鍾盡隴猿吟指台山也猴舊傳大厯中有數百集寧海杉林中里人伐木欲殺之有一老者飛出縱火爇其木於是人走救火猴得脱去其黠如此鯪鯉似鯉而有四足能陸能水一名鱗鯉又名穿山甲刺蝟足短多刺近人則縮獺似犬而口鋭毛細水不能濡善捕魚人有魚鯁以其爪爬項即愈鼠狼生田野中似鼠而尾如帚善捕鼠鼯爾雅云似小蝙蝠栗鼠一名􅤜鼠竹䶉贊寧云凡竹刺入肉不能出者㗖此物立消以其食竹故能化竹毒也魚之屬水族附鱸肉脆者曰脆鱸味極珍又有江鱸差小石首一名鯪魚頭大尾小腦有雙小石瑩如玉故名鱗色如金其小者曰郎君曰黄衫又其次盛於春者曰春魚僅尺許鮭一名俗稱烏狼腹多刺肝毒殺人烹之必去齒目涎血冬月為上味腹有朒白如酥名西施乳又一種小而黄春半方出名黄鮭􆂚俗作鰵三腮曰􆂚四腮為茅狂似魚而膩宜鹽煎炙鯧板身而鋭狀若鎗刀曰鯤匾沙二十四種有白蒲沙黄頭沙白眼沙白蕩沙青頓沙烏沙斑沙牛皮沙狗沙鹿文沙鮧沙沙燕沙虎沙犂到沙昌沙丫髻沙刺沙其類甚衆比目雙則比目單則王餘魚狀如牛脾鱗細紫黒色眼相合乃行楓葉形小味極珍土人重之海物異名記云楓葉入水所化也鮆子多而肥夏初暴乾可以寄逺又有大者曰馬鮆可膾一名魚鯔身圓長而鱗細黑味甘鯉無大小行皆三十六鱗陶𢎞景稱為魚王銀口尖身鋭如銀條以為鮓尤美鰣一名箭魚䱥小者曰康䱥白板身肉美多細鯁鮶似鯔而目大似鯉而鱗粗能以鬛刺水蛇食之鯽出海中曰海鯽出溪塘中者止曰鯽其形皆匾而鯽首味甘梅首大朱口金鱗土人暴以致逺次於鮆骨多而肉白馬鮫無鱗而鋸齒青斑色短項縮而短又有一種曰鸚哥魚火頭巨尾小身圓通赤故以火名􅤤身如膏髓骨柔無鱗竹夹近尾有硬鱗白袋形似牛而白每自海入江則為水潦之兆謝豹杜宇鳴時有之烏澤與鯔相類柿核一名秀才魚魟形圓似扇無鱗口向下尾長於身最大曰鯨魟次曰錦魟又次曰黄魟形似魟以鹽裛暴乾俗呼老鴉鮝地青尾有刺甚長逢物則撥之毒能中人色白者曰地白與魟相類又名邵陽魚鼠尾魚細鱗生溪塘中以鱗細故名石勃卒一名耒魚鮎爾雅鯷魚大者長尺餘無鱗亦名鰋又呼為魨子身圓宜為鹹苗至小宜為鹹華臍形如篛笠有帔可食一名老婆魚帶南海異名記云脩若練帶曰帶魚鱔黄色狀如蛇或傳荇蓼根莖所化鰻出海中者齒尤銛利冬晴鱐之名風鰻宜於致逺出溪洞者曰鮫鰻江湖者曰湖鰻又有一種曰鰻或曰􅫛鰻形似蒻江海俱有之鰫背青無鱗多腴目旁有骨名乙禮曰魚去乙鄭注云東海鰫魚也品最下不登賔爼惟鹽裛以為鮝則佳暴其肚名赤魚鰾云鰍生泥中品頗下章巨八足首圓南海異名記正名曰蜛蝫郭璞江賦蜛蝫森森而垂翅是也海濵人訛曰章魚又曰章舉一種足似之而小曰望湖魁首駢足目在腰股其足長三五尺許者曰石蚷江珧以柱為珍東坡有江珧傳言其甘郭璞江賦曰玉珧螺多種揜白而香曰香螺味辛曰辣螺有刺曰刺螺又有丁螺斑螺黄螺白螺田螺之類又有生深海中可為酒杯者曰鸚鵡螺車螯歐陽公詩璀璨殻氷玉斑爛㸃生花美此物也一名昌蛾一名魁蛤蝦有赤白青黄斑數色青者大如掌土人珍之多以餉逺梅熟時曰梅蝦蠶熟時曰蠶蝦狀如蜈蚣而大者曰蝦姑身尺餘鬚亦二三尺曰蝦王不常有皆産於海其産於陂湖者曰湖蝦二鉗比他種其長倍之鱉一名團魚烏腹有墨性嗜烏浮水上伺烏啄其腹則以鬚巻食之骨名海鰾鮹土人以元夕隂晴卜多寡云蛤蜊善醒酒山谷詩商畧督郵風味惡不堪持到合利前是也一種小而殻薄者名蛤蜊姑蟶大者曰竹蟶長二三寸大如指而頭開蚶爾雅謂之魁陸有尾壟蚶毛蚶數種臨海土物志有云有側徑四寸者又有烏頭而似蚶者一名􅒕云䗯似蛤而長殻有毛龜脚以狀似之郭璞江賦石蚴應節以揚葩是也牡蠣陶𢎞景云百歳鵰所化本草以左顧為牡蠣生海際崖石上磈礧相連如房曰蠣房又有一種曰金錢蠣云蝤蛑八足二螯隨潮退殻一退一長最大者曰青蟳斑者曰虎蟳後二足扁濶名撥棹云蟹類蝤蛑而殻鋭螯銛利斷截如剪故一名曰蠘有赤膏者俗呼為母蟹冬以滷漬之曰剛蟹其無膏者曰白蟹螃蟹俗呼曰蟹螯跪帶毛糟之可致逺東坡云蟹㣲生而帶糟是也彭越爾雅名彭螖土人以其色青呼為青越螯赤者名擁劍名執火又一種為彭蜞性極寒正蔡謨謂讀爾雅不熟幾為所誤者也千人擘海物異名記聚刺横殻擘之不能入蚌有珠郭璞江賦曰瓊蚌晞䊮而瑩珠海月形圓如月亦謂之蠣鏡土人刮磨其表取通明者鱗次以蓋天窻謝靈運詩所謂掛席拾海月是也石帆生海中石穴紫黒色枝柯相連石䗘形圓色紫而有刺鱟雌常負雄而行漁者雙取之子如麻醬之可致逺韓愈詩云鱟實如惠文首眼相附行是也䖳一名水母形如覆釡常有蝦隨食其涎縷其膚縮以礬可致逺蛤毎一潮生一暈姚寛夫天台詩所謂春潮生蛤暈是也海濵人以苗栽泥中伺其長然後出生只都者佳淡菜一名夹殻或有産珠者一名老婆牙生於巖或簄竹上蟲之屬蛇十餘種青竹蛇與竹同色花蛇黄色喜捕鼠腹蛇胎化腹裂子生最毒惟烏蛇不螫人蜈蚣腐草所生足有青赤二種蜥蜴似蛇四足以備四色者為雄餘為雌縁籬落而黒色小者名蝘蜒在壁名守宫蠅虎似蜘蛛而灰色善捕蠅鼃三足者名蟾蜍大者名封蛤又水中鳴者名蝦蟇蚯蚓俗云曲蟮蜘蛛織網取蚊小者名蟢子蟻有黄白二種蝱能㗖牛馬血蝸雨時涎壁如銀色蜻蜓小而黄者曰胡棃蜂有蜜蜂沙蜂山蜂數種蝶大者曰蛱蝶有黄白黑數種蠅色蒼其首赤而差大者呼為影跡見歐陽公賦螢淮南畢術螢火却馬注云取螢火褁以羊皮置土中馬見之鳴却不敢行螳螂青色長臂蜩詩云五月鳴蜩本生土中夏則登木而蛻秋鳴為蟬蟋蟀一名促織有尾為雌無尾為雄雄者能鳴鳴於九月後為寒螿赤城志巻三十六
