body:
  text: 赤城志卷三十四宋陳耆卿撰人物門三本朝仕進特科熙寧九年夏升闕宜人字闕終興縣尉求仲弓黃巖人字德夫終知樂清縣有文集藏于家元豐五年蔣師顔臨海人字闕知鶚之闕祖終承奉郎奉化縣八年徐沔闕通人字闕終直郎元祐九年朱君卿闕承人字闕終務郎崇寧二年趙逢闕人字闕五年陳師允闕人字闕大觀三年夏奕闕歸人字闕簿終善縣主張希顔臨海人字闕州希房之弟希甫之兄終闕司户參軍政和五年孟灝仙居人字闕軍終嚴州司户參周光臨海人字天錫洎之祖終恭城縣丞徐久中臨海人字闕終欽州刑曹紹興五年林秉文臨海人字民師終知永福縣二十一年劉知過天台人字與幾與兄知變號二劉終監南嶽廟陳晞愈臨海人字次韓二十四年應權仙居人字偉節終知寶應縣周逢闕人字闕二十七年左璵黃巖人字闕前璠之弟㻫之兄終監御軍器所朱壁臨海人字彥益終麗水縣尉賈輅闕人字闕錢天綱臨海人字仲紀終永豐縣尉三十年陳綰黃巖人字次權終太和縣丞張開臨海人字彥逺終泰州文學隆興元年應敦艮仙居人字若虛頥之弟終衡陽縣主簿乾道二年胡汝舟臨海人字巨濟終威武軍僉判五年徐大中臨海人字元禮終廣西經略司幹官許邦弼寧海人字右之終吉水蒜丞章世安闕人字闕陳願仙居人字子願終承議郎以三品服致仕事見朱文公所贈詩八年徐易天台人字名世終闕陳文行闕人字闕趙餘慶黃巖人字慶叟終長溪縣丞陳著臨海人字孟明耆卿之叔祖終從事郎應懋商臨海人字彥及終古田縣丞方斫仙居人字子木號韋溪先生終嘉州文學事見門人陳檢正庸張郎中布黃侍郎宜所為挽詩淳熙二年孟維翰仙居人字宗卿終通直郎陳問道黃巖人字圖南終宣義郎洪九疇闕人字闕項觀古黃巖人字正已葉元憲仙居人字世則終縉雲縣丞方剛仙居人字抑強終通直郎五年周鏸黃巖人字惠夫沈述臨海人字克明遷之兄終永嘉縣主簿陳剛中臨海人字闕八年余祈臨海人字闕應士廉仙居人字簡仲權之子振之兄終新城縣丞楊朴黃巖人字文之終承奉郎張鈇黃巖人字叔平十一年徐邦卿臨海人字仲勤大中之子終上虞縣尉徐大受天台人字季可終監行在草料場號竹公溪先生有文集經解藏于家事見朱文所遺帖及丁可所為行狀李介石仙居人字正仲終承議郎金師軻仙居人字仲醇終闕州文學十四年徐季闕人字闕劉東臨海人字仲寬終瑞安縣尉左伯疇黃巖人字鍚範終闕縣丞吳汲仙居人字進仲終溫州司户參軍陳永年黃巖人字南壽終闕縣丞金三復仙居人字克孝終監南嶽廟十五年陳炳仙居人字文夫終監南嶽廟十六年登極樓拱臨海人字尚輝覺觀之父終承務郎致仕方富業寧海人字子勤終監南嶽廟車九齡黃巖人字闕金三德仙居人字克家終闕縣主簿紹熙元年唐堯卿天台人字咨仲第一等第一人賜出身終湖州教授左賚黃巖人字錫善終福州推官許濬寧海人字深道邦弼之猶子終承務郎左伯朋黃巖人字鍚龜終贑州推官石丞臨海人字子鎮終闕縣主簿陳煒闕人字闕朱希説臨海人字子傅伯臨之猶子終忠州文學陳驌臨海人字季良騤之兄終監南嶽廟楊浹闕人字闕鄭瀛黃巖人字子仙終監南嶽廟徐天麒黃巖人字長卿四年薛逢辰黃巖人字伯遇終侯官縣主簿陳三省仙居人字少曽願之猶子終承務郎慶元二年楊起宗寧海人字仲起終慶元府觀察推官張萬臨海人字子大蔣震臨海人字起卿終監南嶽廟葉皆臨海人字孟我終寧國縣主簿有易解考工記辨疑行于世賈謂闕永人字渭之終豐縣丞沈必壽黃巖人字天昌賈之祥天台人字闕胡介寧海人字安節終宣教郎陳育臨海人字材翁終懷安縣主簿林有聞闕人字闕闕作就仙居人字闕終監南嶽廟闕年陳南闕人字闕繆之光臨海人字觀國終江陵府觀察支使張田臨海人字子豐萬之兄終嵊縣尉葛一之寧海人字元甫終德安縣丞戈之竒臨海人字穎父終湖口縣丞朱江臨海人字叔泳終安慶府觀察支使謝彪仙居人字文伯顧牧仙居人字謙之終常山縣丞林發藻闕鹿開臨海人字必先終監南嶽廟高恭臨海人字子儀終闕蔡賔黃巖人字闕嘉泰二年周中臨海人字子建光之孫洎之弟楫之父終嘉興府酒稅諸葛若黃巖人字欽之終泉州市舶謝九齡臨海人字子壽終監南嶽廟金柟天台人字茂之終連州推官葉日新天台人字德明終閩縣尉潘浹闕人字闕開禧元年陳穎仙居人字秀叔終溫州贍軍酒庫關庚臨海人字子明商儀卿臨海人字儀仲飛卿逸卿炳卿之兄終永福縣主簿馮侁臨海人字先之終監南嶽廟朱伸之臨海人字泰叔終湘潭縣主簿陳洪仙居人字子良終桂陽縣主簿金逵仙居人字士貴終道州文學林登黃巖人字子驤終侯官縣主簿嘉定元年潘休臨海人字逄辰終監南嶽廟吳桴臨海人字才叔終廣濟縣主簿林唯臨海人字貫之終仙遊縣主簿陳方黃巖人字漢英終闕州文學伍章臨海人字端叔張叔元臨海人字廷善宋之謙天台人字闕劉倓寧海人字允叔炔之兄終黃陂縣主簿號閬風居士闕年石繼喻臨海人字子罕惇之子森之父第一等第一人賜出身王煥黃巖人字子章張起宗臨海人字振叔開之猶子士遜之父朱唐卿臨海人字伯大終青田縣主簿七年郭商佐臨海人字文仲終無為縣尉池從周黃巖人字子文林季永臨海人字伯山十年湯廷俊仙居人字闕周鎬臨海人字子京徐夢熊黃巖人字叔祥十三年陳少明黃巖人字明叔黃元吉臨海人字伯裳吳洋仙居人字闕陳方之臨海人字深叔竒之之兄陳暉臨海人字吉老薑應龍仙居人字升之十五年玉寶盧雄飛黃巖人字升之朱渭老臨海人字叔霖沈蒙黃岩人字正叔商良弼臨海人字賚豫商傅卿臨海人字翰仲朱巗臨海人字叔瞻黃申臨海人字伯翰柯􅔩臨海人字子堅薑琛臨海人字廷璧李簡寧海人字敬可林杲寧海人字子晦柯楫天台人字濟川十六年吳嚞臨海人字吉甫樓申之臨海人字吉甫惠芝臨海人字德瑞商璡孫臨海人字溫甫宗室紹興二十一年彥信居臨海字欣叟歷通判處州知德慶常德府西外宗正事終朝請大夫知贑州二十七年伯洙居黃巖字彥文終知南外宗正事伯淔居黃巖字彥正伯洙之弟終知建昌軍隆興元年彥璦居仙居字中玉終平江府觀察推官乾道二年彥敏居仙居字茂功終建康府分司糧料院汝翼居臨海字元輔終闕州司户參軍五年彥鼒居黃巖字國器終通判處州八年師淵居黃巖字幾道歷通判溫州將作監太常寺主簿司農太常丞終朝奉郎師譽居寧海字師道終兩浙轉運司船場淳熙二年師會居寧海字會叔師譽之弟終都大提點四川茶馬五年汝伋居臨海字季思終通判信州十一年善法居臨海字養直師端居黃巖字知道歷大理寺主簿知徽州司農寺丞度支郎淮東轉運判官終知婺州篔居臨海字慶長善法之兄歷知昭循二州今以朝散郎主管崇禧觀十四年師雍居黃巖字然道伯洙之子歷通判嘉興府主管官告院宗正寺主簿今以朝散大夫知通州崇巨居臨海字可大終監文思院汝俞居臨海字仁父歷司農寺主簿太府寺丞今以朝請郎知饒州紹熙元年師夏居黃巖字志道師淵之弟歷大理司直知南康軍撫州今以朝散郎知西外宗正事師䢼居臨海縣字共父終嘉興府判官潭夫居臨海字深父伯滸居黃巖字彥澤終長州縣丞汝簡居臨海字敬行終羅源縣令希旦居臨海字周卿終知宿松縣慶元二年崇嵒居黃巖字山父翰夫居寧海字宗甫五年師開居黃巖字信道崇居黃巖字正甫師羽居黃巖字由道終都大坑冶司幹官嘉泰二年琡夫居臨海字溫玉彥信之子終嘉興府判官開禧元年師藏居黃巖字詠道伯洙之子師雍之弟崇居黃巖字吉父希尹居臨海字吉甫允夫居黃巖字文卿嘉定元年時望居天台字民瞻終海鹽縣尉四年希亮居黃巖字自明希廙居黃巖宇欽夫師端之子崇琰居天台字廷玉希悅居黃巖字習之師夏之子七年師耕居黃巖字耕道崇禹居臨海字舜咨汝俞之猶子希恪居黃巖字元恭時著居寧海字仲昭崇中居黃巖字和父與齡居臨海字德逺十年希瑀居臨海字禹玉崇正居臨海字端可汝俞之猶子汝孖居臨海字孜卿善篔之子崇譽居臨海字君美崇禮居臨海字君用君美之弟十三年時杲居臨海字元昕彥信之孫崇居臨海字子正十六年時恭居臨海字國梁潭夫之子崇學居臨海字處文崇譽崇禮之弟潛夫居黃巖字景夀彥鼒之子允夫之弟武科紹興二十四年鄭矼榜設科始此鮑惟幾仙居人字與權終武經郎興元府都統司計議官三十年樊仁逺榜鮑惟時仙居人字少明惟幾之弟終秉義郎泉州永春酒稅隆興元年孫顯祖榜童熙仙居人乾道二年蔡必勝榜高選仙居人字才舉歷知萬安軍栁州主管崇道觀終武經大夫王卿月詳見乾道五年科名陳必定仙居人五年趙鼐榜蔣碩仙居人字仲美金駒仙居人字興可終從義郎如皋縣令八年林宗臣榜王公弼臨海人字輔之終武翼郎知安豐軍淳熙二年蔣介榜蔡鎬黃巖人字正之歷武學諭終博士事見水心葉侍郎所為銘吳沆仙居人字仲亢歷知昭靖二州今以武經大夫主管崇道觀王公佐臨海人字才之公弼之弟終象山縣尉五年陳説榜陳大節仙居人字伯固終監永春縣稅楊斌臨海人字兼子終武經郎知賀州王智夫仙居人字愚可終修武郎知鬱林州蔣師堅仙居人字仲乂終訓武郎潼川路都監陳針闕人字闕八年江伯虎榜鄭澥仙居人字子山終修武郎主管仙都觀十一年林㟽榜葉嵩臨海人字伯高省試第一終武翼郎武學博士十四年黃褎然榜鄭漁仙居人字子淵澥之弟終清流縣尉張世英臨海人字文伯終殿前司幹官紹熙元年厲仲祥榜金性仙居人字子善終浙東兵馬都監林卨仙居人字子中終修武郎湖南兵馬都監鹿嘉孫臨海人字亨卿慶元五年陳良彪榜王孫震仙居人字起卿智夫之姪嘉泰二年葉漴臨海人字仲高嵩之弟優等第一人歷知郴澧二州終武經郎知沅州栁斌仙居人字顯父開禧元年鄭公侃榜鄭鎔仙居人字敬夫終華亭縣松浦巡檢王孫貴仙居人字良卿終知邵陽縣胡謙仙居人字聰夫特奏第一終如皋縣尉嘉定元年周師鋭榜鄒顔卿臨海人字希甫丁希吕臨海人字渭叟王槱仙居人字子賢四年林汝浹榜朱仲弼臨海人字正之淮之子終知澧陽縣鹿伯虎臨海人字文卿嘉孫之闕七年劉必萬榜葉蓀仙居人字仲友終江州將領陳清卿仙居人字子直楊渭起詳見進士科吳躍仙居人字雲叔十年朱嗣宗榜鄭堅仙居人字子筠李周仙居人字盈之蔣叔虎仙居人字周卿十三年陳正大仙居人字子中清卿之弟優等第一人陳履泰天台人字泰叔郭用中仙居人字端甫范祖筠仙居人字節父終石門縣尉黃憲臨海人字成甫十六年杜幼節榜陳寵仙居人字良卿陳廷蘭仙居人字伯服遊立節仙居人字季堅黃光弼黃巖人字可信鞏俊臨海人字仲申高申甫仙居人字宣卿遺逸郭琮黃巖人少喪父事母極孝絶葷醴三十年以祈母壽母百有四歲鄉黨異之至道二年士民陳贊等四十人狀其事于轉運使請以聞詔旌表門閭復其徭役明年母無疾卒琮執喪甚哀自是邑人多化之蔣至臨海人字造之有素行家居講授甚盛母張氏年八十抄經典助之大中祥符六年詔舉德行遺逸章守得象及部使者以名聞詔索所著經解以進授將仕郎本州助教賜其母帛咸平初曽守會命使主學慶歷大水城潰子孫掖之往避至曰死生命也吾何逃焉正冠危坐而逝後鄉人祠于學孫師顔師閔四世孫鶚見乾道五年科名呂逢時仙居人字原道少受經于令陳公襄邑人知學自逄時始入太學與鄭獬友駙馬都尉錢景臻師之欲奏以官辭後隱于白岩山羅提刑適舉以孝廉亦不就林放仙居人字達本元祐中將上禮部以親死廬墓側後築草堂于東山隱焉大觀中求八行縣欲以放應詔放不懌去之三十里左譽銘其墓左緯黃巖人字經臣以詩鳴號委羽居士與許少伊為忘年友劉元禮周恭叔以兄事之其卒陳侍郎公輔以詩哭之有有德傳鄉里無金遺子孫之句子璠璵㻫皆知名吳福仙居人性純實括有巨賈留千金其家久之不至福為貿遷得贏俟賈至悉以歸之賈曰向者吾留千金耳贏則君自致吾敢覬乎互相遜決之縣縣上之郡使中分其息福仍不受賈以其半捐之僧廬謂福曰君行誼如許不應久無子吾近得顔氏女願奉君為似續計焉其後生子奉積至芾兄弟登上第歷顯官云余元卿黃巖人父死元卿始生母曰我不見夫何忍見子自剔其目誓不他適宣和冦亂元卿負母而逃力弱不勝仰天誓曰天若助我全母願焚身以報冦定欲償前誓母力止之燃一指以謝天貺其後閭里欲上其事則曰吾非干名者也旋居母喪哀毁不離墓側縣上之郡立碣以記其事江失其字仲明宣和冦亂載老母奔山水間猝遇名冦于東城之岡逼使就降仲明義不辱奮起詈冦卒死之吕丞相頤浩誄以文蔣煜仙居人有文學宣和冦亂與煜遇欲妻以女煜拒之脅以拜亦不從冦曰吾戮汝矣煜伸頸就刃詈聲不絶煜性滑稽其臨事有立如此黃襲明臨海人字原善宣和冦亂視郡城多圯其北倚山無闉堞首白郡以私財為倡遂增築焉訖事冦驟至合圍數日不得入事聞詔免鄉舉有滕侯膺所與書尺美其功甚詳王衡臨海人字平仲大觀中舉八行州歲貢一人衡名居次其上當貢者有微纍居衡次者趨衡指抉之覬遞升一年衡不可竟貢當貢者時書考法甚嚴功過即上達及貢者姓名至提學司以行不應法責郡郡欲改貢衡衡又不可遣職官往諭始聽後死於方臘之亂賊首聞之自戮其黨數人曰何敢殺王佛子趙占龜黃巖人字十朋志尚超卓與石尚書公弼李參政光為內外兄弟二公貴無隻字相通其介如此家有軒面植雙檜呼為檜隱士而自號木公居士宣和冦亂動以火攻獨於是軒相戒母敢犯徐廷筠黃巖人字季節父中行嘗舉八行中行死免喪不忍娶者十年秦丞相檜當國試題問中興歌頌廷筠曰今日豈歌頌時邪條其未足為中興者有五且曰吾不忍欺君也郡縣屈主學後進師尊之後以纍舉恩合得嶽祠廷筠曰吾嘗革封事言嶽廟冗祿無用心既非之可躬蹈邪卒不就林鼒黃巖人字叔和與兄鼐及趙師淵杜􅏎兄弟皆從朱文公遊以學行知名早冠鄉書當用纍舉恩不就邑人尊之稱為草廬先生詳見水心葉侍郎適所為銘僑寓不生長於此而居焉者為僑寓其子若孫生長於此而有科名者入仕進洪擬丹陽人字成季紹聖元年中第官至吏部尚書靖康中避地寧海諡文憲有文集十六卷事見國史呂頥浩濟南人字元直元祐九年中第紹興元年拜左僕射終少傅鎮南定江軍節度使成國公贈太師諡忠穆建炎四年寓臨海淳熙十五年配饗高宗廟庭事見國史子搢兩浙轉運副使孫昭逺知武岡軍綦崇禮北海人字叔厚政和八年中第官至寶文閣學士建炎中寓臨海事見國史曽姪孫奎歷太府少卿湖廣總領今直敷文閣韓昭真定人字用晦丞相縝之曽孫官至直顯謨閣自號大同居士紹興初避地仙居成大亨河間人字正仲元符三年中第官至左朝散大夫直祕閣紹興初寓天台范宗尹襄陽人字覺民宣和三年中第建炎四年拜右僕射終觀文殿學士紹興初寓臨海事見國史弟宗伋知衡州子榛知常州孫節知南劍州籍知江隂軍錢忱錢塘人字伯誠少師駙馬都尉景臻之子官至少師瀘川軍節度使榮國公紹興初奉秦魯國賢穆明懿大長公主主寓臨海事見國史錢端禮錢塘人字處和少師忱之子隆興二年賜同進士出身參知政事終觀文殿學士諡忠肅紹興初自湖廣侍父徙居臨海事見國史孫象祖見嘉泰四年科名弟端仁直祕閣知郢州姪竽直祕閣知饒州從弟徽之朝議大夫知崇慶府紹興初父稔為守因寓天台從姪幹辦行在諸司糧料院謝克家上蔡人字任伯紹聖四年中第建炎四年參知政事終資政殿學士紹興初寓臨海事見國史弟克明官至主管刑工部架閣文字贈朝奉大夫姪傑浙西安撫司參議官謝伋字景思參知政事克家之子官至太常少卿知處州紹興初侍父寓黃巖自號藥寮居士有文集葉侍郎適為之序孫直見淳熙十一年科名郭仲荀洛陽人字傳師官至太尉慶逺軍節度使殿前都指揮使紹興中寓臨海事見國史李擢奉符人字德升元符三年中第官至禮部尚書徽猷閣直學士紹興初寓臨海事見國史子益謙吏部侍郎益能宗正丞盧知原山東人字行之官至徽猷閣待制紹興中寓臨海事見國史曽孫子章見嘉泰二年科名張師正大梁人字子正宣和中平冦難于此官至宜州觀察使河東都統制紹興中寓臨海事見國史賀允中上蔡人字子忱政和八年中第紹興二十九年參知政事終資政殿大學士紹興初寓臨海事見國史蔡向東平人字瞻明樞密挺之孫紹興初提舉本路常平因寓臨海自號淨空居士有澮水集藏于家曹勛潁昌人字功顯宣和五年賜同進士出身官至昭信軍節度使開府儀同三司贈太師諡忠靖紹興中寓天台事見國史子耜工部郎中知蘄州耘今利州觀察使薑詵長山人字廷言官至寶文閣直學士右通議大夫贈少師紹興中寓臨海事見國史子處度知惠州孫注今大理丞王之望襄陽人字瞻叔紹興八年中第隆興二年參知政事終資政殿大學士諡敏肅紹興初寓臨海事見國史子鏞知房州銖知荆門軍鉛歷大府卿四川總領今奉祠孫涔歷金部郎官終知婺州桑莊高郵人字公肅官至知栁州紹興初寓天台曽文清公幾志其墓有茹芝廣覽三百卷藏于家子世昌自號莫庵有文集三十卷事見尤尚書袤楊閣學萬里陸待制遊樓參政鑰葉侍郎適序跋虞似良餘杭人字仲房淳熙中為兵部郎官終成都府路轉運判官建炎中以父涭分教于此因寓黃巖自號橫溪真逸林同長樂人字季野紹興二十四年中第官至朝請大夫知惠州先是其父仰為州推官因寓臨海闕憲奉符人字景思中特科監西嶽廟乾道中隨妻祖賀參政允中寓臨海號雪巢先生有詩集行于世事見尤尚書袤陳參政騤樓參政鑰楊閣學萬里序記李龜朋長安人字才翁與兄龜年齊名中特科監南嶽廟紹興末隨錢少師忱寓臨海應恕括蒼人字仁仲淳熙初寓黃巖朱文公熹以隱居老友稱之門人趙師淵等號艮齋先生于恕諸城人字忠甫張侍郎九成之甥中特科終昌國縣主簿紹興中以父定逺為州判官因寓黃巖節婦名節士大夫之所難也而婦人女子輒易之蓋善出於性非必學問之所及也今紀其顯者一人餘則可以槩推矣陳氏臨海人貢士朱伯履妻年少夫亡有欲奪其志者陳氏拊膺慟絶既蘇歎曰吾寧速死忍聞此言引刀欲自剄姑亟奪之乃免事父母舅姑至孝舅得風眩疾侍湯藥不懈者八年姑老齒豁手調甘旨以養壽百有一歲庭有桃實萱穎之祥郡以聞詔特封安人仍旌表門閭赤城志卷三十四
