body:
  text: 赤城志卷三十七宋陳耆卿撰風土門二土俗古言廣谷大川異制民生其間異俗俗誠有異也轉移之則在人焉州介東南之陬承平時號無事里無貴客百姓饜漁獵不識官府建炎後官吏叢脞兵旅繹騷民生産作業益艱自是機變繁滋有逐末而閧於爭者幸王化密邇風雅日奏薰郁涵浸遂為文物之邦儻誠身以為民先俾禮義四達豈非學士大夫之責而尚可議俗耶參故常列風土蓋古人記歲時之意今不復贅而惟以名守令勸戒列焉蓋不惟學士大夫之責而尤為政者之責也仙居令陳密學襄勸學文咨汝邑父老夫人之為善莫善於讀書為學學然後知禮義孝悌之教故一子為學則父母有養一弟為學則兄姊有愛一家為學則宗族和睦一鄉為學則閭里康寧一邑為學則風俗美厚雖有惡人將變而為善矣今天子三年一選士雖山野貧賤之家子弟茍有文學必賜科名身享富貴家門光寵户無繇役庥蔭子孫豈不為盛事哉豫自到任以來居常憫爾邑民不識為學父子兄弟不相孝友鄉黨鄰里不相存恤其心汲汲惟爭財競利為事以至身冒刑憲鞭笞流血而不知止豫甚哀焉奈何奉行天子詔條不可私恕每刑一人若傷膚髮而汝邑民不知豫心乃相扇熾囂訟成獄自以為能使豫日不得食夜不得寢以與汝斷弊略不能改是誠何心雖然非汝百姓之樂於此也蓋不知讀書為善之故也前年曽有文書教諭汝鄉民令遣子弟入學于今二年矣何其無人也古者十室之邑尚有忠信况今百里之邑良民之子弟不少其間豈無聰明瓌茂朴美之器可使為公卿者然而不使之為學真可惜也今汝父老歸告而子弟速令來學豫其擇明師而教誨之庶幾有成如前所説豫明年十二月官滿即去汝父老亟其聽豫言李守兼跋云密學陳公昔宰仙居作勸學文歲正元日因耆老來賀使門人管師復宣讀於庭時皇祐二年也初海邦僻左人未知學及是風俗翕然丕變詩書理義之澤訖今百餘年漸漬深矣袤及千里絃誦之聲洋溢人才輩出掄魁造士諌臣碩輔名迹相望豈惟上之人作成之功與其山川炳靈之驗亦由前輩巨公格言遺訓近接其耳默感其心有以致之然爾兼承乏為州之二年始克以斯文鏤板傳示學者冀吾父兄子弟之賢相與紬繹而誦味之嘗原公之勸誨在於父母有養兄姊有愛宗族和睦閭里康寧風俗美厚此學之要亦其效也若乃身享富貴家門光寵理之固然否則有命矣然未有不學而能致此亦猶韓文公經訓乃災畬之説非以利言曉人之法當如是爾兼輒因繕寫題其後勸俗文為吾民者父義能正其家母慈能養其下兄友能愛其弟弟恭能敬其兄子孝能事父母夫婦有恩貧窮相守為恩若棄妻不養夫喪改嫁皆是無恩也男女有别男有婦女有夫分别不亂子弟有學能知禮義廉耻鄉閭有禮歲時寒暄有以思意往來燕飲序老少坐立拜起貧窮患難親戚相救借貸錢穀婚姻死喪鄰保相助無作盜賊無學賭博無好爭訟無以惡凌善無以富吞貧行者遜路少避長賤避貴輕避重去避來耕者遜畔地有界畔不相侵奪班白者不負戴於道路子弟負重執役不令老者擔挈則為禮義之俗矣和鄭閎中仙居詩十一首我愛仙居好三年理尚寬民雖罹網罟政未息風瀾邑民大水之後困於賦役豫欲少息然州縣科率勢不獲巳者比嘗有之憫物刑多省勞心席少安祗慚無惠術求配古人難我愛仙居好民純不用拘閭閻興禮遜囹圄長榛蕪網濶姦逾少風恬惡自無一年人已信感激謝張弧我愛仙居好臨民必以誠簿書無日暇訟獄積年生豫始至邑姦豪有以債負憑折細民田土者迹驗分明豫治而歸之或有年深而無稽者亦忘詞訟三年分戶二千凡有産而無業積年空納其租許其還主者不可勝數百疾求針補千鈞待凖平嗟豫不如古斯道未能宏我愛仙居好安民去百姦誠心雖照物政體昧循環喜有綱條立慙無教令頒二年憂且病王事豈能間我愛仙居好慙無德政馨下車時問疾治獄且空囹老吏貧歸里有老吏余彬者貧無以自給每歸耕田里數月而後出聽之蒼生餒在庭惟憂澤未至豈敢瀆邦刑我愛仙居好園池日退居馴禽來鶴鶴野水進徐徐園鑿新沼引水經竹林間以環流釣翁臺習坎嘉魚二亭草木通樵采圃有短垣薪樵桐子之屬時為邑民所拾桑麻有老鋤猶言民未樂更待寢刑書我愛仙居好家無十數人民窮惟有疾俸薄不知貧弟妹間成癖妻孥老未淳自餘無所恨寸祿及偏親我愛仙居好公餘日在房憂民極反覆責已未周詳法律行隨手詩書坐滿箱老來須向學多病喜平康我愛仙居好隆儒鮮大方諸生令講藝童子俾升堂公暇每有童子十數人至堂上教授經書或試之詩買地興民學因孔子廟後修起學舍買三家之地以廣其基驅車下黨庠豫每出行諸鄉遇有小學則下以觀童子三年邑未化官滿意倣徨我愛仙居好經營盡國工庶民心喜悅小邑勢尊隆萬瓦如雲合千題不日礱自非仁惠術愧子一觀風我愛仙居好官卑分巳盈才非漢循吏道似魯狂生擊柝心雖樂觀風志未平寧如孟夫子不食去齊卿守令賦詠甚多獨録此者以其言皆切於厲俗而多拳拳責巳愛民之意蓋仙居稱善治規摹昉此推一縣則一州可知也蕭守振示邦人詩我本江海人來守仙佛國年豐訟牒稀公事不留積豈無一樽酒約客飛大白重念此邦人朝飽不謀夕頃遭兩旱荒十九皆菜色城中多餓莩倒死臭燻陌幸兹連歲豐粒米棄狼籍嬉嬉不營生便爾輕牟麥三日天不雨沙田已龜拆十家九無儲何以度飢厄我為此邦憂夜眠不安席願天歲歲豐願爾痛儉嗇一年三年儲三年九年食堯湯雖在上豐歉豈可測唐守仲友跋云示邦人詩五言二十八句前台守蕭公侍郎作也台居山海間易水旱民偷於魚鹽惰農靡費故公作是詩以諭之仲友入境覽山川問風俗惜田事鹵莽思有以勸戒之鑱公詩於石以永邦人之思云天台令鄭至道諭俗七篇縣令之職所以承流宣化於民為最親民不知教令之罪也豫自至官觀爾百姓日以爭訟來至于庭其間多違理逆德不孝不悌凌犯宗族結怨鄰里以至婚姻之際多事茍合殊無恩義五服之親問以服紀全然不知浮浪盜販之人日益加衆如此者皆由風俗鄙陋教道未至兼修學從宦之家少小人無所觀法若不曉告而加之罪是罔民而刑之也今採諸經傳擇其文理易明而可以感動人之善心者為諭俗七篇百姓各以此更相訓教率而行之禮義之風必從此始若順爾舊俗反豫教言恣意任情必犯刑禁孝父母父兮生我母兮鞠我拊我畜我長我育我顧我復我出入腹我欲報之德昊天罔極故孝子之事親居則致其敬養則致其樂病則致其憂喪則致其哀祭則致其嚴所以為厚德之報也昔周文王事父王季每雞初鳴則衣服至於寢門外問左右曰今日安否如何左右曰安文王乃喜其有不安則左右以告文王文王色憂行不能正步王季復膳然後亦復初凡食上必自視寒暖食下問所膳然後退其後武王亦如此事文王不敢有加焉然則不孝其親而欲子孫事我以孝豈可得也漢石奮為上大夫老歸於家其子石建為郎中令已老每五日一歸省親入諸子之舍問侍者取其親中衣身自洗濯復與侍者不敢令其親知之夫貴者之事親猶如此况於賤乎晉王祥性至孝繼母不慈每使掃除牛下祥愈恭謹父母有疾衣不解帶湯藥必親嘗母常欲生魚時天寒冰凍祥解衣將剖冰求之忽有雙鯉躍出其孝誠所感如此雖然此言其能養父母者也孝之道又不止於能養而巳故孟子曰惰其四肢不顧父母之養一不孝也博奕好飲酒不顧父母之養二不孝也好貨財私妻子不顧父母之養三不孝也從耳目之欲以為父母戮四不孝也好勇鬪狠以危父母五不孝也禮記亦曰居處不莊非孝也事君不忠非孝也涖官不敬非孝也朋友不信非孝也戰陳無勇非孝也五者不遂災及其親敢不敬乎孝經曰居上而驕則亡為下而亂則刑在醜而爭則兵三者不除雖日用三牲之養猶為不孝也如此則所謂孝者又貴乎修身謹行不辱其親非獨養口體而已今爾百姓父母在則私分異財離居各食從妻子之歡忘天性之愛且禮曰父母在不有私財又曰子甚宜其妻父母不悅則出之子不宜其妻父母曰彼善事我子行夫婦之禮沒身不衰然則私貨財順妻子豈為孝乎愛兄弟兄弟者同受形於父母一氣所生骨肉之至親者也詩曰凡今之人莫如兄弟死喪之威兄弟孔懷言死喪則相恤也又曰脊令在原兄弟急難兄弟鬩於牆外禦其侮言患難則相救也昔衛宣公有子二人曰伋曰夀伋被謗宣公遣往齊使盜待於路欲殺之夀知以告伋使勿去伋曰棄父之命不可夀遂先行為盜所殺伋後至曰夀何罪請殺我盜又殺之故詩人作二子乘舟之詩思之也晉王祥王覽異母兄弟也母朱氏待祥不慈祥被楚撻覽年數歲輒涕泣抱持之朱氏屢以非禮使祥覽輒與俱又雪使祥妻覽妻亦往共之朱氏患之乃止又嘗使人以毒酒殺祥覽知之與祥爭酒飲朱氏遂奪之自後朱氏與祥饌覽必先嘗夫異母兄弟猶如此况同母乎南唐江州陳氏七代同居族人數百口每食鋪廣席以次就坐有犬百餘頭共食一槽一犬不至餘犬為之不食禽獸猶如此况於兄弟乎今爾百姓不明禮義悖逆天性生雖同胞情同胡越居雖同室迹猶路人以至計分毫之利而棄絶至恩信妻子之言而結為死怨豈知兄弟之義哉後漢薛包好學篤行弟子求分財異居包不能止乃中分其財奴婢引其老者曰與我共事久若不能使也田廬取其荒頓者曰吾少時所理意所戀也器物取其朽敗者曰我素所服食身心所安也弟子數破其産輒復賑給嗚呼兄弟叔姪之不和皆因爭財之不平使能少慕薛包之風豈復有爭也哉睦宗族親者身之所自出祖者又親之所自出則愛吾身與吾親者不可以不尊祖推尊祖之心順而下之則宗族者皆祖之遺體可不敬乎睦族者尊祖之義也古者聖人等人情之輕重立為五服以别親踈以定上下上以治祖禰下以治子孫旁以治兄弟歲時之間合族以食序以昭穆别以禮義使之生則有恩以相歡死則有服以相哀然後宗族之義重今爾百姓多逆人理不知族屬茍有忿怨不能自勝則執持棒仗恣相毆擊豈擇尊長也力足以勝之斯毆之矣我富而族貧則耕田佃地荷車負擔之役皆其族人豈擇尊長也財足以養之斯役之矣此皆風俗薄惡人倫之深害也恤鄰里古者五家為比使之相保五比為閭使之相愛四閭為族使之相葬五族為黨使之相救五黨為州使之相賙五州為鄉使之相賔如此則百姓之情歡欣交通而和睦之道著矣孟子曰鄉田同井出入相友守望相助疾病相扶持則百姓親睦蓋為此也禮記言居鄉之禮年長以倍則父事之十年以長則兄事之五年以長則肩隨之見父之執不使之進不敢進不使之退不敢退不問不敢對其於道路則父之齒隨行兄之齒鴈行所任輕則併之重則分之以至斑白者不負戴於道路則古人所以待鄉黨之老者又如此也鄉飲酒之禮於歲十二月率鄉黨之民會聚飲酒以正齒位長者坐少者立老者食以厚少者食以薄所以示民以孝悌之道也其有禍患則鄰里之人同其憂故曰鄰有喪舂不相相謂以聲相勸里有殯不巷歌行弔之日不飲酒食肉焉漢萬石君居鄉里其子慶為內史醉歸入外門不下車萬石君聞之怒而不食慶惶恐請罪萬石君責之曰內史入閭里里中長老皆走避內史坐車中自如豈當如此自後慶及諸子入里門常趨至家王吉居長安東家有大棗木垂吉庭中其婦取以啖吉後知之乃去其婦東家聞之欲伐其棗鄰里共止之因請吉令還婦里中為之語曰東家有樹王陽婦去東家棗全去婦復還又曹節素仁厚鄰人有失豕者相似詣門認之節不與爭後所失豕自還鄰人大慙送歸所認豕并謝節笑而受之夫古人所以睦鄰里者如此今爾百姓以富役貧以強凌弱以少犯長豈知古人所以交鄰里之意哉重婚姻男女有别然後夫婦有義夫婦有義然後父子有親婚姻者禮之本所以合二姓之好上以事先祖下以繼後世可不謹乎是以婚姻有納采問名納吉納徴請期五者之禮皆主人設几筵於家廟而受之所以敬婚姻也古者男女非有行媒不相知名非受幣不交不親故齋戒以告鬼神為酒食以召鄉黨僚友所以厚其别也夫幽則質於鬼神明則證以鄉黨然後行婚姻之禮則男女不可以茍合也如此及婚禮既成男子親迎受之於母也母送之門戒之曰往之女家必敬必戒無違夫子以順為正者教以為婦之道也既而出於大門男先率女女從男夫婦之義由此始也蓋婦人從人者也幼從父兄嫁從夫夫死從子男先而女後則從人之義也質明婦執棗栗榛修以見舅姑成婦禮也舅姑入室婦以特豚饋明婦順也舅姑降自西階婦降自阼階以著代也古人於婚禮之義如此今爾百姓婚姻之際多不詳審閨闈之間恩義甚薄男夫之家視娶妻如買雞豚為婦人者視夫家如過傳舍偶然而合忽爾而離淫奔誘略之風久而愈熾誠可哀也正喪服禮記曰三年之喪何也曰稱情而立文以别親踈貴賤之節而不可損益也創大者其日久痛甚者其愈遲三年者所以為至痛極也斬衰苴杖食粥枕塊所以為至痛飾也人生天地之間有血氣之屬莫不知愛其類今鳥獸失其羣匹越月踰時反其故鄉則翔回鳴號然後能去之故有血氣之屬莫智於人故人於其親也至死不窮將由夫邪淫之人則彼朝死而夕忘之然而從之則鳥獸之不若也將由夫修飾之君子則三年之喪若駟馬過隙之易然而從之是無窮也故先王為之中制止於三年使足以成文理則去之矣然則何以期年曰天地則已易矣四時則已變矣其在天地之間者莫不更始焉故以期也九月以下則漸殺之使弗及也故三年以為隆期九月以為間小功緦麻以為殺上取法於天下取法於地中取法於人人所以羣居和一之理盡矣斬衰貌若苴齊衰貌若枲大功貌若止小功緦麻容貌可也此哀之發於容體者也斬衰之哭若往而不返齊衰之哭若往而返大功之哭三曲而偯小功緦麻哀容可也此哀之發於聲音者也斬衰唯而不對齊衰對而不言大功言而不議小功緦麻議而不及樂此哀之發於言語者也斬齊三日不食齊衰二日不食大功三不食小功緦麻再不食父母之喪既殯食粥朝一溢米暮一溢米齊衰之喪疏食水飲不食菜果大功之喪不食醯醬小功緦麻不飲醴酒此哀之發於飲食者也父母之喪居廬寢苫枕塊不脫絰帶齊衰之喪居堊室編蒲而寢大功之喪寢有席小功緦麻牀可也此哀之發於居處者也斬衰布三升齊衰布四升五升六升大功七升八升九升小功十升十一升十二升緦麻十五升此哀之發於衣服者也聖人取於人情制為五服其等降如此今爾百姓親屬相犯問以服紀年月皆言不知以此觀之則死時不為服服而不終其制者亦多矣其去禽獸豈逺哉重本業古有四民曰士曰農曰工曰商士勤於學業則可以取爵祿農勤於田畝則可以聚稼穡工勤於技巧則可以易衣食商勤於貿易則可以積財貨此四者皆百姓之本業自生民以來未有能易之者也若能其一則仰以事父母俯以育妻子而終身之事畢矣不能此四者則謂之浮浪遊手之民浮浪遊手之民衣食之源無所從出若不為盜賊即私販禁物一旦身被拘執陷於刑禁小則鞭笞肌膚大則編配絞斬破蕩家産離棄骨肉方此之時欲為四民之業而何可得也臨海令彭仲剛續諭俗五篇崇忠信人之所以異於禽獸者以有人理也人理莫大於忠信忠則不欺於君信則不欺於人人能內不欺心外不欺人然後可以為人而異於禽獸矣茍能力行不息則明無人非幽無鬼責天地祐之鬼神福之親族信之鄉黨敬之其在世也豈不樂哉若不忠不信懷私飾詐內以欺心外以欺人則人理絶滅去禽獸不逺矣如此則明有官府之典刑幽有鬼神之譴責不協於親族不齒於鄉黨又何利焉三代之時人人有士君子之行雖小夫賤𨽻婦人女子皆知蹈履忠信不敢為欺何必古之時近世如包孝肅公尹京時民有自陳某人以白金百兩寄我其人死矣以金還其子子不肯受願召其子還之尹召其子其子辭曰亡父未嘗以白金寄人兩人相遜久之又嘗親見田間一老農時當大旱人皆訴以求蠲稅獨不肯訴問其故曰老夫田偶得蔭注實不傷若雷例去訴是欺天也又見一老吏有鄰人訴事於郡囑以三十千後果得理其老吏遣人送三十千還之云此事乃知州自判我實不曽致力不敢欺心受此錢也後其子登科人以為不欺之報又浙西有一牙儈之子登科人賀之答曰老夫自小為牙以至今日未嘗欺瞞官司一文稅錢所以獲此報將來兒子受得官中俸錢亦無愧也如此數事皆可謂不欺心不欺人者矣今每見詞訟動飾欺詐或有偽作契劵揩改簿約負財賴業設詐規利隱減財産規避賦役本因喧爭便稱被打本因討索便稱打劫情態萬狀虛偽百端皆是自欺其心以欺他人豈不大可耻哉崇儉素儉美德也古人之所寶也禹大聖人也帝舜稱其德曰克儉於家人君富有天下猶以儉為德况民庶乎故曰儉德之共也又曰儉常足人能崇尚儉素深自撙節省口腹之欲抑耳目之好不作無益以害有益不務虛飾以喪實費食可飽而不必珍衣可暖而不必華居處可安而不必麗吉凶賔客可備禮而不必侈如此則一身之用易供而一歲之計可給既免稱貸舉息俯仰求之又且省事寡過安樂無事故富者能儉則可以長保貧者能儉則可以無飢寒豈不美哉今世之人不知以儉為美德而反以儉相鄙笑往往縱目下之欲而不恤後來飾一時之觀而不顧實患亦可謂愚矣故富饒之家日朘月削寖以不足中人之産積逋纍欠寖以貧困於是見利忘義茍求妄取兼并爭奪放僻邪侈無所不為農工商販之家朝得百金暮必盡用博奕飲酒以快一時一有不繼立見飢凍於是相攘相詐甚至盜竊身陷刑辟妻子流離原其所由皆不知崇尚儉素之過也戒忿爭一朝之忿可以亡身及親錐刀之事可以破家蕩業故忿爭不可以不戒也大抵忿爭之起其初甚微而其禍甚大所謂涓涓不壅將為江河綿綿不絶或成網羅人能於其初而堅忍制伏之則無事矣性猶火也方發之初滅之甚易既已焰熾則焚山燎原不可撲滅豈不甚可畏哉俗語云得忍且忍得戒且戒不忍不戒小事成大試觀今人忿爭致訟以致身亡及親破蕩家業者其初亦豈有大故哉被人少有所擊觸則必忿被人少有所侵凌則必爭不能忍也則詈人而人亦詈之毆人而人亦毆之訟人而人亦訟之相怨相讎各務相勝勝心既熾無緣可遏此亡身及親破家蕩業之由也莫若於其將忿之初則便忍之才忍過片時則必便清涼矣於其欲爭之初則且忍之果所侵有利害徐以禮懇問之不從而後徐訟之於官可也若蒙官司見直行之稍峻亦當委曲以全鄰里之義如此則不傷財不勞神身心安寧人亦信服此人世中安樂法也比之忿鬪爭競喪心費財伺候公庭俯仰胥吏拘繫囹圄荒廢本業以至亡身及親破家蕩業者不亦逺乎謹戶田常人之家每被官司追呼禁繫不得安寧者多緣户門之事田産之爭此最不可不謹也大抵稅賦宜及早輸納不使違期差役合依理承認不須妄糾以至交易尤當審細須防卑幼寡婦重疊私輟之類致有違礙又須錢物過度牙保契要之類凡事分明具張取問親鄰依限投印契書即時交物抱稅無紐債負以凖折交易無擡虛價以蒙昧親鄰無詭名隱寄以避免賦役無廣作四至以包占他業抱稅則盡其數不可使少抱未抱則還其錢不可使代納已典而就賣者酬其價限滿而取贖者聽其贖有鄰而執吝者從其吝理曲而被訴者還其業其或理直而有爭競則當聞之於官不可強種強割強種強割勢必鬪爭忽有殺傷必遭刑敗至如分析財産務在和平寧可崇篤親屬損已分以資骨肉不可爭訴州縣竭家資以奉吏胥如前數事茍能謹守力行無貪小利以不念大患無見目前以不恤後來無爭虛氣以不思實禍如此則追呼不至其門刑責不及其身在家無耗費之財與人無爭忤之怨豈不樂哉修隂德人之所以能安身立家長育子孫者不可但恃其智力而已必積行隂德而後為天地之所祐鬼神之所福則其身康強其家昌盛其子孫逢吉茍惟矜恃智力多行不義不祐於天地不福於鬼神未有不禍敗而覆亡也若不在其身必在其子孫故隂德不可以不修也夫所謂隂德者何也知善之可欲而力行之知不善之不可為而不為不求知不責報不以隱顯二其心夫是之謂隂德能行隂德者不矜智以詐愚不逞勇以苦怯不倚強以凌弱不挾衆以暴寡不以口腹之欲而戕害物命不以已私之利而妨害他人凡事之有負於心有害於人者皆不忍為也凡事之有便於人有利於衆者皆所樂為也寧可輸人便宜不可討人便宜茍能如是豈不為天地所祐鬼神所福哉如近世所見人行數事皆獲善報或平價糶穀求濟飢民或髙資置産深憐失業或得業即時受稅不使虛挂名籍或買業亦許收贖不欲奪其祖産或周旋族黨閭里極其歡心或存撫鰥寡少弱時加賑恤見人不善委曲勸訓聞人禍患多方解救修橋道以便行人築堰埭以利農畝散藥食以濟病民為粥食以食餓者憐男女之無歸而為之婚嫁憫旅喪之不舉而為之津遣收棄子於路而養育以俟其長拾遺物於道而標記以待其取如此之類不一而足往往身獲夀考家道興隆子孫蕃盛隂德之報豈誣也哉熊守克勸農十首雪漬冰濡土脈肥趂時舉趾莫教違荷蓑早合衝煙去負耒遲須帶月歸低田傍海仰依山雨即橫流旱即乾時決時瀦能自力轉成沃壤不為難蒸涵萌動戴芒芽小廪先儲種自嘉天暖地腴當亟播好蠲甲穀潤田家九農主客兩相依以富資貧政所宜要彼力耕吾有望借糧借種莫遲遲巳田自種樂為農不肯勤耕奉主翁勸汝回心毋見錯秋成獲利兩家同黃巖出榖半丹丘使指新疏萬壑流築堰未妨齊著力旱天隨取灌髙疇午村茅舍起炊煙夫帶兒耕餒在田赤飯黃羮須婦饁往來莫憚走東阡蠶月農須雨及時三眠才起食嫌遲採桑風雨無辭苦指日繅成白雪絲臘時得雪喜重重春到而今雨又通麥自十分堪指擬更當力穡順年豐唆伊爭訟真伊賊勸你休和是你師縱使勝來耕已廢得便宜處失便宜李守兼戒事魔十詩勸爾編氓莫事魔魔成剗地禍殃多家財破蕩身狼籍看取胡忠季子和白衣夜會説無根到曉奔逃各出門此是邪魔名外道自投刑辟害兒孫金針引透白蓮池此語欺人亦自欺何似田桑家五畝雞豚狗彘弗違時莫念雙宗二會經官中條令至分明罪流更溢三千里白佛安能救爾生生時只遣事犁鉏有智宜令早讀書莫被妖僧相誘引此人決脊尚囚拘蚩蚩女婦太無知喫菜何須自苦為料想阿童鞭背後中心雖悔何能追仙居舊有祖師堂坐落當初白塔鄉眼見菜頭頭落地今人諱説吕師囊貴賤家家必有尊如何捨祖事魔神細思父母恩難報蚤轉頭來孝爾親肉味魚腥喫不妨隨宜茶飯守家常朝昏但莫為諸惡底用金爐爇乳香官家為是愛斯民臨遣知州誨爾諄願爾進知庠序教怕嫌爾做事魔人赤城志卷三十七
