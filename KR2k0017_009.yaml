body:
  text: 赤城志卷九宋陳耆卿撰秩官門二余既序前代姓氏次及本朝按太平興國三年吳越歸版圖自錢昱以前九人皆吳越所置自是而後皆命于王朝而選遴寄專守得展布以乳赤子視昔有光矣如畢公士元章公得象元公絳趙公汝愚輔相事業發軔此州其風績最著自近世至今日每以文伯或吏師主之多循良少威刻有興作無仆壞民得婆娑起卧以養生送死而孰知上之德與侯之力哉蓋總其姓氏得一百五十有七人其日月則加詳焉逺難考近易核也赤城志卷九
  hash: sha256:818edf8e834af94be75950592a2c91799f6978c528f6f688d6653f13c134aea9
