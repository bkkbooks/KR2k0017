body:
  text: 赤城志卷二十一宋陳耆卿撰山水門三山天台天台山在縣北三里自神迹石起按陶𢎞景真誥髙一萬八千丈周回八百里山有八重四面如一十道志謂之頂對三辰或曰當牛女之分上應台宿故曰天台一曰大小台以石橋大小得名亦號桐柏棲山登真隱訣云大小台處五縣中央五縣謂餘姚句章臨海天台剡縣顧野王輿地志云天台山一名桐柏衆嶽之最秀者也徐靈府記云天台山與桐柏接而少異神雍山圖又采浮屠氏説以為閻浮震旦國極東處或又號靈越孫綽賦所謂托靈越以正基是也按諸書名稱不同惟天台乃其正號餘亦各有據獨上應台宿之語雖本道書邈不可考爾魏夫人傳云天台山下有祠堂方三里乃司命君府其東南二門有日月三辰之精光燭洞天抱朴子內篇云諸山不可煉金丹以其皆有水石之精惟大華少室縉雲羅浮大小台正神主之可以修鍊審此則其靈敞詭異出仙入佛為天下偉觀冝哉孫綽賦序云天台山者蓋山嶽之神秀也涉海則有方丈蓬萊登陸則有四明天台皆玄聖之所逰化靈仙之所窟宅夫其峻極之狀嘉祥之美窮山海之瓌富盡人神之狀麗矣所以不列於五嶽闕載於常典者豈不以所立冥奧其路幽逈或倒景於重溟或匿峯於千嶺始經魑魅之途卒踐無人之境舉世莫能登陟王者莫由禋祀故事絶於常篇名標於竒紀然圖象之興豈虛也哉非夫遺世玩道絶粒茹芝者焉能輕舉而宅之非夫逺寄𡨕搜篤信通神者何肯遙想而存之余所以馳神運思晝詠霄興俯仰之間若已冉升者也方解纓絡永託兹嶺不任吟想之至聊奮藻以散懷太虛遼邈而無閡運自然之妙有融而為川瀆結而為山阜嗟台嶽之竒挺實神明之所扶持蔭牛宿以曜峯託靈越以正基結根彌於華岱直指髙於九疑應配天於唐典齊峻極於周詩邈彼絶域幽邃窈窕近者以守見而不之之者以路絶而莫曉哂夏蟲之疑氷整輕翮而思矯理無隱而不彰啓二竒以示兆赤城霞起以建標瀑布飛流以界道觀靈驗而遂徂忽乎吾之將行仍羽人於丹丘尋不死之福庭茍台嶺之可攀亦何羡於層城釋域中之常戀暢超然之髙情披毛褐之森森振金策之鈴鈴披荒榛之蒙蘢陟峭崿之崢嶸濟楢溪而直進落五界而迅征跨穹窿之懸磴臨萬丈之絶冥踐莓苔之滑石摶壁立之翠屏攬樛木之長蘿援葛藟之飛莖雖一冒於垂堂乃永存乎長生必契誠於幽昧履重險而逾平既克隮於九折路威夷而修通恣心目之寥爽任緩步之從容藉萋萋之芳草蔭落落之長松覿翔鸞之裔裔聽鳴鳯之嗈嗈過靈溪而一濯疏煩想於心胸蕩遺塵於旋流發五蓋之逰蒙追羲農之絶軌躡二老之玄蹤陟降信宿迄於仙都䨥闕雲竦以夾道瓊臺中天而懸居珠閣玲瓏於林間玉堂隂映於髙隅彤雲斐亹以翼櫺皎日耀晃於綺疏八桂森挺以凌霜五芝含秀而晨敷惠風佇芳於陽林醴泉涌溜於隂渠建木滅景於千尋琪樹璀璨而垂珠王喬控鶴以沖天應真飛錫以躡虛騁神轡之揮霍匆出有而入無於是逰覽既周體靜心間害馬以去世事都損投刃皆虛目牛無全凝思幽巖浩詠長川爾乃羲和亭午逰氣髙褰法鼓琅以振響衆香馥以揚煙肆近天宗爰集通仙挹以玄玉之膏潄以華池之泉散以象外之説暢以無生之篇悟遣有之不盡覺涉無之有間泯色空以合迹忽即有而得玄釋二名之同出消一無於三幡恣語樂以終日等寂默於不言揮萬象以冥觀兀同體於自然李白送楊山人詩云客有思天台東行路超忽濤落浙江秋沙明浦陽月今逰方厭楚昨夢先歸越且盡秉燭歡無辭凌晨發我家小阮賢剖竹赤城邉詩人多見重官燭未曽然興引登山屐情催泛海船石橋如可度携手弄雲煙又同友人舟行詩云楚臣傷江楓謝客拾海月懷沙去瀟湘挂席泛溟渤蹇豫訪前迹獨往造窮髮古人不可攀去若浮雲沒願言弄倒景從此煉真骨華頂窺絶冥蓬壺望超忽不知青春度但怪緑芳歇空持釣鰲心從此謝魏闕又有天姥吟留别等詩張祐詩云崔嵬海西鎮靈迹傳萬古羣峯日來朝纍纍孫氏祖三茅即拳石二室猶塊土傍洞窟神仙中巖宅龍虎名從乾取象位與坤作輔鸞鶴自相羣前人空若瞽巉巉割秋碧媧女徒巧補視聽出塵埃處髙心漸苦才登招手石肘底笑天姥仰看華蓋尖赤日雲上午奔雷撼深谷下見山腳雨回首望四明矗若城一堵昏晨邈千態恐動非自主控鵠大夢中坐覺身栩栩東溟子時月却孕元化毋彭蠡不分杯浙江微辨縷石梁屹橫架萬紐青壁竪却瞰赤城嶺勢來如刀弩盤松國清道九里天莫覩穹崇上攢三突兀傍聳五空崖絶凡路癡立麋與塵邈峻極天門覷深窮地户金庭路非逺步徙將欲舉身樂道家流崇儒若一矩行尋白雲叟禮象登峻宇佛窟繚杉嵐仙壇半榛莾懸巖與飛瀑險噴難足俯海眼三井通洞門雙闕拄瓊臺下昏側手足前採乳但造不死鄉前勞何足數僧貫休詩云重疊大古色濛濛花雨時好峯行恐盡流水語相隨黑壤生紅术黃猿領白兒因思石橋月曽與道人期陳恬遊山詩云嵩陽不得到華頂可徘徊當知吾往處自有一天台赤城山在縣北六里一名燒山又名消山石皆霞色望之如雉堞因以為名孫綽賦所謂赤城霞起以建標是也山之麓有巖極深廣晉義熙初僧曇猷造寺號中巖齊僧慧明復就塑一佛故又名卧佛上又有巖二曰結集曰釋籖蓋灌頂湛然遺迹也西有玉京洞北有金錢池絶頂有浮屠七級梁嶽陽王妃所建下有曇猷洗腸井大抵皆峭壁不可登上有仙人井飛流噴沫冬夏不竭支遁天台山銘序云往天台山當由赤城為道而神雍山圖亦以此為台山南門石城山為西門徐靈府小録又以剡縣金庭觀為北門云瓊臺雙闕兩山自崇道觀西北行二里至元應真人祠由真人祠取道仙人迹經龍潭側凡五里至瓊臺轉南三里至雙闕皆翠壁萬仭森倚相向孫綽賦所謂雙闕雲竦以夾道瓊臺中天而危居是也夏英公竦銘云瓊臺峩㠔左右如闕直上相等蘿交蔓結啓閉雲氣出入日月千里若線羣峯如屑凌霄壓海吞吳跨越柳泌題云崖壁盤空大路回白雲行盡到瓊臺洞門黯黯隂宫閉金闕瞳瞳日殿開方干詩云積翠千層一徑開遙盤山腹到瓊臺藕花飄落巖前去桂子流從别洞來石上叢林礙星斗窗邉瀑布走風雷縱云孤鶴無留滯定恐煙蘿不放回寒石山在縣西北七十里寒山子嘗居之今呼為寒巖前有盤石曰宴坐峯上有拊石洞世傳赤城山神避曇猷徙居此山宴坐西有石如植笋蘿蔓縈綴其西有石梁可數尺架兩崖間險峻不可陟南有泉如屋雷寺僧縻竹綆引之前距山腹一里有道人洞轉西二里亂泉釃流巖竇間散若虬髯因號龍鬚洞蓋台山絶勝處也臨海記云石室前有立石參差五色逺望如綬帶舊傳為綬帶山産石髓石脂絶杪有仙人石棺蛻骨尚存嘗有僧就視脛骨幾數尺云寒山詩云重巖我卜居鳥道絶人迹庭除何所有白雲抱幽石住兹凡幾年屢見春冬易寄語鐘鼎家虗名定無益又云登陟寒山道寒山路不窮溪長石磊磊澗闊草濛濛苔滑非關雨松鳴不假風誰能超世纍共坐白雲中瀑布山在縣西四十里山有瀑布垂流千丈遙望如布蓋與福聖觀國清寺二瀑為三其山出竒茗神異記云餘姚人虞洪入山採茗遇一道士引三青羊至此山曰吾丹丘子也聞子善具飲今以茗奉給祈子他日有甌犧之餘相遺也後常與家人入山獲大茗焉覆船山在縣東一十里以狀如覆船故名按神雍山圖此台山腳也其上夷坦可三十頃中有三泉冬溫夏冽以其橫據縣東舊呼為東橫側有古淨池云許渾有宿東橫山瀨詩云孤舟路漸賖時見碧桃花溪雨灘聲急巖風樹勢斜獼猴垂弱蔓鸂鶒睡橫槎漫向山林宿無人識阮家方瀛山在縣西北二十八里按徐靈府小録云由桐柏北上一峯可五里許上有平疇餘十畝間以陂池前眺蒼峯後即雲蓋峯也長慶中靈府居此寶厯元年賜今名蒼山在縣東四十里按神雍山圖云其山凌映桐柏神雍以桐柏在天台極東接寧海界即非司馬子微今置觀處絶頂睇滄海以其蒼蒼接漢故名古經云其山鳴吼必有大風雨繫船山在縣東四十里地名南洋舊傳古煎鹽處有石盤柱尚存有巨石橫亘云海波沃日舟人常繫纜於此然不可考鳯凰山在縣東一十里孫綽賦所謂覿翔鸞之濟濟聽鳴鳯之嗈嗈意即此地也司馬悔山在縣北一十三里天台山後蓋第十六福地仙人李明治之闕山在縣西南一十五里舊以狀類盤龍名龍山唐天寶中更今名折山在縣東一十六里以崖崿險折故名中有峯屹立孤秀舊傳王喬控鶴於此天柱山在縣西九十里南有黃水峯羅提刑適詩云孤峯插太清天柱此垂名造化功成後乾坤賴不傾夜星千拱小秋漢一梁橫欲問登臨處重梯四面生大盆山在縣西一百八十里西接東陽南界仙居以遙望形如覆盆故名鼻山在縣西北一十五里以山形如鼻故名髻山在縣東四十里以其形如髻故名土墻山在縣西四十里以形如繚墻故名峇山在縣西南一十五里甑山在縣西三十里簷山在縣西南三十五里松山在縣東南四十里招賢山在縣東四十五里焦山在縣西南六十里雷馬山在縣西九十里華頂峯在縣東北六十里蓋天台第八重最髙處舊傅髙一萬丈少晴多晦夏有積雪可觀日之出入中有黃金洞絶頂東望滄海彌漫無際俗號望海尖下瞰衆山如龍虎蟠踞旗鼓布列闕草木薰郁殆非人世僧智顗與司馬承禎嘗宴坐修真焉孫綽賦所謂陟降信宿迄乎仙都是也有葛元丹井王羲之墨池李紳題云欲向仙峯煉九丹獨瞻華頂禮真壇石標琪木凌天碧水挂銀河映日寒天外鶴聲隨絳節洞中雲氣隱琅玕浮生未有從師路空誦仙經想羽翰玉霄峯在縣北三十五里洞天宫上重崖疊障松竹蔥倩且産香茅世號小桐柏焉茅惟宫後者佳地不踰丈山中道士多祕惜之皮日休寄題云青冥向上玉霄峯元始先生戴紫蓉曉案瓊文光洞壑夜壇香氣惹杉松間迎仙客來為鶴靜噀靈符去是龍子細捫心無偃骨欲如師去肯相容陸龜蒙詩云天台一萬八千丈師在浮雲端掩扉永夜秪知星斗大深秋猶見海山微風前幾降青毛節雪後應披白羽衣南望煙霞空冉拜欲將飛魄問靈威五峯在縣北一十里國清寺側其峯有五正北曰八桂東北曰靈禽東南曰祥雲西南曰靈芝西北曰映霞前有雙澗合流南注大溪舊志云號天下四絶之一按九域志以齊州靈巖潤州棲霞荆州玉泉并國清為四絶而神雍山圖又有益州定慧寺初無四絶之名姑存之九峯在縣西北一十五里其峯有九按徐靈府小録瀑布寺有峯山蓋台山支翰名九壟唐天寶闕年改今名王羲之與支道林嘗登焉水塏西峯在縣北二十里僧普岸棲止處紫凝峯在縣西南二十五里無相院側舊傳僧智顗誦經感紫雲之異故名蓋與瑞龍天柱香爐應澤四峯相望均為勝槩大靁峯在縣北二十九里大慈寺主山有蜜蜂洞在其東焉九折峯在縣東北三十里僧智顗宴坐立道場處孫綽賦所謂既克濟於九折路威夷而修通是也蓮華峯在縣西北三十五里以狀如蓮華故名通元峯在縣北五十里僧德韶嘗卓庵焉柏香峯在縣北六十里以多柏木故名四望隂崖垂磴萬仭列秀峯在縣西北六十里萬年寺西蘆峯在縣西七十里舊傳葛元嘗植蘆於此下有蘆洋蘆坑明巖在縣西北七十里舊名暗巖周顯德中更今名巖前峭壁屹立亦號幽石其下竅冗逶邃日光穿漏中有僧全宰棲真洞轉北數步怪石森然上有兩峯倒側號合掌巖西有泉蔽崖而下渙若垂箔寺僧用竹綆引之從髙下墜號曰水索由其北捫蘿而下至重巖盤石品列即三隱嘯詠之地常有光如月號石月寒山子詩所謂重巖我卜居鳥道絶人迹是也寺東有響巖或云叩之聲鏗然白郎巖在縣西北三十里齊僧普自遼東憩此有神號江白郎告曰此吾所居以師有德業推以相奉故建寺號白巖唐長慶四年令白餘豐首禱雨焉時有異物似龍自穴而出至寶厯初有令冉禱亦然前進士王展為之記百丈巖在縣西北二十五里崇道觀西北與瓊臺相望峭險束隘四山墻立下為龍湫翠蔓蒙絡水流聲潨然盤澗繞麓入為靈溪獅子巖在縣東四十里繫船山北口呀然如獅子故名下臨小溪險峻不可陟特可仰視有石棺石匱石爐之屬東望有小亭翼然即龍祠翠屏巖在縣南二十五里孫綽賦所謂摶壁立之翠屏者是也曹家巖在縣西三里龜巖在縣南五里闡法寺側寶陀巖在縣北二十里捨身巖在縣北五十里石橋庵側赤巖在縣西七十里顧儒嶺在縣東南一十五里按輿地志舊名東􅢐魚浪反有齊顧歡讀書堂後人因以為名今嶺旁有歡溪歡墺且有顧姓居之或其苗裔也大小石鎖巖在縣西北一十五里福聖觀西盤摺峭峻八柱嶺在縣北五十里按地理記云天台山有八柱巖孫綽賦所謂八柱森挺以凌霜是也察嶺在縣西二十里與金地嶺接蓋漢髙察所隱之處舊有讀書堂今不存金地嶺在縣西二十里金錢池側一名佛隴峯見傳燈録銀地嶺在縣北三十里即定光所示智顗處見傳燈録杜潭嶺在縣南二十五里與臨海分界黃振嶺在縣東南四十里與臨海分界關嶺在縣西北四十里與新昌分界筋竹嶺在縣東四十五里與寧海分界伏虎嶺在縣西一十五里白水嶺在縣西北二十里黃壇嶺在縣南三十里斜嶺在縣西四十里石壁嶺在縣西四十五里羅公嶺在縣北五十五里盤耒嶺在縣南六十里鎗旗嶺在縣西七十里梅支嶺在縣東八十里摘星嶺在縣北一百里玉京洞在縣北七里赤城山右蓋第六洞天茅司命所治或號太上玉清天或號玉真清平天或號上清玉平天按道書云天尊在元都玉京山説法令衆仙居此又會稽記云赤城山有玉室璿臺許邁嘗居之因與王羲之書云自天台山至臨海多有金臺玉室仙人芝草赤城事實又載晉柏碩因馳獵深入見其中有名花異草香氣不凡又徐靈府小録云其下别有洞臺方二百里魏夫人所治南馳縉雲北接四明東距溟渤西通剡川中有日月三辰瑶花芝草自晉宋梁隋暨唐天寶嘗望秩焉國朝咸平天聖中投金龍玉簡頃嵗為人竊去今堙塞不全矣側有道人洞其中二石穴險不可躋余爽詩云羽駕歸來洞已扄洞門深鎖讀殘經瓊臺一覺仙都夢不覺松根長茯苓半山松柏散天聲芝蓋當年憩赤城我是上皇藝閣吏玉京應有舊題名東臨滄海宴羣仙誤入桃源小洞天一局殘棊消幾刻老龍鬚甲巳蒼然劉阮洞在縣西北二十里先是漢永平中有劉晨阮肇入山採藥失道見桃實食之覺身輕行數里至溪滸有二女方笄笑迎以歸留半載謝去至家子孫巳七世矣見續齊諧記國朝景祐中僧明照亦因採藥見金橋跨水有二女戲水上恍然如故事焉乃疏鑿為亭植桃紛擁令鄭至道為即景物之勝隨處命名時人爭為賦詩今舊觀湮沒惟亭存鄭記云劉阮洞其傳久矣余竊邑於此訪於故老往往不知其所在比按圖得之以詢護國寺僧介豐乃曰洞居寺之東北二里斜行山谷隱於榛莾間人迹罕及景祐中先師明照大師嘗採藥見金橋跨水光彩眩目二女未笄戲於水上如劉阮所見此水仙之洞府也元祐二年春乃鑿山開道立亭於其上環亭夾道植桃數百本所以追遺迹續故事也越明年三月十日丁丑寺僧報桃花盛開并以其景物之盛求名焉余率縣尉縉雲郭儀彥文監征開封曹得之來逰而黃巖縣主簿西安王沔之彥楚與其弟宣德郎知金華縣事漢之彥昭繼至乃相與幅巾杖藜徜徉行歌沿澗而上觀渌波之漣漪聽寒音之潺湲微風過之餘韻清逺飄飄然猶鏘佩環而朝玉闕也遂名之曰鳴玉澗澗之東有塢植桃數畦花光射日落英繽紛點綴芳草流紅縹眇隨水而下此昔人食桃輕舉之地也遂名之曰桃花塢自塢以北行數百步攢峯疊翠左右回擁中有澗流隨山曲折而遊人之道從之及水窮而道盡則有潭清徹淵澄可鑒毛髮羣山倒影浮碧搖蕩中有洞門潛通山底其深不測雖淫霖暴注而不盈大旱焦山而不涸此寺僧見金橋之地也遂名之曰金橋潭潭之南滸水淺見沙中有盤石三不沒者數寸可坐以飲自上流杯盤隨流蕩漾必經三石之間俯而惙之如在几案此羣仙會飲之地也遂名之曰會仙石據石之端仰而視之三峯鼎峙峻極雲漢寒光襲人虛碧相映危崖蕩花紅雨散亂其東峯則孤危峭拔儀狀竒偉上有雙石如綰鬟髻遂名之曰雙女峯其西峯則壁立千尋上連巨嶽朝陽方升先得清照遂名之曰迎陽峯其中峯則居中處焉以雙女迎陽為之輔翼羣山之翠合而有之遂名之曰合翠峯三峯之間林麓踈廣草石瑰異左連瓊臺雙闕之山右接石橋合澗之水採芝茹木擷翠佩芳杖屨輕而白雲隨笑語髙而山谷應修然而往直欲跨雙鳬御清風逍遙乎不死之鄉而不知塵境之卑蹙涉世之有纍也遂名之曰迷仙塢自塢以出至於迎陽峯之下有石偃於山腹廣袤數丈寺僧因石址結亭於其上畫桷雕楹翬飛鳥革前臨清泚瓦影浮動魚跳圓波光弄樽爼浮杯之迹顧指在目遂名之曰浮杯亭是日也天氣清明東風和暢巖端過雨踈雲留日余與諸君携茵席挈壺觴上登崔嵬下弄清淺流觴藉草惟興所適山殽野䔩具於臨時膾靈溪之鱗茹金庭之蕨無備具之勞也挂衣長松落帽幽石帶慵則披衣履倦則跣足解巾漉酒玉山自頺無衣冠之束也意所欲飲命樽注之一引而盡量窮則止無鍾鼓之節也酒酣浩歌聲振林木音無宫商唯意所發樵夫牧厮為之捫髙崖履危石荷柯倚䇿而視之彼烏知其非劉氏之子阮氏之孫厭洞府之未廣而復為山間之逰乎既而夕陽西傾暮煙四塞洞天之景恍若失之於是尋雲路騁歸驂松月照人金影破碎遙聞雞犬乃悟人間諸君皆懅然而驚相顧而語疑夫陵谷之更變而子孫之遷易也時郭彥文立馬謂余言曰數千百年湮沒之迹自公發之今日勝逰之樂可無文以紀之乎余病夫山水清而文辭俗景物冨而才思窮不能盡洞中之幽趣固辭而不獲免乃書其所見之實以塞來命若夫寫難名之象發不盡之意則諸君之新辭雅詠在焉非余所能道也元稹題劉阮妻二首云仙洞千年一度開等間偷入又偷回桃花飛盡秋風起何處消沉去不來芙蓉脂肉緑雲罨盡樓臺青黛山千樹桃花萬年藥不知何事憶人間曹唐題云樹入天台石路新雲和草淨逈無塵煙霞不省生前事水木空疑夢後身往往雞鳴巖下月時時犬吠洞中春不知此地歸何處須就桃源問王人朝公為題云桃花開巳繁溪水濺濺去不見持杯人自嘆來何暮丹霞小洞在縣西北一十五里福聖觀東北舊傳葛元錬丹於此有仙人拍手巖唐刺史柳泌於此修藥今天台觀其所止也石橋在縣北五十里即五百應真之境相傳為方廣寺有石梁架兩崖間龍形龜背廣不盈咫其上雙澗合流泄為瀑布西流出剡中梁既峭危且多莓苔甚滑下臨絶澗過者目眩心悸昔僧曇猷欲度梁訪方廣忽有石如屏梗之舊號蒸餅峯孫綽賦所謂踐莓苔之滑石搏壁立之翠屏是也凡往來人供茗乳花效應或寶炬金雀靈蹤梵響接於見聞石鏬有木瓜尤異華時青蛇盤紏枝幹至實落供大士乃去人目為護聖瓜夏英公竦銘云山壤厭靈融結推功穹隆石梁飛雲架空埀流下激絶岸旁通煙華溟濛矯矯翔龍朝日曈曨蜿蜿騰虹願接天孫以助登封趙清獻抃詩云曉登山閣一爐香瞻企神僧謁上方人度石橋何所畏如來元是世津梁楊蟠詩云金毫五百幾龍尊隱隱香山聖迹存方廣寺開無俗路優曇花現有靈根一峯突岸臨天壁闕澗淙橋透石門今日不將心洗盡更從何處覔真源杉孫何詩云六月巖崖似九秋興公辭賦好淹留松迤邐連華頂鐘磬依稀近沃洲枕水古碑卿相撰拂雲新剎帝皇修髙僧盡解飛金錫誰是當年白道猷靈姚孳詩云萬沠鏗鍧走電車跨巖蚴蟉玉虹斜禽飛下傳消息五百甌中結茗花趙湘詩云白石峯猶在橫橋一徑微多年無客過落日有雲歸水淨苔生髮山寒樹著衣如何方廣寺千古去人稀斷橋在縣北七十里自石橋沿澗行可十五里至此一石中斷因以為名即所謂小橋是也舊傳羅漢所居之境下臨危澗亂石棊布行者十步九跌雖邑人亦罕至云坐禪石在慈雲寺東舊傳有夀禪師者宴坐於此雞籠石在縣東南八里拋陀石在縣西一十五里赤城志卷二十一
