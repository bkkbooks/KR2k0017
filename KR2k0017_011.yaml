body:
  text: 赤城志卷十一宋陳耆卿撰秩官門四余於縣廨巳略述令之義今考五縣姓氏自雍熙迄今二百四十年間總三百八十有九人其卓有治行去為民思與夫貪殘罷軟留為民患者不知其多寡何如也河陽鄴岸何地無之顧一伸眉彈指間休戚立變余讀唐古之竒八如之語輒三歎焉繼是者何寥寥邪茲故彚為一編且略附其行事將使後之為政者知警知慕相率為卓魯之歸至若前代姓氏其散在史諜者今得十有七人餘弗著縣令臨海黃巖天台仙居寧海赤城志卷十一
  hash: sha256:5077033a8e7425f4d4ef7aadfb19ed710c725d5cb5119647a27db36c50ad7707
