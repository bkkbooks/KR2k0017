body:
  text: 赤城志卷二十八宋陳耆卿撰寺觀門二寺院黃巖禪院三十有三慶善寺在縣東南五十步舊名安寧晉永和二年建國朝紹興二十一年改今額有二閣一奉太宗御書一號金光明又放生池在焉瑞巖淨土寺在縣西北四十五里唐景福初僧師彥建或云唐大順二年或又云丈德初建其山石皆紫色乾寧二年賜名瑞巖僧懷玉智顗皆嘗棲焉國朝祥符元年改今額乾道中錢參政端禮家乞為香燈院賜名移忠昭慶後其孫丞相象祖還諸朝復今額楊傑詩云岩谷連天嶺杉松徹象山路從雲外入人自海邊還禪榻紅塵斷經窗白畫間玉蓮生有處香滿翠微間孫大廉詩云流水元依澗孤雲不著山萬緣機慮斷一點淨明還立雪人何在銜花鳥自間羣昏疑網破雄論落人間又云白蓮開緑水佛子舊家山淨境無南北塵心有去還林深天籟逺風定水雲間何日逄征騎重來翠巚間教忠崇報寺在縣西五十里東晉隆安二年建舊傳有僧誦仁王經而甘露降遂名露山後以冦孫恩屯兵其處忽有飛石擊之退遂改名靈石有隋智顗翻經臺唐李義山著書堂又有飛來石或傳自西北飄墜于此一鐘頗巨云自海門浮至鐫西度鐘三字國朝紹興初謝參政克家家乞為香燈院遂改今額舊傳昔有異人塑殿中佛像期以十旬啓門僧怪之未及期而啓忽有雙鶴飛出視所塑才二像珠髻熒然故寺舊名耀珠殿前有浮圖二藏舍利及貝葉等書云鴻福寺在縣西八十里東晉永和中建舊有永和堂相傳菩提引尊者所基至唐咸通中新之按五代石刻山有獨峯望之若紫雲覆頂芒采注射山若浮動故號浮山後有西僧結廬誦經其動遂止國朝大中祥符四年賜額香積寺在縣西南二十里晉元興二年建國朝大中祥符元年賜額按蘇仲昌殿記即古三童寺也東禪護國院在縣東南二里唐咸通二年建國朝太平興國五年重建瑞相院在縣東南七里方山上唐大中六年建國朝治平三年賜額有辟支佛牙正等院在縣南二十里唐乾符五年建治平三年賜額舊有竹軒吳亶詩云虛室澄心近竹開雪中無事共徘徊不須翠柏亭前見自有清風座上來林小未宜輕瘦節嵗寒方可看髙材支公適好誠何在豈謂香嚴擊後雷黃逺詩云隱隱招提地幽軒無點埃惟栽紫竹種相伴白雲堆疏影月移轉清聲風送來居常稀俗客貝葉此勤開張景修詩云種竹才添十數竿題詩已僅百餘篇有時碎影搖金地盡日清風伴玉泉不與愛漁人把釣肯教騎馬客求鞭平生最喜此君子一灑何當聽雨眠左緯詩云山色重重鑽碧蘿更栽修竹在山阿老僧不識春頭面但見階前新笋多廣化院在縣南二十五里吳赤烏中建國朝政和中斸地獲大古鏡背上有靈龜二字賜號曰靈龜治平三年改今額善法院在縣南三十里大中祥符元年建仍賜額證法院在縣西三十里舊在方山東唐大順中守杜雄徙今地因名資福即僧稠木道場國朝大中祥符元年改今額按康定元年長吉懴堂記云堂立西南隅至祥符紀號之初募衆廣之觀此則徙建嵗月當在淳化之後祥符之前未詳孰是慈德院在縣南五十里舊名善德唐中和二年建國朝治平三年改今額善住院在縣西五十五里唐太和七年建國朝大中祥符元年賜額崇福院在縣西六十里治平三年建仍賜額淨應院在縣東南六十里舊名感應晉天福八年建國朝治平三年改今額金仙院在縣南六十里舊名仙巖唐天寶元年僧子鴻建國朝治平三年改今額演教院在縣西六十里雙魚峯吳赤烏二年建仍賜額廣孝院在縣西南六十里吳赤烏中建國朝治平三年賜額般若院在縣西七十里大中祥符元年建仍賜額禪定院在縣南七十里舊名神祿禪師塔院晉天福七年建國朝大中祥符三年賜今額惠衆院在縣南七十里舊名靈泉開寶元年建治平元年改今額秪園院在縣南七十里舊名瑞峯即神祿禪師道場晉天福中建吳越寶正六年改今額法會院在縣東南七十五里舊名龍華吳越寶正三年建國朝治平三年改今額崇國院在縣南七十里舊名普光晉咸和中建國朝景德中改今額西安國院在縣西七十里唐清泰三年建國朝治平三年賜額明覺院在縣南八十里舊名應龍唐大中二年建昔僧智顗嘗飛錫于此所指處泉自石出號智者泉國朝治平三年改今額吉祥院在縣東南八十里舊名應祥晉天福八年建國朝治平三年改今額覺慈院在縣西南八十里唐大中五年建國朝大中祥符元年賜額慶恩院在縣東南一百里舊名修福晉天福三年建國朝治平三年改今額大明因院在縣東南一百里泉村舊名修福唐大中二年建國朝大中祥符元年改今額治平院在縣南一百二十里治平三年建仍賜額天真院在縣東南二百里海中乾德四年建仍賜額悟空院在縣東南三百里海中東鎮山上晉天福六年建國朝治平三年賜額舊傳有金鐘一寨官脅而取之登舟人鐘俱溺今水際時現金光云教院二十興善院在縣東南三里舊名瑞隆感應塔院本僧德韶建國朝大中祥符元年賜今額俗呼山奧寺宣和中燬于冦紹興二十八年僧文異新之其後令孫挺之以旱禱觀音立應乃審天竺梵相建殿以奉之彭殿撰椿年為之記汪內翰藻題云已怯驚潮渡還憂復嶺登逢人多問數投宿只尋僧野飯農夫怪山行稚子能冦來那得爾諸將解飛騰時藻聞北兵入四明故云崇善院在縣東南八十里乾德五年建太平興國七年賜額興善治平元年改今額並寺有巨麓曰紫髙産異茶佛殿後有泉出巖竇人以煮藥多驗威神院在縣南四十五里舊名靈湫唐乾寧三年建國朝治平三年改今額寺後崖壁峭立有瀑布及鄭公臺國寧院在縣南二十里唐咸通三年建治平三年賜額內有元祐間題梁曰金門散吏杜蓋祁公族也小妙智院在縣西南一里內乾德五年建仍賜額天長院在縣南四里舊名無量夀塔院大中祥符元年賜今額寶相院在縣東七里舊名歸依唐乾符中建國朝治平三年改今額常樂院在縣東南二十里唐大中六年建國朝治平三年賜額報恩院在縣北二十里唐清泰三年建國朝嘉祐六年賜額夀安院在縣西南二十五里唐中和二年建國朝景德中賜額普信院在縣南三十里治平三年建仍賜額多福院在縣西三十里舊名興福吳赤烏中建國朝治平三年改今額安國院在縣東南五十里舊名聖水唐大中間建國朝大中祥符元年改今額慈雲院在縣西五十里晉隆安二年建國朝大中祥符元年賜額慧力院在縣南四十五里唐咸通三年建國朝治平三年賜額流慶院在縣南五十里舊名塔院晉天福三年建國朝大中祥符元年改今額澄照院在縣東南七十里舊名龍潭天聖元年建治平三年賜今額資聖院在縣南八十里溫嶺舊名報國乾德五年建國朝治平三年改今額顯慈院在縣南一百里舊名報國唐太和七年建後改今額資聖院在縣東南一百里舊名國興唐元和元年建國朝大中祥符元年改今額律院二普澤院在縣東三里隋開皇中建舊在新安廟南國朝治平三年賜額乾道九年僧彥琚徙今地勝果院在縣東南二十五里治平三年建仍賜額前有小嶼名金屏山右二院嘉定十六年齊守碩請以禪為律甲乙院三十有四妙智院在縣東南三十里舊號靈感觀音建隆元年僧南慧建初慧自蜀輿觀音像至此少憩且舁行不動少頃彩雲絢霞環匝紛擁且現其相焉闔境尊異遂留慧營殿其後如吉繼主之有王羲之墨池內照庵滌慮軒陸農師佃記云佛出西方不知幾千萬里其書之契理會道與中國聖人之言一又其神靈之寓光影著見若今峩眉天台感觸之異非獨中州之人聞而趨之雖西域其徒亦纍譯而至也與道家之説蓬萊方丈乃在煙海渺茫荒忽不考之外異矣黃巖逺邑也以鄰天台其俗無貴賤大扺嚮佛雖屠羊履狶牛醫馬走漿奴酒保洴澼之家亦望佛剎輒式遇其象且拜也以故學佛之徒飾官宇為莊嚴則吝者施財惰者輸力傴者獻塗眇者效準聾者與之磨礱而土木之功蒼黈赭堊之飾殆無遺巧然其最佳曰妙智寺蓋建隆中僧南慧之所造逮今百年繼者非一而卒成者如吉也余聞之也夫所謂妙智者佛之所知是也疏觀泛救無適而非真可得而不可求可知而不可授雖母欲以與季不能也蓋智難口傳妙須心解如此今以名其寺如吉與其徒託而居之矣當知是也彼世之人舍是弗圖而逐逐於外以事莊嚴則雖締以金銀絡以珠玉譬猶蜃噓成樓半出霄漢其彩五色終非實相如吉善住持置田數百畝延十方衆以為無窮永久之賴邑人多之而余兄嘗宰是邑言其善故與為記囚附以所聞使刻諸石焉趙拃題內照庵云山老榜庵名內照掩扉默坐徒觀妙欲知畢竟事如何無量夀光踰兩曜岑象求題滌慮軒云聖人重洗心君子貴浴德清心是道場金仙有遺則人言我慮不須滌我謂幾人能滌得以此息萬緣以此消六賊君不見水觀月觀成道人盡向此門生妙識廣慈院在縣西二十里唐景福中建仍賜額陳侍郎公輔嘗肄業其間且為詩云來時膏雨迷新野去日薰風吹舊林寄語主人休惜别白雲南北本無心鷲峯院在縣北七里晉永和中建國朝治平二年賜額大仁院在縣東一十里舊在山之下名智仁周顯德中建國朝景德元年改今額乾道初徙今地有兩池極清泚蓴萊生焉化城院在縣西一十五里舊名岱石唐乾寧二年建國朝治平三年改今額清修院在縣東南一十五里金鵝潭下舊在縣南九十里治平三年賜額乾道六年徙今地定光院在縣西二十里唐景福中建仍賜額國朝天聖七年重建永夀院在縣西北二十里晉永和二年建唐會昌中廢咸通中復建國朝大中祥符元年賜額法蔭院在縣西二十里舊名靈雲唐乾寧二年建國朝治平三年改今額延夀院在縣西南二十五里晉天福五年建國朝治平三年賜額明寂院在縣北二十里治平三年建仍賜額夀昌院在縣東南三十里舊名永昌唐大中間建國朝淳化二年以犯藝祖陵名改今額廣教院在縣南三十五里舊名石佛漢乾祐二年建國朝大中祥符元年改今額淨安院在縣西四十里唐咸通九年建晉天福初僧德倫重建四年賜額廣嚴院在縣西四十里唐乾符間建國朝大中祥符元年賜額香嚴院在縣南四十里唐開元元年建會昌中廢大中復建國朝大中祥符四年賜額有富文忠公遺華嚴顒師及王樂道張隱之論道帖更兵火弗存護法院在縣南四十五里舊在鳯城山下唐大順二年建國朝治平三年徙今地仍賜額普濟院在縣南五十里舊名安濟唐光化元年建國朝治平三年改今額淨慧院在縣南四十五里太平興國元年建今佛殿僅存梵安院在縣東南五十里舊名保安開寶中建太平興國二年改今額廣濟院在縣東南六十里舊名福夀唐咸通元年建國朝大中祥符初改今額資善院在縣東南六十里慶歷元年重建仍賜額演法院在縣東南六十里舊名茶院端拱中建慶歷三年改看經院治平三年改今額燈明院在縣東南六十里晉隆安二年建國朝大中祥符元年賜額興教院在縣南七十里舊名興國治平三年改今額資福院在縣南七十五里舊名瑞峯唐大順中建國朝大中祥符二年改今額按殿記云大順建寺時即賜額未詳小明因院在縣南八十里唐咸通五年建國朝大中祥符九年重建妙嚴院在縣南七十里治平三年建仍賜額普照院在縣東南一百二十里唐乾符元年建國朝治平三年賜額梵興院在縣東南一百二十里舊名法興梁貞明元年建國朝治平三年改今額淨居院在縣東北一十五里唐咸通二年建國朝大中祥符元年賜額寶嚴院在縣西橋外唐太和元年建舊在縣東二十五里後徙今地靈雲院在縣西南三十里唐太和七年建國朝治