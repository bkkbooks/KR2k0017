元年改今額普慈院在縣北一里舊在蓮華峯頂名大悲開寶七年建治平三年改今額熙寧三年徙今地清心院在縣東一十里舊號螺溪以僧智顗放螺溪中故名今上有螺如巨蠣或出沒焉國朝治平三年改今額禪林院在縣西南一十五里舊號龍山集雲隋僧智顗建唐天寶六年改龍山為始豐國朝乾德二年號龍山崇修大中祥符元年改今額東廣福院在縣東一十五里舊名靈水庵寶元二年建治平三年改夀聖紹興三十一年改今額大覺院在縣東南一十五里舊名華嚴道場乾德三年建治平三年改今額永寧院在縣東北一十五里舊名普寧周顯德四年吳越王建國朝治平三年改今額景福院在縣西二十五里周顯德七年建俗呼茶院蓋僧德韶施茗處國朝開寶三年賜號崇福大中祥符元年改今額興教院在縣南三十里吳赤烏二年建舊有孜禪師廬於此以其衆峯縈抱號回巒庵及是始為院國朝大中祥符元年賜今額仁夀院在縣東北三十里舊名九明漢乾祐二年建蓋僧智顗宴坐九折道場國朝治平三年改今額西廣院在縣西三十里舊名水陸太平興國四年建熙寧三年改夀聖紹興三十一年避髙廟尊號改今額秀巖院在縣西北三十五里舊名西雲晉天福八年建蓋僧德韶第三道場國朝大中祥符元年改今額淨安院在縣西南三十五里唐乾符二年建先是吳赤烏中有周禪師居此以山如屏峙名翠屏庵及是始為院國朝治平三年賜今額資福院在縣東南四十五里舊名清化吳赤烏二年建國朝治平三年改興化隆興初賀參政允中家乞為香燈院遂改今額普光院在縣西北四十里舊名長夀後唐清泰元年建國朝大中祥符元年改今額鷲峯院在縣西五十里舊名峇嶺唐大中三年僧懷玉建國朝咸平三年改今額廣嚴院在縣西五十里舊名長隴唐光啓三年建凡三徙至今地國朝治平三年改今額寶興院在縣西南五十七里舊名寶夀漢乾祐三年建國朝治平三年改今額永福院在縣西六十里舊名靈瑞唐咸通四年建國朝大中祥符元年改今額闕院在縣西北三十五里漢乾祐元年建蓋德韶第四道場國朝大中祥符元年賜額善興院在縣東北六十里舊名華頂圎覺道場晉天福元年僧德韶建蓋僧智顗嘗宴坐於此故有定光招手石古語云定光金地遙招手智者江陵暗點頭是也又有降魔塔伏虎壇鬼疉石白雲先生室甘泉先生居今耆舊又傳葛元茶圃王羲之墨池然無所據國朝治平三年改今額寶華院在縣東六十里舊名太平唐乾符二年建國朝治平三年改今額實相院在縣西南七十里舊名彌陀塔院周顯德中建蓋僧德韶第七道場國朝大中祥符元年賜今額東安隱院在縣東七十里舊名隱嶼漢乾祐三年建國朝治平三年改今額淨居院在縣西北七十三里舊名華嚴庵蓋僧居月誦此經處治平三年賜今額證教院在縣北一百里舊名無量夀佛塔院建隆元年建蓋僧德韶第十道場後於此示滅大中祥符元年改今額澄心院在縣北一百三十里舊名澄明治平元年改今額金文藏院在縣西北六十里蓋萬年支院漢乾祐三年建國朝咸平二年賜額有金書大藏經五千二百卷實大宗所賜護飾甚偉建中靖國中燬于火瀑布寺在瀑布西一里宋元嘉二年僧法順建今廢隱嶽寺在縣東一十里鳳凰山西梁大同元年西域梵僧建隋大業元年廢唐貞觀元年重建俗或傳為鳳凰寺今廢白馬寺在縣西四十里陳時建唐會昌中廢佛窟寺在三井西峯上僧遺則卓庵居之唐會昌中廢飛霞寺按神雍山圖在赤城山腹梁嶽陽王妃建其後僧定光居之梁亡寺廢慧明院在縣東北六十里華頂峯上舊名慧日俗又呼東峯梁乾化元年建國朝治平三年改今額近廢闕十五里晉開運闕闕庵於此號金地定光後廢先照庵在縣北五十里建中靖國元年建後燬于兵紹熙四年復新之詳見石橋中有妙音曇華二亭應真閣舊有先照亭今廢葉清臣詩云一徑涼飈響萬松青霞紫霧祕靈蹤寒生别洞前溪雨聲到諸天午夜鐘山頂月髙猶駕鶴潭隂雲起舊降龍出塵境界無多逺已上金庭第七重頭陀庵在縣西九十里隋開皇十八年建初國清有聖者頭陀詣雷馬山伐木建殿相距絶逺聖者作法致雨一夕暴漲木蔽流而下後人為卓庵焉楊傑為施結界文斷橋道場在縣北七十里國朝開寶元年建太平興國五年廢赤城志卷二十八
