body:
  text: 赤城志卷五宋陳耆卿撰公廨門二郡初治臨海後徙章安後又徙始豐其復治臨海又幾年于兹矣度地既正面勢亦均脈絡聚而基礎高于以宅邦君為稱惜頗蹙陋如衙鼓二樓不正矗於前而旁峙於左是其一端也豈負山為郡其規制止若是歟然屋宅多架巉岩危軒傑閣旁湧側出摘星辰而舞雲氣視闤闠百倍公退暇杖藜輿竹清賞幽討豈不足以呼吸光潤而增為政之清明哉自倅二以下咸有舍惟兵官監當官多僦民屋不書州治州治在州城西北大固山下舊在山上今永慶院蓋其處按州廳壁記序州置大固山屈晃公居宅以其地勝立屈氏次子惠坦為太守改家為州按惠坦吳人而臨海郡置於太平二年此建立之始也後以峻不可躋遂徙今地而不知其徙之嵗續按白雲延壽庵記庵即今永慶院云昔為鈴閣當庵之中後人遷于山之下將二百載刺史錢昱登山而望遂置庵焉錢以乾德三年來守以太平興國二年再守逆而數之至唐大厯中適二百載焉此固其徙之嵗歟自儀門設廳修與建各有本末今列於左儀門在設廳前列戟十二淳熙七年沈守揆重建設廳在儀門後淳熙七年沈守揆重建有御筆詔旨藏焉小廳在設廳後淳熙十五年章守沖重建簽廳在平橋西廡嘉定十六年齊守碩重修鼓樓在子城南門上榜曰台州乾道八年趙守思重建刻漏則皇祐四年浮屠可榮所作嵗久寖差紹興三十二年黃守章重造按可榮所建用減水鐵壺二十一箭下有瓷桶以受水焉皆穴其底窒以綿其最異者大寒壺不凍後欲改造添水壺則凍矣方改造時掘其瓷桶牢不可動遂止不掘因得復用之又其出水銅管或為滓塞則以竹通之而歷百餘年管不消闕莫知其法也或曰乾道八年陳曠易之嘉定四年黃守畇又更箭籌治屏壺新作鼓角如舊制州扁乃蔡待制修所書後改用徐待制兢篆書會水災棄去復用舊額云衙樓在州治東南四十步嘉定四年黃守畇重修手詔亭在儀門外東廡與衙樓對紹興十八年宗守穎建宣詔亭在州治前與儀門對宣和元年趙守資道建拜詔亭在州西永福院嘉定八年俞守建建班春亭在儀門西廡嘉定四年黃守畇建嘉定十六年齊守碩重修清平閣在節愛堂右山上舊在堂前賀參政允中以守蕭洽清平而名淳熙三年尤守袤重建慶元二年劉守坦之徙今地見山閣在宅堂後靜鎮堂在小廳左唐李嘉祐為守竇常南薰集贊之有雅登郎位靜鎮方州之句故名嘉定六年俞守建重建君子堂在靜鎮堂前太平興國三年畢文簡士安來守真宗有君子人之稱故名慶元元年周守曄重建詳見牧守門尤守袤詩云堂堂文簡公一世夔與臯君子哉若人此言聖所褒遺愛在斯民誰能薦牲牢獨有坐嘯地清風仰彌高節愛堂在君子堂右舊名燕豫淳熙四年尤守袤重建取節用愛人之義更今名尤詩云誰憐窮山民粳籺不自贍紛紛死溝壑往往困征斂夫惟節與愛是謂仁且儉揭兹聖人言聊用自針砭又記云過靜鎮堂之左少南為方池並池而南墻壁障礙敗屋傾欹公厨以積醪醴問諸故老曰此昔之燕豫堂也池舊有橋橫縱齊度其東為草堂今皆毁撤後人因基築臺以望月其下枕池為小閣名曰清平臺庳且隘不快登覽人迹罕至亦漸頽圯余既徙臺於參雲亭之後榜曰匿峯以望北山平夷舊基更作堂曰樂山以望西山之秀而池光山色且蔽於閣而不得見也乃徙閣於池之南因燕豫堂之基别為堂曰節愛取節用愛人之義旁為挾廊而上與樂山堂通池之北石崖盤踞土壤所壅疏剔理脈發露呈顯如枕股膊如覆囷廩如黿鼉之背負土而出西望連岡疊嶂間厠隱顯如擁鬟髻如展旌斾如風檣陳馬排闥而入其南則帢幘二峯角立明秀若偉丈夫冠劍而坐雙塔亭亭影插天半於是仰山俯池逺樹近石環列先後若相拱揖煙消日出層樓飛閣浮虛跨空如展圗畫如望蓬萊之雲氣也夫昔人經始莫不相山川之宜度面勢之便其所建立如紀綱法度井井然悉有條理一定而不可易後人見其敝而不能復也始出已意變更之易其東則西廢撤其左而右病遂使昔之勝槩日就湮沒今余非能有所增創也大抵無改前規無廢後觀便覺天宇開明岩壑增秀林木水鳥皆有喜色而後知昔人之規模可因而不可變也爰刻諸石以識顛末尚告來者嗣有葺焉始欲跨池為橋仍其舊池上有老梅惜不忍伐遂不復作霞起堂在靜鎮堂後淳熙三年尤守袤建取孫綽賦赤城霞起之句嘉定十二年喻守圭重建尤自為記云雙岩堂踞兩崖之間獨得地勝其下面牆廣不尋丈擁蔽心目不快人意豫首闢之牆之外糞壤所瀦乃墾乃夷得舊址焉撤廢亭於射圃移植其上榜曰凝思取孫興公賦所謂凝思幽岩者也亭之前有敗屋數椽東面西上榱棟橈折隅奧庳仄乃改創為堂三楹南鄉與靜鎮堂相直因名曰霞起繇雙岩而望靜鎮直若引繩其外繞以回廊上連參雲以為風雨遊觀之備爰植美竹以經緯之於是堂成而勝益奇前所未睹披豁呈露天若開而明地若廣而敞景物若增益而富晨煙夕霏萬化千變近峯逺嶺間見層出皆可不出簷廡而盡得之噫是亦足以廣心志蕩塵垢而非茍以為娛也惟此邑神仙所宅昔號勝處自經大旱遂成陋邦而山川之秀不異今昔或謂豫當單乏之際顧為此不急之務然取材於舊課工於卒不市一木不役一民而使隘者敞窒者通弊者新則亦何害於政哉苐廢材不足以支久尚能十稔若其革而鼎之以俟後之君子始役於淳熙三年正月已未成於二月壬午凝思堂在霞起堂後淳熙四年尤守袤建尤詩云失腳墮塵網牒訴裝吾懷公庭了官事時來坐幽齋天風肅泠泠山鳥鳴喈喈我思在何許獨對蒼然崖雙岩堂在凝思堂後慶厯八年元守絳建紹興十七年曽守惇增修之謝伋詩云埋沒雙岩已百年班班勝事謾流傳幸陪佳客揮犀塵實欠傾城舞繡筵故老風流寒似鐵月卿英妙筆如椽拂衣便欲故山去復恐眼中無此賢樂山堂在清平閣下淳熙三年尤守袤建取仁者樂山之義慶元二年劉守坦之徙閣于今地前為堂後為挹爽尤詩云草堂有遺基榛莽嵗月久我來始經葺挹翠開户牖羣山供笑傲萬象皆奔走所以名樂山欲企仁者壽和青堂在小廳右慶元四年葉守籈重建取杜甫雲水長和島嶼青之句集寶齋在清平閣右舊在雙巖堂左治平四年葛守閎建蓋集葛元司馬承禎栁公權及近世名人翰墨刻其間故名嘉定元年李守兼徙今處羅致金石刻以實之陳通判貽範為之記參雲亭在雙巖堂左山上慶厯七年元守絳建嘉定十六年齊守碩重新之前有羅漢樹頗奇怪元自為記云州治據大固山介天台括蒼之間北直大海潮汐遡江薄城而羣山厄束水不得肆慶厯五年夏山泐海溢踰城殺人萬餘漂室廬幾半州既殘毁明年豫來守兹土拊視凋瘵戚然出涕乃循周官聚養萬民之法恤孤獨收介特招徠安輯之問軍政昔之關成過更疲佚不一乃取尺籍伍符而均齊之問吏蠧昔之強宗囊槖為姦積嵗勞豪忽厭飫豢腴貧者擠轉溝瀆沒齒不享升斗之澤乃為定規釐一隱括料姦擲譎牢不容罅參是數物信以諗之法以束之故民罷者興兵勤者休吏窮者給繕戎械治囷廪全官廬秩祠宇表㕓閈齊簿領平獄岸一一悉力問水害之繇昔之負城之民刳去客土日以薄圯是有水敗乃因新城出帑金以購材募工礱石纍甋環周表裏外內九門飾之樓觀縋木于門牝牡相函外水方悍以禦其怒作十竇窗栽以密石內水方淹以疏其惡又鑿渠貫城厮為三支達壅渟清餘波距川斫十二石杠蜿蜒跨渠舟車朅來行者不病旬嵗而工既於是秋水復攻城不沒者三板乃循闉闍垂木闔窗或持編管或捧簣土輔堅窒隙扞有餘壯巳而水無以縱遂復故道昔之刺史廨舍在山谷間滔襄之餘雖不甚壞而潮波洄汩鞠為淖汙大凡署所以朝夕處君命之地不可以不葺乃培偃瀦支蔽阤即舊而新之廨之四隅有樓及亭列峙而五至是摧圯悉欲全之則重煩里旅然士大夫必有退公息偃之地乃取城闉賸材於二山之交作雙岩堂廡緣山椒作參雲亭天空地逈萬象在下射有長圃飲有曲水賓友衎衎雅歌哨壺日為文酒之樂粵今年春州人縱遊鼓舞於庭除之下有賓擊節而歌曰昔民昏墊今民庶蕃昔民齎咨今民熙熙惟君憂樂兮與民共之天惠其寧兮無以君歸豫聞之甚喜因酬之曰豫斷斷然一介臣素性狷直重以蹇連之分孤鳴自哀而朝廷不加誅葺名為二千石幸為僚諸君皆文學政事之選交修補察以裨不逮繇是不為司敗之謫爾大抵刺史能休戚千里若政之媺惡則有輿論蓋春秋之法興作始事必書豫是以雜為之記以俟後之知者曽守幾詩云大暑不可避微涼安可尋雲亭非濁世竹樹有清隂近海風先集山高日易沉無因見明月螢火亂更深玉霄亭在參雲亭左紹興十七年曽守惇建取玉霄峯而名嘉定十六年齊守碩修後軒尤守袤記云台州南西北三面逼山獨東望諸峯差逺雲煙空濛外際溟海蓬萊方丈想見其處舊有小亭在子城之上紹興丁卯南豐曽史君谹父改創更名玉霄距今三十年摧敗傾欹岌嶪欲壓其下昔有茂林修竹今皆剪伐錯為民居溷圊羅列汚穢喧囂遊者嘆息余乃披剃蠲疏載芟載除四為繚牆以限外塗下建石柱上跨飛閣出亭之外又有六尺凡楹棟榱桷之朽撓疊瓴級甓之缺折丹黃粉漆之陊剝皆易而新之方連周阹可倚可眺晨挹灝氣夕延素月山川城郭盡在几席之下憑欄四望疊嶂環繞手揮絲桐目送飛鴻飄飄乎如乘雲御風身在物表州之宴遊於是為勝乃刻亭柱以紀嵗月云曽和李舉之詩云新亭崛起最高峯無數遙岑翠掃空恐有謝公留屐齒為開摩詰畫屏風倚江楊栁自高下照水杏花能白紅正羡渭川千畝竹清隂分借賴鄰翁王亷清云憶昔新亭敞玉霄使君髯舅意飄飄春風瀲灧黃金盞明月參差紫玉簫歌吹舊蹤空草木風流間話屬漁樵憑欄無限凄涼意寂寞寒江落暮潮舒嘯亭在參雲亭後舊名匿峯淳熙四年尤守袤建取孫綽賦匿峯千嶺之句紹興元年江守乙祖更今名尤有詩云小亭在山背不見山巍巍但見四面風輻湊朝宗之深藏固甚智自牧甘處卑一謙受四益是以能不危駐目亭在參雲亭右慶厯七年元守絳建取杜甫曠望延駐目之句嘉定十六年齊守碩重建尤詩云攀梯上甓級小憩得危亭一覽盡寥廓四山聳寒青浩若淩太虛翩如逐遐征昏花拭病目望處增雙明解纓亭在參雲亭東嘉定四年黃守畇重建澄碧亭在靜鎮亭左廡跨池舊名興移淳熙十年史守彌正增水閣更今名瑞蓮亭在節愛堂前池心舊名玉虹嘉定四年黃守畇以平橋獲蓮更今名凝香閣在靜鎮堂左嘉定六年俞守建建且名赤城奇觀在郡圃後山上舊名覽輝慶元三年劉守坦之建開禧元年葉守箋更今名雙瑞軒在赤城奇觀後嘉定四年黃守畇以粟九穗麥兩岐故名梅臺在赤城奇觀前開禧元年錢守文子建下臨巨壑有梅數十本焉桃源在郡圃嘉定二年黃守畇建自參雲亭後循雙岩堂而上植桃百餘蓋倣劉阮故事云黃有詩云本自深村老圃來偶分符竹到天台漫山幸可容桃李莫待劉郎去後栽熙春館在手詔亭西淳熙十年史守彌正建和豐樓在天台館南慶元四年葉守籈建多旨樓在三酒務北慶元四年葉守籈建推勘院在州東南二里舊在資聖寺西後廢嘉定六年俞守建徙今地濟糶倉一在報恩寺一在吉祥寺嘉定四年黃守畇建用緡錢二萬為之本秋則糴春夏則糶糶價平嵗不踊歉嵗特損嘗請于朝乞以此錢循環毋隸他用從之詳見規畫及序文養濟院在中津橋南舊在資聖寺下嘉定四年黃守畇徙今地內有坊二曰安老慈幼屋總二十楹嘗以錢置官民田一十二頃有奇地山園一頃一十六畝有奇嵗可得穀一千七百石有奇錢七十九貫有奇又嵗以千緡給他費度可贍百口廢疾者縱不入亦量給之日用什物各有差提督官吏典直卒及醫職皆具嘗自為之記且請于朝如濟糶倉法云安濟坊在司理院後嘉定四年黃守畇建先是病囚無所棲止散之城樓祠宇若僧廬三門數有死者黃乃為此以處之卧坐百用皆具監臨典直以下一如養濟法米鹽藥餌取之贓罰錢冬給衾與薪炭漏澤園在城東法安院側初奉旨建嘉定四年黃守畇重新之先是地止三十餘畝守以僧行力不任近舍有民王姓者自為之守四繚以墻其後屢壞民死皆道攢路瘞過者惻焉黃遣於東西南三隅比城五里循古城根山宫梅花園後嶺麻車同等處括遺骸一千五百餘乃先葺舊園且求園外地及威神院側後嶺庵三所置新園永為邦人聚葬之地焉舊園內立墻墻內分為若干層層分為若干穴自東取西或自南取北每穴地廣七尺修一丈比葬掘深五尺每三層橫穿一溝溝廣三尺深六尺仍相一低處筧溝水出溪約可瘞一千五百四十八人餘三所可瘞二千五百人有地而無力者官量給其費宗室命士大五千小二千餘則大三千小一千五百俗尚火化有諭而不格者亦助之錢錢稍下於瘞巳化而願以灰骨葬者聽其暴露無主者一百七十餘人棺損者易之瘞於舊園如前式右自推勘院以下非廨舍然皆繫民政故附見之通判廳廳在州西五十步淳熙五年通判管鋭重建芝秀堂在廳左以有紫芝産於棟故名登瀛堂在廳右慶元三年通判趙彥衛以欽廟所賜唐十八學士像刻于壁故名景沂堂在登瀛堂右嵗寒堂在景沂堂後蓮風閣在宅堂後側有流花渚漾花池後有翠麓雲水亭在後山上舊有觀蒼臺慶元三年通判趙彥衛更今名雲海亭在萬壑風煙右月臺在宅堂右舊為雙蓮堂後廢嘉定十四年通判何洙築臺更今名嵐關在雲海亭右梅榭在雲水亭右其側有梅峽及銀谷石於菟峩眉嶺四處萬壑風煙在後山上舊即雲水亭萬山拱揖一江演迆井邑粲然在目最為奇勝慶元三年通判趙彥衛徙亭而建且更今名添差通判廳廳在州東四十步舊為判官廳紹興十六年通判洪適改建今廢洪自記云天台之為郡環山枕海壤僻民願牒訴簡少輸調有常平時從容見謂無事故分曹授政絶贅冗者中興以來彯纓之士日進一官相承率三四輩員外置者無郡邑不有紹興二年是邦始增治中凡五易而適至被命遲期者後復三人則兹員之設將踐武不廢乃裒稡名氏官秩去來龕石壁間而繫之言曰昔昌黎韓公嘗謂邑丞二令位逼而嫌文書視成一不敢省有公負復歸尤焉曽主簿尉之不若丞於郡者亦然厥有不蹈其中萎腇不事事玩民戚休貪殘放手漫不孰何曰此太守職也吾何干夫是之謂負官否則錚錚表襮召權市威上下相高矛楯崖異吏不確其承民情不得直夫是之謂越位負其官不可越其位又不可然則奈何能使官不負位不越清其心以求其平視著令唯謹外是而議夫何知分繡閣在廳左洪自記云浙河以東層岡峭岑盤深繚復陸自會稽道天姥又百有餘里才得夷曠之地十有五頃以為天台郡郡踐山作郛而餘麓及屹立之峯廢不可廬者亦十一二故官寺民區鮮巨麗之所十數年中監州始有以員外置者僑于城之巽隅距黃堂七百步而贏其職業之商讞僚寀之謁請吏抱簿牘袂屬囂闤隘蹊間舉不以為便乃徙幕曹之舍為今所居與正員相東西焉然規恢下窄榮奧埃墨無復明軒虛牖常佯敞豁之勝獨東偏有地斗大叢榛委甓蚓虺所潛前沿後仍指為棄壤則薅刜畚治培基建閣以夏四月課材閲月而斤斧論功其高四尋衡袤二十有七尺南北不及者九之一羣山縈環垂光獻狀可以分繡名風籜雲梢映燭左右目其堂曰清閟閣之後舊有蔬畦更以嘉葩中穿小池可容蒲荷方行鶩狎至占位云休登臨亘望則岩姿之四時煙霏雲采之隱見茂木敷隂幽禽諧聲過耳娛目景與意會間日觴朋命寀奕棊援琴放歌賦詩灑然不自意其塵坌中也客有過之者曰人在天壤間以百年為須臾况宦遊弗常席甫暖而趣代今子來旬嵗矣又如是而去何以兹閣為揖之曰人皆無以一生為寄則端節澡行崈勛著言期與前英聨橫能無以一官為不久則遵憲柅姦必有以美其政豫年少質下若乘鴈雙鳬雖去來無係於邦人然吾身朝夕于斯抑欲自適其適爾客憮然曰有是哉因泚筆而書之曽守谹父戲洪詩云新營小閣面孱顔領客開樽紫翠間千里畫圖供徙倚一時名勝喜躋攀好風已破晚來暑小雨不遮湖上山老子箇中殊不淺尚堪同醉看弓彎又題詩云治中妙言語洪濤㵼詞源向來羣玉府才下紫薇垣佐郡滄海傍憑軒望朝暾便欲乘輕車長嘯登崑崙兹樓何縹眇千岩靄雲屯庭空百吏散博山炷微熏重尋羡門輩仙事渺無垠何如對妙高舉手招德雲洪弟翰林邁寄題云新閣何隆隆經營自兹嵗其前山送青其下竹交翠景物日夕佳登臨春秋異治中公事暇領客共留憩四坐歡相酬壽主真重意向來蓬瀛上視此無乃愧主稱客意好是事幸且置拄頰飽看山朝來殊爽致清閟堂在分繡閣下翰林邁寄題云昔聞王子猷借宅亦種竹此君固可喜人亦清不俗伯氏貧而癯一飯不飽肉堂前自經始護此無盡緑一官嵗強半餘日如轉燭待其長稚子而巳牽歸轂何由享嘉蔭償我志願足應煩彼邦人日報平安福曽守谹父詩云洪郎雅吳語不減賀季真開軒風煙上爽氣朝朝新手栽渭川竹坐對北海尊平生耐久朋嵗晚獨此君此君不可疏亦復未易親紛紛桃李行豈容託清塵退食靜隱几微風冷衣巾乃知王子猷真是我輩人舞漪亭在清閟堂後教授廳廳在州學東二十五步嘉定八年教授姚自重修且建宅堂三益堂在廳右淳熙四年教授應春年建前有松竹梅故名隅山堂在三益堂前慶元五年教授方㽥建以東南闖巾峯而名東軒在廳左嘉定三年教授高松建野思堂在隅山東南嘉定九年教授姚自建立德亭在宅堂後射圃慶元五年教授方㽥因立武學而建判官廳廳在州東七十步舊在今添差通判聽紹興十六年徙杜家巷淳熙三年以舊比較務改建推官廳廳在州東五十步嘉定三年推官趙師回重建遺直堂在廳後熙寧中孔文仲為從事手植檜于堂後越八十年其甥曽幾來守揭今名曽有詩六章用叔向古之遺直為韻詩云三孔吾渭陽猶及見仲叔堂堂舍人公再拜但喬木長身一庭中徑氣九霄上思公立朝時凛凛不可向如䇿登董相科賦作長卿語劉牢出外甥愧我不古老柏蜀人愛甘棠召南思領客清越下作詩來歌之扶元祐幾閲嵗諸公一無遺吾舅典型在神明力持柏葉松其身在時公手植雜木誰所栽一錢初不直録事廳廳在州南六十步州院在焉宣和三年工曹陳槖建青青堂在廳右以其前植竹取淇澳之語而名石公孺記云昔之言好竹者莫先王子猷子猷所至必種竹曰何可一日無此君耶又聞人有佳竹直造其庭不見主人而去是真好竹者豫謂子猷風流雅尚固足以超絶一時然知竹之為美而不知其所以為美者果真好竹也哉夫人之所好非特為耳目之玩而巳猶將有所考焉故淇澳之詠自猗猗至於青青自青青至於如簀則積德為愈成任事為愈重衛武公之德如是也使子猷知所以美而考德焉則功業所見亦大矣會稽陳德應司台之工曹事廳之西為小堂無他嗜好唯植竹數百竿青青然向成矣因命之曰青青堂蓋德應虛緣以應物薰然而致和直節凜凛有昂霄拂雲之氣真知愛竹者高標􅓸厲久而不渝其亦有意乎武公之功業哉故豫朝夕從之遊相與傍徨不能去也然德應嘗假黃岩臨海令遺愛户有之曹事典獄小大之獄必以情台人德之甚飲食起居必為之禱唯恐其去也後之人息於斯者猶將封殖此竹遂賦甘棠焉其亦何逺之有司理廳廳在州南九十步司理院在焉嘉定七年司理吳焯重建司户廳廳在州南五十步宣和元年户曹滕膺建今堂內脊記有姓名門額亦其所書云司法廳廳在州南一十步淳熙九年司法朱孝倫重建支鹽廳廳在州東南報恩寺後開禧元年鹽官王栻以都監倉改建巡轄遞鋪廳廳在崇和門外淳熙十年巡轄趙舜舉建赤城志卷五
